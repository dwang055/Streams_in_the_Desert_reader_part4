          "audio": "audio/Streams in the Desert - October 15.m4a",
          "paragraphs": [
            {
              "en": "The <span class=\"vocab-trigger\" data-vocab=\"sacrifices\">sacrifices<\/span> of God are a <span class=\"vocab-trigger\" data-vocab=\"broken spirit\">broken spirit<\/span>; a broken and <span class=\"vocab-trigger\" data-vocab=\"contrite heart\">contrite heart<\/span>, O God, you will not <span class=\"vocab-trigger\" data-vocab=\"despise\">despise<\/span>. (Psalm 51:17)",
              "zh": "神所要的祭就是忧伤的灵；神啊，忧伤痛悔的心，你必不轻看。（诗篇51:17）",
              "simpEn": "The gifts God wants are a heart that is broken, a heart that is sorry for its sin; You will not turn away from such a heart, O God.",
              "simpZh": "神所要的祭就是一个破碎的灵，一颗为罪忧伤痛悔的心；神啊，你绝不会轻看这样的心。"
            },
            {
              "en": "Those people God uses most to bring <span class=\"vocab-trigger\" data-vocab=\"glory\">glory<\/span> to Himself are those who are completely broken, for the <span class=\"vocab-trigger\" data-vocab=\"sacrifice\">sacrifice<\/span> He accepts is a “broken and contrite heart.” It was not until <span class=\"vocab-trigger\" data-vocab=\"Jacob\">Jacob<\/span>’s natural strength was broken, when “his hip was <span class=\"vocab-trigger\" data-vocab=\"wrenched\">wrenched<\/span>” (Gen. 32:25) at <span class=\"vocab-trigger\" data-vocab=\"Peniel\">Peniel<\/span>, that he came to the point where God could <span class=\"vocab-trigger\" data-vocab=\"clothe\">clothe<\/span> him with <span class=\"vocab-trigger\" data-vocab=\"spiritual power\">spiritual power<\/span>. And it was not until <span class=\"vocab-trigger\" data-vocab=\"Moses\">Moses<\/span> struck the rock at <span class=\"vocab-trigger\" data-vocab=\"Horeb\">Horeb<\/span>, breaking its surface, that cool “water [came] out of it for the people to drink” (Ex. 17:6).",
              "zh": "那些神用来最叫自己得荣耀的人，是那些完全破碎的人，因为祂所悦纳的祭乃是“忧伤痛悔的心”。直到雅各的天然力气被破碎，在毗努伊勒“大腿窝扭了”（创世记32:25），他才到了神能以属灵能力给他束腰的地步。直到摩西击打何烈的磐石，破开它的表面，凉水才从磐石里流出来给百姓喝（出埃及记17:6）。",
              "simpEn": "The people God uses the most to bring honor to Himself are those who are completely broken. The offering He accepts is a heart that is broken and sorry. Not until Jacob's natural strength was broken, when his hip was twisted at Peniel, did he come to the place where God could dress him with power from above. And not until Moses hit the rock at Horeb, breaking its surface, did cool water come out for the people to drink.",
              "simpZh": "神最常用来荣耀祂自己的人，是那些完全破碎的人，因为祂接纳的祭物就是破碎痛悔的心。直到雅各天生的力量在毗努伊勒被破碎，大腿窝被扭了，他才到了能让神把属灵能力披在他身上的地步。摩西也是在何烈山击打磐石，打破它的表面，凉水才流出来给百姓喝。"
            },
            {
              "en": "It was not until <span class=\"vocab-trigger\" data-vocab=\"Gideon\">Gideon<\/span>’s three hundred specially chosen soldiers “broke the jars that were in their hands” (Judg. 7:19), which <span class=\"vocab-trigger\" data-vocab=\"symbolized\">symbolized<\/span> brokenness in their lives, that the hidden light of the torches shone forth, bringing terror to their enemies. It was once the poor <span class=\"vocab-trigger\" data-vocab=\"widow\">widow<\/span> broke the <span class=\"vocab-trigger\" data-vocab=\"seal\">seal<\/span> on her only remaining jar of oil and began to pour it that God <span class=\"vocab-trigger\" data-vocab=\"miraculously\">miraculously<\/span> multiplied it to pay her debts and thereby supplied her means of support. (See 2 Kings 4:1–7.)",
              "zh": "直到基甸三百名特选的战士“打破手中的瓶”（士师记7:19）——那象征了他们生命中的破碎——藏于瓶内的火光才显出来，使敌人惊恐。正是那穷寡妇打开她唯一所剩油瓶的封口，开始倾倒，神便神奇地使油增多，偿还了她的债务，并供应了她的生活。（见列王纪下4:1–7。）",
              "simpEn": "Not until Gideon's three hundred picked soldiers broke the jars in their hands—a picture of brokenness in their lives—did the hidden torchlight shine out and terrify their enemies. It was when the poor widow broke the cover on her only jar of oil and started pouring that God wonderfully made it grow to pay her debts and supply her needs.",
              "simpZh": "直到基甸那三百名特选的战士打破手里的瓶子——这象征了他们生命的破碎——藏在里面的火炬亮光才发出来，使敌人惊恐。那个穷寡妇也是在打破她唯一一瓶油的封口并开始倒油时，神才奇妙地使油增多，还了债，供应了她的生活。"
            },
            {
              "en": "It was not until <span class=\"vocab-trigger\" data-vocab=\"Esther\">Esther<\/span> risked her life and broke through the strict laws of a <span class=\"vocab-trigger\" data-vocab=\"heathen\">heathen<\/span> king’s court that she obtained favor to rescue her people from death. (See Est. 4:16.)",
              "zh": "直到以斯帖冒生命危险，突破异教王宫严苛的律法，才蒙恩拯救她的族人脱离死亡。（见以斯帖记4:16。）",
              "simpEn": "Not until Esther risked her life and broke through the tight laws of a godless king's palace did she win kindness to save her people from death.",
              "simpZh": "以斯帖也是在冒生命危险，突破外邦王宫中严苛法律之后，才得了恩宠，救她的百姓免于死亡。"
            },
            {
              "en": "It was once Jesus took “the five <span class=\"vocab-trigger\" data-vocab=\"loaves\">loaves<\/span> . . . and broke them” (Luke 9:16) that the bread was <span class=\"vocab-trigger\" data-vocab=\"multiplied\">multiplied<\/span> to feed the five thousand. Through the very process of the loaves being broken, the <span class=\"vocab-trigger\" data-vocab=\"miracle\">miracle<\/span> occurred. It was when Mary broke her beautiful “<span class=\"vocab-trigger\" data-vocab=\"alabaster jar\">alabaster jar<\/span> of very expensive perfume” (Matt. 26:7), destroying its future usefulness and value, that the wonderful <span class=\"vocab-trigger\" data-vocab=\"fragrance\">fragrance<\/span> filled the house. And it was when Jesus allowed His <span class=\"vocab-trigger\" data-vocab=\"precious\">precious<\/span> body to be broken by <span class=\"vocab-trigger\" data-vocab=\"thorns\">thorns<\/span>, nails, and a spear that His inner life was poured out like an ocean of <span class=\"vocab-trigger\" data-vocab=\"crystal-clear\">crystal-clear<\/span> water, for <span class=\"vocab-trigger\" data-vocab=\"thirsty\">thirsty<\/span> sinners to drink and then live.",
              "zh": "正是耶稣拿起“五个饼……擘开”（路加福音9:16）的时候，饼才倍增，喂饱了五千人。正是在这擘开的过程中，神迹发生了。正是马利亚打破她美丽的“真哪哒香膏玉瓶”（马太福音26:7），摧毁了它未来的用途和价值，那奇妙的香气才充满了屋子。正是耶稣容许祂宝贵的身体被荆棘、钉子和枪刺破，祂内在的生命才像水晶般清澈的海洋倾倒出来，给干渴的罪人喝，使他们得以存活。",
              "simpEn": "It was when Jesus took the five loaves and broke them that the bread was made many times more and fed the five thousand. Through the very breaking, the wonder happened. It was when Mary broke her beautiful jar of very costly perfume, destroying its future use and worth, that the lovely smell filled the whole house. And it was when Jesus let His dear body be broken by thorns, nails, and a spear that His life inside was poured out like a sea of clear water for thirsty sinners to drink and live.",
              "simpZh": "耶稣拿起五个饼并擘开的时候，饼就倍增，喂饱了五千人。正是在擘开的过程中，神迹发生了。马利亚打碎她那极贵重的真哪哒香膏玉瓶，摧毁了它日后的用处与价值，奇妙的香气才充满屋子。耶稣也任由荆棘、钉子和枪刺破祂宝贵的身体，祂里面的生命才像水晶般的海洋倾倒出来，给干渴的罪人喝，使他们都活了。"
            },
            {
              "en": "It is not until a beautiful <span class=\"vocab-trigger\" data-vocab=\"kernel\">kernel<\/span> of corn is buried and broken in the earth by DEATH that its inner heart <span class=\"vocab-trigger\" data-vocab=\"sprouts\">sprouts<\/span>, producing hundreds of other seeds or kernels. And so it has always been, down through the history of plants, people, and all of spiritual life—God uses BROKEN THINGS.",
              "zh": "直到一颗美丽的麦粒被埋入地里，因死而破碎，它内在的生命才萌发，结出几百倍的子粒。自古以来，植物、人类和一切属灵生命的历史都是如此——神使用破碎的东西。",
              "simpEn": "Not until a pretty grain of corn is buried and broken in the ground by death does its inner heart begin to grow, giving birth to hundreds of other seeds. And so it has always been, through all history of plants, people, and spiritual life—God uses broken things.",
              "simpZh": "一颗漂亮的麦粒，也非要被埋入地下，借着死而破碎，它里面的生命才能萌发，结出几百倍的籽粒。历来植物、人类和所有属灵生命都是如此——神使用的，正是破碎的东西。"

            {
              "en": "Those who have been <span class=\"vocab-trigger\" data-vocab=\"gripped\">gripped<\/span> by the power of the Holy Spirit and are used for God’s glory are those who have been broken in their <span class=\"vocab-trigger\" data-vocab=\"finances\">finances<\/span>, broken in their <span class=\"vocab-trigger\" data-vocab=\"self-will\">self-will<\/span>, broken in their <span class=\"vocab-trigger\" data-vocab=\"ambitions\">ambitions<\/span>, broken in their <span class=\"vocab-trigger\" data-vocab=\"lofty ideals\">lofty ideals<\/span>, broken in their worldly <span class=\"vocab-trigger\" data-vocab=\"reputation\">reputation<\/span>, broken in their desires, and often broken in their health. Yes, He uses those who are <span class=\"vocab-trigger\" data-vocab=\"despised\">despised<\/span> by the world and who seem totally <span class=\"vocab-trigger\" data-vocab=\"hopeless and helpless\">hopeless and helpless<\/span>, just as <span class=\"vocab-trigger\" data-vocab=\"Isaiah\">Isaiah<\/span> said: “The <span class=\"vocab-trigger\" data-vocab=\"lame\">lame<\/span> will <span class=\"vocab-trigger\" data-vocab=\"carry off plunder\">carry off plunder<\/span>” (Isa. 33:23).",
              "zh": "那些被圣灵大能抓住、为神荣耀所用的人，都是在财务上被破碎、在己意上被破碎、在抱负上被破碎、在崇高理想上被破碎、在属世名声上被破碎、在欲望上被破碎，并且常在健康上被破碎的人。是的，祂使用那些被世界藐视、看似全然绝望无助的人，正如以赛亚所说：“瘸腿的必掠获掳物”（以赛亚书33:23）。",
              "simpEn": "Those who are taken hold of by the Holy Spirit's power and used to bring God glory are those broken in their money matters, broken in their own will, broken in their big dreams, broken in their high ideas, broken in their good name before the world, broken in what they want, and often broken in health. Yes, He uses those the world looks down on, those who seem to have no hope and no help, just as Isaiah said, 'The lame will take the goods of war.'",
              "simpZh": "那些被圣灵能力抓住、用来荣耀神的人，是那些在财务上被打碎、在自我意思上被打碎、在雄心壮志上被打碎、在高远的理想上被打碎、在世上的名声上被打碎、在欲望上被打碎，也常在健康上被打碎的人。是的，祂使用被世人藐视、看似毫无指望、毫无办法的人，就像以赛亚说的：“瘸腿的要掠获战利品。”"
            },
            {
              "en": "Oh, break my heart; but break it as a field Is <span class=\"vocab-trigger\" data-vocab=\"plowed\">plowed<\/span> and broken for the seeds of corn; Oh, break it as the buds, by green leaf sealed, Are, to <span class=\"vocab-trigger\" data-vocab=\"unloose\">unloose<\/span> the golden blossom, torn; Love would I offer unto Love’s great Master, Set free the <span class=\"vocab-trigger\" data-vocab=\"fragrance\">fragrance<\/span>, break the <span class=\"vocab-trigger\" data-vocab=\"alabaster\">alabaster<\/span>. Oh, break my heart; break it, <span class=\"vocab-trigger\" data-vocab=\"victorious\">victorious<\/span> God, That life’s <span class=\"vocab-trigger\" data-vocab=\"eternal well\">eternal well<\/span> may flow abroad; Oh, let it break as when the <span class=\"vocab-trigger\" data-vocab=\"captive\">captive<\/span> trees, Breaking cold bonds, regain their <span class=\"vocab-trigger\" data-vocab=\"liberties\">liberties<\/span>; And as thought’s sacred <span class=\"vocab-trigger\" data-vocab=\"grove\">grove<\/span> to life is springing, Be joys, like birds, their hope, Your victory singing. <span class=\"vocab-trigger\" data-vocab=\"Thomas Toke Bunch\">Thomas Toke Bunch<\/span>",
              "zh": "哦，求祢破碎我心；但破碎它如同田地，为播下麦种而耕犁而破开；哦，破碎它如同花蕾，为绽开金色花朵，而撕裂密封的绿叶；我愿将爱献予爱之大主宰，释放那香气，打破玉瓶。哦，求祢破碎我心；得胜的神啊，破碎它，好让生命永恒的泉源涌流四方；哦，让它破裂如同被困的树木，冲破寒冷束缚，重获自由；当思想的圣林跃入生机，让喜乐像鸟儿，歌唱它们的盼望，歌唱祢的得胜。 多马·托克·邦奇",
              "simpEn": "O break my heart, but break it as a field is plowed and broken for corn seeds; O break it as buds, sealed by green leaves, are torn to set free the golden flower; I would bring my love to the great Master of Love, set free the sweet smell, break the jar. O break my heart; break it, winning God, so that life's unending spring may flow out; O let it break as trees held prisoner, breaking icy chains, win back their freedom; and as thought's holy garden leaps into life, let joys, like birds, sing their hope, sing Your victory. Thomas Toke Bunch",
              "simpZh": "哦，求你破碎我的心；但要像田地犁开破碎，为的是播下麦种；哦，像花蕾被密封的绿叶撕裂，为的是开出金色的花朵；我要把爱献给爱的大主人，释放香气，打破玉瓶。哦，破碎我的心；得胜的神啊，破碎它，好让生命的永泉涌流出去；让它破裂，像被囚的树木挣开寒冰的捆绑，重获自由；当思想的圣林跃入生命，让喜乐像鸟儿歌唱盼望，歌唱你的得胜。多马·托克·邦奇"
            }

        {
          "sectionId": 2,
          "heading": "October 16",
          "audio": "audio/Streams in the Desert - October 16.m4a",
          "paragraphs": [
            {
              "en": "Let us <span class=\"vocab-trigger\" data-vocab=\"throw off\">throw off<\/span> everything that <span class=\"vocab-trigger\" data-vocab=\"hinders\">hinders<\/span> and the sin that so easily <span class=\"vocab-trigger\" data-vocab=\"entangles\">entangles<\/span>, and let us run with <span class=\"vocab-trigger\" data-vocab=\"perseverance\">perseverance<\/span> the race marked out for us. (Hebrews 12:1)",
              "zh": "就当放下各样的重担，脱去容易缠累我们的罪，存心忍耐，奔那摆在我们前头的路程。（希伯来书12:1）",
              "simpEn": "Let us put off every weight and the sin that so easily wraps around us, and let us run with holding-on power the race set before us.",
              "simpZh": "让我们放下一切重担，脱去那容易缠住我们的罪，用忍耐的心跑那摆在我们前面的赛程。"
            },
            {
              "en": "There are certain things that are not sins themselves but that tend to weigh us down or become <span class=\"vocab-trigger\" data-vocab=\"distractions\">distractions<\/span> and <span class=\"vocab-trigger\" data-vocab=\"stumbling blocks\">stumbling blocks<\/span> to our Christian growth. One of the worst of these is the feeling of <span class=\"vocab-trigger\" data-vocab=\"despair\">despair<\/span> or hopelessness. A heavy heart is indeed a weight that will surely drag us down in our <span class=\"vocab-trigger\" data-vocab=\"holiness\">holiness<\/span> and usefulness.",
              "zh": "有些事物本身并不是罪，却倾向于压制我们，或成为我们基督徒长进的搅扰和绊脚石。其中最坏的一种，就是绝望或灰心的感觉。沉重的心确实是一种重量，必定将我们在圣洁和有用性上拖垮。",
              "simpEn": "Some things are not sins themselves, but they weigh us down or take our attention away and trip us up in our Christian growth. One of the worst is the feeling of no hope. A heavy heart is truly a load that will pull us down in being holy and useful.",
              "simpZh": "有些东西本身不是罪，但却容易把我们压住，或成为搅扰和绊脚石，拦阻我们基督徒的成长。最坏的一种，就是绝望、灰心的感觉。沉重的心确实是一个重量，一定会在圣洁和有用上把我们拖下去。"
            },
            {
              "en": "The failure of the children of Israel to enter the <span class=\"vocab-trigger\" data-vocab=\"Promised Land\">Promised Land<\/span> began with their <span class=\"vocab-trigger\" data-vocab=\"complaining\">complaining<\/span>, or as the Word says it, “All the Israelites <span class=\"vocab-trigger\" data-vocab=\"grumbled\">grumbled<\/span>” (Num. 14:2). It may have started with a faint desire to complain and be <span class=\"vocab-trigger\" data-vocab=\"discontent\">discontent<\/span>, but they allowed it to continue until it <span class=\"vocab-trigger\" data-vocab=\"blossomed\">blossomed<\/span> and <span class=\"vocab-trigger\" data-vocab=\"ripened\">ripened<\/span> into total <span class=\"vocab-trigger\" data-vocab=\"rebellion\">rebellion<\/span> and ruin.",
              "zh": "以色列人不能进入应许之地的失败，始于他们的抱怨，正如圣经所说：“以色列众人……发怨言”（民数记14:2）。这也许只是从一丁点想要抱怨和不满足开始，但他们容让这情绪继续下去，直到它开花成熟为完全的悖逆和毁灭。",
              "simpEn": "The failure of Israel to go into the land God promised began with their complaining. It may have started as a tiny wish to complain and be unhappy, but they let it go on until it grew and became full-blown fighting back and ruin.",
              "simpZh": "以色列人没能进入应许之地的失败，是从抱怨开始的，就像圣经说的：“以色列众人都发怨言。”也许一开始只是小小的想要抱怨、心里不满，但他们容让这情绪继续下去，直到它开花、成熟，变成了完全的悖逆和毁灭。"
            },
            {
              "en": "We should never give ourselves the freedom to doubt God or His <span class=\"vocab-trigger\" data-vocab=\"eternal love\">eternal love<\/span> and <span class=\"vocab-trigger\" data-vocab=\"faithfulness\">faithfulness<\/span> toward us in everything. We can be determined to set our own will against doubt just as we do against any other sin. Then as we stand firm, refusing to doubt, the Holy Spirit will come to our <span class=\"vocab-trigger\" data-vocab=\"aid\">aid<\/span>, giving us the faith of God and <span class=\"vocab-trigger\" data-vocab=\"crowning\">crowning<\/span> us with victory.",
              "zh": "我们永不可放纵自己去怀疑神，或怀疑祂在凡事上对我们的永恒之爱与信实。我们可以定意让自己的意志对抗怀疑，正如对抗其他任何罪一样。当我们站立得稳，拒绝怀疑，圣灵就要来帮助我们，将神的信心赐给我们，并以得胜为我们加冕。",
              "simpEn": "We should never let ourselves freely doubt God or His forever love and trustworthiness toward us in everything. We can decide to fight against doubt with our will, just as we fight any other sin. Then as we stand strong and refuse to doubt, the Holy Spirit will come to help us, giving us God's own faith and putting a crown of victory on us.",
              "simpZh": "我们永远不要允许自己随意怀疑神，或怀疑祂在万事上对我们永远的爱和信实。我们可以下定主意，用意志对抗怀疑，像对抗别的罪一样。当我们站稳，拒绝怀疑，圣灵就会来帮助我们，把神的信心赐给我们，并以胜利为我们加冕。"
            },
            {
              "en": "It is very easy to fall into the habit of doubting, worrying, wondering if God has <span class=\"vocab-trigger\" data-vocab=\"forsaken\">forsaken<\/span> us, and thinking that after all we have been through, our hopes are going to end in failure. But let us refuse to be <span class=\"vocab-trigger\" data-vocab=\"discouraged\">discouraged<\/span> and unhappy! Let us “<span class=\"vocab-trigger\" data-vocab=\"consider it pure joy\">consider it pure joy<\/span>” (James 1:2), even when we do not feel any happiness. Let us <span class=\"vocab-trigger\" data-vocab=\"rejoice\">rejoice<\/span> by faith, by firm <span class=\"vocab-trigger\" data-vocab=\"determination\">determination<\/span>, and by simply <span class=\"vocab-trigger\" data-vocab=\"regarding\">regarding<\/span> it as true, and we will find that God will make it real to us. <span class=\"vocab-trigger\" data-vocab=\"selected\">selected<\/span>",
              "zh": "我们很容易养成怀疑、忧虑、猜想神是否离弃了我们的习惯，并且以为我们经过这一切之后，盼望终必归于失败。但我们要拒绝灰心和愁苦！即或我们感觉不到任何快乐，也当“看为可喜乐的”（雅各书1:2）。让我们凭信心、凭坚定的决心、单单因为看它为真实而喜乐，这样我们就会发现神要把它变成我们的真实。 选自",
              "simpEn": "It is easy to slip into the habit of doubting, worrying, and wondering if God has left us, thinking that after all we've been through, our hopes will end in failure. But let's say no to being sad and unhappy! Let's 'think of it as pure joy,' even when we don't feel any gladness. Let's be glad by faith, by strong choice, and by simply taking it as true, and we will find God makes it real for us. selected",
              "simpZh": "我们很容易落入怀疑、忧虑、猜想神是不是丢弃了我们的习惯，心想经历了这么多，盼望最后还是要失败。但我们绝不要灰心愁苦！就算一点快乐都感觉不到，也要“看为纯全的喜乐”。让我们用信心、用坚定的决心，只因为相信它是真的而喜乐，这样神就会使它成为我们的真实。选自"
            },
            {
              "en": "The <span class=\"vocab-trigger\" data-vocab=\"Devil\">Devil<\/span> has two very <span class=\"vocab-trigger\" data-vocab=\"masterful tricks\">masterful tricks<\/span>. The first is to tempt us to become discouraged, for then we are <span class=\"vocab-trigger\" data-vocab=\"defeated\">defeated<\/span> and of no service to others, at least for a while. The other is to tempt us to doubt, thereby breaking the bond of faith that unites us with the Father. So watch out! Do not be tricked either way. <span class=\"vocab-trigger\" data-vocab=\"G. E. M.\">G. E. M.<\/span>",
              "zh": "魔鬼有两个非常巧妙的诡计。头一个是引诱我们灰心，因为一旦灰心我们就失败了，且至少在一段时间内对别人毫无用处。另一个是引诱我们怀疑，从而打破我们与父联合的信心之链。所以要当心！两样都不要受骗。 G. E. M.",
              "simpEn": "The Devil has two very clever tricks. The first is to pull us toward being sad and losing heart, because then we are beaten and of no help to others, at least for a while. The other is to pull us to doubt, breaking the faith line that ties us to the Father. So be careful! Don't be tricked either way. G. E. M.",
              "simpZh": "魔鬼有两个非常厉害的诡计。第一是引诱我们灰心，因为一灰心我们就败了，至少一段时间对别人毫无用处。第二是引诱我们怀疑，这样就把我们与父联合的信心之链弄断了。所以要小心！两种诡计都不要上当。 G. E. M."
            },
            {
              "en": "I like to <span class=\"vocab-trigger\" data-vocab=\"cultivate\">cultivate<\/span> the spirit of happiness! It <span class=\"vocab-trigger\" data-vocab=\"retunes\">retunes<\/span> my soul and keeps it so perfectly in tune that Satan is afraid to touch it. The <span class=\"vocab-trigger\" data-vocab=\"chords\">chords<\/span> of my soul become so <span class=\"vocab-trigger\" data-vocab=\"vibrant\">vibrant<\/span> and full of heavenly <span class=\"vocab-trigger\" data-vocab=\"electricity\">electricity<\/span> that he takes his <span class=\"vocab-trigger\" data-vocab=\"fiendish\">fiendish<\/span> fingers from me and goes somewhere else! Satan is always <span class=\"vocab-trigger\" data-vocab=\"wary\">wary<\/span> of interfering with me when my heart is full of the happiness and joy of the Holy Spirit.",
              "zh": "我喜欢培养快乐的情绪！它重新校调我的灵魂，使之保持完美和谐，令撒但不敢触碰。我灵魂的琴弦变得如此震颤、满带属天的电力，以致使他将他那恶魔的手指从我身上收回去，转到别处了！当我心中充满圣灵的喜乐和欢欣时，撒但总是非常顾忌干预我。",
              "simpEn": "I like to grow the spirit of gladness! It tunes my soul again and keeps it so perfectly tuned that Satan is afraid to touch it. The strings of my soul become so alive and full of heaven's electricity that he takes his devilish fingers off me and goes somewhere else! Satan is always careful not to bother me when my heart is full of the gladness and joy of the Holy Spirit.",
              "simpZh": "我喜欢培养快乐的心情！它会重新调准我的灵魂，让它保持在这么完美的音准上，连撒但都不敢碰。我灵魂的弦变得那么颤动，充满天上的电流，让撒但把他那邪恶的手指从我身上拿开，转到别处去。当我心里充满圣灵的欢欣喜乐时，撒但总是很顾忌来打扰我。"
            },
            {
              "en": "My plan is simply to <span class=\"vocab-trigger\" data-vocab=\"shun\">shun<\/span> the spirit of sadness as I would normally shun Satan, but unfortunately I am not always successful. Like the Devil himself, sadness <span class=\"vocab-trigger\" data-vocab=\"confronts\">confronts<\/span> me while I am on the highway of usefulness. And it stays face to face with me until my poor soul turns blue and sad! In fact, sadness <span class=\"vocab-trigger\" data-vocab=\"discolors\">discolors<\/span> everything around me and produces a mental <span class=\"vocab-trigger\" data-vocab=\"paralysis\">paralysis<\/span>. Nothing has any <span class=\"vocab-trigger\" data-vocab=\"appeal\">appeal<\/span> to me, future <span class=\"vocab-trigger\" data-vocab=\"prospects\">prospects<\/span> seem clouded in darkness, and my soul loses all its <span class=\"vocab-trigger\" data-vocab=\"aspirations\">aspirations<\/span> and power!",
              "zh": "我的计划只是像躲避撒但一样躲避忧伤的灵，然而不幸的是，我并不总能成功。就像魔鬼本身一样，忧伤在我奔走在有用的公路上时迎面拦截我。它与我面对面僵持，直到我这可怜的灵魂变得忧郁愁苦！事实上，忧伤把我周围的一切都染上暗色，造成一种心智的瘫痪。任何事对我都不具吸引力，未来的前景似乎笼罩在黑暗里，我的灵魂丧失了一切的抱负和能力！",
              "simpEn": "My plan is just to stay away from the spirit of sadness as I would from Satan, but sadly I am not always able. Like the Devil himself, sadness meets me face on when I am traveling the road of being useful. And it stays right in front of me until my poor soul turns blue and sad! Sadness really takes the color out of everything around me and brings a mind-paralysis. Nothing pulls me, hopes for the future seem dark, and my soul loses all its big desires and power!",
              "simpZh": "我的计划只是像躲避撒但一样躲避忧伤的心情，但可惜我不总能成功。就像魔鬼自己一样，忧伤会在我正走在有用的公路上时迎面拦截我。它和我面对面僵持，直到我这可怜的灵魂变得又蓝又悲！事实上，忧伤把我周围的一切都染成了灰色，造成一种精神瘫痪。什么事都吸引不了我，前途看来乌云密布，我的灵魂失去了所有的抱负和力量。"
            },
            {
              "en": "An <span class=\"vocab-trigger\" data-vocab=\"elderly\">elderly<\/span> believer once said, “<span class=\"vocab-trigger\" data-vocab=\"Cheerfulness\">Cheerfulness<\/span> in our faith causes any act of service to be performed with delight, and we are never moved ahead as swiftly in our spiritual calling as when we are carried on the wings of happiness. Sadness, however, <span class=\"vocab-trigger\" data-vocab=\"clips\">clips<\/span> those wings or, using another <span class=\"vocab-trigger\" data-vocab=\"analogy\">analogy<\/span>, causes the wheels to fall off our <span class=\"vocab-trigger\" data-vocab=\"chariot\">chariot<\/span> of service. Our chariot then becomes like those of the Egyptians at the Red Sea, dragging heavily on its <span class=\"vocab-trigger\" data-vocab=\"axle\">axle<\/span> and slowing our progress.”",
              "zh": "一位年长的信徒曾说：“在信仰中保持愉快，能使任何服侍都在欢喜中进行；我们在属天的呼召中，从来没有比被快乐之翼承载时前进得更快的了。然而，忧伤会剪掉那些翅膀，或者换一个比方，会使我们服侍之车的轮子脱落。我们的车子便如红海边的埃及人那样，沉重地拖在车轴上，减慢我们的前进。”",

          "paragraphs": [
            {
              "en": "May I never <span class=\"vocab-trigger\" data-vocab=\"boast\">boast<\/span> except in the <span class=\"vocab-trigger\" data-vocab=\"cross\">cross<\/span> of our Lord Jesus Christ, through which the world has been <span class=\"vocab-trigger\" data-vocab=\"crucified\">crucified<\/span> to me, and I to the world. (Galatians 6:14)",

            {
              "en": "They were people who were living to themselves. Their hopes, promises, and dreams still controlled them, but the Lord began to <span class=\"vocab-trigger\" data-vocab=\"fulfill\">fulfill<\/span> their prayers. They had asked for a <span class=\"vocab-trigger\" data-vocab=\"repentant heart\">repentant heart<\/span> and had <span class=\"vocab-trigger\" data-vocab=\"surrendered\">surrendered<\/span> themselves with a willingness to pay any price for it, and He sent them sorrow. They had asked for <span class=\"vocab-trigger\" data-vocab=\"purity\">purity<\/span>, and He sent them sudden <span class=\"vocab-trigger\" data-vocab=\"anguish\">anguish<\/span>. They had asked for <span class=\"vocab-trigger\" data-vocab=\"meekness\">meekness<\/span>, and He had broken their hearts. They had asked to be <span class=\"vocab-trigger\" data-vocab=\"dead to the world\">dead to the world<\/span>, and He killed all their living hopes. They had asked to be made like Him, so He placed them in the fire \"as a <span class=\"vocab-trigger\" data-vocab=\"refiner\">refiner<\/span> and <span class=\"vocab-trigger\" data-vocab=\"purifier\">purifier<\/span> of silver\" (Mal. 3:3), until they could reflect His <span class=\"vocab-trigger\" data-vocab=\"image\">image<\/span>. They had asked to help carry His cross, yet when He held it out to them, it cut and tore their hands.",
              "zh": "他们是一群为自己而活的人。他们的盼望、承诺和梦想依旧辖制着他们，但主开始应允他们的祷告。他们求一颗悔改的心，并且已经将自己交出来，愿意付上任何代价，主就给他们赐下忧伤。他们求纯洁，主就给他们突然的痛苦。他们求温柔，主就破碎了他们的心。他们求向世界死，主就杀死了他们一切活着的盼望。他们求被塑造得像祂，主就将他们放在火中，“如炼净银子的”（玛拉基书3:3），直到他们能返照出祂的形像。他们求帮助背祂的十字架，但当主把十字架递给他们时，它却割破了他们的手。",
              "simpEn": "They were people living for themselves. Their hopes, promises, and dreams still held them, but the Lord began to answer their prayers. They had asked for a heart that turns from sin and had given themselves fully, ready to pay any price, so He sent them sadness. They had asked for cleanness of heart, and He sent them sudden deep pain. They had asked for gentleness, and He broke their hearts. They had asked to be dead to the world, and He killed all their living hopes. They had asked to be made like Him, so He put them in the fire like one who melts and cleans silver, until they could show His likeness. They had asked to help carry His cross, but when He held it out to them, it cut and tore their hands.",
              "simpZh": "他们是一群一直为自己活的人。他们的盼望、承诺和梦想仍然控制着他们，但主开始成就他们的祷告。他们求过悔改的心，并且已经把自己交出来，愿意付任何代价，祂就赐下忧伤。他们求纯洁，祂就赐下突然的痛苦。他们求温柔，祂就破碎他们的心。他们求向世界死，祂就杀死了他们所有活着的盼望。他们求被塑造得像祂，祂就把他们放进火里，像炼银之人一样，直到能返照祂的形像。他们求帮助背祂的十字架，但当祂把十字架递过来时，它却割破了他们的手。"

              "simpZh": "他们起初并没有完全明白自己所求的是什么，但祂照他们的话接纳了他们，把他们所求的全部赐给了他们。他们曾拿不准该不该跟祂走这么远，或是这么贴近祂。有一种敬畏和害怕落在他们身上，就像雅各在伯特利梦见一个梯子通到天上，或以利法在夜间被烦扰的梦中，又像门徒们惊慌害怕，以为看见了鬼魂，却不知道那就是耶稣。门徒们充满了敬畏，甚至想要请祂离开，或把祂的荣耀藏起来。"

            {
              "en": "They found it easier to obey than to suffer, to work than to give up, and to carry the cross than to hang upon it. But now they could not turn back, for they had come too close to the <span class=\"vocab-trigger\" data-vocab=\"unseen cross\">unseen cross<\/span> of the spiritual life, and its <span class=\"vocab-trigger\" data-vocab=\"virtues\">virtues<\/span> had <span class=\"vocab-trigger\" data-vocab=\"pierced\">pierced<\/span> them too deeply. And the Lord was fulfilling this promise of His to them: “I, when I am <span class=\"vocab-trigger\" data-vocab=\"lifted up\">lifted up<\/span> from the earth, will draw all men to myself” (John 12:32).",
              "zh": "他们发觉顺服比受苦容易，做工比放弃容易，背起十字架也比挂在上面容易。但如今他们不能回头了，因为他们已经太靠近属灵生命中那看不见的十字架，它的能力刺透了他们太深。主正在向他们应验祂的应许：“我若从地上被举起来，就要吸引万人来归我”（约翰福音12:32）。",

              "simpZh": "他们发现顺服比受苦容易，工作比放弃容易，背起十字架也比挂在上面容易。但现在他们不能回头了，因为他们已经太靠近属灵生命中那看不见的十字架，它的力量已经刺透了他们太深。主正在对他们成就祂的应许：“我若从地上被举起来，就要吸引万人来归我。”"

            {
              "en": "Now at last their opportunity had come. Earlier they had only heard of the <span class=\"vocab-trigger\" data-vocab=\"mystery\">mystery<\/span>, but now they felt it. He had <span class=\"vocab-trigger\" data-vocab=\"fastened\">fastened<\/span> His eyes of love on them, as He had on Mary and Peter, so they could only choose to follow Him. And little by little, from time to time, with quick <span class=\"vocab-trigger\" data-vocab=\"glimmers\">glimmers<\/span> of light, the mystery of His cross shone upon them. They saw Him “lifted up from the earth,” and <span class=\"vocab-trigger\" data-vocab=\"gazed\">gazed<\/span> on the <span class=\"vocab-trigger\" data-vocab=\"glory\">glory<\/span> that <span class=\"vocab-trigger\" data-vocab=\"radiated\">radiated<\/span> from the wounds of His holy suffering. As they looked upon Him, they <span class=\"vocab-trigger\" data-vocab=\"approached\">approached<\/span> Him and were changed into His <span class=\"vocab-trigger\" data-vocab=\"likeness\">likeness<\/span>. His name then shone out through them, for He lived within them. Their life from that moment on was one of <span class=\"vocab-trigger\" data-vocab=\"inexpressible fellowship\">inexpressible fellowship<\/span> solely with Him above.",
              "zh": "终于，他们的机会来到了。早先他们只是风闻这奥秘，如今却亲身感受了。祂已将自己爱的眼目锁定在他们身上，如同锁定在马利亚和彼得身上一样，所以他们只能选择跟随祂。渐渐地，不时地，借着一道道迅速闪过的亮光，十字架的奥秘照耀在他们身上。他们看见祂“从地上被举起来”，凝视着从祂圣洁受苦的伤口中散发出来的荣耀。当他们仰望祂，便靠近祂，被改变成祂的样式。祂的名随即借着他们发出光来，因祂活在他们里面。从那一刻起，他们的生命就成为单单与上面那一位无法言喻的交通。",
              "simpEn": "At last their time had come. Before they had only heard of the secret, but now they felt it. He had set His loving eyes on them, as He had on Mary and Peter, so they could only choose to follow Him. And bit by bit, from time to time, with quick flashes of light, the secret of His cross shone on them. They saw Him lifted up from the earth and looked at the shining greatness that poured from the wounds of His holy pain. As they looked at Him, they came near Him and were changed to be like Him. His name then shined out through them, for He lived inside them. Their life from then on was one of close friendship too deep for words, only with Him above.",
              "simpZh": "终于，他们的机会来了。从前他们只是听说这奥秘，现在却亲身感受到了。祂已经用爱的眼睛定睛看着他们，就像看马利亚和彼得一样，所以他们只能选择跟随祂。渐渐地，不时地，借着飞快的亮光，十字架的奥秘照在他们身上。他们看见祂“从地上被举起来”，凝视着从祂圣洁受苦的伤口中散发出来的荣耀。当他们看着祂，就靠近祂，被改变成祂的样子。祂的名字就透过他们发出来，因为祂活在他们里面。从那刻起，他们的生命就成了单单与上面那位无法言喻的亲密交通。"

            {
              "en": "They were willing to live without <span class=\"vocab-trigger\" data-vocab=\"possessions\">possessions<\/span> that others owned and that they could have had, in order to be unlike others so they would be more like Him. This is the description of all those throughout the ages who “<span class=\"vocab-trigger\" data-vocab=\"follow the Lamb wherever he goes\">follow the Lamb wherever he goes<\/span>” (Rev. 14:4). If they had chosen selfishly for themselves or if their friends had chosen for them, they would have made other choices. Their lives would have shone more brightly here on earth but less <span class=\"vocab-trigger\" data-vocab=\"gloriously\">gloriously<\/span> in His kingdom. Their <span class=\"vocab-trigger\" data-vocab=\"legacy\">legacy<\/span> would have been that of <span class=\"vocab-trigger\" data-vocab=\"Lot\">Lot<\/span> instead of <span class=\"vocab-trigger\" data-vocab=\"Abraham\">Abraham<\/span>. And if they had stopped along the way or if God had removed His hand from them, allowing them to <span class=\"vocab-trigger\" data-vocab=\"stray\">stray<\/span>, what would they have lost? What would they have <span class=\"vocab-trigger\" data-vocab=\"forfeited\">forfeited<\/span> at their resurrection?",
              "zh": "他们甘愿过没有那些别人拥有、他们也可以拥有之财物的生活，为要与人不同，好更与祂相似。这就是历世历代一切“羔羊无论往哪里去，他们都跟随祂”（启示录14:4）之人的写照。倘若他们自私地为自己选择，或者他们的朋友替他们选择，他们早已作了别的决定。他们在地上的生活也许会照得更亮，但在祂的国度里却会少了许多荣耀。他们的产业就会像罗得的，而不是亚伯拉罕的。并且，倘若他们半途而废，或神从他们身上收回祂的手，任凭他们偏行己路，他们将要损失什么呢？在复活时，他们将要失去什么呢？",
              "simpEn": "They were willing to go without things that others had and that they could have had, so that they would be different from others and more like Him. This is the picture of all those through the ages who follow the Lamb wherever He goes. If they had chosen selfishly for themselves, or if their friends had chosen for them, they would have made other choices. Their lives would have shined brighter here on earth, but with less splendor in His kingdom. What they left behind would have been like Lot's, not Abraham's. And if they had stopped on the way, or if God had taken His hand off them and let them wander, what would they have lost? What would they have given up at their rising from the dead?",

            {
              "en": "Yet God <span class=\"vocab-trigger\" data-vocab=\"strengthened\">strengthened<\/span> them and protected them, even from themselves. Often, in His mercy He held them up when they otherwise would have slipped and fallen. And even in this life, they knew that all He did was done well. They knew it was good to suffer in this life so they would <span class=\"vocab-trigger\" data-vocab=\"reign\">reign<\/span> in the one to come; to bear the cross below, to wear a crown above; and to know that not their will but His was done in them and through them. <span class=\"vocab-trigger\" data-vocab=\"Anonymous\">Anonymous<\/span>",

            },

              "en": "God is going to test me with delays, and along with the delays will come suffering. Yet through it all God’s <span class=\"vocab-trigger\" data-vocab=\"promise\">promise<\/span> stands. I have His new <span class=\"vocab-trigger\" data-vocab=\"covenant\">covenant<\/span> in Christ, and His <span class=\"vocab-trigger\" data-vocab=\"sacred\">sacred<\/span> promise of every smaller blessing that I need. The delays and the suffering are actually part of the promised blessings, so may I praise Him for them today. May I “be strong and take heart and <span class=\"vocab-trigger\" data-vocab=\"wait for the Lord\">wait for the Lord<\/span>” (Ps. 27:14). <span class=\"vocab-trigger\" data-vocab=\"Charles Gallaudet Trumbull\">Charles Gallaudet Trumbull<\/span>",
              "zh": "神要用迟延来试验我，随同迟延而来的将是苦难。然而贯穿这一切，神的应许仍旧坚立。我在基督里有祂的新约，有祂对我所需每一项小祝福的神圣应许。迟延和苦难实际上正是所应许之福分的一部分，所以我今天要为它们赞美祂。愿我“坚固等候耶和华”（诗篇27:14）。 查尔斯·加劳德·特朗布尔",
              "simpEn": "God is going to test me with waiting, and with the waiting will come pain. But through it all, God's promise stands. I have His new agreement in Christ, and His holy promise of every smaller good I need. The waiting and the pain are really part of the promised blessings, so may I praise Him for them today. May I be strong, take courage, and wait for the Lord. Charles Gallaudet Trumbull",
              "simpZh": "神会用迟延来试验我，随同迟延而来的会有苦难。但贯穿这一切，神的应许依然立定。我在基督里有祂的新约，有祂对我所需每一样小祝福的神圣应许。迟延和苦难其实正是应许之福分的一部分，所以我今天要为它们赞美祂。愿我能“刚强壮胆，等候耶和华”。查尔斯·加劳德·特朗布尔"
            },
            {
              "en": "<span class=\"vocab-trigger\" data-vocab=\"Unanswered\">Unanswered<\/span> yet the prayer your lips have <span class=\"vocab-trigger\" data-vocab=\"pleaded\">pleaded<\/span> In <span class=\"vocab-trigger\" data-vocab=\"agony\">agony<\/span> of heart these many years? Does faith begin to fail? Is hope <span class=\"vocab-trigger\" data-vocab=\"departing\">departing<\/span>? And think you all in vain your falling tears? Say not the Father has not heard your prayer; You will have your desire <span class=\"vocab-trigger\" data-vocab=\"sometime, somewhere\">sometime, somewhere<\/span>. Unanswered yet? No, do not say <span class=\"vocab-trigger\" data-vocab=\"ungranted\">ungranted<\/span>; Perhaps your work is not yet wholly done. The work began when first your prayer was <span class=\"vocab-trigger\" data-vocab=\"uttered\">uttered<\/span>, And God will finish what He has begun. If you will keep the <span class=\"vocab-trigger\" data-vocab=\"incense\">incense<\/span> burning there, His glory you will see sometime, somewhere. Unanswered yet? Faith cannot be unanswered, Its feet are firmly <span class=\"vocab-trigger\" data-vocab=\"planted\">planted<\/span> on the Rock; Amid the wildest storms it stands <span class=\"vocab-trigger\" data-vocab=\"undaunted\">undaunted<\/span>, Nor shakes before the loudest thunder shock. It knows <span class=\"vocab-trigger\" data-vocab=\"Omnipotence\">Omnipotence<\/span> has heard its prayer, And cries, “It will be done”—sometime, somewhere. <span class=\"vocab-trigger\" data-vocab=\"Ophelia G. Browning\">Ophelia G. Browning<\/span>",
              "zh": "你嘴唇所恳求的祷告，在心灵痛苦中多年未蒙应允？信心开始失灵了吗？盼望正在消逝吗？你以为你落下的眼泪全都枉然了吗？不要说天父没有听见你的祷告；你必在某个时候、某个地方得着你所愿的。尚未蒙应允吗？不，不要说未蒙应允；或许你当做的工尚未完全了结。那工作从你头一次发出祷告时就开始了，神必完成祂所开始的工。你若肯继续在那里烧香，你必在某个时候、某个地方看见祂的荣耀。尚未蒙应允吗？信心不可能不蒙应允，它的脚牢牢栽在磐石上；在狂野的风暴中它站立不惧，在最大声的雷击前也不动摇。它知道全能者已经听见它的祷告，便喊着说：“事情必要成就”——在某时、某地。 奥菲利亚·G·勃朗宁",
              "simpEn": "Still no answer to the prayer your lips have begged in heart-pain all these years? Is faith starting to fail? Is hope leaving? Do you think all your falling tears are for nothing? Don't say the Father hasn't heard your prayer; you will have what you long for sometime, somewhere. Still no answer? No, don't say not granted; maybe your work is not yet fully done. The work started when your prayer was first spoken, and God will finish what He has started. If you will keep the sweet-smelling smoke rising there, you will see His glory sometime, somewhere. Still no answer? Faith cannot go unanswered; its feet are set firmly on the Rock. In the wildest storms it stands unafraid, and doesn't shake before the loudest thunder. It knows that the All-Powerful One has heard its prayer, and cries, 'It will be done'—sometime, somewhere. Ophelia G. Browning",
              "simpZh": "你嘴唇多年在内心痛苦中恳求的祷告，还没有得到回应吗？信心开始垮了吗？盼望正在溜走吗？你觉得你流下的眼泪全都白费了吗？不要说天父没有听见你的祷告；你会在某个时候、某个地方得到你所渴望的。还没回应吗？不，不要说没有被答应；也许你的工作还没有完全做完。这工作在你第一次发出祷告时就开始了，神一定会完成祂所开始的。只要你继续让那里的香烧着，你必在某个时候、某个地方看见祂的荣耀。还没回应吗？信心不可能不蒙应允，它的脚牢牢立在磐石上；在最狂野的风暴中它站立不惧，在最响的雷击面前也不摇动。它知道全能者已经听见了它的祷告，便喊着说：“一定会成就”——在某时、某地。奥菲利亚·G·勃朗宁"
            }

        {
          "sectionId": 5,

          "audio": "audio/Streams in the Desert - October 19.m4a",
          "paragraphs": [
            {

              "zh": "神有时候会用简单的触摸或感觉来影响我们，但不是叫我们凭感觉行动。这触摸若是从祂而来，祂就必提供充分的证据来证实它，消除一切极微小的疑惑。",
              "simpEn": "God sometimes touches us with a simple feeling, but not so we would act just on that feeling. If the touch is from Him, He will then give enough proof to make it certain beyond any tiny question.",
              "simpZh": "神有时候用简单的一个触摸或感觉来影响我们，但不是要我们凭那个感觉就行动。如果那个触摸是从祂来的，祂就一定会提供足够的证据来证实，使这件事毫无疑问。"

              "zh": "思想耶利米那段优美的故事，当他感觉神要他去买亚拿突的那块地时，他并没有凭最初的感觉行动，而是等候神完全向他说了话，才采取行动。后来他的堂兄弟来了，借着提出购地的建议带来了神引导的外在证据，他便回应说：“我就知道这是耶和华的话”（耶利米书32:8）。",
              "simpEn": "Think of the lovely story of Jeremiah, when he felt God leading him to buy the field at Anathoth. He did not act on his first feeling but waited until God fully kept His words to him before taking action. Then when his cousin came, bringing outside proof of God's leading by offering to sell the field, he answered, 'I knew this was the word of the Lord.'",
              "simpZh": "想想耶利米那段美丽的故事，当他感觉到神在带领他买亚拿突的那块地时，他并没有凭起初的感觉就行动，而是等候神完全向他说了话，然后才采取行动。等到他的堂兄弟来，提出要卖那块地，带出神引导的外在证据，他才回应说：“我就知道这是耶和华的话。”"
            },
            {
              "en": "Jeremiah waited until God confirmed his feeling through a <span class=\"vocab-trigger\" data-vocab=\"providential act\">providential act<\/span>, and then he worked with a clear view of the facts, which God could also use to bring <span class=\"vocab-trigger\" data-vocab=\"conviction\">conviction<\/span> to others. God wants us to act only once we have His <span class=\"vocab-trigger\" data-vocab=\"mind\">mind<\/span> on a certain situation. We are not to ignore the <span class=\"vocab-trigger\" data-vocab=\"Shepherd\">Shepherd<\/span>’s personal voice to us, but like “Paul and his companions” (Acts 16:6) at <span class=\"vocab-trigger\" data-vocab=\"Troas\">Troas<\/span>, we are to listen and also examine His <span class=\"vocab-trigger\" data-vocab=\"providential work\">providential work<\/span> in our circumstances, in order to <span class=\"vocab-trigger\" data-vocab=\"glean\">glean<\/span> the full mind of the Lord. <span class=\"vocab-trigger\" data-vocab=\"A. B. Simpson\">A. B. Simpson<\/span>",
              "zh": "耶利米一直等到神借着一个护理的作为来证实他的感觉，然后他才依据清楚的事实作工，而神也能用这事实叫别人信服。神要我们只在某一处境上有了祂的心意时才行动。我们不是要忽略牧人亲自对我们说话的声音，却要像在特罗亚的“保罗和他的同人”（使徒行传16:6）那样，既听从，也察验祂在我们环境中的护理之工，好采集主完整的心意。 宣信",
              "simpEn": "Jeremiah waited until God proved his feeling through a guiding event, and then he worked with a clear sight of the facts, which God could also use to convince others. God wants us to act only once we have His thought on a matter. We are not to ignore the Shepherd's own voice to us, but like Paul and his friends at Troas, we are to listen and also look at His guiding work in what is happening, to gather the full thought of the Lord. A. B. Simpson",
              "simpZh": "耶利米一直等到神用一件看顾中的事情来证实他的感觉，然后才凭清楚的事实去行动，而神也能用这些事实去让别人信服。神要我们等到在某一件事上有了祂的心意才行动。我们不要忽视牧人亲自对我们说话的声音，但也要像保罗和他的同伴在特罗亚那样，一面听，一面察看祂在我们环境中的引导之工，好完整地领会主的心意。宣信"
            },
            {
              "en": "Wherever God’s <span class=\"vocab-trigger\" data-vocab=\"finger\">finger<\/span> points, His hand will clear a way. Never say in your heart what you will or will not do but wait until God <span class=\"vocab-trigger\" data-vocab=\"reveals\">reveals<\/span> His way to you. As long as that way is hidden, it is clear that there is no need of action and that He holds Himself <span class=\"vocab-trigger\" data-vocab=\"accountable\">accountable<\/span> for all the results of keeping you exactly where you are. <span class=\"vocab-trigger\" data-vocab=\"selected\">selected<\/span>",
              "zh": "神的手指指向哪里，祂的手就在那里开路。切莫在心里说你要做什么或不做什么，当等到神向你显明祂的道路。只要那条路还是隐藏的，就清楚表明无需行动，并且祂自己要为你保持现状的一切后果负责。 选自",
              "simpEn": "Wherever God's finger points, His hand will make a road. Never say in your heart what you will or won't do, but wait until God shows you His way. As long as that way is hidden, it is clear that no action is needed, and He takes responsibility for all that comes from keeping you right where you are. selected",
              "simpZh": "神的手指指向哪里，祂的手就会在那里开出路来。绝不要在心里说你要做什么或不做什么，只等到神向你显明祂的道路。只要那条路还藏着，就清楚说明不需要行动，而祂也会为把你留在此处的所有后果负责。选自"

        {
          "sectionId": 6,
          "heading": "October 20",
          "audio": "audio/Streams in the Desert - October 20.m4a",
          "paragraphs": [
            {
              "en": "The <span class=\"vocab-trigger\" data-vocab=\"peace of God\">peace of God<\/span>, which <span class=\"vocab-trigger\" data-vocab=\"transcends\">transcends<\/span> all understanding, will <span class=\"vocab-trigger\" data-vocab=\"guard\">guard<\/span> your hearts and your minds in Christ Jesus. (Philippians 4:7)",
              "zh": "神所赐出人意外的平安，必在基督耶稣里保守你们的心怀意念。（腓立比书4:7）",
              "simpEn": "The peace that God gives, which goes far beyond what we can understand, will keep your hearts and thoughts safe in Christ Jesus.",
              "simpZh": "神所赐的那种超越人所能理解的平安，必在基督耶稣里保守你们的心和思想。"
            },
            {
              "en": "There is a part of the sea known as “the <span class=\"vocab-trigger\" data-vocab=\"cushion of the sea\">cushion of the sea<\/span>.” It lies beneath the surface that is <span class=\"vocab-trigger\" data-vocab=\"agitated\">agitated<\/span> by storms and <span class=\"vocab-trigger\" data-vocab=\"churned\">churned<\/span> by the wind. It is so deep that it is a part of the sea that is never <span class=\"vocab-trigger\" data-vocab=\"stirred\">stirred<\/span>. When the ocean floor in these deep places is <span class=\"vocab-trigger\" data-vocab=\"dredged\">dredged<\/span> of the remains of plant or animal life, it reveals evidence of having remained completely <span class=\"vocab-trigger\" data-vocab=\"undisturbed\">undisturbed<\/span> for hundreds, if not thousands, of years.",
              "zh": "海中有一带被称为“海的垫褥”。它位于被风暴搅动、被风翻腾的海面之下。它是如此之深，是海中永不被搅动的部分。当这些深海处的洋底被挖掘，取出动植物残骸时，显出的证据表明它们已经完全不被扰动地保持了数百年，甚至数千年之久。",
              "simpEn": "There is a part of the sea called 'the cushion of the sea.' It lies under the surface that is shaken by storms and stirred up by the wind. It is so deep that it is never moved. When the bottom of these deep places is dug for leftover plant or animal life, it shows that it has stayed completely quiet for hundreds or even thousands of years.",
              "simpZh": "海里有一带叫作“海的垫褥”。它位于被风暴摇晃、被风搅动的海面之下，深到从来没有被搅动过。当这些深海处的海底被挖开，找寻动植物残骸时，显出的证据是它们已经完全静卧了数百年甚至数千年之久。"
            },
            {
              "en": "The peace of God is an <span class=\"vocab-trigger\" data-vocab=\"eternal calm\">eternal calm<\/span> like the cushion of the sea. It lies so deeply within the human heart that no <span class=\"vocab-trigger\" data-vocab=\"external difficulty\">external difficulty<\/span> or disturbance can reach it. And anyone who enters the <span class=\"vocab-trigger\" data-vocab=\"presence of God\">presence of God<\/span> becomes a <span class=\"vocab-trigger\" data-vocab=\"partaker\">partaker<\/span> of that <span class=\"vocab-trigger\" data-vocab=\"undisturbed\">undisturbed<\/span> and <span class=\"vocab-trigger\" data-vocab=\"undisturbable\">undisturbable<\/span> calm. <span class=\"vocab-trigger\" data-vocab=\"Arthur Tappan Pierson\">Arthur Tappan Pierson<\/span>",
              "zh": "神的平安就像海的垫褥一样，是永恒的宁静。它深藏在人心里，是任何外在困难或扰乱都无法触及的。凡进入神同在的人，便有分于那不被搅动、也无法搅动的安宁。 亚瑟·塔潘·皮尔逊",
              "simpEn": "God's peace is a forever quietness like the cushion of the sea. It lies so deep inside the human heart that no outside trouble or shaking can reach it. And anyone who comes into God's presence shares in that unshaken and unshakable calm. Arthur Tappan Pierson",
              "simpZh": "神的平安就像海的垫褥一样，是永恒的宁静。它深藏于人心之内，是任何外面的困难或骚动都无法触及的。凡是进入神同在的人，就有份于那不受打扰、也无法被搅动的安宁。亚瑟·塔潘·皮尔逊"
            },
            {
              "en": "When winds are <span class=\"vocab-trigger\" data-vocab=\"raging\">raging<\/span> o’er the upper ocean, And waves are tossed wild with an angry roar, It’s said, far down beneath the wild <span class=\"vocab-trigger\" data-vocab=\"commotion\">commotion<\/span>, That peaceful stillness <span class=\"vocab-trigger\" data-vocab=\"reigns\">reigns<\/span> forevermore. Far, far beneath, noise of <span class=\"vocab-trigger\" data-vocab=\"tempests\">tempests<\/span> falls silent, And silver waves lie ever peacefully, And no storm, however fierce or violent, Disturbs the <span class=\"vocab-trigger\" data-vocab=\"Sabbath\">Sabbath<\/span> of that deeper sea. So to the heart that knows Your love, O Father, There is a temple sacred evermore, And all life’s angry voices causing bother Die in <span class=\"vocab-trigger\" data-vocab=\"hushed silence\">hushed silence<\/span> at its peaceful door. Far, far away, the roars of <span class=\"vocab-trigger\" data-vocab=\"strife\">strife<\/span> fall silent, And loving thoughts rise ever peacefully, And no storm, however fierce or violent, Disturbs the soul that <span class=\"vocab-trigger\" data-vocab=\"dwells\">dwells<\/span>, O Lord, in Thee. <span class=\"vocab-trigger\" data-vocab=\"Harriet Beecher Stowe\">Harriet Beecher Stowe<\/span>",
              "zh": "当狂风在洋面怒吼，怒涛在狂嚣中颠簸，据说在狂乱的下方极深之处，永远掌权的乃是平静与安宁。在远远的下方，暴风的响声止息，银色的波澜永远安卧，无论多么猛烈狂悍的风暴，也不能搅扰那更深之海的安息。照样，认识祢爱的心啊，父啊，其内也有一处永远的圣殿，生命一切烦扰的怒吼，都在它平安的门口归于死寂。远远的，纷争的咆哮止息了，爱意永远宁静地升起，无论多么猛烈狂悍的风暴，也不能搅扰那住在祢里面的灵魂，主啊。 哈丽特·比彻·斯托",
              "simpEn": "When winds are blowing hard over the upper ocean, and waves are thrown wildly with angry noise, it is said that far, far down beneath the wild stir, peaceful quietness rules forever. Far down below, the sound of storms falls quiet, and silver waters lie at peace always, and no storm, no matter how strong or wild, shakes the rest of that deep sea. So in the heart that knows Your love, O Father, there is a holy place forever, and all the angry voices of life that bother die in quiet at its peaceful door. Far, far away, the shouts of fighting fall silent, and loving thoughts rise always in peace, and no storm, no matter how strong or wild, shakes the soul that lives, O Lord, in You. Harriet Beecher Stowe",
              "simpZh": "当狂风在上层洋面吹动，波浪被愤怒的咆哮抛来抛去，据说在狂乱的下方极深之处，平静的安静永远掌权。在远远的下方，风暴的声音静默了，银色的波浪永远安然平卧，不管风暴多猛烈多狂暴，都无法搅扰那更深之海的安息。照样，那认识祢慈爱的心啊，父啊，里面也有一处永远的圣殿，生命中一切烦人的怒吼，都在它平安的门口变成肃静。远远地，争斗的咆哮静默了，爱意永远宁静地升起，不管风暴多猛烈多狂暴，都不能搅扰那住在祢里面的灵魂，主啊。哈丽特·比彻·斯托"

              "zh": "我所住这房子的主人，已经通知我说，他几乎不会做什么来修缮这房子了。他也建议我预备好搬家。起初这消息并不大受欢迎。从许多方面看，周围环境相当宜人，若没有一些日渐衰残的证据，这房子看起来还挺好的。然而仔细一看，就会发现甚至一阵微风也使它摇晃，它的根基也不足以使它稳固。所以我正在预备搬家。",

            {
              "en": "As I consider the move, it is strange how quickly my interest is <span class=\"vocab-trigger\" data-vocab=\"transferred\">transferred<\/span> to my <span class=\"vocab-trigger\" data-vocab=\"prospective\">prospective<\/span> new home in another country. I have been <span class=\"vocab-trigger\" data-vocab=\"consulting\">consulting<\/span> maps and studying accounts of its <span class=\"vocab-trigger\" data-vocab=\"inhabitants\">inhabitants<\/span>. And someone who has come from there to visit has told me that it is beautiful beyond <span class=\"vocab-trigger\" data-vocab=\"description\">description<\/span> and that language is <span class=\"vocab-trigger\" data-vocab=\"inadequate\">inadequate<\/span> to fully describe what he heard while there. He said that in order to make an investment there, he has suffered the loss of everything he owned here, yet <span class=\"vocab-trigger\" data-vocab=\"rejoices\">rejoices<\/span> in what others would call a <span class=\"vocab-trigger\" data-vocab=\"sacrifice\">sacrifice<\/span>. Another person, whose love for me has been proved by the greatest possible test, now lives there. He has sent me several clusters of the most delicious grapes I have ever eaten, and after tasting them everything here tastes very <span class=\"vocab-trigger\" data-vocab=\"bland\">bland<\/span>.",

              "simpZh": "当我想到要搬家时，奇怪的是，我的兴趣这么快就转到我在另一个国家那所期待的新家上了。我一直在查看地图，研究当地居民的描述。有从那边来探访的人告诉我，那个地方美丽得无法形容，语言完全不足以描述他在那里所听见的。他说，为了在那里投资一份产业，他把在这里拥有的一切都损失了，却以别人看为牺牲的事为乐。还有一位，对我的爱已被最大的考验所证明，现在就住在那里。他曾寄给我几串我吃过的最好吃的葡萄，尝过以后，这里的一切都变得没味道了。"

            {
              "en": "The words of Jesus during His last days on earth vividly express His desire to go “<span class=\"vocab-trigger\" data-vocab=\"back to the Father\">back to the Father<\/span>” (John 16:28). We, as His people, also have a vision of something far beyond the difficulties and disappointments of this life and are traveling toward <span class=\"vocab-trigger\" data-vocab=\"fulfillment\">fulfillment<\/span>, completion, and an <span class=\"vocab-trigger\" data-vocab=\"enriched\">enriched<\/span> life. We too are going “to the Father.” Much of our new home is still <span class=\"vocab-trigger\" data-vocab=\"unclear\">unclear<\/span> to us, but two things are certain. Our “<span class=\"vocab-trigger\" data-vocab=\"Father’s house\">Father’s house<\/span>” (John 14:2) is our home. And it is in the <span class=\"vocab-trigger\" data-vocab=\"presence of the Lord\">presence of the Lord<\/span>. As believers, we know and understand that we are all travelers and not <span class=\"vocab-trigger\" data-vocab=\"permanent residents\">permanent residents<\/span> of this world. <span class=\"vocab-trigger\" data-vocab=\"R. C. Gillie\">R. C. Gillie<\/span>",

              "simpEn": "The words of Jesus in His last days on earth clearly show His desire to go back to the Father. We, as His people, also see something far beyond the hard times and letdowns of this life, and we are traveling toward being full, complete, and having a richer life. We too are going to the Father. Much of our new home is still not clear to us, but two things are sure. Our Father's house is our home. And it is in the very nearness of the Lord. As believers, we know that we are all travelers and not people who live here forever. R. C. Gillie",
              "simpZh": "耶稣在世最后日子的话语，生动地说出祂渴望“回到父那里去”。我们作为祂的百姓，也望见了远超今生艰难和失望的事物，正向圆满、完全和更丰盛的生命行进。我们也是“往父那里去”。我们新家的许多事对我们还不清楚，但有两件事是确定的。我们的“父家”是我们的家，而且是在主的面前。作为信徒，我们知道我们在这世界都是旅客，不是永久居民。R. C. 吉里"

              "en": "Now Moses was <span class=\"vocab-trigger\" data-vocab=\"tending the flock\">tending the flock<\/span> of <span class=\"vocab-trigger\" data-vocab=\"Jethro\">Jethro<\/span> his father-in-law, the priest of <span class=\"vocab-trigger\" data-vocab=\"Midian\">Midian<\/span>, and he led the flock to the far side of the <span class=\"vocab-trigger\" data-vocab=\"desert\">desert<\/span> and came to <span class=\"vocab-trigger\" data-vocab=\"Horeb\">Horeb<\/span>, the mountain of God. There the <span class=\"vocab-trigger\" data-vocab=\"angel of the Lord\">angel of the Lord<\/span> appeared to him in flames of fire from within a <span class=\"vocab-trigger\" data-vocab=\"bush\">bush<\/span>. (Exodus 3:1–2)",

              "zh": "亲爱的父，求祢帮助我，使我在行人生普通道路时期盼祢。我不求轰动的经历。在我日常的工作和服侍中与我相交，在我走平凡旅途时作我的同伴。让我卑微的生命因祢的同在而改变。",

              "en": "Some Christians think they must always be on the <span class=\"vocab-trigger\" data-vocab=\"mountaintop\">mountaintop<\/span> of extraordinary joy and <span class=\"vocab-trigger\" data-vocab=\"revelation\">revelation<\/span>, but this is not God’s way. Those high spiritual times and wonderful <span class=\"vocab-trigger\" data-vocab=\"communion\">communion<\/span> with the unseen world are not promised to us, but a daily life of <span class=\"vocab-trigger\" data-vocab=\"fellowship\">fellowship<\/span> with Him is. And it is enough for us, for He will give us those times of exceptional revelation if it is the right thing for us.",

              "simpZh": "但他这样决定之后，有个穿褪色破旧军服的年轻士兵走进银行。他脸上手上的伤看得出他住过军队医院。这可怜的年轻人正在口袋摸东西时，银行家看见了他。银行家猜到他进来的目的，就说：“好心人，今天我不能帮你，我实在太忙了。你得去军队总部，那里的官长会管你。”"
            },
            {
              "en": "The poor wounded soldier still stood there, not seeming to fully understand what was being said to him. He continued to fumble in his pockets and finally pulled out a <span class=\"vocab-trigger\" data-vocab=\"scrap\">scrap<\/span> of dirty paper. He laid the <span class=\"vocab-trigger\" data-vocab=\"filthy\">filthy<\/span> page before the banker, who read the following words written in pencil: <span class=\"vocab-trigger\" data-vocab=\"Dear Father, This is one of my friends, who was wounded in the last battle and is coming to you directly from the hospital. Please receive him as you would me. Charlie\">Dear Father, This is one of my friends, who was wounded in the last battle and is coming to you directly from the hospital. Please receive him as you would me. Charlie<\/span>",
              "zh": "可怜的伤兵依然站着，似乎不完全明白别人对他说了什么。他继续在口袋里摸，终于掏出一张肮脏的破纸片。他把这张污秽的纸放在银行家面前，银行家读到上面用铅笔写的字：“亲爱的父亲，这是我的一位朋友，他在上次战役中受了伤，直接从医院来到您这里。请您如同接待我一样接待他。查理。”",
              "simpEn": "The poor wounded soldier still stood there, not fully understanding. He kept searching in his pockets and finally pulled out a dirty scrap of paper. He laid the filthy page before the banker, who read these words written in pencil: 'Dear Father, This is one of my friends, wounded in the last battle, coming to you straight from the hospital. Please receive him as you would me. Charlie.'",
              "simpZh": "可怜的伤兵还站在那里，好像不完全明白。他继续摸口袋，终于掏出一张脏兮兮的破纸片，放在银行家面前。银行家读到上面铅笔写的字：“亲爱的父亲，这是我一个朋友，他在上次战役受伤，直接从医院到你这里。请像接待我一样接待他。查理。”"
            },
            {
              "en": "All the banker’s previous resolve to focus solely on his business instead of soldiers quickly flew away. He took the young man to his own <span class=\"vocab-trigger\" data-vocab=\"magnificent\">magnificent<\/span> home and gave him Charlie’s room and seat at the dinner table. He cared for him until the food, rest, and love had returned him to health, and then sent him back to his place of service to again risk his life for his country’s flag. <span class=\"vocab-trigger\" data-vocab=\"selected\">selected<\/span>",
              "zh": "银行家先前决心只专注于生意、不再管士兵的一切，顿时烟消云散。他把年轻人带回自己华美的家中，给他查理的房间和餐桌旁的座位。他照顾他，直到食物、休息和爱使他康复，然后送他回到服役的地方，再次为国旗冒生命危险。 选自",
              "simpEn": "The banker's earlier firm decision to focus only on his business and forget the soldiers quickly flew away. He took the young man to his own grand home, gave him Charlie's room and a seat at the dinner table. He cared for him until food, rest, and love made him well, then sent him back to serve and risk his life for his country's flag. selected",

            {
              "en": "Christ Jesus, in His <span class=\"vocab-trigger\" data-vocab=\"humanity\">humanity<\/span>, felt the need of complete <span class=\"vocab-trigger\" data-vocab=\"solitude\">solitude<\/span>—to be entirely by Himself, alone with Himself. Each of us knows how draining constant <span class=\"vocab-trigger\" data-vocab=\"interchange\">interchange<\/span> with others can be and how it exhausts our energy. As part of humankind, Jesus knew this and felt the need to be by Himself in order to regain His strength. Solitude was also important to Him in order to fully realize His high <span class=\"vocab-trigger\" data-vocab=\"calling\">calling<\/span>, His human weakness, and His total <span class=\"vocab-trigger\" data-vocab=\"dependence\">dependence<\/span> on His Father.",
              "zh": "主耶稣在祂的人性里，感到需要完全的独处——完全单独一人，单独与自己同在。我们每个人都知道，不断与人交接是何等消耗，使我们精力枯竭。作为人类的一员，耶稣深知这点，觉得需要独处以恢复力量。独处对祂也极为重要，好让祂完全领会祂那崇高的呼召、祂人性的软弱，以及祂对父的全然依赖。",
              "simpEn": "Jesus, as a human, felt the need to be completely alone. Constant talking with others drains us and uses up our energy. As a man, Jesus knew this and needed to be alone to get His strength back. Being alone also helped Him remember His high purpose, His human weakness, and how much He depended on His Father.",
              "simpZh": "耶稣作为人，感觉需要完全独处。不断与人交往会耗尽精力。耶稣知道这点，需要独处恢复力量。独处也让祂深深认识自己的崇高呼召、人性的软弱，以及对父的完全依赖。"
            },
            {
              "en": "As a child of God, how much more do we need times of complete solitude—times to deal with the spiritual realities of life and to be alone with God the Father. If there was ever anyone who could <span class=\"vocab-trigger\" data-vocab=\"dispense\">dispense<\/span> with special times of solitude and <span class=\"vocab-trigger\" data-vocab=\"fellowship\">fellowship<\/span>, it was our Lord. Yet even He could not maintain His full strength and power for His work and His fellowship with the Father without His quiet time. God desires that every servant of His would understand and perform this blessed practice, that His church would know how to train its children to recognize this high and holy <span class=\"vocab-trigger\" data-vocab=\"privilege\">privilege<\/span>, and that every believer would realize the importance of making time for God alone.",
              "zh": "作为神的儿女，我们何等更需要完全独处的时间——与生命中属灵的实际较力，与父神独处。如果说有谁可以免去特别独处和交通的时间，那就是我们的主。然而，就连祂都不能没有安静的时间而维持祂作工和与父交通所需的全部力量与能力。神渴望祂的每一个仆人都明白并实行这蒙福的操练，祂的教会知道如何教导儿女认识这崇高圣洁的特权，每一个信徒都认识到花时间与神独处的重要性。",
              "simpEn": "As God's children, how much more do we need times alone—to face the real things of the spirit and be alone with our Father. If anyone could have skipped quiet times alone with God, it was Jesus. But even He couldn't keep His full strength and power for His work and time with the Father without those quiet times. God wants every servant of His to know and do this blessed practice, that the church would train its children to see this high and holy gift, and that every believer would know how important it is to make time for God alone.",
              "simpZh": "我们是神的儿女，何等更需要独处的时间——面对属灵真实、单独与父神同在。如果有谁可以不需要特别独处的时间，那只有主。但就连祂也不能没有安静时间就维持作工和与父交通的力量。神愿意每个仆人都明白并实行这蒙福的习惯，教会懂得教导儿女认识这圣洁特权，每个信徒都明白花时间单独与神在一起的重要性。"

            {
              "en": "Oh, the thought of having God all alone to myself and knowing that God has me all alone to Himself! <span class=\"vocab-trigger\" data-vocab=\"Andrew Murray\">Andrew Murray<\/span>",

              "simpEn": "Oh, the thought of having God all to myself and knowing that God has me all to Himself! Andrew Murray",
              "simpZh": "哦，想到我能单独拥有神，神也单独拥有我！慕安德烈"

            {
              "en": "<span class=\"vocab-trigger\" data-vocab=\"Lamartine\">Lamartine<\/span>, the first of the French Romantic poets and a writer of the nineteenth century, in one of his books wrote of how his mother had a <span class=\"vocab-trigger\" data-vocab=\"secluded\">secluded<\/span> spot in the garden where she spent the same hour of each day. He related that nobody ever dreamed of <span class=\"vocab-trigger\" data-vocab=\"intruding\">intruding<\/span> upon her for even a moment of that hour. It was the holy garden of the Lord to her.",
              "zh": "拉马丁，十九世纪法国最早的浪漫派诗人之一，在他的书中写到，他的母亲在园中有一个僻静之处，每天同一时间都在那里度过。他说，没有人敢梦想在那一个小时中去打扰她片刻。那对她就是主的圣园。",

            {
              "en": "<span class=\"vocab-trigger\" data-vocab=\"A Meditation\">A Meditation<\/span> My soul, practice being alone with Christ! The Scripture says, “When he was alone with his own disciples, he explained everything” (Mark 4:34). Do not wonder about the truth of this verse, for it can be true of your life as well. If you desire to have understanding, then <span class=\"vocab-trigger\" data-vocab=\"dismiss\">dismiss<\/span> the crowd, just as Jesus did. (See Matt. 14:22.) Let them “go away one at a time . . . until only Jesus [is] left” (John 8:9) with you. Have you ever pictured yourself as the last remaining person on earth, or the only person left in the entire universe? If you were the only person remaining in the universe, your every thought would be, “God and I . . . ! God and I . . . !” And yet He is already as close to you as that. He is as near as if no heart but His and yours ever beat throughout the <span class=\"vocab-trigger\" data-vocab=\"boundlessness\">boundlessness<\/span> of space. O my soul, practice that solitude! Practice dismissing the crowd! Practice the stillness of your heart! Practice the <span class=\"vocab-trigger\" data-vocab=\"majestic\">majestic<\/span> song “God and I! God and I!” Let no one come between you and your wrestling angel! You will receive <span class=\"vocab-trigger\" data-vocab=\"conviction\">conviction<\/span> yet <span class=\"vocab-trigger\" data-vocab=\"pardon\">pardon<\/span>, when you meet Jesus alone! <span class=\"vocab-trigger\" data-vocab=\"George Matheson\">George Matheson<\/span>",
              "zh": "《默想》 我的灵魂啊，要操练单独与基督同在！经上说：“若没有人的时候，就把一切的道讲给门徒听”（马可福音4:34）。不要对这节经文的真实感到奇怪，因为它也能成为你生命的真实。你若渴望明白，就要像耶稣那样散去众人（见马太福音14:22）。让他们“一个一个地都出去……只剩下耶稣一人”（约翰福音8:9）与你同在。你可曾想象过自己是世上最后剩下的人，或全宇宙唯一存留的人？假如你是宇宙中唯一存留的人，你的每一个意念都将是“神与我……！神与我……！”然而祂已经与你如此亲近。祂亲近到一个地步，仿佛在无边无际的太空中，除了祂的心和你的心跳动之外，再没有别的心跳。哦，我的灵魂，操练这独处吧！操练遣散人群！操练心中的安静！操练那威严的诗歌“神与我！神与我！”不要让任何人介入你和你那摔跤的天使之间！当你单独遇见耶稣时，你就要领受定罪与赦免！ 乔治·马西森",
              "simpEn": "A Meditation: My soul, practice being alone with Christ! The Scripture says, 'When He was alone with His own disciples, He explained everything.' Don't wonder if this can be true for you too. If you want to understand, send the crowd away, just as Jesus did. Let them leave one by one until only Jesus is left with you. Have you ever pictured yourself as the last person on earth, the only one in the whole universe? If you were, your every thought would be, 'God and I! God and I!' And He is already that close to you—as near as if no other heart but His and yours ever beat in all of space. O my soul, practice that aloneness! Practice sending the crowd away! Practice the quietness of your heart! Practice the grand song 'God and I! God and I!' Let nothing come between you and your wrestling angel! You will find both guilt and forgiveness when you meet Jesus alone! George Matheson",
              "simpZh": "默想：我的灵魂啊，要练习单独与基督在一起！经上说：“没有人的时候，就把一切的道讲给门徒听。”不要怀疑这话对你也是真的。你若想明白，就要像耶稣那样散去人群，让他们一个一个离开，直到只剩下耶稣和你在一起。你可曾想象自己是世上最后一个人，宇宙中唯一的人？如果是这样，你每个念头都会是“神与我！神与我！”而祂已经与你那么近了，就好像整个无尽太空中只有祂的心和你的心在跳动。哦，我的灵魂，练习独处吧！练习遣散人群！练习内心的安静！练习那威严的歌“神与我！神与我！”不要让任何东西介入你与那位摔跤的天使之间！当你单独遇见耶稣，你就要得到定罪也得到赦免！乔治·马西森"

            {
              "en": "All your <span class=\"vocab-trigger\" data-vocab=\"waves and breakers\">waves and breakers<\/span> have <span class=\"vocab-trigger\" data-vocab=\"swept over\">swept over<\/span> me. (Psalm 42:7)",

            {
              "en": "They are HIS waves, whether they break over us, Hiding His face in <span class=\"vocab-trigger\" data-vocab=\"smothering\">smothering<\/span> spray and foam; Or smooth and sparkling, spread a path before us, And to our <span class=\"vocab-trigger\" data-vocab=\"haven\">haven<\/span> bear us safely home. They are HIS waves, whether for our sure comfort He walks across them, stilling all our fear; Or to our cry there comes no aid nor answer, And in the lonely silence none is near. They are HIS waves, whether we are hard-striving Through <span class=\"vocab-trigger\" data-vocab=\"tempest-driven\">tempest-driven<\/span> waves that never cease, While deep to deep with <span class=\"vocab-trigger\" data-vocab=\"turmoil\">turmoil<\/span> loud is calling; Or at His word they <span class=\"vocab-trigger\" data-vocab=\"hush\">hush<\/span> themselves in peace. They are HIS waves, whether He separates them, Making us walk dry ground where seas had flowed; Or lets <span class=\"vocab-trigger\" data-vocab=\"tumultuous\">tumultuous<\/span> breakers surge about us, Rushing unchecked across our only road. They are HIS waves, and He directs us through them; So He has promised, so His love will do. Keeping and leading, guiding and upholding, To His sure harbor, He will bring us through. <span class=\"vocab-trigger\" data-vocab=\"Annie Johnson Flint\">Annie Johnson Flint<\/span>",
              "zh": "它们都是祂的波浪，无论它们是淹没我们，在令人窒息的浪花泡沫中藏起祂的脸；还是波平如镜、闪烁发光，铺一条路在我们前头，平安载我们回到家中的港湾。它们都是祂的波浪，无论是为了给我们确实的安慰，祂行在其上，平静我们一切的惧怕；还是对呼叫既无帮助也无回应，孤寂中四围无人。它们都是祂的波浪，无论我们在狂风驱动的永无止息的波浪中苦苦挣扎，深渊与深渊在喧闹中大声呼应；还是因祂一言，它们便自行静默在平安里。它们都是祂的波浪，无论是祂将它们分开，叫我们在曾有海水流过之处走干地；还是任狂乱的大浪在我们四围翻腾，不受阻拦地冲过我们唯一的路径。它们都是祂的波浪，祂领我们穿过；祂已经如此应许，祂的爱也必如此行。保守、引导、带领、扶持，祂必领我们平安穿过，到达祂稳固的港湾。 安妮·约翰逊·弗林特",
              "simpEn": "They are His waves, whether they crash over us, hiding His face in choking spray; or smooth and shining, make a path before us and carry us safely home. They are His waves, whether He walks on them to calm our fear; or when we cry out, no help comes and no one is near. They are His waves, whether we fight hard through endless storm-driven waves while the deep calls loudly to the deep; or at His word they quiet down in peace. They are His waves, whether He splits them apart, letting us walk on dry ground where seas once flowed; or lets wild, rough waters surge around us, rushing over our only path. They are His waves, and He leads us through. He has promised, and His love will do it. Keeping and leading, guiding and holding, He will bring us through to His safe harbor. Annie Johnson Flint",
              "simpZh": "这都是祂的波浪，无论它们把我们淹没，用泡沫藏起祂的脸；还是平滑闪亮，为我们铺路，平安带我们回家。这都是祂的波浪，无论祂走在水面上平静我们惧怕；还是我们呼喊却无帮助无回应，孤寂无人。这都是祂的波浪，无论我们在无尽狂风巨浪中拼命挣扎，深渊与深渊大声呼喊；还是祂一开口，它们就安静。这都是祂的波浪，无论祂分开波浪，让我们走过干地；还是任狂涛翻腾，冲过我们唯一的道路。这都是祂的波浪，祂领我们穿过。祂已应许，祂的爱必成就。保守、引导、带领、扶持，祂必带我们平安到达坚固的港湾。安妮·约翰逊·弗林特"

              "en": "Stand firmly in the place where your dear Lord has put you, and do your best there. God sends us trials or tests, and places life before us as a face-to-face <span class=\"vocab-trigger\" data-vocab=\"opponent\">opponent<\/span>. It is through the pounding of a serious conflict that He expects us to grow strong. The tree planted where the fierce winds twist its branches and bend its trunk, often nearly to the point of breaking, is commonly more firmly <span class=\"vocab-trigger\" data-vocab=\"rooted\">rooted<\/span> than a tree growing in a <span class=\"vocab-trigger\" data-vocab=\"secluded\">secluded<\/span> valley where storms never bring any stress or strain. The same is true of human life. The strongest and greatest character is grown through hardship. <span class=\"vocab-trigger\" data-vocab=\"selected\">selected<\/span>",
              "zh": "要坚定地站在亲爱的主所安置你的地方，在那里尽力而为。神赐下试炼或考验，将生命像面面相对的敌手一般放在我们面前。祂正是借着严肃争战的击打，使我们变得强壮。一棵树，若种在猛风扭弯枝条、弯折树干、几乎折断的地方，通常比种在暴风从不带来任何压力张力的隐蔽山谷里的树，扎根更深。人生也是如此。最刚强伟大的品格是经由困苦而生。 选自",
              "simpEn": "Stand strong where your dear Lord has placed you, and do your best. God sends us tests and puts life before us like an enemy facing us. Through the hard pounding of a real fight, He expects us to become strong. A tree planted where wild winds twist its branches and bend its trunk, almost to breaking, usually has deeper roots than a tree growing in a quiet valley with no storms. So it is with human life. The strongest, greatest character grows through trouble. selected",
              "simpZh": "坚定站在你亲爱的主所安置你的地方，尽力而为。神赐下考验，把人生像对手一样摆在我们面前。祂要借激战的击打让我们变强壮。一棵树若种在猛风吹弯枝条、几乎折断的地方，往往比种在无风无浪的山谷中的树扎根更深。人生也一样，最刚强伟大的品格是从困苦中长出来的。选自"
            }

              "simpZh": "安静中有极大能力。一位伟大信徒曾说：“凡事都临到会信靠和静默的人。”这话含义极深，真明白的话会大大改变我们做事的方式。我们不再烦躁地挣扎，而是在主面前内心坐下来，让圣灵神圣的力量安静地作成实现我们目标的方法。"

            {

              "simpEn": "There is a place of rest at the very center of the cyclone's force, a silence at its hidden start; a little child could sleep there quietly, without a single curl being ruffled, in that strange calm middle amid the mighty spin. Make it your aim to learn to be peaceful and safe in God through every situation.",
              "simpZh": "在飓风力量的巨大中心有一个安息之处，在其隐秘源头有寂静；一个小孩可以在那奇特中心的平静中安然入睡，连一个漂亮发卷都不会被吹乱，四周却是狂暴的大旋风。要立志学习在任何境遇中都在神里面平安稳妥。"

          "audio": "audio/Streams in the Desert - October 29.m4a",
          "paragraphs": [
            {
              "en": "He will sit as a <span class=\"vocab-trigger\" data-vocab=\"refiner\">refiner<\/span> and <span class=\"vocab-trigger\" data-vocab=\"purifier\">purifier<\/span> of silver. (Malachi 3:3)",
              "zh": "祂必坐下如炼净银子的，洁净利未人，熬炼他们像金银一样。（玛拉基书3:3）",
              "simpEn": "He will sit like one who heats and cleans silver.",
              "simpZh": "祂要坐下来，像炼银子的人一样，把银子炼干净。"
            },
            {
              "en": "Our Father, who seeks to <span class=\"vocab-trigger\" data-vocab=\"perfect\">perfect<\/span> His saints in holiness, knows the value of the refiner’s fire. It is with the most <span class=\"vocab-trigger\" data-vocab=\"precious\">precious<\/span> metals that a <span class=\"vocab-trigger\" data-vocab=\"metallurgist\">metallurgist<\/span> will take the greatest care. He subjects the metal to a hot fire, for only the refiner’s fire will melt the metal, release the <span class=\"vocab-trigger\" data-vocab=\"dross\">dross<\/span>, and allow the remaining, pure metal to take a new and perfect shape in the <span class=\"vocab-trigger\" data-vocab=\"mold\">mold<\/span>.",
              "zh": "我们那位定意要在圣洁中成全祂圣徒的父，深知道炼银之人的火何等宝贵。冶金者正是对最珍贵的金属，才会投以最大的关注。他将金属置于烈火中，因为只有炼金之人的火能熔化金属，释放出渣滓，让剩下的纯金在模具里呈现出全新且完美的形状。",
              "simpEn": "Our Father, who wants to make His holy people complete, knows how important the fire that refines is. A metal worker takes the greatest care with the most valuable metals. He puts the metal in a hot fire, because only that fire will melt it, let the waste float away, and let the clean metal take a perfect new shape.",
              "simpZh": "天父要叫属祂的人完全圣洁，祂知道炼金之人的火有多重要。冶金的人对最贵重的金属，才会最用心。他把金属放在烈火里，因为只有这火能熔化它，让渣滓除掉，剩下的纯金才能变成完美的新形状。"

            {
              "en": "A good refiner never leaves the <span class=\"vocab-trigger\" data-vocab=\"crucible\">crucible<\/span> but, as the above verse indicates, “will sit” down by it so the fire will not become even one degree too hot and possibly harm the metal. And as soon as he <span class=\"vocab-trigger\" data-vocab=\"skims\">skims<\/span> the last bit of dross from the surface and sees his face reflected in the pure metal, he <span class=\"vocab-trigger\" data-vocab=\"extinguishes\">extinguishes<\/span> the fire. <span class=\"vocab-trigger\" data-vocab=\"Arthur Tappan Pierson\">Arthur Tappan Pierson<\/span>",
              "zh": "一个好的炼银之人从不离开坩埚，正如上面经文所表明的，他会“坐下”在它旁边，这样火就不会哪怕高一度而伤及金属。一旦他撇去表面最后一点渣滓，看见自己的脸映照在纯净的金属中，他就熄了火。 亚瑟·塔潘·皮尔逊",
              "simpEn": "A good silver maker never leaves the melting pot but, as the verse says, sits down by it so the fire doesn't get even one degree too hot and harm the metal. As soon as he takes off the last waste and sees his own face shining in the pure metal, he puts out the fire. Arthur Tappan Pierson",

            },
            {
              "en": "He sat by a fire of <span class=\"vocab-trigger\" data-vocab=\"sevenfold heat\">sevenfold heat<\/span>, As He looked at the <span class=\"vocab-trigger\" data-vocab=\"precious ore\">precious ore<\/span>, And closer He bent with a searching gaze As He heated it more and more. He knew He had ore that could stand the test, And He wanted the finest gold To mold as a crown for the King to wear, Set with <span class=\"vocab-trigger\" data-vocab=\"gems\">gems<\/span> with a price untold. So He laid our gold in the burning fire, Though we would have asked for delay, And He watched the <span class=\"vocab-trigger\" data-vocab=\"dross\">dross<\/span> that we had not seen, And it melted and passed away. And the gold grew brighter and yet more bright, But our eyes were so dim with tears, We saw but the fire—not the Master’s hand, And questioned with anxious fears. Yet our gold shone out with a richer glow, As it <span class=\"vocab-trigger\" data-vocab=\"mirrored\">mirrored<\/span> a Form above, That bent o’er the fire, though unseen by us, With a look of <span class=\"vocab-trigger\" data-vocab=\"unspeakable love\">unspeakable love<\/span>. Should we think that it pleases His loving heart To cause us a moment’s pain? Not so! for He saw through the present cross The joy of <span class=\"vocab-trigger\" data-vocab=\"eternal gain\">eternal gain<\/span>. So He waited there with a watchful eye, With a love that is strong and sure, And His gold did not suffer a bit more heat, Than was needed to make it pure.",
              "zh": "祂坐在加七倍热的火旁，察看着宝贵的矿石，祂俯身靠得越近，用搜寻的目光，越加热它。祂知道祂有这样的矿石能经得起考验，祂要的是最精的金子，好铸成冠冕给君王戴，镶嵌无价之宝。于是祂把我们的金子放进烈火中，尽管我们本会请求迟延。祂看见我们未曾看见的渣滓，就熔化流走。金子愈发明亮，更加明亮，但我们泪眼模糊，只见火，不见主的手，在焦急惧怕中质问。然而我们的金子发出更丰盛的光辉，映照出那一位在上面的形像，祂俯身在火旁，虽被我们未见，面带着无法言喻的爱。我们以为祂的爱心乐意使我们受片刻疼痛吗？绝非如此！因祂透过今世的十字架看见了永恒收获的喜乐。因此祂以专注的眼目在那里等候，带着坚固确切的爱情，祂的金子并未承受一分多余的火，不过是炼净所需的分量而已。",
              "simpEn": "He sat by a fire seven times hotter, looking at the valuable ore. He bent closer, heating it more and more. He knew He had ore that could pass the test, and He wanted the finest gold to shape a crown for the King, set with priceless jewels. So He put our gold in the burning fire, though we would have asked Him to wait. He watched the hidden waste melt and disappear. The gold grew brighter, but our eyes were so filled with tears that we saw only the fire, not the Master's hand, and we questioned with worried fear. Yet our gold shone with a richer glow, reflecting a Form above who bent over the fire with unspoken love, though we could not see Him. Should we think it makes His loving heart happy to cause us a little pain? No! For He saw past today's cross to the joy of eternal gain. So He waited there with a watchful eye, with a love strong and sure, and His gold did not suffer one bit more heat than was needed to make it pure.",
              "simpZh": "祂坐在比平时热七倍的火旁，看着宝贵的矿石，越俯身，越加热。祂知道这矿石经得起考验，祂要得到最精的金子，打造冠冕给君王戴，镶上无价的宝石。于是祂把我们的金子放进烈火里，尽管我们原本会求祂等等。祂看着我们没察觉的渣滓熔化流走。金子越来越亮，但我们泪水模糊，只看见火，看不见主的手，在焦惧中质问。可是我们的金子发出更美的光，映照出那位我们看不见、却俯身在火旁的主，脸上带着说不出的爱。我们以为祂忍心叫我们受苦吗？不是！因祂透过暂时的十字架看见了永远收获的喜乐。祂用专注的眼睛守着，爱又强又稳，祂的金子绝没有多受一分热度，炼净就够了。"

              "en": "Let us run with <span class=\"vocab-trigger\" data-vocab=\"patience\">patience<\/span>. (Hebrews 12:1 KJV)",

              "zh": "“存心忍耐地跑”是一件极为艰难的事。“跑”这个词本身就暗示了缺少忍耐，或急切要到达目标。然而我们常把忍耐与躺卧或静止不动联系起来，视它为一位守护在残障者床边的天使。但我并不认为残障者所拥有的那种忍耐是最难达到的。",
