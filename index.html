        {
          "sectionId": 3,
          "heading": "November 21",
          "audio": "audio/Streams in the Desert - November 21.m4a",
          "paragraphs": [
            {
              "en": "<span class=\"vocab-trigger\" data-vocab=\"Commit your way\">Commit your way<\/span> to the Lord. (Psalm 37:5)",
              "zh": "当将你的事交托耶和华。（诗篇37:5）",
              "simpEn": "Give your way over to the Lord.",
              "simpZh": "把你的事情交托给耶和华。"
            },
            {
              "en": "Talk to God about whatever may be <span class=\"vocab-trigger\" data-vocab=\"pressuring\">pressuring<\/span> you and then commit the entire matter into His hands. Do this so that you will be free from the confusion, conflicts, and cares that fill the world today. In fact, anytime you are preparing to do something, <span class=\"vocab-trigger\" data-vocab=\"undergoing\">undergoing<\/span> some trial, or simply pursuing your normal business, tell the Father about it. <span class=\"vocab-trigger\" data-vocab=\"Acquaint\">Acquaint<\/span> Him with it; yes, even <span class=\"vocab-trigger\" data-vocab=\"burden\">burden<\/span> Him with it, and you will have put the concerns and cares of the matter behind you. From that point forward, exercise quiet, sweet <span class=\"vocab-trigger\" data-vocab=\"diligence\">diligence<\/span> in your work, recognizing your <span class=\"vocab-trigger\" data-vocab=\"dependence\">dependence<\/span> on Him to carry the matter for you. Commit your cares and yourself with them, as one burden, to your God. <span class=\"vocab-trigger\" data-vocab=\"R. Leighton\">R. Leighton<\/span>",
              "zh": "将任何正在压迫你的事告诉神，然后把整件事交在祂手中。要这样做，好让你从充满今日世界的混乱、冲突与挂虑中得着释放。事实上，每当你预备作某事、经历某个试炼，或只是办理日常事务时，都当告诉父。让祂知晓这事；是的，甚至把你的重担加在祂身上，这样你就把那些事务的牵挂和忧虑丢在身后了。从那时起，在你的工作中操练安静甜美的勤奋，承认你要依赖祂来为你承担这事。将你的挂虑连同你自己，如同一个担子，交给你的神。 R. 莱顿",
              "simpEn": "Talk to God about whatever is pressing on you, then hand the whole thing over to Him. Do this so you will be free from the confusion, fights, and worries that fill today's world. In fact, whenever you are about to do something, going through a test, or just doing your usual work, tell the Father about it. Let Him know it; yes, even put the weight on Him, and you will have left the worry and care of it behind. From then on, work with quiet, sweet care, knowing you depend on Him to carry it for you. Give your worries and yourself with them, as one load, to your God. R. Leighton",
              "simpZh": "把任何正在压着你的事告诉神，然后把整件事交在祂手里。这样做，你就能从今天世界上的混乱、冲突和忧虑中得释放。其实，每当你准备做什么事、经历什么考验，或者只是处理日常事务时，都去告诉天父。让祂知道这件事；是的，甚至把你的重担放到祂身上，这样你就能把这件事的牵挂和忧虑丢在身后。从那时起，就用安静甘甜的勤奋做你的工，意识到你要倚靠祂来替你担当这事。把你的忧虑和你自己一起，像一个担子，交给你神。 R. 莱顿"
            },
            {
              "en": "Build a little fence of trust Around today; Fill the space with loving work And therein stay. Look not through the <span class=\"vocab-trigger\" data-vocab=\"protective rails\">protective rails<\/span> Upon tomorrow; God will help you bear what comes Of joy or sorrow. <span class=\"vocab-trigger\" data-vocab=\"Mary Butts\">Mary Butts<\/span>",
              "zh": "在今日四围，筑一道小小的信任篱笆；用爱心的工作填满其间，并停留在内。不要透过那防护的栏杆，去窥望明天；无论是喜是忧，神必帮助你承担所临到的。 玛丽·巴茨",
              "simpEn": "Build a little fence of trust around today; fill the space with loving work and stay inside. Don't look through the protecting rails at tomorrow; God will help you carry whatever comes, joy or sorrow. Mary Butts",
              "simpZh": "在今天周围筑一道小小的信靠篱笆；用爱心的劳作填满这个空间，并待在里面。不要透过护栏去看明天；无论是喜乐还是忧愁，神都会帮你承担来临的一切。玛丽·巴茨"
            },
            {
              "en": "You will find it impossible to “commit your way to the Lord,” unless your way has met with His approval. It can only be done through faith, for if there is even the <span class=\"vocab-trigger\" data-vocab=\"slightest doubt\">slightest doubt<\/span> in your heart that your way is not a good one, faith will refuse to have anything to do with it. Also, this committing of your way to Him must be continuous, not just one isolated action. And no matter how <span class=\"vocab-trigger\" data-vocab=\"unexpected\">unexpected<\/span> or extraordinary His guidance may seem and no matter how close to the edge of the cliff He may lead you, never <span class=\"vocab-trigger\" data-vocab=\"snatch\">snatch<\/span> the guiding <span class=\"vocab-trigger\" data-vocab=\"reins\">reins<\/span> from His hands.",
              "zh": "你会发现，除非你的路已经得着祂的认可，否则不可能“将你的事交托耶和华”。这只能借着信心来完成，因为你心里若存有一丝怀疑，认为你的路不好，信心就拒绝与它有任何关系。并且，这种交托必须是持续的，而不是一次孤立的行为。而且，不论祂的引导看似多么意外或奇特，不论祂领你多么靠近悬崖边缘，绝不要从祂手中夺过引导的缰绳。",
              "simpEn": "You will find it impossible to give your way to the Lord unless your way has met with His okay. It can only be done through faith, because if there is even a tiny doubt in your heart that your way is not good, faith will have nothing to do with it. Also, this giving over of your way must be ongoing, not just a one-time act. And no matter how surprising or strange His leading may look, and no matter how close to the cliff edge He takes you, never grab the guiding straps out of His hands.",
              "simpZh": "你会发现，除非你的路已经得到祂的认可，否则不可能“把你的事交托耶和华”。这只能借着信心来做，因为如果你心里有一点点怀疑，觉得你的路不好，信心就根本不会碰它。而且，这种交托必须是持续不断的，不能只是一次。另外，不论祂的引导看起来多么突然、多么特别，也不论祂把你领到离悬崖边多近的地方，都不要从祂手里把引导的缰绳抢过来。"
            },
            {
              "en": "Are you willing to <span class=\"vocab-trigger\" data-vocab=\"submit\">submit<\/span> all your ways to God, allowing Him to pass judgment on them? There is nothing a Christian needs to more closely examine than his own confirmed views and habits, for we are so <span class=\"vocab-trigger\" data-vocab=\"prone\">prone<\/span> to taking God’s divine approval of them for granted. And that is why some Christians are so anxious and fearful. They have obviously not truly committed their way to the Lord and left it with Him. They took it to Him but walked away with it again. <span class=\"vocab-trigger\" data-vocab=\"selected\">selected<\/span>",
              "zh": "你愿将你一切的道路交托给神，让祂来判断吗？基督徒最需要省察的，莫过于自己所认定的观念和习惯，因为我们太容易把神对它们的赞许当作理所当然。这就是为何有些基督徒如此焦虑惧怕。他们显然没有真正将事交托给主，并留在祂那里。他们把事带到主面前，却又带着它走了。 选自",
              "simpEn": "Are you willing to give all your ways to God, letting Him decide if they are right? There is nothing a Christian needs to check more closely than his own fixed ideas and habits, because we so easily take God's approval of them for granted. And that is why some Christians are so worried and afraid. They have clearly not truly given their way to the Lord and left it there. They brought it to Him but walked away with it again. selected",
              "simpZh": "你愿不愿意把你所有的道路都交给神，让祂来判断？基督徒最需要省察的，就是自己认定的看法和习惯，因为我们太容易把神对这些的赞同当作理所当然。这就是为什么有些基督徒那么焦虑害怕。他们显然没有真正把事情交托给主，并留在祂那里。他们把事情带到神面前，却又自己把它带走了。选自"

            {
              "en": "Do you believe that I am able to do this? (Matthew 9:28)",
              "zh": "你们信我能做这事吗？（马太福音9:28）",
              "simpEn": "Do you believe that I am able to do this?",
              "simpZh": "你们信我能做这件事吗？"
            },
            {
              "en": "God deals with <span class=\"vocab-trigger\" data-vocab=\"impossibilities\">impossibilities<\/span>. It is never too late for Him to do so, as long as that which is impossible is brought to Him in complete faith by the person whose life and <span class=\"vocab-trigger\" data-vocab=\"circumstances\">circumstances<\/span> would be impacted if God is to be <span class=\"vocab-trigger\" data-vocab=\"glorified\">glorified<\/span>. If we have experienced <span class=\"vocab-trigger\" data-vocab=\"rebellion\">rebellion<\/span>, <span class=\"vocab-trigger\" data-vocab=\"unbelief\">unbelief<\/span>, sin, and ruin in our life, it is never too late for God to deal <span class=\"vocab-trigger\" data-vocab=\"triumphantly\">triumphantly<\/span> with these tragic things, if they are brought to Him in complete <span class=\"vocab-trigger\" data-vocab=\"surrender\">surrender<\/span> and trust.",
              "zh": "神处理不可能的事。只要那不可能之事，由那生命和环境会因神得荣耀而受影响的人，以完全的信心带到祂面前，对祂来说就永不太晚。如果我们生命中经历了悖逆、不信、罪恶和毁坏，只要这些事以完全的降服和信靠被带到祂面前，神得胜地处理这些悲剧，也永不太晚。",
              "simpEn": "God handles things that are impossible. It is never too late for Him to do so, as long as the impossible thing is brought to Him in full trust by the person whose life would be changed if God gets the glory. If we have gone through rebellion, unbelief, sin, and ruin, it is never too late for God to deal with these sad things in a winning way, if they are brought to Him with complete giving up and trust.",
              "simpZh": "神处理不可能的事。只要是那不可能的事，被那些生命会因神得荣耀而受影响的人，用完全信心带到祂面前，对祂来说就永远不会太晚。如果我们经历过悖逆、不信、犯罪和败坏，只要把这些事用完全的降服和信靠带到祂面前，神以得胜的方式处理这些悲惨的事，也永远不会太晚。"
            },
            {
              "en": "It has often been said, and truthfully so, that Christianity is the only religion that can deal with a person’s past. God “will repay you for the years the <span class=\"vocab-trigger\" data-vocab=\"locusts\">locusts<\/span> have eaten” (Joel 2:25), and He is trustworthy to do it <span class=\"vocab-trigger\" data-vocab=\"unreservedly\">unreservedly<\/span>. He does so not because of what we are but because of who He is. God forgives and heals and <span class=\"vocab-trigger\" data-vocab=\"restores\">restores<\/span>, for He is “the God of all <span class=\"vocab-trigger\" data-vocab=\"grace\">grace<\/span>” (1 Peter 5:10). May we praise Him and trust Him. <span class=\"vocab-trigger\" data-vocab=\"from Sunday School Times\">from Sunday School Times<\/span>",
              "zh": "常有人说，且说得真实，基督教是唯一能处理人过去的宗教。神“那些年蝗虫所吃掉的，我要补还你们”（约珥书2:25），并且祂是完全可信靠、毫无保留地这样做的。祂这样做，不是因着我们是什么，乃是因着祂是谁。神赦免，医治，并恢复，因祂是“赐诸般恩典的神”（彼得前书5:10）。愿我们赞美祂，信靠祂。 摘自《主日学报》",
              "simpEn": "It has often been truly said that Christianity is the only faith that can handle a person's past. God says, 'I will pay you back for the years the locusts have eaten,' and He can be trusted to do it fully. He does this not because of what we are, but because of who He is. God forgives, heals, and brings back, for He is 'the God of all grace.' May we praise and trust Him. from Sunday School Times",
              "simpZh": "常有人说，这也是真的，基督教是唯一能处理人过去的信仰。神说：“蝗虫吃掉的年日，我要补还给你们”，祂完全值得信靠，毫无保留地这样做。祂这样做不是因为我们是怎样的人，而是因为祂是怎样的一位神。神赦免，医治，恢复，因为祂是“赐诸般恩典的神”。愿我们赞美祂、信靠祂。摘自《主日学报》"
            },
            {
              "en": "Nothing is too hard for Jesus No man can work like Him. We have a God who delights in <span class=\"vocab-trigger\" data-vocab=\"impossibilities\">impossibilities<\/span> and who asks, “Is anything too hard for me?” (Jer. 32:27). <span class=\"vocab-trigger\" data-vocab=\"Andrew Murray\">Andrew Murray<\/span>",
              "zh": "在耶稣没有难成的事，没有人能像祂那样作工。我们有一位喜悦不可能之事的神，祂问：“岂有我难成的事吗？”（耶利米书32:27）。 慕安德烈",

            {
              "en": "This summer someone gave me some beautiful pink flowers, and as I took them, I asked, “What kind are they?” My friend answered, “They are <span class=\"vocab-trigger\" data-vocab=\"rock flowers\">rock flowers<\/span>. They grow and bloom only on rocks where you can see no soil.” Then I thought of God’s flowers growing in desperate times and hard places, and I somehow feel that He may have a certain <span class=\"vocab-trigger\" data-vocab=\"tenderness\">tenderness<\/span> for His “rock flowers” that He may not have for His lilies and roses. <span class=\"vocab-trigger\" data-vocab=\"Margaret Bottome\">Margaret Bottome<\/span>",
              "zh": "今年夏天，有人给了我一些美丽的粉红色花朵。我接过来时，问：“这是什么花？”我的朋友回答：“是岩石花。它们只生长在没有泥土的岩石上，在那里开花。”于是我想到了神的花，那些生长在艰难时刻与困苦之地的花朵。我总觉得，神对祂的“岩石花”，可能有一种对百合与玫瑰所没有的特别温柔。 玛格丽特·伯顿",
              "simpEn": "This summer someone gave me some pretty pink flowers. I took them and asked, 'What kind are they?' My friend said, 'They are rock flowers. They grow and bloom only on rocks where you see no soil.' Then I thought of God's flowers growing in hard times and hard places, and I feel that He may have a special gentleness for His 'rock flowers' that He may not have for His lilies and roses. Margaret Bottome",
              "simpZh": "今年夏天有人送了我一些漂亮的粉红色花。我接过来时间：“这是什么花？”朋友说：“是岩石花。它们只在岩石上生长开花，那里看不到泥土。”我就想到了神的花，那些在艰难时刻和困苦地方生长的花。我有种感觉，神对祂的“岩石花”，可能有一种对百合花和玫瑰花没有的特别温柔。玛格丽特·伯顿"
            },
            {
              "en": "The trials of life are sent to make us, not to break us. Financial troubles may destroy a person’s business but build up his character. And a direct blow to the outer person may be the greatest blessing possible to the inner person. So if God places or allows anything difficult in our lives, we can be sure that the real danger or trouble will be what we will lose if we run or <span class=\"vocab-trigger\" data-vocab=\"rebel\">rebel<\/span> against it. <span class=\"vocab-trigger\" data-vocab=\"Maltbie D. Babcock\">Maltbie D. Babcock<\/span>",
              "zh": "人生的试炼为要建造我们，而非摧毁我们。财务困难可能会毁掉一个人的生意，却建立他的品格。针对外面的人一记直接的重击，可能是对里面之人最大的祝福。所以，如果神在我们生活中安置或允许任何艰难的事，我们可确知，若我们逃跑或悖逆，那真正的危险或麻烦，就是我们所要失去的。 马尔特比·D·巴布科克",
              "simpEn": "Life's tests are sent to build us, not to break us. Money troubles may wreck a person's business but build up his character. A hard hit to the outer person may be the biggest blessing to the inner person. So if God puts or allows anything hard in our lives, we can be sure the real danger or trouble will be what we lose if we run or fight against it. Maltbie D. Babcock",
              "simpZh": "人生的试炼是为了造就我们，不是要打碎我们。财务上的困难可能毁掉一个人的生意，却建立他的品格。对外面的人一记重击，可能成为对里面的人最大的祝福。所以，如果神在我们的生活中安排或允许了什么艰难的事，我们可以确定，真正的危险或麻烦是我们逃跑或反抗时所要失去的。马尔特比·D·巴布科克"
            },
            {
              "en": "<span class=\"vocab-trigger\" data-vocab=\"Heroes\">Heroes<\/span> are <span class=\"vocab-trigger\" data-vocab=\"forged\">forged<\/span> on <span class=\"vocab-trigger\" data-vocab=\"anvils\">anvils<\/span> hot with pain, And splendid courage comes but with the test. Some natures <span class=\"vocab-trigger\" data-vocab=\"ripen\">ripen<\/span> and some natures bloom Only on blood-wet soil, some souls prove great Only in moments dark with death or <span class=\"vocab-trigger\" data-vocab=\"doom\">doom<\/span>. God finds His best soldiers on the mountain of <span class=\"vocab-trigger\" data-vocab=\"affliction\">affliction<\/span>.",
              "zh": "英雄是在滚烫的痛苦铁砧上锻造出来的，卓越的勇气只在考验中诞生。有些性情成熟，有些性情绽放，惟独在血浸的土壤上；有些灵魂，只在黑暗的死亡或厄运时刻才显为伟大。神在苦难的山上寻得祂最好的精兵。",
              "simpEn": "Heroes are shaped on burning hot anvils of pain, and great courage comes only through testing. Some characters grow ripe and some bloom only on blood-wet ground; some souls become great only in dark moments of death or ruin. God finds His best soldiers on the mountain of suffering.",
              "simpZh": "英雄是在烧得滚烫的痛苦铁砧上打造出来的，出色的勇气只有借着考验才能产生。有些性情成熟，有些性情开花，只有在血浸的土壤上；有些灵魂只有在充满死亡或厄运的黑暗时刻才显出伟大。神在苦难的山上找到祂最好的战士。"
            }

        {
          "sectionId": 6,
          "heading": "November 24",
          "audio": "audio/Streams in the Desert - November 24.m4a",
          "paragraphs": [
            {
              "en": "Be still, and know that I am God. (Psalm 46:10)",
              "zh": "你们要休息，要知道我是神！（诗篇46:10）",
              "simpEn": "Be quiet and know that I am God.",
              "simpZh": "安静下来，知道我是神。"
            },
            {
              "en": "Is there any note in all the music of the world as mighty as the <span class=\"vocab-trigger\" data-vocab=\"grand pause\">grand pause<\/span>? Is there any word in the Psalms more <span class=\"vocab-trigger\" data-vocab=\"eloquent\">eloquent<\/span> than the word “<span class=\"vocab-trigger\" data-vocab=\"Selah\">Selah<\/span>,” meaning pause? Is there anything more <span class=\"vocab-trigger\" data-vocab=\"thrilling\">thrilling<\/span> and <span class=\"vocab-trigger\" data-vocab=\"awe-inspiring\">awe-inspiring<\/span> than the calm before the crashing of the storm, or the strange quiet that seems to fall upon nature before some <span class=\"vocab-trigger\" data-vocab=\"supernatural phenomenon\">supernatural phenomenon<\/span> or disastrous <span class=\"vocab-trigger\" data-vocab=\"upheaval\">upheaval<\/span>? And is there anything that can touch our hearts like the power of stillness?",
              "zh": "世界上一切音乐中，有哪个音符如同那伟大的休止一般有力呢？诗篇中有什么词比“细拉”——意为“停歇”——更有口才呢？有什么比暴风袭来前的平静，或一些超自然现象与灾难性剧变之前临到大自然的那种奇异寂静，更令人震撼、敬畏呢？又有什么能像安静的力量那样触动我们的心呢？",
              "simpEn": "Is there any sound in all the world's music as powerful as the great stop? Is there any word in the Psalms more meaningful than 'Selah,' which means stop? Is there anything more exciting and full of wonder than the calm before the storm breaks, or the strange quiet that falls on nature before some supernatural event or great shaking? And is there anything that can touch our hearts like the power of being still?",
              "simpZh": "在全世界所有的音乐中，有哪一个音像那个大停顿那样有力呢？诗篇中有哪一个词比“细拉”——意思就是停下来——更有力量呢？有什么比暴风雨来临前的平静，或是在超自然现象或大灾难发生之前，大自然中那种奇特的寂静更让人激动和敬畏呢？又有什么能像安静的力量那样触动我们的心呢？"
            },
            {
              "en": "For the hearts that will <span class=\"vocab-trigger\" data-vocab=\"cease\">cease<\/span> focusing on themselves, there is “the peace of God, which <span class=\"vocab-trigger\" data-vocab=\"transcends\">transcends<\/span> all understanding” (Phil. 4:7); “<span class=\"vocab-trigger\" data-vocab=\"quietness and trust\">quietness and trust<\/span>” (Isa. 30:15), which is the source of all strength; a “great peace” that will never “make them <span class=\"vocab-trigger\" data-vocab=\"stumble\">stumble<\/span>” (Ps. 119:165); and a deep rest, which the world can never give nor take away. Deep within the center of the soul is a chamber of peace where God lives and where, if we will enter it and quiet all the other sounds, we can hear His “<span class=\"vocab-trigger\" data-vocab=\"gentle whisper\">gentle whisper<\/span>” (1 Kings 19:12).",
              "zh": "对于那些肯停止专注己的心，有“神所赐出人意外的平安”（腓立比书4:7）；有“平静和安稳”（以赛亚书30:15），乃是一切能力的源头；有“大平安”，永不会“使他们绊脚”（诗篇119:165）；有那世界永不能赐予、也永不能夺去的深沉安息。在灵魂深处的中心，有一间平安的内室，神就住在那里。我们若肯进去，并将其他一切声音静下来，就能听见祂的“微小的声音”（列王纪上19:12）。",
              "simpEn": "For hearts that stop thinking only about themselves, there is 'the peace of God, which is beyond all understanding'; 'quietness and trust,' which is the source of all strength; a 'great peace' that will never 'make them fall'; and a deep rest the world can never give or take away. Deep inside the very center of the soul is a room of peace where God lives. If we enter it and quiet all other sounds, we can hear His 'gentle whisper.'",
              "simpZh": "对于那些肯停止只顾自己的心，有“神所赐出人意外的平安”；有“平静安稳”，那是一切力量的源头；有“大平安”，永远不会“叫他们跌倒”；还有世界不能给、也不能夺去的深沉安息。在灵魂最深处，有一间平安的内室，神就住在那里。我们若愿意进去，把所有别的声音都静下来，就能听见祂“微小的声音”。"
            },
            {
              "en": "Even in the fastest wheel that is turning, if you look at the center, where the <span class=\"vocab-trigger\" data-vocab=\"axle\">axle<\/span> is found, there is no movement at all. And even in the busiest life, there is a place where we may dwell alone with God in eternal stillness. There is only one way to know God: “Be still, and know.” “The Lord is in his holy <span class=\"vocab-trigger\" data-vocab=\"temple\">temple<\/span>; let all the earth be silent before him” (Hab. 2:20). <span class=\"vocab-trigger\" data-vocab=\"selected\">selected<\/span>",
              "zh": "即使在转得最快的轮子里，你若看轴心所在的那中心点，它全然没有移动。即使在最忙碌的生活中，也有一个地方我们可以独自与神同住在永恒的安静里。认识神只有一条路：“你们要休息，要知道”。 “惟耶和华在祂的圣殿中；全地的人都当在祂面前肃静静默”（哈巴谷书2:20）。 选自",
              "simpEn": "Even in the fastest spinning wheel, if you look at the very center where the axle is, there is no movement at all. Even in the busiest life, there is a place where we can live alone with God in forever stillness. There is only one way to know God: 'Be still, and know.' 'The Lord is in His holy house; let all the earth be quiet before Him.' selected",
              "simpZh": "即使在转动得最快的轮子上，如果你看中心轴所在的地方，那里完全不动。就算在再忙碌的生活中，也有一个地方，我们可以单独与神在永远的安静中同住。认识神只有一个方法：“安静下来，知道”。“耶和华在祂的圣殿中，全地都当在祂面前静默。”选自"
            },
            {
              "en": "<span class=\"vocab-trigger\" data-vocab=\"All-loving Father\">All-loving Father<\/span>, sometimes we have walked under starless skies that dripped darkness like drenching rain. We <span class=\"vocab-trigger\" data-vocab=\"despaired\">despaired<\/span> from the lack of light from the sun, moon, and stars. The gloomy darkness <span class=\"vocab-trigger\" data-vocab=\"loomed\">loomed<\/span> above us as if it would last forever. And from the dark, there spoke no <span class=\"vocab-trigger\" data-vocab=\"soothing voice\">soothing voice<\/span> to mend our broken hearts. We would gladly have welcomed even a wild clap of thunder, if only to break the torturing stillness of that mournfully depressing night. Yet Your soft whisper of eternal love spoke more sweetly to our bruised and bleeding souls than any winds that breathe across a <span class=\"vocab-trigger\" data-vocab=\"wind harp\">wind harp<\/span>. It was Your “gentle whisper” that spoke to us. We were listening and we heard You, and then we looked and saw Your face, which was <span class=\"vocab-trigger\" data-vocab=\"radiant\">radiant<\/span> with the light of Your love. And when we heard Your voice and saw Your face, new life returned to us, just as life returns to <span class=\"vocab-trigger\" data-vocab=\"withered blossoms\">withered blossoms<\/span> that drink the summer rain.",
              "zh": "全然慈爱的父啊，有时我们行在无星的天空下，那天空如倾盆大雨般滴下黑暗。我们因没有日头、月亮、星辰的光而绝望。阴沉的黑暗在我们上方赫然耸现，仿佛要持续到永远。黑暗中，没有安抚的声音来修补我们破碎的心。我们甚至愿意欢迎一声狂野的霹雳，只要能打破那凄惨压抑之夜的折磨寂静。然而，祢永恒之爱的柔细低语，比任何吹过风弦琴的风更甜美地临到我们受创流血的灵魂。正是祢的“微小的声音”向我们说话。我们在倾听，我们听见了祢；然后我们观看，看见了祢的面，因祢爱的光辉而闪耀。当我们听见祢的声音，看见祢的面，新生命就回到我们里面，正如生命回到饮了夏雨的凋谢花朵中一般。",
              "simpEn": "All-loving Father, sometimes we have walked under skies without stars, where darkness dripped like heavy rain. We lost hope without light from sun, moon, and stars. The dark gloom hung over us as if it would never end. From the darkness, no comforting voice came to heal our broken hearts. We would have been glad even for a loud clap of thunder, just to break the painful quiet of that sad, heavy night. Yet Your soft whisper of forever love spoke more sweetly to our hurt and bleeding souls than any wind that blows over a wind harp. It was Your 'gentle whisper' that spoke to us. We were listening and we heard You, and then we looked and saw Your face, shining bright with the light of Your love. When we heard Your voice and saw Your face, new life came back to us, just like life comes back to dried-up flowers that drink the summer rain.",
              "simpZh": "全然慈爱的父啊，有些时候我们走在没有星星的天空下，那黑暗像倾盆大雨一样滴下来。因为没有日头、月亮和星星的光，我们绝望了。阴沉的黑暗悬在我们上方，好像永远不会结束。黑暗中，没有安慰的声音来修补我们破碎的心。我们甚至愿意欢迎一声猛烈的雷响，只要能打破那个凄惨黑夜折磨人的寂静。然而，祢永恒之爱的微声，比任何吹过风弦琴的风都更甘甜地临到我们受伤流血的灵魂。正是祢“微小的声音”对我们说话。我们一直在听，我们听见了祢；然后我们抬头一看，看见了祢那因祢的爱而容光焕发的脸。当我们听见祢的声音，看见祢的面，新的生命就回到了我们里面，就像生命回到那些喝了夏雨的枯萎花朵中一样。"
            }

              "simpZh": "这些话的信息多么触目、多么有力！以色列王约阿施以为他打了三下地就停住，已经做得很好了。在他看来，那好像是个了不起的信心举动，但主和以利沙却深深失望，因为他半途停了下来。"

              "simpZh": "是的，他确实得到了一些东西，其实得到了很多——说到底，就是他信心所相信的那么多。但约阿施没有得到以利沙本来要给他的全部，也没有得到主想要赐给他的全部。他错过了应许的许多意义和祝福的丰盛。他得到的比任何人能给的都多，但他没有得到神最好的。"

            {

              "simpZh": "亲爱的信徒，这个故事的真理多么让人警醒！我们学会在环境里透彻地祷告，用神给我们的信息来彻底察验自己的心，这是多么重要！不然，我们就永远得不着祂应许的全部丰盛，也得不到信心祷告所能带来的所有可能。宣信"

              "en": "What does it mean when it says that you will “<span class=\"vocab-trigger\" data-vocab=\"escape with your life\">escape with your life<\/span>”? It means your life will be <span class=\"vocab-trigger\" data-vocab=\"snatched\">snatched<\/span> from the jaws of the Enemy, as David snatched the lamb from the lion. It does not mean you will be spared the heat of the battle and <span class=\"vocab-trigger\" data-vocab=\"confrontation\">confrontation<\/span> with your foes, but it means “a table before [you] in the presence of [your] enemies” (Ps. 23:5), a shelter from the storm, a <span class=\"vocab-trigger\" data-vocab=\"fortress\">fortress<\/span> amid the foe, and a life preserved in the face of continual pressure. It means comfort and hope from God, such as Paul received when he and his friends “were under great pressure, far beyond [their] ability to endure, so that [they] despaired even of life” (2 Cor. 1:8). And it means the Lord’s divine help, such as when Paul’s “<span class=\"vocab-trigger\" data-vocab=\"thorn in the flesh\">thorn in the flesh<\/span>” (2 Cor. 12:7 KJV) remained, but the power of Christ came to rest upon him, and he learned that God’s “<span class=\"vocab-trigger\" data-vocab=\"grace\">grace<\/span> is <span class=\"vocab-trigger\" data-vocab=\"sufficient\">sufficient<\/span>” (2 Cor. 12:9).",
              "zh": "当说到你必“以自己性命为掠物”时，那是什么意思呢？意思是你的性命要从仇敌的牙缝中被夺回，如同大卫从狮子口中夺回羊羔一样。这并非意味你会免于战斗的灼热和与敌人的对峙，而是意味着“在敌人面前，你为我摆设筵席”（诗篇23:5），暴风中的避难所，仇敌中间的堡垒，以及在持续压力面前得蒙保全的生命。这意味着从神来的安慰和盼望，就像保罗和他同人“被压太重，力不能胜，甚至连活命的指望都绝了”（哥林多后书1:8）时所领受的。也意味着主神圣的帮助，正如保罗的“肉体上的一根刺”（哥林多后书12:7）虽仍存留，但基督的能力覆庇了他，并且他学到了神的“恩典够你用”（哥林多后书12:9）。",
              "simpEn": "What does it mean to 'escape with your life'? It means your life will be pulled out of the enemy's teeth, as David pulled the lamb from the lion. It doesn't mean you won't feel the heat of the fight or face your enemies, but it means a table set before you while your enemies watch, a hiding place from the storm, a strong safe place among your foes, and a life kept safe even when pressure keeps coming. It means comfort and hope from God, like Paul received when he and his friends were under huge pressure, far past what they could bear, and gave up hope of living. And it means the Lord's help from heaven, like when Paul's 'thorn in the flesh' stayed, but Christ's power rested on him, and he learned that God's grace is enough.",
              "simpZh": "“以自己性命为掠物”是什么意思呢？意思就是你的性命要从仇敌的牙缝里被抢回来，就像大卫从狮子口里把羊抢回来一样。不是说你就不会经历战斗的激烈和与敌人的对抗，而是说“在敌人面前，祂为你摆桌子”，在暴风中为你遮蔽，在敌人当中作你的保障，让你在不断的压力下生命仍得保全。这就是从神来的安慰和盼望，像保罗和他同伴被压太重、甚至连活命的指望都绝了时，所经历的那样。也像保罗“肉体上那根刺”还在，但基督的能力覆庇他，他学到神恩典够用一样。"
            },
            {
              "en": "May the Lord “wherever you go . . . let you escape with your life” and help you today to be <span class=\"vocab-trigger\" data-vocab=\"victorious\">victorious<\/span> in your difficulties. <span class=\"vocab-trigger\" data-vocab=\"from Days of Heaven upon Earth\">from Days of Heaven upon Earth<\/span>",
              "zh": "愿主“无论你往哪里去，都使你以自己的命为掠物”，并在今天帮助你在困境中得胜。 摘自《在地如在天》",
              "simpEn": "May the Lord let you escape with your life wherever you go, and help you today to win in your hard times. from Days of Heaven upon Earth",
              "simpZh": "愿主无论你往哪里去，都让你保住自己的性命，并在今天帮助你在困难中得胜。摘自《在地如在天》"
            },
            {
              "en": "We often pray to be delivered from <span class=\"vocab-trigger\" data-vocab=\"afflictions\">afflictions<\/span>, and even trust God that we will be. But we do not pray for Him to make us what we should be while in the midst of the afflictions. Nor do we pray that we would be able to live within them, for however long they may last, in the complete awareness that we are held and <span class=\"vocab-trigger\" data-vocab=\"sheltered\">sheltered<\/span> by the Lord and can therefore continue within them without suffering any harm.",
              "zh": "我们常祷告求从患难中得救，甚至信靠神必要救我们。但我们却没有祷告求祂使我们在患难中成为我们应该有的样子，也没有祈求能在患难中生活，不论它们持续多久，都完全意识到自己被主托住、蒙主庇护，因此能够继续留在其中而不受任何损害。",
              "simpEn": "We often pray to be set free from troubles, and even trust God that we will be. But we don't pray for Him to make us what we should be while in the middle of the troubles. Nor do we pray that we could live inside them, however long they last, fully knowing that we are held and protected by the Lord and can stay in them without being hurt.",
              "simpZh": "我们常常祷告求脱离患难，甚至相信神会救我们出来。但我们没有祷告求神在患难中把我们做成该有的样子，也没有祈求能在患难里安然生活，不管持续多久，都完全知道自己被主托着、被主护着，因此能在其中不受伤害。"
            },
            {
              "en": "The Savior endured an especially difficult test in the wilderness while in the presence of <span class=\"vocab-trigger\" data-vocab=\"Satan\">Satan<\/span> for forty days and nights, His human nature weakened by the need for food and rest. The three Hebrew young men were kept for a time in the flames of “the <span class=\"vocab-trigger\" data-vocab=\"furnace heated seven times hotter than usual\">furnace heated seven times hotter than usual<\/span>” (Dan. 3:19). In spite of being forced to endure the <span class=\"vocab-trigger\" data-vocab=\"tyrant\">tyrant<\/span>’s last method of torture, they remained calm and <span class=\"vocab-trigger\" data-vocab=\"composed\">composed<\/span> as they waited for their time of deliverance to come. And after surviving an entire night sitting among the lions, “when <span class=\"vocab-trigger\" data-vocab=\"Daniel\">Daniel<\/span> was lifted from the den, no wound was found on him, because he had trusted in his God” (Dan. 6:23).",
              "zh": "救主在旷野中，在撒但面前，忍受了四十昼夜特别艰难的试炼，祂的人性因缺少食物和休息而软弱。三个希伯来少年在“比寻常加七倍热”的火窑中被保守了一些时间。尽管被迫承受暴君最后的酷刑，他们仍保持镇定，静候他们得拯救的时刻到来。而但以理在狮子坑中坐了整整一夜之后，“但以理被从坑里系上来，身上毫无伤损，因为信靠他的神”（但以理书6:23）。",
              "simpEn": "The Savior went through a very hard test in the desert in the presence of Satan for forty days and nights, His human body weakened by the need for food and rest. The three young Hebrew men were kept for a time in the flames of a furnace heated seven times hotter than usual. Even though forced to bear the cruel ruler's worst torture, they stayed calm and quiet as they waited for their rescue. And after staying all night among the lions, when Daniel was lifted out of the den, no wound was found on him, because he had trusted in his God.",
              "simpZh": "救主在旷野，在撒但面前忍受了四十昼夜极难的考验，祂的人性因缺食物和休息而软弱。三个希伯来少年在“比平时热七倍的”火窑里被保守了一段时间。虽然被迫忍受暴君最厉害的酷刑，他们仍然镇定从容，等候拯救时刻的到来。但以理在狮子坑里坐了整夜后，“但以理从坑里被拉上来，身上毫无伤损，因为他信靠他的神。”"
            },
            {
              "en": "They were able to endure in the presence of their enemies because they <span class=\"vocab-trigger\" data-vocab=\"dwelt\">dwelt<\/span> in the presence of their God.",
              "zh": "他们之所以能在仇敌面前忍耐，是因为他们住在神的同在中。",
              "simpEn": "They were able to hold on in front of their enemies because they lived in the presence of their God.",
              "simpZh": "他们能在仇敌面前坚持住，是因为他们活在神的同在中。"
            }

          "paragraphs": [
            {
              "en": "There remains, then, a <span class=\"vocab-trigger\" data-vocab=\"Sabbath-rest\">Sabbath-rest<\/span> for the people of God. (Hebrews 4:9)",
              "zh": "这样看来，必另有一安息日的安息为神的子民存留。（希伯来书4:9）",
              "simpEn": "There remains, then, a Sabbath rest for God's people.",
              "simpZh": "这样看来，一定还有一安息日的安息，为神的子民存留。"
            },
            {
              "en": "That rest includes <span class=\"vocab-trigger\" data-vocab=\"victory\">victory<\/span>: “The Lord gave them rest on every side. . . . The Lord handed all their enemies over to them” (Josh. 21:44). “Thanks be to God! He gives us the victory through our Lord Jesus Christ” (1 Cor. 15:57).",
              "zh": "那安息包含得胜：“耶和华使他们四境平安……耶和华把他们的一切仇敌都交在他们手中”（约书亚记21:44）。“感谢神，使我们借着我们的主耶稣基督得胜”（哥林多前书15:57）。",
              "simpEn": "That rest includes winning: 'The Lord gave them rest on every side. The Lord handed all their enemies over to them.' 'Thanks be to God! He gives us the victory through our Lord Jesus Christ.'",
              "simpZh": "那安息包含了得胜：“耶和华使他们四围安息……耶和华把他们所有的仇敌都交在他们手中。”“感谢神，祂借着我们主耶稣基督把胜利赐给我们。”"
            },
            {
              "en": "A <span class=\"vocab-trigger\" data-vocab=\"prominent believer\">prominent believer<\/span> once told of his mother, who was a very anxious and troubled Christian. He would often talk with her for hours, trying to convince her of the <span class=\"vocab-trigger\" data-vocab=\"sinfulness\">sinfulness<\/span> of worrying, but to no <span class=\"vocab-trigger\" data-vocab=\"avail\">avail<\/span>. She was like the elderly woman who once said that she had suffered a great deal, especially from the troubles that never came.",
              "zh": "一位知名的信徒曾讲到他母亲，她是一位极为焦虑愁烦的基督徒。他常常与她谈上几个小时，试图说服她忧虑是罪，却毫无效果。她就像那位老妇人一样，曾说自己受了许多苦，尤其是那些从未临到的困难带来的苦。",
              "simpEn": "A well-known believer once told of his mother, who was a very worried and troubled Christian. He would often talk with her for hours, trying to make her see that worrying is a sin, but it did no good. She was like the old woman who once said she had suffered so much, especially from troubles that never even happened.",
              "simpZh": "一位有名望的信徒曾讲到他母亲，是个非常焦虑、愁烦的基督徒。他常和她谈好几个小时，想让她明白忧虑是罪，却一点用也没有。她就像那个老妇人一样，曾说自己受了很多苦，尤其是那些从没发生过的难处带来的苦。"
            },
            {
              "en": "Then one morning his mother came to breakfast with a smile <span class=\"vocab-trigger\" data-vocab=\"adorning\">adorning<\/span> her face. He asked her what had happened, and she began describing a dream she had in the night. In her dream, she was walking along a <span class=\"vocab-trigger\" data-vocab=\"highway\">highway<\/span> with a large crowd of people, all of whom seemed very tired and <span class=\"vocab-trigger\" data-vocab=\"burdened\">burdened<\/span>. The people were all carrying little black bundles, and she noticed that more bundles were being dropped along the way by numerous <span class=\"vocab-trigger\" data-vocab=\"repulsive-looking\">repulsive-looking<\/span> creatures that seemed quite <span class=\"vocab-trigger\" data-vocab=\"demonic\">demonic<\/span> in nature. As the bundles were dropped, the people <span class=\"vocab-trigger\" data-vocab=\"stooped down\">stooped down<\/span> to pick them up and carry them.",
              "zh": "后来一天早晨，他的母亲来吃早餐，脸上洋溢着微笑。他问她发生了什么事，她便开始描述夜里做的一个梦。在梦中，她和一大群人正行在一条大路上，众人似乎都很疲惫且背负重担。人们都提着黑色的小包袱，她注意到有越来越多的包袱被一些容貌丑陋、似乎颇具鬼魔本性的活物沿途丢下。每当包袱被丢下，人们就弯腰捡起来背着。",
              "simpEn": "Then one morning his mother came to breakfast with a smile on her face. He asked what happened, and she told about a dream she had that night. In her dream, she was walking along a road with a big crowd of people, all of them looking tired and heavy-laden. They were all carrying little black bundles, and she saw that more bundles were being dropped along the way by many ugly-looking creatures that seemed evil. As the bundles were dropped, the people bent down, picked them up, and carried them.",
              "simpZh": "后来一天早上，母亲来吃早餐，脸上带着微笑。他问发生了什么事，她就说起夜里做的一个梦。梦里她和一大群人走在一条大路上，大家都显得很疲倦、背着重担。人们都提着小黑包袱，她看见沿途有许多面目可憎、有点像鬼魔的东西把更多的包袱丢下来。包袱一丢下来，人们就弯腰捡起来背着。"
            },
            {
              "en": "Like everyone else in her dream, she also carried her needless load, being weighted down with the Devil’s bundles. After a while, she looked up and saw a Man whose face was loving and bright as He moved through the crowd, <span class=\"vocab-trigger\" data-vocab=\"comforting\">comforting<\/span> the people. Finally He came to her, and she realized it was her Savior. She looked at Him, telling Him how tired she was, and He smiled sadly and said, “My dear child, these bundles you carry are not from me, and you have no need of them. They are the Devil’s burdens, and they are wearing out your life. You need to drop them and simply refuse to touch them with even one of your fingers. Then you will find your path easy, and you will feel as if ‘I carried you on eagles’ wings’ [Ex. 19:4].”",
              "zh": "在梦中，她和其他人一样，也背着那不必要的担子，被魔鬼的包袱压得沉重。过了一会儿，她抬起头，看见一个人的脸充满慈爱和光辉，正穿行在人群中，安慰众人。最后祂走到她跟前，她认出那就是她的救主。她望着祂，告诉祂自己何等疲累，祂带着忧伤的微笑说：“我亲爱的孩子，你所背的这些包袱并不是从我来的，你也无需背着它们。这些是魔鬼的担子，它们正在耗尽你的生命。你要把它们丢掉，连一根指头都不要再碰。然后你就必发现路途轻省，你也必觉得如同‘我如鹰将你们背在翅膀上’（出埃及记19:4）一样。”",
              "simpEn": "Like everyone else in the dream, she also carried her useless load, weighted down with the Devil's bundles. After a while, she looked up and saw a Man with a loving, bright face moving through the crowd, comforting people. At last He came to her, and she knew it was her Savior. She looked at Him and told Him how tired she was. He smiled sadly and said, 'My dear child, these bundles you carry are not from Me, and you don't need them. They are the Devil's loads, and they are wearing out your life. You need to drop them and refuse to even touch them with one finger. Then your path will be easy, and you will feel as if I carried you on eagles' wings.'",
              "simpZh": "梦里她也和别人一样，背着那不需要的重担，被魔鬼的包袱压着。过了一会儿，她抬头看见一个人的脸充满爱和亮光，在人群中走动，安慰众人。最后祂走到她面前，她认出那就是她的救主。她望着祂，告诉祂自己多么疲倦。祂带着忧伤的微笑说：“我亲爱的孩子，你背的这些包袱不是从我来的，你也不需要它们。那些是魔鬼的担子，正在耗尽你的生命。你要把它们丢掉，连一根手指头都不要再碰。这样你的路就会变得轻省，你也会觉得好像‘我如鹰把你们背在翅膀上’一样。”"
            },
            {
              "en": "The Savior touched her hand, and peace and joy quickly filled her soul. As she saw herself in her dream casting her burdens to the ground and ready to throw herself at His feet in joyful thanksgiving, she suddenly awoke, finding that all her worries were gone. From that day forward to the end of her life, she was the most cheerful and happy member of her family.",
              "zh": "救主触摸了她的手，平安与喜乐立刻充满了她的灵魂。在梦中她看见自己将重担丢在地上，准备欢喜感恩地扑倒在祂脚前，这时她突然醒了，发现所有的忧虑都消失了。从那天起直到她生命结束，她成了家中最愉快、最幸福的成员。",
              "simpEn": "The Savior touched her hand, and peace and joy filled her soul. In her dream she saw herself throwing her burdens to the ground and ready to fall at His feet with glad thanks. Suddenly she woke up and found that all her worries were gone. From that day to the end of her life, she was the happiest and most joyful person in her family.",
              "simpZh": "救主摸了摸她的手，平安和喜乐就充满了她的心。梦里她看见自己把重担丢在地上，正要欢喜感恩地扑倒在祂脚前，这时候她突然醒过来，发现所有的忧虑都不见了。从那天起直到她生命的尽头，她成了全家最开心、最幸福的人。"

        {

          "paragraphs": [
            {
              "en": ". . . <span class=\"vocab-trigger\" data-vocab=\"perfect\">perfect<\/span> through suffering. (Hebrews 2:10)",
              "zh": "……因受苦难得以完全。（希伯来书2:10）",
              "simpEn": "Made complete through suffering.",
              "simpZh": "借着受苦得以完全。"
            },
            {
              "en": "Steel is the product of iron plus fire. Soil is rock plus heat and the crushing of <span class=\"vocab-trigger\" data-vocab=\"glaciers\">glaciers<\/span>. <span class=\"vocab-trigger\" data-vocab=\"Linen\">Linen<\/span> is <span class=\"vocab-trigger\" data-vocab=\"flax\">flax<\/span> plus the water that cleans it, the comb that separates it, the <span class=\"vocab-trigger\" data-vocab=\"flail\">flail<\/span> that pounds it, and the shuttle that weaves it. In the same way, the development of human character requires a <span class=\"vocab-trigger\" data-vocab=\"plus\">plus<\/span> attached to it, for great character is made not through <span class=\"vocab-trigger\" data-vocab=\"luxurious\">luxurious<\/span> living but through suffering. And the world does not forget people of great character.",
              "zh": "钢是铁加上火的产物。土壤是岩石加上热和冰川的碾碎。细麻布是亚麻加上洁净它的水、梳理它的篦、捶打它的连枷，和编织它的梭子。同样，人类品格的塑造需要一个“加上”，因为伟大的品格不是借奢华生活，而是借苦难造成的。而世界不会忘记那些品格伟大的人。",
              "simpEn": "Steel is iron plus fire. Soil is rock plus heat and the grinding of ice sheets. Linen is flax plus the water that cleans it, the comb that separates it, the beating tool that pounds it, and the weaving machine that makes it. In the same way, building human character needs a 'plus,' because great character is not made by easy, rich living but by suffering. And the world does not forget people of great character.",
              "simpZh": "钢是铁加上火。土壤是石头加上热和冰川的碾碎。细麻布是亚麻加上清洗的水、梳理的篦子、捶打的连枷和编织的梭子。同样，人的品格需要加上一些东西，因为伟大的品格不是靠奢华生活造成的，而是靠苦难造成的。世界不会忘记那些品格伟大的人。"

              "en": "For sixty-two years and five months I had my beloved wife, and now, in my ninety-second year, I am left alone. But I turn to the ever present Jesus as I walk around my room, and say, “Lord Jesus, I am alone. Yet I am not alone, for You are with me and are my Friend. Now, Lord, please comfort me, strengthen me, and give to Your poor servant everything that You see I need.” We should never be satisfied until we have come to the place where we know the Lord Jesus in this way—until we have discovered He is our <span class=\"vocab-trigger\" data-vocab=\"eternal Friend\">eternal Friend<\/span>—continually, under all circumstances, and constantly ready to prove Himself as our Friend. <span class=\"vocab-trigger\" data-vocab=\"George Mueller\">George Mueller<\/span>",

            {
              "en": "<span class=\"vocab-trigger\" data-vocab=\"Afflictions\">Afflictions<\/span> cannot injure when we blend them with <span class=\"vocab-trigger\" data-vocab=\"submission\">submission<\/span>. Ice on trees will bend many a branch to the point of breaking. Similarly, I see a great many people bowed down and <span class=\"vocab-trigger\" data-vocab=\"crushed\">crushed<\/span> by their afflictions. Yet every now and then I meet someone who sings in affliction, and then I thank God for my own circumstance as well as his. There is never a song more beautiful than that which is sung in the night. You may remember the story of a woman who, when her only child died, looked toward heaven as with the face of an angel and said, “I give you joy, my sweet child.” That <span class=\"vocab-trigger\" data-vocab=\"solitary\">solitary<\/span>, simple sentence has stayed with me for many years, often <span class=\"vocab-trigger\" data-vocab=\"energizing\">energizing<\/span> and comforting me. <span class=\"vocab-trigger\" data-vocab=\"Henry Ward Beecher\">Henry Ward Beecher<\/span>",

              "simpEn": "Suffering cannot hurt us when we mix it with giving in to God's will. Ice on trees bends branches until they almost break. I see many people crushed by their troubles. Yet sometimes I meet someone who sings through trouble, and I thank God. There is no song more beautiful than one sung in the night. You may recall the woman who, when her only child died, looked toward heaven with an angel's face and said, 'I give you joy, my sweet child.' That single, simple sentence has stayed with me for many years, often giving me strength and comfort. Henry Ward Beecher",
              "simpZh": "当苦难与顺服神的旨意调和在一起，苦难就不能伤害我们。树枝上的冰会压弯许多枝条，甚至折断。我看见很多人被苦难压垮。但偶尔遇见在苦难中歌唱的人，我就为他和自己的遭遇感谢神。没有比在黑夜中唱的歌更美的了。你可能记得那个故事：一位母亲，当她唯一的孩子死去时，她带着天使般的面容望向天空说：“我亲爱的孩子，我因你而喜乐。”那一句简单的话陪伴了我许多年，常常给我力量和安慰。亨利·沃德·比彻"

              "zh": "住在甘美的山谷中是好的，世人工作在那里完成，收割者在麦田里歌唱，劳作直到太阳西沉。但在草场之外，我看见了群山，那里交通的喧嚣止息，我跟随一个声音，它从山巅平安之境呼唤我。是的，住在美丽的山谷中是甘甜的，劳作直到太阳西沉；但当日暮工毕，我的灵渴慕山顶的空气。因为有一种同在弥漫在寂静的群山之上，它的甜美至今犹存；那同样的深深宁静充满了整个山坡，正如曾吹拂在橄榄山上。",

        {
          "sectionId": 5,
          "heading": "December 7",
          "audio": "audio/Streams in the Desert - December 7.m4a",
          "paragraphs": [
            {
              "en": "You will see neither wind nor rain, yet this valley will be filled with water, and you, your cattle and your other animals will drink. This is an easy thing in the eyes of the Lord; he will also hand <span class=\"vocab-trigger\" data-vocab=\"Moab\">Moab<\/span> over to you. (2 Kings 3:17–18)",

              "simpEn": "You will not see wind or rain, yet this valley will be filled with water. You and your animals will drink. This is an easy thing for the Lord; He will also hand Moab over to you.",
              "simpZh": "你们不会看见风，也不会看见雨，但这山谷必定满了水，你们和你们的牲畜都可以喝。这在耶和华眼中是件小事，祂还要把摩押交在你们手里。"
            },
            {
              "en": "To human reason, what God was promising seemed simply impossible, but nothing is too difficult for Him. Without any sound or sign and from sources invisible and seemingly impossible, the water flowed the entire night, and “the next morning . . . there it was . . . ! And the land was filled with water. . . . The sun was shining on the water. . . . [And it] looked red—like blood” (vv. 20, 22).",
              "zh": "对人的理性而言，神所应许的似乎根本不可能，但在祂没有难成的事。没有任何声音或征兆，从不可见、看似不可能的源头，水整整流了一夜，“次日早晨……有水……！遍地就满了水……日光照在水上……[水]红如血”（20, 22节）。",
              "simpEn": "To human thinking, God's promise seemed impossible, but nothing is too hard for Him. With no sound or sign, from sources unseen and seemingly impossible, water flowed all night. The next morning, there it was! The land was filled with water. The sun shone on it, and it looked red like blood.",
              "simpZh": "按人的理智，神应许的事好像根本不可能，但对神来说没有什么是太难的。没有声音，没有预兆，从看不见、似乎不可能的源头，水流了整整一夜。第二天早上，水就在那里！遍地满了水。太阳照在水上，水看起来红得像血一样。"
            },
            {
              "en": "Our unbelief is always desiring some outward sign, and the faith of many people is largely based on <span class=\"vocab-trigger\" data-vocab=\"sensationalism\">sensationalism<\/span>. They are not convinced of the <span class=\"vocab-trigger\" data-vocab=\"genuineness\">genuineness<\/span> of God’s promises without some visible <span class=\"vocab-trigger\" data-vocab=\"manifestation\">manifestation<\/span>. But the greatest triumph of a person’s faith is to “be still, and know that [He is] God” (Ps. 46:10). The greatest victory of faith is to stand at the shore of the <span class=\"vocab-trigger\" data-vocab=\"impassable\">impassable<\/span> Red Sea and to hear the Master say, “Stand firm and you will see the deliverance the Lord will bring you today” (Ex. 14:13), and “Move on” (Ex. 14:15). As we step out in faith, without any sign or sound, taking our first steps into the water, we will see the water divide. Continuing to march ahead, we will see a pathway open through the very midst of the sea.",
              "zh": "我们的不信总是渴望一些外在的征兆，许多人的信心大量建立在轰动的事上。若没有某种可见的彰显，他们就不能确信神应许的真实性。但一个人信心的最大胜利，乃是“休息，知道[祂]是神”（诗篇46:10）。信心的最大得胜，乃是站在无法逾越的红海岸边，听见主说：“只管站住！看耶和华今天向你们所要施行的救恩”（出埃及记14:13），又说：“往前走”（出埃及记14:15）。当我们凭信心踏出去，没有任何声音或征兆，将脚第一步踏入水中，就必看见水势分开。继续向前行进，就必看见一条道路敞开在海洋的正当中。",
              "simpEn": "Our unbelief always wants some outward sign. Many people's faith is built on exciting displays. They are not sure God's promises are real without something they can see. But faith's greatest win is to be still and know He is God. The greatest victory of faith is to stand at the shore of the impassable Red Sea and hear the Master say, 'Stand firm and see the rescue the Lord will bring today,' and 'Move forward.' As we step out in faith, with no sign, taking our first steps into the water, we will see the waters part. Marching ahead, we will see a path open right through the sea.",
              "simpZh": "我们的不信总想要外面的兆头。很多人的信心建立在轰动的现象上。没有看得见的显灵，他们就不确信神的应许是真的。但信心最大的胜利，就是安静下来，知道祂是神。信心最大的得胜，是站在无法通过的红海边上，听见主说：“站住，看耶和华今天要施行的拯救”，又说：“往前走”。当我们凭信心踏出去，没有任何兆头，第一步踩进水里，就会看见水分开。继续向前走，就会看见一条路从海中开出来。"
            },

          "audio": "audio/Streams in the Desert - December 10.m4a",
          "paragraphs": [
            {
              "en": "If we are <span class=\"vocab-trigger\" data-vocab=\"distressed\">distressed<\/span>, it is for your <span class=\"vocab-trigger\" data-vocab=\"comfort\">comfort<\/span> and <span class=\"vocab-trigger\" data-vocab=\"salvation\">salvation<\/span>; if we are comforted, it is for your comfort, which produces in you <span class=\"vocab-trigger\" data-vocab=\"patient endurance\">patient endurance<\/span> of the same sufferings we suffer. And our hope for you is firm, because we know that just as you share in our sufferings, so also you share in our comfort. (2 Corinthians 1:6–7)",
              "zh": "我们受患难呢，是为叫你们得安慰，得拯救；我们得安慰呢，也是为叫你们得安慰；这安慰能叫你们忍受我们所受的那样苦楚。我们为你们所存的盼望是确定的，因为知道你们既是同受苦楚，也必同得安慰。（哥林多后书1:6–7）",
              "simpEn": "If we are in trouble, it is to bring you comfort and rescue. If we are comforted, it is to comfort you, helping you to bear the same kind of suffering we go through. And our hope for you is strong, because we know that just as you share in our suffering, you also share in our comfort.",
              "simpZh": "我们落在患难里，是为了让你们得到安慰和拯救。我们得了安慰，也是为了让你们得安慰，帮助你们能忍受跟我们一样的苦。我们对你们的盼望很坚定，因为我们知道，你们既然跟我们一同受苦，也一定会和我们一同得安慰。"
            },
            {
              "en": "Are there some people in your circle of friends to whom you naturally go in times of trials and sorrow—people who always seem to say just the right words and who give you the very <span class=\"vocab-trigger\" data-vocab=\"counsel\">counsel<\/span> you so desire? If so, you may not realize the high cost they have paid to become so skilled at binding up your <span class=\"vocab-trigger\" data-vocab=\"gaping wounds\">gaping wounds<\/span> and drying your tears. Yet if you were to investigate their past, you would find they have suffered more than most other people.",
              "zh": "在你的朋友圈子中，是否有些人在你经受试炼和忧伤时，你自然而然会去找他们——他们似乎总是能说出恰到好处的话，给予你极为渴慕的劝告？如果是，你或许不知道他们为了变得如此擅长包扎你的裂口、擦干你的眼泪，付出了何等高的代价。你若查究他们的过往，就会发现他们比大多数人受过更多的苦。",
              "simpEn": "Do you have friends you naturally go to in hard times and sadness—people who always seem to say the right words and give you the very advice you need? If so, you may not know the high price they paid to become so good at healing your deep hurts and drying your tears. If you looked at their past, you would find they have suffered more than most others.",
              "simpZh": "你身边是不是有些人，在你遇到试炼和忧伤的时候，你自然就会去找他们？他们好像总能说对话，给你最需要的建议。如果有，你可能不知道他们为了学会包扎你裂开的伤口、擦干你的眼泪，付出了多大的代价。如果你去看看他们的过去，你会发现他们比大多数人受的苦都多。"
            },
            {
              "en": "They have watched the silver cord on which the lamp of life hung slowly <span class=\"vocab-trigger\" data-vocab=\"unravel\">unravel<\/span>. They have seen the golden bowl of joy <span class=\"vocab-trigger\" data-vocab=\"smashed\">smashed<\/span> at their feet, and its contents spilled. They have experienced <span class=\"vocab-trigger\" data-vocab=\"raging tides\">raging tides<\/span>, <span class=\"vocab-trigger\" data-vocab=\"withering crops\">withering crops<\/span>, and darkness at high noon, but all this has been necessary to make them into the nurses, physicians, and ministers of others.",
              "zh": "他们曾目睹那悬挂生命之灯的银绳慢慢散开。他们曾看见喜乐的金碗在脚前被打碎，内中所盛洒满一地。他们经历过翻腾的洪涛、枯槁的庄稼，和正午的黑暗；但这一切都是必需的，为要把他们造就成他人的护士、医生和牧者。",
              "simpEn": "They have watched the silver cord holding the lamp of life slowly come apart. They have seen the golden bowl of joy broken at their feet, and everything inside poured out. They have gone through wild floods, dying crops, and darkness at noon. But all this was needed to make them nurses, doctors, and ministers to others.",
              "simpZh": "他们曾看着吊着生命之灯的银绳慢慢散开，看着喜乐的金碗在脚前被打碎，里面所有的都洒出来。他们经历过狂浪、枯干的庄稼，还有正午的黑暗。但这一切都是必要的，为要把他们做成别人的护士、医生和牧者。"
            },
            {
              "en": "<span class=\"vocab-trigger\" data-vocab=\"Cartons\">Cartons<\/span> containing <span class=\"vocab-trigger\" data-vocab=\"spices from the Orient\">spices from the Orient<\/span> may be <span class=\"vocab-trigger\" data-vocab=\"cumbersome\">cumbersome<\/span> to ship and slow in coming, but once they arrive the beautiful <span class=\"vocab-trigger\" data-vocab=\"fragrances\">fragrances<\/span> fill the air. In the same way, suffering is trying and difficult to bear, but hiding just below its surface is <span class=\"vocab-trigger\" data-vocab=\"discipline\">discipline<\/span>, knowledge, and limitless possibilities. Each of these not only strengthens and matures us but also <span class=\"vocab-trigger\" data-vocab=\"equips\">equips<\/span> us to help others. So do not worry or <span class=\"vocab-trigger\" data-vocab=\"clench your teeth\">clench your teeth<\/span>, simply waiting with <span class=\"vocab-trigger\" data-vocab=\"stubborn determination\">stubborn determination<\/span> for the suffering to pass. Instead, be determined to get everything you can from it, both for yourself and for the sake of those around you, according to the will of God. <span class=\"vocab-trigger\" data-vocab=\"selected\">selected<\/span>",
              "zh": "装着东方香料的货箱或许运输笨重、到达缓慢，但它们一到，美妙的香气就充满空气。同样，苦难令人疲惫、难以承受，但在其表面之下正藏着的，是管教、知识和无限的可能性。其中每一项不仅坚固和成熟我们，也装备我们去帮助别人。所以不要忧虑或咬牙切齿，仅仅以倔强的决心等候苦难过去。相反，当立定心志要从苦难中得着一切你所能得的，既为你自己，也为你周围人的缘故，照着神的旨意。 选自",
              "simpEn": "Boxes carrying costly spices from the East may be heavy to ship and slow to arrive, but when they come, the lovely smells fill the air. In the same way, suffering is hard to bear, but just under its surface lie training, knowledge, and endless possibilities. Each of these not only makes us stronger and more grown-up but also makes us able to help others. So don't worry or grit your teeth, just waiting stubbornly for the suffering to end. Instead, be determined to get everything you can from it, for yourself and for those around you, as God wants. selected",
              "simpZh": "装着东方香料的箱子运输起来很笨重，到得也慢，但是一到之后，美妙的香气就充满了空气。同样，苦难很折磨人、很难承受，但在它底下藏着的，是管教、知识和无限的可能性。这些不但让我们更刚强、更成熟，也装备我们去帮助别人。所以不要忧虑，也不要咬紧牙关，只是倔强地等着苦难过去。相反，要下定决心，从苦难中拿到一切你能拿到的，为自己，也为你周围人的缘故，照神的心意。选自"
            },
            {
              "en": "Once I heard a song of sweetness, As it filled the morning air, Sounding in its blest completeness, Like a tender, <span class=\"vocab-trigger\" data-vocab=\"pleading prayer\">pleading prayer<\/span>; And I sought to find the singer, Where the wondrous song was borne; And I found a bird, quite wounded, <span class=\"vocab-trigger\" data-vocab=\"Pinned down\">Pinned down<\/span> by a cruel thorn. I have seen a soul in sadness, While its wings with pain were <span class=\"vocab-trigger\" data-vocab=\"furled\">furled<\/span>, Giving hope, and cheer and gladness That should bless a weeping world; And I knew that life of sweetness, Was of pain and sorrow borne, And a <span class=\"vocab-trigger\" data-vocab=\"stricken\">stricken<\/span> soul was singing, With its heart against a thorn. You are told of One who loved you, Of a <span class=\"vocab-trigger\" data-vocab=\"Savior crucified\">Savior crucified<\/span>, You are told of nails that held Him, And a spear that <span class=\"vocab-trigger\" data-vocab=\"pierced\">pierced<\/span> His side; You are told of cruel <span class=\"vocab-trigger\" data-vocab=\"scourging\">scourging<\/span>, Of a Savior bearing <span class=\"vocab-trigger\" data-vocab=\"scorn\">scorn<\/span>, And He died for your salvation, With His brow against a thorn. You “are not above the Master.” Will you breathe a sweet <span class=\"vocab-trigger\" data-vocab=\"refrain\">refrain<\/span>? And His grace will be sufficient, When your heart is <span class=\"vocab-trigger\" data-vocab=\"pierced with pain\">pierced with pain<\/span>. Will you live to bless His loved ones, Though your life be <span class=\"vocab-trigger\" data-vocab=\"bruised and torn\">bruised and torn<\/span>, Like the bird that sang so sweetly, With its heart against a thorn? <span class=\"vocab-trigger\" data-vocab=\"selected\">selected<\/span>",
              "zh": "我曾听见一首甜美的歌，在清晨空气中飘荡，乐声如此完全蒙福，宛如温柔恳求的祈祷；我便寻找那唱歌者，追寻那奇妙歌声所发之处；却找到一只鸟，身受重伤，被一根残酷的刺紧紧压住。我曾见过一个忧愁的灵魂，翅膀因疼痛而收拢，却将盼望、欢欣和喜乐，赐给这应当蒙福的哭泣世界；我才知道那甜美的生命，是由疼痛和忧伤所生，那受击打的灵魂正在歌唱，心口抵着一根刺。有人告诉过你那位爱你的主，那位被钉十字架的救主，有人告诉你那钉穿祂的钉子，和刺透祂肋旁的枪；有人告诉你那残忍的鞭打，有人告诉你救主忍受的凌辱，祂为你的救恩而死，额头抵着一根刺。你们“不能高过主人”。你愿发出甘美的副歌吗？当你的心被痛苦刺透时，祂的恩典将够你所用。你愿活着祝福祂所爱的人吗？纵然你的一生满是青肿和撕裂，就像那只歌唱得如此甜美的鸟，心口抵着一根刺？ 选自",
              "simpEn": "Once I heard a song so sweet filling the morning air, sounding complete and blessed, like a tender, begging prayer. I looked for the singer where the wonderful song came from, and I found a bird, badly hurt, pinned down by a cruel thorn. I have seen a sad soul, its wings folded in pain, giving hope, cheer, and gladness to bless a crying world. And I knew that life of sweetness was born from pain and sorrow, and a wounded soul was singing with its heart against a thorn. You are told of One who loved you, a Savior nailed to a cross, told of nails that held Him and a spear that cut His side; told of cruel whipping, of a Savior bearing shame, and He died for your rescue with His brow against a thorn. You 'are not above the Master.' Will you breathe a sweet song? His grace will be enough when your heart is cut with pain. Will you live to bless His loved ones, though your life is hurt and torn, like the bird that sang so sweetly with its heart against a thorn? selected",
              "simpZh": "我曾经听到一首特别甜美的歌，飘在早晨的空气中，那声音那么完全、那么蒙福，像一个温柔恳求的祷告。我就去找那个唱歌的，顺着那奇妙的歌声去找；结果找到一只小鸟，受了很重的伤，被一根残酷的刺钉住了。我也见过一个忧伤的灵魂，翅膀因为疼痛收了起来，却把盼望、欢欣和喜乐带给这个应当蒙福的哭泣世界；我就知道那甜美的生命是从疼痛和忧伤里生出来的，是一个被击打的灵魂在唱歌，心口顶着一根刺。有人告诉过你有一位爱你的主，一位被钉十字架的救主，有人告诉过你钉子穿过祂，枪刺透祂的肋旁；有人告诉过你祂被残忍鞭打，救主忍受了凌辱，祂为你的拯救而死，额头抵着一根刺。你们“不能高过主人”。你愿意发出一句甘美的副歌吗？当你的心被疼痛刺透的时候，祂的恩典会够你用的。你愿意一生祝福祂所爱的人吗？虽然你的一生满是伤痕和撕裂，就像那只歌唱得那么甜美的小鸟，心口抵着一根刺？选自"
            }

        {
          "sectionId": 2,
          "heading": "December 11",
          "audio": "audio/Streams in the Desert - December 11.m4a",
          "paragraphs": [
            {
              "en": "Praise the Lord, all you servants of the Lord who <span class=\"vocab-trigger\" data-vocab=\"minister by night\">minister by night<\/span> in the house of the Lord. . . . May the Lord, the Maker of heaven and earth, bless you from <span class=\"vocab-trigger\" data-vocab=\"Zion\">Zion<\/span>. (Psalm 134:1, 3)",
              "zh": "耶和华的仆人夜间站在耶和华殿中的，你们当称颂耶和华！……愿造天地的耶和华，从锡安赐福给你们！（诗篇134:1, 3）",
              "simpEn": "Praise the Lord, all you who serve the Lord by night in His house. May the Lord, who made heaven and earth, bless you from Zion.",
              "simpZh": "所有在夜间于神殿中服侍的仆人哪，你们要赞美耶和华！愿那位创造天地的耶和华从锡安赐福给你们。"
            },
            {
              "en": "You may see this as a strange time to worship—“<span class=\"vocab-trigger\" data-vocab=\"ministering by night\">ministering by night<\/span> in the house of the Lord.” Indeed, worshiping at night, during the depth of our sorrows, is a difficult thing. Yet therein lies the blessing, for it is the test of perfect faith. If I desire to know the true depth of my friend’s love, I must see how he responds during the winter seasons of my life. And it is the same with divine love.",
              "zh": "你或许视此为一段奇特的敬拜时间——“夜间站在耶和华殿中”。诚然，在夜间，在我们忧伤的深处敬拜，是一件艰难的事。然而祝福就在其中，因为这是完全信心的考验。我若想知道朋友之爱的真正深度，就必须看他在我人生的冬季如何回应。神的爱也是如此。",
              "simpEn": "You may think this is a strange time to worship—serving by night in God's house. Indeed, worshiping at night, in the depth of our sadness, is hard. But that is where the blessing lies, because it is the test of true faith. If I want to know the real depth of my friend's love, I must see how he acts during the winter seasons of my life. It is the same with God's love.",
              "simpZh": "你可能会觉得在夜间于神殿中服侍是个很奇怪的敬拜时刻。确实，在夜间、在我们最忧伤的时候敬拜，是件很难的事。但祝福就在其中，因为这是对完全信心的考验。我如果想知道朋友的爱心有多深，就得看他在我人生的冬天怎么回应。对神的爱也是一样。"
            },
            {
              "en": "It is easy for me to worship in the summer sunshine, when the beautiful <span class=\"vocab-trigger\" data-vocab=\"melodies\">melodies<\/span> of life seem to fill the air, and the <span class=\"vocab-trigger\" data-vocab=\"lush fruit\">lush fruit<\/span> of life is still on the trees. But when the songbirds <span class=\"vocab-trigger\" data-vocab=\"cease\">cease<\/span> and the fruit falls from the trees, will my heart continue to sing? Will I remain in God’s house at night? Will I love Him simply for who He is? Am I willing to “keep watch for one hour” (Mark 14:37) with Him in His <span class=\"vocab-trigger\" data-vocab=\"Gethsemane\">Gethsemane<\/span>? Will I help Him carry His cross up the road of suffering to <span class=\"vocab-trigger\" data-vocab=\"Calvary\">Calvary<\/span>? Will I stand beside Him in His dying moments, with Mary, His mother, and John, the beloved disciple? Would I be able, with <span class=\"vocab-trigger\" data-vocab=\"Joseph of Arimathea\">Joseph of Arimathea<\/span> and <span class=\"vocab-trigger\" data-vocab=\"Nicodemus\">Nicodemus<\/span>, to take the dead Christ from His cross?",
              "zh": "在夏日的阳光下敬拜是容易的，当生命的美妙旋律似乎充满空中，生命的丰硕果实仍挂在枝头。但当歌鸟静默，果实从枝头落下时，我的心还会继续歌唱吗？我还会在夜间逗留在神的殿中吗？我会单单因祂的所是而爱祂吗？我愿意在祂的客西马尼与祂“一同警醒片时”（马可福音14:37）吗？我愿意帮助祂背负十字架，走过受苦之路，往加略山去吗？我愿意在祂临终的时刻，与祂的母亲马利亚和祂所爱的门徒约翰一同站在祂身旁吗？我能够与亚利马太的约瑟和尼哥底母一同，从十字架上取下死去的基督吗？",
              "simpEn": "It is easy for me to worship in the summer sunshine, when the lovely music of life fills the air and the rich fruit is still on the trees. But when the songbirds stop and the fruit falls, will my heart keep singing? Will I stay in God's house at night? Will I love Him just for who He is? Am I willing to 'keep watch for one hour' with Him in His Gethsemane? Will I help Him carry His cross up the road of suffering to Calvary? Will I stand beside Him in His dying moments with Mary and John? Could I, with Joseph of Arimathea and Nicodemus, take the dead Christ from His cross?",
              "simpZh": "在夏天阳光里敬拜很容易，那时候生活美妙的音乐好像充满空中，生命的果子还挂在树上。但当小鸟不叫了，果子从树上掉下来的时候，我的心还能继续唱歌吗？我还会在夜间留在神的殿里吗？我会单单因为祂是神而爱祂吗？我愿意跟祂一起在客西马尼园“警醒片时”吗？我愿意帮祂把十字架背过受苦的道路，走到各各他吗？我愿意在祂临终的时刻，和马利亚、约翰一同站在祂身边吗？我能和亚利马太的约瑟还有尼哥底母一起，把死去的基督从十字架上取下来吗？"
            },
            {
              "en": "If I can do these things, then my worship is complete and my blessing <span class=\"vocab-trigger\" data-vocab=\"glorious\">glorious<\/span>. Then I have indeed shown Him love during the time of His <span class=\"vocab-trigger\" data-vocab=\"humiliation\">humiliation<\/span>. My faith has seen Him in His lowest state, and yet my heart has recognized His <span class=\"vocab-trigger\" data-vocab=\"majesty\">majesty<\/span> through His humble <span class=\"vocab-trigger\" data-vocab=\"disguise\">disguise<\/span>. And at last I truly know that I desire not the gift but the Giver. Yes, when I can remain in His house through the darkness of night and worship Him, I have accepted Him for Himself alone. <span class=\"vocab-trigger\" data-vocab=\"George Matheson\">George Matheson<\/span>",
              "zh": "我若能做这些事，那么我的敬拜就完全了，我的祝福也荣耀了。那时我确已在祂受辱的时刻显出了对祂的爱。我的信心看见了祂在最低微的状态中，然而我的心却透过祂卑微的伪装认出了祂的威严。并且我终于真知道我渴望的不是恩赐，而是赐恩者。是的，当我能在黑夜的幽暗中留在祂的殿中敬拜祂时，我就已经单单为祂自己的缘故接纳了祂。 乔治·马西森",
              "simpEn": "If I can do these things, then my worship is complete and my blessing is wonderful. Then I have truly shown Him love during the time of His shame. My faith has seen Him at His lowest, yet my heart has recognized His greatness through His humble covering. And at last I truly know that I want not the gift but the Giver. Yes, when I can stay in His house through the dark night and worship Him, I have accepted Him for Himself alone. George Matheson",
              "simpZh": "如果我能做到这些，我的敬拜就完全了，我的祝福就荣耀了。那时我就真的在祂受羞辱的时候向祂显出了爱。我的信心看见了祂最卑微的样子，但我的心却透过祂卑微的外表认出了祂的威严。我终于知道，我渴望的不是礼物，而是那位赐礼物者。是的，当我能透过黑夜的黑暗留在祂殿中敬拜祂，我就是单单为祂自己的缘故接纳了祂。乔治·马西森"

              "en": "When one of the disciples said, “Teach us to pray,” the Lord raised His eyes to the far horizon of His Father’s world. He brought the <span class=\"vocab-trigger\" data-vocab=\"ultimate goal\">ultimate goal<\/span> of eternal life together with everything God desires to do in the life of humankind and packed it all into a powerful prayer that followed these words: “This, then, is how you should pray” (Matt. 6:9). And what a contrast between His prayer and what we often hear today!",
              "zh": "当一个门徒说“求主教导我们祷告”时，主举目望向父世界的远方地平线。祂将永生的终极目标与神渴望在人类生命中所行的一切结合起来，将其全部浓缩进一个跟随这些话而来的大能祷告中：“所以，你们祷告要这样说”（马太福音6:9）。祂的祷告与我们今日常听见的是何等鲜明的对比！",
              "simpEn": "When a disciple said, 'Teach us to pray,' the Lord lifted His eyes to the far horizon of His Father's world. He brought together the final goal of eternal life with everything God wants to do in human life and packed it all into a powerful prayer that followed these words: 'This, then, is how you should pray.' What a difference between His prayer and what we often hear today!",
              "simpZh": "当一个门徒说“教我们祷告”的时候，主举目望向天父世界的远方地平线。祂把永生的终极目标跟神要在人类生命中所做的一切结合在一起，全部浓缩进一个跟着这些话的大能祷告里：“所以，你们要这样祷告。”祂的祷告跟我们今天常听到的，有多么大的差别！"
            },
            {
              "en": "How do we pray when we follow the desires of our own hearts? We say, “Lord, bless me, then my family, my church, my city, and my country.” We start with those closest to us and gradually move outward, ultimately praying for the <span class=\"vocab-trigger\" data-vocab=\"expansion\">expansion<\/span> of God’s kingdom throughout the world.",
              "zh": "当我们随着自己内心的愿望祷告时，我们怎么祷告呢？我们说：“主啊，赐福我，然后我的家庭，我的教会，我的城市，我的国家。”我们从最亲近的人开始，逐渐向外扩展，最后才为神国度在全世界的扩张祷告。",
              "simpEn": "How do we pray when we follow our own heart's desires? We say, 'Lord, bless me, then my family, my church, my city, and my country.' We start with those closest to us and slowly move outward, finally praying for the spread of God's kingdom throughout the world.",
              "simpZh": "我们按自己心里的愿望祷告时，是怎么祷告的呢？我们说：“主啊，祝福我，然后我的家人，我的教会，我的城市，我的国家。”我们从最亲近的人开始，慢慢往外面扩展，最后才为神国度在全世界的扩张祷告。"
            },
            {
              "en": "Our Master’s prayer, however, begins where we end. He taught us to pray for the world first and our personal needs second. Only after our prayer has covered every continent, every remote island of the sea, every person in the last hidden tribe, and every desire and purpose of God for the world are we taught to ask for a piece of bread for ourselves.",
              "zh": "然而我们主的祷告，却从我们结束的地方开始。祂教导我们先为世界祷告，然后才为自己的需要祷告。只有当我们的祷告已经覆盖了每一大洲、海上每一个遥远的岛屿、最后一个隐藏部落中的每一个人，以及神对世界的每一个心愿和目的之后，我们才被教导为自己求一片饼。",
              "simpEn": "But our Master's prayer begins where we end. He taught us to pray for the world first and our personal needs second. Only after our prayer has covered every continent, every faraway island of the sea, every person in the last hidden tribe, and every desire and purpose of God for the world, are we taught to ask for a piece of bread for ourselves.",
              "simpZh": "但我们主的祷告，是从我们结束的地方开始的。祂教导我们先为全世界祷告，然后才为自己的需要祷告。只有当我们的祷告已经涵盖每一个大洲、海上的每一个偏远岛屿、最后一个隐藏部落里的每一个人，以及神对世界的每一个心愿和目的之后，我们才被教导为自己求一片面包。"
            },
            {
              "en": "Jesus gave Himself for us and to us, paying a holy and <span class=\"vocab-trigger\" data-vocab=\"precious price\">precious price<\/span> on the cross. After giving His all, is it too much for Him to ask us to do the same thing? No man or woman will ever amount to anything in God’s kingdom or ever experience any of His power, until this lesson of prayer is learned—that Christ’s business is the <span class=\"vocab-trigger\" data-vocab=\"supreme concern\">supreme concern<\/span> of life and that all of our personal considerations, no matter how important or precious to us, are <span class=\"vocab-trigger\" data-vocab=\"secondary\">secondary<\/span>. <span class=\"vocab-trigger\" data-vocab=\"Dr. Francis\">Dr. Francis<\/span>",
              "zh": "耶稣在十字架上为我们并将自己给了我们，付上了圣洁而宝贵的代价。在祂付出一切之后，祂要求我们做同样的事，还算太多吗？没有任何男人或女人能在神的国度里有所成就，或经历祂的任何能力，直到学会这个祷告的功课——基督的事乃是人生至高的关注，而我们一切个人的考量，不论对我们多重要、多宝贵，都是次要的。 弗朗西斯博士",
              "simpEn": "Jesus gave Himself for us and to us, paying a holy and valuable price on the cross. After giving everything, is it too much for Him to ask us to do the same? No one will ever be anything in God's kingdom or ever know His power until this lesson of prayer is learned—that Christ's business is the most important concern of life, and all our personal matters, no matter how important or dear to us, are second. Dr. Francis",
              "simpZh": "耶稣在十字架上把自己给了我们，也为我们舍己，付上了圣洁又宝贵的代价。祂把一切都给了，然后要求我们做同样的事，这算过分吗？没有一个人能在神的国度里有什么价值，或者经历祂的能力，除非学会这个祷告的功课——基督的事业是人生最要紧的事，而我们个人的一切考量，不管对我们来说多重要、多宝贵，都是次要的。弗朗西斯博士"
            },
            {
              "en": "When <span class=\"vocab-trigger\" data-vocab=\"Robert Moffat\">Robert Moffat<\/span>, the nineteenth-century Scottish explorer and missionary to South Africa, was once asked to write in a young lady’s personal album, he wrote these words: My album is a <span class=\"vocab-trigger\" data-vocab=\"savage chest\">savage chest<\/span>, Where fierce storms <span class=\"vocab-trigger\" data-vocab=\"brood\">brood<\/span> and shadows rest, Without one ray of light; To write the name of Jesus there, And see the savage bow in prayer, And point to worlds more bright and fair, This is my soul’s delight. “His kingdom will never end” (Luke 1:33), or as an old <span class=\"vocab-trigger\" data-vocab=\"Moravian\">Moravian<\/span> version says, “His Kingdom shall have no <span class=\"vocab-trigger\" data-vocab=\"frontier\">frontier<\/span>.” Missionary work should never be an <span class=\"vocab-trigger\" data-vocab=\"afterthought\">afterthought<\/span> of the church, because it is Christ’s <span class=\"vocab-trigger\" data-vocab=\"forethought\">forethought<\/span>. <span class=\"vocab-trigger\" data-vocab=\"Henry Jackson Van Dyke\">Henry Jackson Van Dyke<\/span>",
              "zh": "当十九世纪苏格兰探险家、南非宣教士罗伯特·莫法特有一次被邀请在一本年轻女士的私人册子上题字时，他写道：我的册子是一片野蛮的胸膛，那里狂风暴雨酝酿，暗影停驻，没有一线光芒；把耶稣的名字写在那里，看见野蛮人跪下来祷告，并指向更明亮更美好的世界，这就是我灵魂的喜悦。“祂的国没有穷尽”（路加福音1:33），又如一个古老的莫拉维亚版本所说：“祂的国度没有疆界。”宣教工作永不该是教会的后来之思，因为它是基督的预谋。 亨利·杰克逊·范戴克",
              "simpEn": "When Robert Moffat, the 19th-century Scottish explorer and missionary to South Africa, was once asked to write in a young lady's album, he wrote: 'My album is a savage chest, where fierce storms gather and shadows rest, without one ray of light; to write the name of Jesus there, and see the savage bow in prayer, and point to worlds more bright and fair—this is my soul's delight.' 'His kingdom will never end,' or as an old Moravian version says, 'His Kingdom shall have no frontier.' Missionary work should never be an afterthought of the church, because it is Christ's forethought. Henry Jackson Van Dyke",
              "simpZh": "罗伯特·莫法特是十九世纪苏格兰的探险家、南非宣教士。有一次有人请他在一本年轻女士的私人册子上题字，他写道：我的册子是一片野蛮的胸膛，那里有猛烈的风暴酝酿、暗影停驻，没有一线亮光；把耶稣的名字写在那里，看见野蛮人跪下祷告，并指向更明亮更美好的世界——这就是我灵魂的喜悦。“祂的国没有穷尽”，或者像古老的莫拉维亚版本说的：“祂的国度没有边疆。”宣教工作永远不该是教会的事后想法，因为那是基督的预先谋划。亨利·杰克逊·范戴克"
            }
          ],

              "zh": "“信任”这个词是信心的核心，是旧约赐给信心婴孩或早期阶段的用词。“信心”这个词更多传达的是一种意志的行动，“相信”这个词传达的是心思或理智的行动，但信任却是心灵的语言。“信心”和“相信”这两个词更多指某一被相信的真理，或某件预期会发生的事。",

              "simpZh": "“信靠”这个词是信心的核心，是旧约里给信心在婴孩阶段或早期阶段用的词。“信心”更多指意志上的行动，“相信”更多指思想或理智上的行动，但信靠是心灵的语言。“信心”和“相信”更多指某件被相信的真理或某件期待发生的事。"
            },
            {
              "en": "Trust implies more than this, for it sees and feels and it <span class=\"vocab-trigger\" data-vocab=\"leans on\">leans on<\/span> those who have a great, living, and genuine heart of love. Therefore let us “trust also in him” (Ps. 37:5 KJV), through all the delays, in spite of all the difficulties, and in the face of all the <span class=\"vocab-trigger\" data-vocab=\"rejection\">rejection<\/span> we encounter in life. And in spite of our feelings and evidence to the contrary, and even when we cannot understand our way or our situation, may we still “trust also in him; [for] he shall bring it to pass.” The way will open, our situation will be changed, and the end result will be peace. The cloud will finally be lifted, and the light of eternal <span class=\"vocab-trigger\" data-vocab=\"noonday\">noonday<\/span> will shine at last.",
              "zh": "信任包含的比这些更多，因为它看见、它感觉，并倚靠在那拥有伟大、活泼、真实爱心的人身上。所以让我们“也倚靠祂”（诗篇37:5），经过一切的迟延，不顾一切的困难，面对人生中遭遇的一切拒绝。纵然我们的感觉和反面的证据都在，甚至当我们无法明白自己的道路或处境时，愿我们仍旧“也倚靠祂；[因]祂必成全”。路必开通，处境必改变，最终的结果将是平安。云层终必消散，永恒正午的光辉终必照耀。",
              "simpEn": "Trust means more than this, for it sees, feels, and leans on those who have a great, living, and real heart of love. So let us 'trust also in Him,' through all the waiting, in spite of all the hard times, and facing all the rejection we meet in life. Even when our feelings and the way things look say the opposite, and even when we cannot understand our path or our situation, let us still 'trust also in Him; for He shall bring it to pass.' The way will open, our situation will change, and the end will be peace. The cloud will at last be lifted, and the light of endless noon will finally shine.",
              "simpZh": "信靠比这些包含得更多，因为它看见、它感觉，并且它依靠那些拥有一颗伟大、活泼又真诚爱心的人。所以让我们“也信靠祂”，经过所有的耽延，不顾所有困难，面对人生中遇到的所有拒绝。就算我们的感觉和反面的证据都在，甚至当我们不明白自己的道路或处境，我们仍然要“也信靠祂，因祂必成就”。路会打开，处境会改变，最后的结果会是平安。云雾终必消散，永恒正午的光芒终必照耀。"
            },
            {
              "en": "Trust and rest when all around you Puts your faith to <span class=\"vocab-trigger\" data-vocab=\"stringent test\">stringent test<\/span>; Let no fear or foe <span class=\"vocab-trigger\" data-vocab=\"confound\">confound<\/span> you, Wait for God and trust and rest. Trust and rest with heart <span class=\"vocab-trigger\" data-vocab=\"abiding\">abiding<\/span>, Like a <span class=\"vocab-trigger\" data-vocab=\"birdling\">birdling<\/span> in its nest, Underneath His feathers hiding, Fold your wings and trust and rest.",
              "zh": "当四围的一切将你的信心置于严厉考验中时，要信靠、要安息；不要让惧怕或仇敌使你惶乱，要等候神，要信靠、要安息。要信靠、要安息，以常住的心，像巢中的雏鸟，隐藏在祂的羽毛下，收起你的翅膀，信靠、安息。",
              "simpEn": "Trust and rest when everything around you puts your faith to a hard test. Let no fear or enemy confuse you; wait for God, and trust and rest. Trust and rest with a heart that stays, like a baby bird in its nest, hiding under His feathers; fold your wings and trust and rest.",
              "simpZh": "当你周围的一切把你信心放在严厉考验中时，要信靠、要安息；不要让惧怕或仇敌使你混乱，要等候神，要信靠、安息。用一颗常住的心来信靠、安息，像巢里的小鸟，藏在祂的羽毛底下，收起翅膀，信靠、安息。"

        {
          "sectionId": 7,
          "heading": "December 16",
          "audio": "audio/Streams in the Desert - December 16.m4a",
          "paragraphs": [
            {
              "en": "There was also a <span class=\"vocab-trigger\" data-vocab=\"prophetess\">prophetess<\/span>, <span class=\"vocab-trigger\" data-vocab=\"Anna\">Anna<\/span>. . . . She never left the temple but worshiped night and day, <span class=\"vocab-trigger\" data-vocab=\"fasting\">fasting<\/span> and praying. (Luke 2:36–37)",
              "zh": "又有女先知，名叫亚拿……她并不离开圣殿，禁食祈求，昼夜侍奉神。（路加福音2:36–37）",
              "simpEn": "There was also a prophetess, Anna. She never left the temple but worshiped night and day, fasting and praying.",
              "simpZh": "还有一个女先知，名叫亚拿。她从不离开圣殿，禁食祷告，日夜敬拜神。"
            },
            {
              "en": "There is no doubt that it is by praying that we learn to pray, and that the more we pray, the better our prayers will be. People who pray <span class=\"vocab-trigger\" data-vocab=\"in spurts\">in spurts<\/span> are never likely to attain to the kind of prayer described in the Scriptures as “<span class=\"vocab-trigger\" data-vocab=\"powerful and effective\">powerful and effective<\/span>” (James 5:16). Great power in prayer is within our reach, but we must work to obtain it.",
              "zh": "毫无疑问，我们是在祷告中学会祷告的，祷告越多，祷告也越好。那些断断续续祷告的人，绝不可能达到圣经所描述的那种“大有功效”（雅各书5:16）的祷告。祷告的大能是我们力所能及的，但我们必须努力去得着它。",
              "simpEn": "There is no doubt that we learn to pray by praying, and the more we pray, the better our prayers become. People who pray only in short bursts are never likely to reach the kind of prayer the Bible calls 'powerful and effective.' Great power in prayer is within our reach, but we must work to get it.",
              "simpZh": "毫无疑问，我们是在祷告中学会祷告的，祷告越多，祷告就越好。那些只是一阵一阵祷告的人，绝不可能达到圣经所说的那种“大有功效”的祷告。祷告的大能是我们能够得到的，但我们必须努力去得着它。"
            },
            {
              "en": "We should never even imagine that <span class=\"vocab-trigger\" data-vocab=\"Abraham\">Abraham<\/span> could have <span class=\"vocab-trigger\" data-vocab=\"interceded\">interceded<\/span> so successfully for <span class=\"vocab-trigger\" data-vocab=\"Sodom\">Sodom<\/span> if he had not communed with God throughout the previous years of his life. <span class=\"vocab-trigger\" data-vocab=\"Jacob\">Jacob<\/span>'s entire night of wrestling at <span class=\"vocab-trigger\" data-vocab=\"Peniel\">Peniel<\/span> was certainly not the first encounter he had with his God. And we can even look at our Lord’s most beautiful and wonderful prayer in John 17, before His suffering and death, as the fruit of His many nights of devotion, and of His rising often before <span class=\"vocab-trigger\" data-vocab=\"daybreak\">daybreak<\/span> to pray.",
              "zh": "我们绝不可想象，亚伯拉罕若没有在先前年日中与神相交，就能为所多玛做出那样成功的代求。雅各在毗努伊勒整夜的摔跤，当然不是他与神的第一次相遇。我们甚至可以将主在受苦和受死之前，于约翰福音17章中那最美丽奇妙的祷告，视为祂许多个敬虔之夜并常常天未亮就起来祷告所结的果子。",
              "simpEn": "We should never think that Abraham could have prayed so well for Sodom if he had not walked with God through all the years before. Jacob's whole night of wrestling at Peniel was certainly not his first meeting with God. And we can even see our Lord's most beautiful prayer in John 17, before His suffering and death, as the fruit of His many nights of devotion and His rising often before dawn to pray.",
              "simpZh": "我们千万不要以为，亚伯拉罕要是没有从前那些年日一直与神相交，就能为所多玛做出那样成功的代求。雅各在毗努伊勒整夜的摔跤，当然不是他头一次遇见神。我们甚至可以把主在受苦受死之前，于约翰福音17章那个最美丽最奇妙的祷告，看作祂许多个敬虔之夜、常常天没亮就起来祷告所结的果子。"
            },
            {
              "en": "If a person believes he can become powerful in prayer without making a commitment to it, he is living under a great <span class=\"vocab-trigger\" data-vocab=\"delusion\">delusion<\/span>. The prayer of <span class=\"vocab-trigger\" data-vocab=\"Elijah\">Elijah<\/span>, which stopped the rain from heaven and later opened heaven’s <span class=\"vocab-trigger\" data-vocab=\"floodgates\">floodgates<\/span>, was only one example of a long series of his mighty pleadings with God. Oh, if only we Christians would remember that <span class=\"vocab-trigger\" data-vocab=\"perseverance\">perseverance<\/span> in prayer is necessary for it to be effective and victorious!",
              "zh": "若有人相信自己可以不对祷告委身，就能在祷告上大有能力，他是活在一个巨大的幻想之中。以利亚那叫天闭塞不下雨、后来又打开天上窗户的祷告，不过是他一长串向神有力恳求中的一个例子。哦，巴不得我们基督徒牢记，在祷告上恒忍是叫它有效且得胜所必需的！",
              "simpEn": "If someone thinks he can become strong in prayer without giving himself to it, he is living under a big lie. Elijah's prayer, which stopped the rain and later opened heaven's floodgates, was just one example of a long series of his mighty pleadings with God. Oh, if only we Christians would remember that holding on in prayer is necessary for it to work and win!",
              "simpZh": "如果有人相信自己不用委身于祷告就能在祷告上大有能力，他是活在一个很大的错觉里。以利亚那个使天不下雨、后来又打开天上窗户的祷告，只不过是他一长串向神有力恳求中的一个例子。哦，巴不得我们基督徒都记住，在祷告上坚持忍耐，是祷告有功效、能得胜所必需的！"
            },
            {
              "en": "The great <span class=\"vocab-trigger\" data-vocab=\"intercessors\">intercessors<\/span>, who are seldom mentioned in connection with the heroes and <span class=\"vocab-trigger\" data-vocab=\"martyrs\">martyrs<\/span> of the faith, were nevertheless the greatest <span class=\"vocab-trigger\" data-vocab=\"benefactors\">benefactors<\/span> of the church. Yet their becoming the channels of the blessings of mercy to others was only made possible by their <span class=\"vocab-trigger\" data-vocab=\"abiding\">abiding<\/span> at the <span class=\"vocab-trigger\" data-vocab=\"mercy seat\">mercy seat<\/span> of God.",

              "simpEn": "The great intercessors, who are seldom spoken of along with the heroes and martyrs of the faith, were still the greatest helpers of the church. But their becoming the channels of mercy's blessings to others was made possible only by their staying at God's mercy seat.",
              "simpZh": "那些伟大的代求者，很少被跟信心的英雄和殉道者一起提起，但他们却是教会最大的恩人。然而，他们能成为怜悯之福流向别人的管道，完全是因为他们常住在神施恩的宝座前。"
