            {
              "en": "There is another kind of patience that I believe is harder to obtain—the patience that runs. Lying down during a time of grief, or being quiet after a financial setback, certainly implies great strength, but I know of something that suggests even greater strength—the power to continue working after a setback, the power to still run with a heavy heart, and the power to perform your daily tasks with deep sorrow in your spirit. This is a Christlike thing!",
              "zh": "我相信还有一种更难得到的忍耐——就是奔跑的忍耐。在悲伤时躺下，或在财物受挫后安静，诚然意味着极大的力量。但我知道有一种更显明更大力量的事——就是在挫折后继续工作的能力，仍能背负重担奔跑的能力，在灵里深深忧伤中仍履行日常职责的能力。这是基督般的品质！",
              "simpEn": "There is another kind of patience that I think is harder to get—the patience that keeps running. Lying still in sadness or being quiet after a money loss takes great strength, but I know something that shows even greater strength: the power to keep working after a loss, to keep running with a heavy heart, and to do your daily tasks while carrying deep sorrow inside. This is like Christ!",
              "simpZh": "还有一种忍耐更难得到，就是一边跑一边忍耐。在忧伤时躺下，或在破财后安静，确实需要很大的力气。但我发现有件事显出更大的力量——就是在打击之后还能继续做工，背着沉重的心还能跑，心里深深忧愁还能做每天的事。这就像基督了。"
            },
            {
              "en": "Many of us could tearlessly deal with our grief if only we were allowed to do so in private. Yet what is so difficult is that most of us are called to exercise our patience not in bed but in the open street, for all to see. We are called upon to <span class=\"vocab-trigger\" data-vocab=\"bury our sorrows\">bury our sorrows<\/span> not in restful inactivity but in active service—in our workplace, while shopping, and during social events—contributing to other people’s joy. No other way of burying our sorrow is as difficult as this, for it is truly what is meant by running “with patience.”",
              "zh": "我们许多人若被允许私下处理忧伤，都能做到不流泪。但困难的是，我们大多数人蒙召不是在床上、乃是在敞开的街道上，在众人眼前操练忍耐。我们蒙召不是安歇无为地埋葬忧伤，而是以积极的服侍——在职场、在购物中、在社交场合——以增添别人的快乐来埋葬它。再没有比这更难埋葬忧伤的方式了，因为这正是“存心忍耐地跑”的真正意义。",
              "simpEn": "Many of us could handle our sadness without tears if we could do it in private. But what makes it hard is that we are called to show patience not in bed but out in the open, for everyone to see. We are asked to bury our sorrows not by resting and doing nothing, but by active service—at work, while shopping, at social times—adding to other people's joy. No way of burying sadness is harder than this, because this is what it truly means to run with patience.",
              "simpZh": "许多人如果可以在私下处理悲伤，都能不流泪。但难的是，我们被呼召不是躺在床上忍耐，而是在大街上，让众人看见。我们被召不是安歇着把忧伤埋掉，而是借着积极服侍——在上班时、购物时、社交时——给别人带去快乐，这样来埋葬忧伤。这样埋忧伤最难，因为这正是“用忍耐的心跑步”的意思。"
            },
            {
              "en": "Dear Son of Man, this was Your kind of patience. It was both waiting and running at one time—waiting for the <span class=\"vocab-trigger\" data-vocab=\"ultimate goal\">ultimate goal<\/span> while in the meantime doing lesser work. I see You at <span class=\"vocab-trigger\" data-vocab=\"Cana of Galilee\">Cana of Galilee<\/span>, turning water into wine so the marriage feast would not be ruined. I see You in the desert, feeding the <span class=\"vocab-trigger\" data-vocab=\"multitude\">multitude<\/span> with bread, simply to relieve a temporary need. Yet all the time, You were bearing a mighty grief—not shared or spoken. Others may ask for a “<span class=\"vocab-trigger\" data-vocab=\"rainbow in the clouds\">rainbow in the clouds<\/span>” (Gen. 9:13), but I would ask for even more from You. Make me, in my cloud, a rainbow bringing the ministry of joy to others. My patience will only be perfect when it works in Your vineyard. <span class=\"vocab-trigger\" data-vocab=\"George Matheson\">George Matheson<\/span>",
              "zh": "亲爱的人子啊，这正是祢的忍耐。它既是等候，又是一边奔跑——一面等候最终的目标，同时做着次要的工作。我看见祢在加利利的迦拿，将水变为酒，使婚筵不致破坏。我看见祢在旷野，以饼饱足众人，仅是为了解除暂时的需要。然而一直之间，祢都背负着极大的忧伤——未曾分享、未曾言说。别人也许求“云中的彩虹”（创世记9:13），但我向祢求的更多。求祢使我在自己的云中，成为一道将喜乐服侍带给他人的彩虹。我的忍耐只有当它在祢的葡萄园中作工时，才会完全。 乔治·马西森",
              "simpEn": "Dear Son of Man, this was Your kind of patience. It was both waiting and running at the same time—waiting for the final goal while doing smaller work. I see You at Cana, turning water into wine to save the wedding feast. I see You in the wilderness, feeding the crowd with bread just to meet a passing need. Yet all the while, You were carrying a heavy sorrow—not shared or spoken. Others may ask for a rainbow in the clouds, but I ask even more from You. Make me, in my own cloud, a rainbow that brings the gift of joy to others. My patience will only be complete when it works in Your vineyard. George Matheson",
              "simpZh": "亲爱的神子啊，这就是祢的忍耐。它一面等待，一面奔跑——等候最终目标，同时做眼前的小工。我看见祢在迦拿，把水变成酒，让婚宴不丢脸。我看见祢在旷野，用饼喂饱众人，只为了应急之需。然而祢一直在背负重担般的忧伤，不分享、不提起。别人或许祈求云中的彩虹，但我要向祢求更大的：求祢使我，在自己的乌云中，成为一道带给别人喜乐的彩虹。我的忍耐只有当它在祢的葡萄园里工作时，才算完全。乔治·马西森"
            },
            {
              "en": "When all our hopes are gone, It is best our hands keep toiling on For others’ sake: For strength to bear is found in duty done; And he is best indeed who learns to make The joy of others cure his own heartache.",
              "zh": "当一切盼望消失，最好我们的手仍为他人劳碌不止；因为承担的力量是在完成本分中找到的；而学会用他人的喜乐医治自己心痛的人，确实最为美好。",
              "simpEn": "When all our hopes are gone, it is best to keep working hard for the sake of others. Strength to carry on is found in doing our duty. And the best person is the one who learns to cure his own heartache by bringing joy to others.",
              "simpZh": "当所有的盼望都消失时，最好的做法是继续为别人辛苦做工。因为能撑下去的力量就在尽责里找到；能用别人的喜乐治好自己的心痛，这样的人最好。"

          "paragraphs": [
            {
              "en": "In the same way, the Spirit helps us in our weakness. We do not know what we ought to pray for, but the Spirit himself <span class=\"vocab-trigger\" data-vocab=\"intercedes\">intercedes<\/span> for us with <span class=\"vocab-trigger\" data-vocab=\"groans\">groans<\/span> that words cannot express. And he who searches our hearts knows the mind of the Spirit, because the Spirit intercedes for the saints in accordance with God’s will. (Romans 8:26–27)",

              "simpEn": "In the same way, the Spirit helps us when we are weak. We don't know what to pray for, but the Spirit Himself prays for us with deep feelings that words can't express. And God, who sees our hearts, knows what the Spirit is thinking, because the Spirit prays for God's people in line with God's will.",
              "simpZh": "同样，我们软弱时圣灵帮助我们。我们不知道该怎样祷告，但圣灵亲自用说不出的叹息替我们祈求。鉴察人心的神知道圣灵的意思，因为圣灵是照着神的旨意为圣徒祈求。"

            {
              "en": "This is a deep <span class=\"vocab-trigger\" data-vocab=\"mystery\">mystery<\/span> of prayer. It is a delicate, <span class=\"vocab-trigger\" data-vocab=\"divine\">divine<\/span> tool that words cannot express and theology cannot explain, but the <span class=\"vocab-trigger\" data-vocab=\"humblest\">humblest<\/span> believer knows, even when he does not understand.",
              "zh": "这是祷告的深邃奥秘。它是一件精细、神圣的工具，非言语可述，非神学可释，但最谦卑的信徒知道，即便他并不理解。",
              "simpEn": "This is a deep secret of prayer. It is a fine, God-given tool that words cannot describe and teaching cannot explain, yet the simplest believer knows it, even without understanding.",
              "simpZh": "这是祷告很深的奥秘。它是一件精细神圣的工具，说不出、讲不明，但最卑微的信徒都知道，即使他还不明白。"
            },
            {
              "en": "Oh, the burdens we lovingly bear but cannot understand! Oh, the <span class=\"vocab-trigger\" data-vocab=\"inexpressible longings\">inexpressible longings<\/span> of our hearts for things we cannot <span class=\"vocab-trigger\" data-vocab=\"comprehend\">comprehend<\/span>! Yet we know they are an echo from the throne of God, and a whisper from His heart. They are often a groan rather than a song, and a burden rather than a floating feather. But they are a blessed burden, and a groan whose <span class=\"vocab-trigger\" data-vocab=\"undertone\">undertone<\/span> is praise and unspeakable joy. They are “groans that words cannot express.” We cannot always express them ourselves, and often all we understand is that God is praying in us for something that only He understands and that needs His touch.",
              "zh": "哦，那些我们默默承担却无法理解的担子！哦，心中那无法言喻的渴望，向着我们不能明白的事物！然而我们知道，那是从神宝座来的回音，是祂心头的微语。它们常是叹息，而非歌唱；是重担，而非飘羽。但它们是蒙福的重担，是那样的叹息，其底蕴乃是赞美和无法言喻的喜乐。它们是“说不出来的叹息”。我们自己常常无法表达，所能明白的往往仅是：神正在我们里面，为一件只有祂了解、并需要祂触摸的事祷告。",
              "simpEn": "Oh, the loads we carry lovingly but cannot understand! Oh, the deep longings of our hearts for things we cannot fully grasp! Yet we know these are an echo from God's throne and a whisper from His heart. They are often a groan, not a song; a weight, not a light feather. But they are a blessed weight, and a groan whose hidden sound is praise and joy too great for words. They are 'groans that words cannot express.' We often can't put them into words ourselves, and all we know is that God is praying inside us for something only He understands and needs His touch.",
              "simpZh": "哦，那些我们默默爱着却不理解的担子！哦，心中那说不出的渴望，对那些我们不明白的事！但我们知道，那是从神宝座来的回音，是祂心的微声。它们常是叹息，不是歌唱；是重担，不是羽毛。但它们是蒙福的重担，是那样的叹息，其底下是赞美和说不出的喜乐。它们是“说不出的叹息”。我们自己常常说不出来，往往只知道：神正在我们里面，为一件只有祂懂、需要祂触摸的事祷告。"

            {
              "en": "So we can simply pour from the fullness of our heart the burden of our spirit and the sorrow that seems to crush us. We can know that He hears, loves, understands, receives, and separates from our prayer everything that is in error, imperfect, or wrong. And then He presents the remainder, along with the <span class=\"vocab-trigger\" data-vocab=\"incense\">incense<\/span> of the great High Priest, before His throne on high. We may be assured that our prayer is heard, accepted, and answered in His name. <span class=\"vocab-trigger\" data-vocab=\"A. B. Simpson\">A. B. Simpson<\/span>",

              "simpEn": "So we can simply pour out from our full hearts the heavy load of our spirit and the sadness that seems to crush us. We can be sure that He hears, loves, understands, accepts, and takes out of our prayer everything that is wrong or imperfect. Then He offers what is left, along with the sweet smell of the great High Priest, before His throne on high. We can be confident that our prayer is heard, accepted, and answered in His name. A. B. Simpson",
              "simpZh": "所以我们可以从满溢的心里，把压碎我们的重担和忧伤倒出来。我们可以确信，祂听见、祂爱、祂明白、祂接受，并把我们祷告中一切错误的、不完全的都拿掉。然后把剩下的，连同那位大祭司的香，一起呈到高天宝座前。我们可以放心，我们的祷告已经在祂的名里蒙垂听、蒙悦纳、蒙应允了。宣信"

              "en": "It is not necessary to be continually speaking to God, or always hearing from God, in order to have communion or fellowship with Him, for there is an <span class=\"vocab-trigger\" data-vocab=\"unspeakable fellowship\">unspeakable fellowship<\/span> that is sweeter than words. A little child can sit all day long beside his mother, totally <span class=\"vocab-trigger\" data-vocab=\"engrossed\">engrossed<\/span> in his playing, while his mother is consumed by her work, and although both are busy and few words are spoken by either, they are in perfect fellowship. The child knows his mother is there, and she knows that he is all right.",

              "simpZh": "要与神相交，不需要不停地说话或总听见祂的声音。有一种说不出的交通，比言语更甜美。一个小孩可以整天坐在妈妈身边，专心玩自己的，妈妈则忙着工作。虽然两人都忙，很少说话，他们却处在完美的相交中。孩子知道妈妈在，妈妈知道他平安。"

            {

              "simpEn": "This was the greatest test of obeying. It was fairly easy to pack up their tents when the soft, fluffy cloud rose above the tabernacle and grandly floated ahead of the huge crowd. Change is often pleasant, and the people were excited about the path, the views, and the place of the next stop.",

            {
              "en": "The <span class=\"vocab-trigger\" data-vocab=\"psalmist\">psalmist<\/span> said, “I waited patiently for the LORD; he turned to me and heard my cry” (Ps. 40:1). And what God did for the Old Testament saints, He will do for believers down through the ages, yet He will often keep us waiting. Must we wait when we are face to face with a threatening enemy, surrounded by danger and fear, or below an unstable rock? Would this not be the time to fold our tents and leave? Have we not already suffered to the point of total collapse? Can we not exchange the sweltering heat for “green pastures . . . [and] quiet waters” (Ps. 23:2)?",
              "zh": "诗人说：“我曾耐性等候耶和华；祂垂听我的呼求”（诗篇40:1）。神为旧约圣徒所作的，祂也必为历世历代信徒成就，然而祂常叫我们等候。我们面对威吓的仇敌，被危险与恐惧包围，或身处不稳固的岩石下时，岂必须等候吗？这岂不是该卷起帐篷离开的时候吗？我们岂不已经受够了痛苦，几乎全然崩溃了吗？我们岂不能将闷热换成“青草地……[和]可安歇的水边”（诗篇23:2）吗？",
              "simpEn": "The psalm writer said, 'I waited patiently for the Lord; He turned to me and heard my cry.' What God did for Old Testament believers, He will do for believers in every age, but He will often make us wait. Must we wait when a dangerous enemy is right in front of us, surrounded by fear and trouble, or under a shaky rock? Wouldn't this be the time to pack up and go? Haven't we already suffered enough to fall apart? Can't we trade the burning heat for green fields and quiet waters?",
              "simpZh": "诗人说：“我曾耐性等候耶和华，祂垂听我的呼求。”神怎样待旧约圣徒，也必怎样待历代的信徒，但祂常常让我们等候。当我们面对凶敌，四面危险恐惧，或在不稳的石头下，还必须等吗？这不正是收帐篷走人的时候吗？我们不是已经痛苦到快要垮掉了吗？难道不能把这闷热换成青草地和安静水边吗？"
            },
            {
              "en": "When God sends no answer and “the cloud remain[s],” we must wait. Yet we can do so with the full <span class=\"vocab-trigger\" data-vocab=\"assurance\">assurance<\/span> of God’s provision of <span class=\"vocab-trigger\" data-vocab=\"manna\">manna<\/span>, water from the rock, shelter, and protection from our enemies. He never keeps us at our post without assuring us of His presence or sending us daily supplies.",
              "zh": "当神没有回音，“云彩停留”时，我们必须等候。然而我们可以满有确信地等，确知神必供应吗哪、从磐石出水、赐下庇护，并保护我们脱离仇敌。祂绝不叫我们留守岗位而不使我们确知祂的同在，或每日供应我们。",
              "simpEn": "When God sends no answer and the cloud stays, we must wait. Yet we can wait with full confidence that God will give us bread from heaven, water from the rock, shelter, and safety from enemies. He never keeps us in a place without making us sure of His presence or sending us what we need each day.",
              "simpZh": "当神没有回应，云彩停住时，我们必须等。但我们可以完全放心地等，神必供应吗哪、从磐石出水、遮蔽我们、保护我们脱离仇敌。祂绝不会把我们留在一个地方，却不让我们知道祂同在，或不每天供应我们。"
            },
            {
              "en": "Young person, wait—do not be in such a hurry to make a change! Minister, stay at your post! You must wait where you are until the cloud clearly begins to move. Wait for the Lord to give you His good pleasure! He will not be late! <span class=\"vocab-trigger\" data-vocab=\"from Daily Devotional Commentary\">from Daily Devotional Commentary<\/span>",
              "zh": "年轻人哪，要等候——不要如此急于求变！传道人哪，要守在你的岗位上！你必须等候原地，直到云彩明确开始移动。当等候主将祂的美意赐给你！祂必不迟延！ 摘自《每日灵修注释》",
              "simpEn": "Young person, wait—don't be in such a rush to change things! Minister, stay where you are! You must wait until the cloud clearly starts to move. Wait for the Lord to give you what pleases Him! He will not be late! from Daily Devotional Commentary",
              "simpZh": "年轻人，要等——不要急着改变！传道人，守住你的岗位！你必须等在原地，直到云彩清楚开始移动。等候主将祂的美意给你！祂不会迟到的！摘自《每日灵修注释》"
            },
            {
              "en": "An hour of waiting! Yet there seems such need To reach that spot <span class=\"vocab-trigger\" data-vocab=\"sublime\">sublime<\/span>! I long to reach them—but I long far more To trust HIS time! “Sit still, My children”— Yet the <span class=\"vocab-trigger\" data-vocab=\"heathen\">heathen<\/span> die, They perish while I stay! I long to reach them—but I long far more To trust HIS way! It’s good to get, It’s good indeed to give! Yet it is better still— O’er breadth, through length, down depth, up height, To trust HIS will! <span class=\"vocab-trigger\" data-vocab=\"F. M. N.\">F. M. N.<\/span>",
              "zh": "一个钟头的等候！然而看来何等需要去到那崇高的地点！我渴望到达那里——但我更渴望信靠祂的时间！“我的孩子们，静坐勿动”——然而异教徒正在死亡，我停留时他们正灭亡！我渴望到达他们那里——但我更渴望信靠祂的道路！得着固然好，给予也诚然好！然而更美的是——阔过长、深过深、高过天，信靠祂的旨意！ F. M. N.",
              "simpEn": "An hour of waiting! Yet there seems such a need to get to that high place! I long to reach them—but I long much more to trust His timing! 'Sit still, My children'— Yet those who don't know God die, They are lost while I stay! I long to reach them—but I long far more to trust His way! It's good to get, It's good to give! But it is even better still— Over width, through length, down depth, up height, To trust His will! F. M. N.",
              "simpZh": "等一个小时！可看起来多需要到达那高点！我渴望到达那里——但我更渴望相信祂的时间！“我的孩子，安静坐住”——但那些不认识神的人正在死亡，我停留时他们正在灭亡！我渴望到他们那里——但我更渴望相信祂的道路！得到好，给予也好！但更好的是——在阔处、在长里、在深处、在高处，相信祂的旨意！ F. M. N."
            }

          "paragraphs": [
            {
              "en": "Peter was kept in prison, but the church was <span class=\"vocab-trigger\" data-vocab=\"earnestly praying\">earnestly praying<\/span> to God for him. (Acts 12:5)",
              "zh": "彼得被囚在监里；教会却为他切切地祷告神。（使徒行传12:5）",
              "simpEn": "Peter was kept in prison, but the church was praying very hard to God for him.",
              "simpZh": "彼得被关在监牢里，但教会为他迫切地祷告神。"
            },
            {
              "en": "Prayer is the link that connects us with God. It is the bridge that spans every <span class=\"vocab-trigger\" data-vocab=\"gulf\">gulf<\/span> and carries us safely over every <span class=\"vocab-trigger\" data-vocab=\"chasm\">chasm<\/span> of danger or need.",
              "zh": "祷告是连接我们与神的链环。它是跨越每一道深渊、承载我们安全越过每一处危险或需要之峡谷的桥梁。",
              "simpEn": "Prayer is the chain that ties us to God. It is the bridge that reaches across every deep gap and carries us safely over every deep split of danger or need.",
              "simpZh": "祷告是把我们和神连在一起的链子，是跨越每个深谷、带我们平安走过每个危险和需要裂口的桥。"
            },
            {
              "en": "Think of the significance of this story of the first-century church: Everything seemed to be coming against it, for Peter was in prison, the Jews appeared <span class=\"vocab-trigger\" data-vocab=\"triumphant\">triumphant<\/span>, <span class=\"vocab-trigger\" data-vocab=\"Herod\">Herod<\/span> still reigned supreme, and the arena of <span class=\"vocab-trigger\" data-vocab=\"martyrdom\">martyrdom<\/span> was eagerly awaiting the next morning so it could drink the apostle’s blood. “But the church was earnestly praying to God for him.” So what was the outcome? The prison was <span class=\"vocab-trigger\" data-vocab=\"miraculously\">miraculously<\/span> opened, the apostle freed, the Jews <span class=\"vocab-trigger\" data-vocab=\"bewildered\">bewildered<\/span>, and as a display of God’s punishment, wicked King Herod “was eaten by worms and died.” And rolling on to even greater victory, “the word of God continued to increase and spread” (vv. 23–24).",
              "zh": "想想这第一世纪教会故事的重要性：一切似乎都来与它作对，彼得在监里，犹太人显出得胜的样子，希律依然高高统治，殉道者的竞技场正急切等候第二天早晨，好饮使徒的血。“教会却为他切切地祷告神。”结果如何呢？监牢神奇地开了，使徒获释，犹太人惊惶失措，而作为神刑罚的彰显，邪恶的王希律“被虫所咬，气就绝了”。事情并继续滚向更大的胜利，“神的道日见兴旺，越发广传”（23–24节）。",
              "simpEn": "Think of how important this story of the early church is. Everything seemed against it: Peter was in prison, the Jews looked like winners, Herod ruled with full power, and the place of death was waiting eagerly for morning to drink the apostle's blood. 'But the church was earnestly praying to God for him.' What happened? The prison was wonderfully opened, the apostle went free, the Jews were confused, and as a sign of God's judgment, wicked King Herod was eaten by worms and died. And rolling on to even greater victory, 'the word of God continued to grow and spread.'",
              "simpZh": "想想初代教会这故事多重要。看起来一切都反对他们：彼得下监，犹太人好像得胜了，希律高高在上，殉道场急切等着天亮喝使徒的血。“但教会却为他迫切祷告神。”结果呢？监牢奇妙地开了，使徒自由了，犹太人慌张了，而作为神的惩罚，恶王希律被虫咬死了。而且更得胜的是，“神的道越发兴旺，广传开来”。"
            },
            {
              "en": "Do we truly know the power of our <span class=\"vocab-trigger\" data-vocab=\"supernatural\">supernatural<\/span> weapon of prayer? Do we dare to use it with the authority of a faith that not only asks but also commands? God baptizes us with holy <span class=\"vocab-trigger\" data-vocab=\"boldness\">boldness<\/span> and <span class=\"vocab-trigger\" data-vocab=\"divine confidence\">divine confidence<\/span>, for He is looking not for great people but for people who will dare to prove the greatness of their God! “But the church was earnestly praying.” <span class=\"vocab-trigger\" data-vocab=\"A. B. Simpson\">A. B. Simpson<\/span>",
              "zh": "我们真知道祷告这超自然武器的能力吗？我们敢以不仅祈求、而且命令的信心的权柄来使用它吗？神以圣洁的胆量和神圣的确信为我们施洗，因为祂所寻找的不是伟人，而是敢于证明他们神之伟大的人！“教会却为他切切地祷告。” 宣信",
              "simpEn": "Do we truly know the power of our supernatural weapon of prayer? Do we dare to use it with the authority of a faith that not only asks but also commands? God fills us with holy courage and God-like confidence, for He is looking not for great people but for people who will dare to prove the greatness of their God! 'But the church was earnestly praying.' A. B. Simpson",
              "simpZh": "我们真知道祷告这超自然武器的能力吗？我们敢以那种不只祈求、而且命令的信心的权柄来用它吗？神用圣洁的胆量和属天的把握充满我们，因为祂寻找的不是大人物，而是敢证明他们的神有多伟大的人！“教会却为他迫切祷告。”宣信"
            },
            {
              "en": "In your prayers, above everything else, <span class=\"vocab-trigger\" data-vocab=\"beware\">beware<\/span> of limiting God, not only through unbelief but also by thinking you know exactly what He can do. Learn to expect the unexpected, beyond all that you ask or think. So each time you <span class=\"vocab-trigger\" data-vocab=\"intercede\">intercede<\/span> through prayer, first be quiet and worship God in His <span class=\"vocab-trigger\" data-vocab=\"glory\">glory<\/span>. Think of what He can do, how He delights in Christ His Son, and of your place in Him—then expect great things. <span class=\"vocab-trigger\" data-vocab=\"Andrew Murray\">Andrew Murray<\/span>",
              "zh": "在你的祷告中，最要紧的是提防限制神，不仅借着不信，也借着自以为确切知道祂能做什么。要学会期望那出乎意料的事，超过你所求所想的。所以每一次你借着祷告代求时，先要安静，在神的荣耀中敬拜祂。思想祂所能作的，祂如何在祂儿子基督里喜悦，以及你在祂里面的地位——然后期盼大事。 慕安德烈",
              "simpEn": "In your prayers, above all else, be careful not to put limits on God, not only by not believing but also by thinking you know exactly what He can do. Learn to look for the unexpected, above all you ask or think. So each time you pray, first be quiet and worship God in His shining greatness. Think of what He can do, how much He delights in Christ His Son, and of your place in Him—then expect great things. Andrew Murray",
              "simpZh": "你祷告时，最要紧的是当心不要限制神，不仅是不信，而且是自以为清楚祂能做什么。要学习期待那出乎意料的事，超过你所求所想的。所以每次你代求时，先要安静，在神的荣耀中敬拜祂。思想祂能做什么，祂何等喜悦祂的爱子基督，以及你在祂里面的地位——然后期待大事。慕安德烈"
            },
            {
              "en": "Our prayers are God’s opportunities. Are you experiencing sorrow? Prayer can make your time of <span class=\"vocab-trigger\" data-vocab=\"affliction\">affliction<\/span> one of strength and sweetness. Are you experiencing happiness? Prayer can add a heavenly <span class=\"vocab-trigger\" data-vocab=\"fragrance\">fragrance<\/span> to your time of joy. Are you in grave danger from some outward or inward enemy? Prayer can place an angel by your side whose very touch could shatter a <span class=\"vocab-trigger\" data-vocab=\"millstone\">millstone<\/span> into smaller grains of dust than the flour it grinds, and whose glance could destroy an entire army. What will prayer do for you? My answer is this: Everything that God can do for you. “Ask for whatever you want me to give you” (2 Chron. 1:7). <span class=\"vocab-trigger\" data-vocab=\"Frederick William Farrar\">Frederick William Farrar<\/span>",
              "zh": "我们的祷告是神的机会。你正经历忧伤吗？祷告能使你的患难时刻变为力量与甘甜。你正经历快乐吗？祷告能为你的喜乐时光加上天上的香气。你正处于某种外敌或内敌的严重危险中吗？祷告能将一位天使安置在你身旁，其触摸能将磨石打得比它所磨的面粉还细，其眼目能毁灭全军。祷告要为你作什么呢？我的回答是：神能为你作的一切。“你要我赐你什么，你可以求”（历代志下1:7）。 弗雷德里克·威廉·法勒",
              "simpEn": "Our prayers give God chances to work. Are you sad? Prayer can turn your time of pain into one of power and sweetness. Are you happy? Prayer can add a heavenly sweet smell to your joy. Are you in great danger from enemies outside or inside? Prayer can put an angel by your side whose very touch could crush a huge grinding stone into finer dust than the flour it makes, and whose look could destroy a whole army. What will prayer do for you? My answer: Everything that God can do for you. 'Ask for whatever you want Me to give you.' Frederick William Farrar",
              "simpZh": "我们的祷告是神做工的机会。你正忧伤吗？祷告能让你的受苦时刻变得有力甘甜。你正喜乐吗？祷告能给你的快乐时光加上天上的香气。你正被外敌或内敌严重威胁吗？祷告能把一个天使放在你身边，他的触摸能把大磨石击成比面粉还细的灰，他的目光能毁灭全军。祷告要为你做什么呢？我的回答是：神能为你做的一切。“你要我赐你什么，只管求。”弗雷德里克·威廉·法勒"
            },
            {
              "en": "<span class=\"vocab-trigger\" data-vocab=\"Wrestling prayer\">Wrestling prayer<\/span> can wonders do, Bring relief in <span class=\"vocab-trigger\" data-vocab=\"dire straits\">dire straits<\/span>; Prayer can force a passage through Iron bars and heavy gates.",

        {
          "sectionId": 6,
          "heading": "November 3",
          "audio": "audio/Streams in the Desert - November 3.m4a",
          "paragraphs": [
            {
              "en": "You who bring good <span class=\"vocab-trigger\" data-vocab=\"tidings\">tidings<\/span> to <span class=\"vocab-trigger\" data-vocab=\"Zion\">Zion<\/span>, go up on a high mountain. (Isaiah 40:9)",
              "zh": "报好信息给锡安的啊，你要登高山。（以赛亚书40:9）",
              "simpEn": "You who bring good news to Zion, go up on a high mountain.",
              "simpZh": "你们这向锡安报好消息的，要登上高山。"
            },
            {
              "en": "Toys and <span class=\"vocab-trigger\" data-vocab=\"trinkets\">trinkets<\/span> are easily earned, but the most valuable things carry a heavy price. The highest places of power are always bought with blood, and you can attain those <span class=\"vocab-trigger\" data-vocab=\"pinnacles\">pinnacles<\/span> if you have enough blood to pay. That is the condition of conquering holy heights everywhere. The story of true <span class=\"vocab-trigger\" data-vocab=\"heroics\">heroics<\/span> is always the story of <span class=\"vocab-trigger\" data-vocab=\"sacrificial\">sacrificial<\/span> blood. The greatest values and character in life are not blown randomly across our path by <span class=\"vocab-trigger\" data-vocab=\"wayward\">wayward<\/span> winds, for great souls experience great sorrows.",
              "zh": "玩具和小饰物容易赚得，但最宝贵的东西却带着沉重的代价。最高处的权能地位总是以血买来的，你若能付出足够的血，便能达到那些巅峰。这就是处处征服圣洁高处的条件。真正英勇的事迹永远是牺牲之血的故事。生命中最伟大的价值和品格，并不是被任意飘忽的风偶然吹到我们路上的，因为伟大的灵魂经历伟大的忧伤。",
              "simpEn": "Toys and small pretty things are easy to get, but the most valuable things cost a great price. The highest places of power are always bought with blood, and you can reach those high points if you have enough blood to pay. That is the condition for winning holy heights everywhere. The story of true bravery is always the story of blood given up. The greatest worth and character in life are not blown carelessly across our path by stray winds, for great souls go through great sorrows.",
              "simpZh": "玩具和小玩意儿容易得，但最宝贵的东西代价沉重。最高处的权能总是用血买来的，你有足够的血就能爬上那些高峰。征服各处属灵高处的条件就是如此。真正英勇的故事总是牺牲流血的故事。生命最伟大的价值和品格，不是被乱风吹到路上来的，因为伟大的灵魂都经历过极大的忧伤。"
            },
            {
              "en": "Great truths are dearly bought, the common truths, Such as we give and take from day to day, Come in the common walk of easy life, Blown by the careless wind across our way. Great truths are greatly won, not found by chance, Nor <span class=\"vocab-trigger\" data-vocab=\"wafted\">wafted<\/span> on the breath of summer dream; But grasped in the great struggle of our soul, Hard <span class=\"vocab-trigger\" data-vocab=\"buffeting\">buffeting<\/span> with adverse wind and stream. But in the day of conflict, fear, and grief, When the strong hand of God, put forth in might, Plows up the <span class=\"vocab-trigger\" data-vocab=\"subsoil\">subsoil<\/span> of our <span class=\"vocab-trigger\" data-vocab=\"stagnant\">stagnant<\/span> heart, And brings the imprisoned truth seed to the light. Wrung from the troubled spirit, in hard hours Of weakness, <span class=\"vocab-trigger\" data-vocab=\"solitude\">solitude<\/span>, and times of pain, Truth springs like harvest from the well-<span class=\"vocab-trigger\" data-vocab=\"plowed\">plowed<\/span> field, And our soul feels it has not wept in vain.",
              "zh": "伟大的真理是付重价买来的，那些日常的真理，我们每天相互传递的，是在轻松生活的常路中得来，被不经意的风吹过我们路途。伟大的真理是大大赢得的，不是偶然找到的，也不是被夏日梦的气息飘送而来的；乃是在灵魂的大挣扎中，与逆风和逆流猛烈搏斗时抓住的。但在冲突、恐惧和忧伤的日子，当神刚强的手伸出大能，犁开我们停滞之心的底土，将被囚的真理种子带到光明中。真理是从受搅扰的心灵中，在软弱、孤寂和痛苦的艰难时刻，被拧挤出来，如同丰收从好好犁过的田里长出，我们的灵魂就感到眼泪没有白流。",
              "simpEn": "Great truths cost a lot. The everyday truths we share back and forth come easily, blown by a lazy wind across our path. But deep truths are won with great effort, not found by luck or carried on a summer dream. They are grabbed in the great fight of the soul, struggling hard against wind and water pushing the wrong way. In the day of battle, fear, and sadness, when God's strong hand reaches out with power, plowing up the deep hard ground of our hearts and bringing hidden truth seeds into the light. Squeezed out of a shaken spirit, in hard hours of weakness, loneliness, and pain, truth springs up like a crop from a well-plowed field, and our soul feels it has not cried for nothing.",
              "simpZh": "伟大的真理代价很高。日常那些你一句我一句的真理，轻轻松松就得到了，是随意风吹到路上来的。但伟大的真理是拼命赢来的，不是碰巧遇见，也不是夏日轻风吹来的；而是灵魂在巨大挣扎中，跟逆风逆水猛斗时抓住的。在冲突、惧怕、忧伤的日子，神大能的手用力犁开我们心中那块又硬又死的地，把藏在里面的真理种子翻到光中。真理是从摇晃的心灵里，在软弱、孤单、痛苦的日子，被挤出来的，像丰收从犁好的田里长出来，我们的灵魂就知道眼泪没有白流。"
            },
            {
              "en": "Our capacity for knowing God is enlarged when we are brought by Him into circumstances that cause us to exercise our faith. So when difficulties block our path, may we thank God that He is taking time to deal with us, and then may we lean heavily on Him.",
              "zh": "我们认识神的能力，当祂将我们带入必须运用信心的环境时，便得以扩大。所以当困难拦阻前路时，愿我们感谢神正花时间对付我们，然后深深地倚靠祂。",
              "simpEn": "Our ability to know God grows when He puts us in situations that make us use our faith. So when hard times block our way, may we thank God that He is spending time working on us, and then lean hard on Him.",
              "simpZh": "神把我们带进必须用信心的环境中，我们认识祂的容量就扩大了。所以困难挡路时，我们要感谢神花时间对付我们，然后深深地倚靠祂。"
            }
          ],

              "simpEn": "Nothing makes the Bible more dear to us than a time of being captives. The old songs of God's Word sang to us with kindness by our stream at Babel, and rang with new joy when we saw the Lord free us and 'bring back our riches, like streams in the dry south.'",

            {

              "zh": "一个经历过极大艰难的人，不会轻易与他的圣经分开。对别人来说另一本书可能看起来一样，但对他来说却不同。在他那本旧而泪痕斑斑的圣经页面上，他用只有自己能看见的文字，写下了自己经历的日记。透过那些篇章，他一次次来到神殿中的柱子前，来到“以琳，那里有……棕树”（出埃及记15:27）。那些柱子和棕树，每一样都成了他生命中某个关键时刻的记念。",

              "zh": "要从被掳中得着任何益处，我们必须接受处境，并定意善用它。为失去的、或被夺去的事焦虑，并不会使情况好转，只会拦阻我们改善余下的部分。我们若反抗它，只会使捆索勒得更紧。",
              "simpEn": "To gain anything good from our captivity, we must accept the situation and decide to make the best of it. Worrying about what we have lost or what was taken won't make things better; it will only stop us from improving what is left. We will only pull the rope tighter if we fight against it.",
              "simpZh": "要从被掳的光景中得益，我们必须接受现实，决心好好利用它。为失去的担忧不会让事情变好，只会拦阻我们改善剩下的。我们越是反抗，身上的绳子只会勒得更紧。"

              "zh": "同样，一匹不肯安静顺服嚼环的烈马，只会勒死自己。一头在轭下焦躁不安的高傲牲口，只会擦破自己的肩膀。每个人也会明白劳伦斯·斯特恩——那位十八世纪牧师兼作家——所写关于一只燕八哥和一只金丝雀的比方。他讲述一只焦躁的燕八哥，在笼条上挣扎折断了翅膀，不停地喊：“我出不去！我出不去！”而一只顺服的金丝雀，却安栖在栖木上，唱着比那自由翱翔于天门的云雀更优美的歌。",
              "simpEn": "In the same way, a nervous horse that won't quietly accept its bridle only chokes itself. And a restless animal in its yoke only bruises its own shoulders. Everyone understands the picture that Laurence Sterne, an 18th-century writer and preacher, drew of a starling and a canary. He told of a restless starling that broke its wings fighting the bars and cried, 'I can't get out! I can't get out!' while a gentle canary sat on its perch and sang songs more beautiful than even a lark flying freely to heaven's gates.",

            {

              "simpZh": "无论什么灾难，只要我们马上用热切的祷告带到神面前，就不会只带来坏处。就像在暴雨中躲到树下，可能意外发现枝上有果子。我们逃到神那里，躲在祂翅膀荫下，就必在祂里面发现比以前所见所知的更多。"

              "simpEn": "So it is through our hard times and troubles that God gives us new and fresh pictures of Himself. Like Jacob, we must cross the stream at Jabbok if we are ever to get to Peniel, where he wrestled with God, was blessed, and could say, 'I saw God face to face, and my life was saved.' Make this story your own, dear prisoner, and God will give you 'songs in the night' and turn your 'darkness into dawn.' Nathaniel William Taylor",
              "simpZh": "所以，神正是借着我们的试炼和患难，把关乎祂的新启示赐给我们。像雅各一样，我们必须先过雅博渡口，才能抵达毗努伊勒——就是他与神摔跤、蒙祝福、并能说“我面对面看见神，我的性命仍得保全”的地方。亲爱的被掳者啊，把这故事当自己的，神就必赐你“夜间的歌唱”，并使你的“幽暗变为晨光”。纳撒尼尔·威廉·泰勒"

            {

      "sections": [
        {
          "sectionId": 1,
          "heading": "November 5",
          "audio": "audio/Streams in the Desert - November 5.m4a",
          "paragraphs": [
            {
              "en": "Is anything too hard for the Lord? (Genesis 18:14)",
              "zh": "耶和华岂有难成的事吗？（创世记18:14）",
              "simpEn": "Is anything too hard for the Lord?",
              "simpZh": "耶和华有做不了的事吗？"
            },
            {
              "en": "This is God’s loving <span class=\"vocab-trigger\" data-vocab=\"challenge\">challenge<\/span> to you and me each day. He wants us to think of the deepest, highest, and worthiest <span class=\"vocab-trigger\" data-vocab=\"desires and longings\">desires and longings<\/span> of our hearts. He wants us to think of those things that perhaps were desires for ourselves or someone dear to us, yet have gone <span class=\"vocab-trigger\" data-vocab=\"unfulfilled\">unfulfilled<\/span> for so long that we now see them as simply lost desires. And God <span class=\"vocab-trigger\" data-vocab=\"urges\">urges<\/span> us to think of even the one thing that we once saw as possible but have given up all hope of seeing fulfilled in this life.",
              "zh": "这是神每天对你我发出的爱的挑战。祂要我们思想我们心中最深、最高、最有价值的渴望和向往。祂要我们想起那些或许为自己或亲爱的人所存的心愿，却久久未曾实现，以致如今我们视它们为已然失去的愿望。神更催促我们想起那曾一度看为可能、却早已放弃今生能实现指望的那一件事。",
              "simpEn": "This is God's loving dare to you and me each day. He wants us to think of the deepest, highest, and best wants of our hearts. He wants us to think of things we may have wanted for ourselves or someone close to us, but they haven't come true for so long that we now see them as lost. And God pushes us to think even of that one thing we once thought possible but have lost all hope of seeing happen in this life.",
              "simpZh": "这是神每天对你我爱的挑战。祂要我们想想心里最深、最高、最配得的渴慕和向往。祂要我们想想那些为自己或亲友所存、却久久未实现、已经被我们当成已失去的愿望。神还催促我们回想那件我们曾认为可能、却早已放弃今生能成就的事。"
            },
            {
              "en": "That very thing, as long as it <span class=\"vocab-trigger\" data-vocab=\"aligns\">aligns<\/span> with what we know to be His expressed will—as a son was to <span class=\"vocab-trigger\" data-vocab=\"Abraham and Sarah\">Abraham and Sarah<\/span>—God intends to do for us. Yes, if we will let Him, God will do that very thing, even if we know it is such an <span class=\"vocab-trigger\" data-vocab=\"utter impossibility\">utter impossibility<\/span> that we would simply laugh at the <span class=\"vocab-trigger\" data-vocab=\"absurdity\">absurdity<\/span> of anyone ever suggesting it could come to pass.",
              "zh": "那件事，只要合乎我们所知道祂显明的旨意——正如一个儿子对于亚伯拉罕和撒拉——神定意要为我们成就。是的，只要我们肯让祂做，神必要成就那件事，纵使我们深知那是绝对不可能的，以致若有人建议它会实现，我们只会嗤笑其荒谬。",
              "simpEn": "That very thing, as long as it fits with what we know is His clear will—just like a son was for Abraham and Sarah—God plans to do for us. Yes, if we will let Him, God will do that very thing, even if we know it is so totally impossible that we would laugh at how silly it sounds if anyone said it could happen.",
              "simpZh": "那件事，只要合乎我们确信是祂显明的旨意——就像亚伯拉罕和撒拉得一个儿子——神定意要为我们做成。是的，只要我们让祂做，神就要做成那件事，哪怕我们知道那是绝对不可能的，谁要提议它会实现，我们只会觉得荒唐可笑。"
            },
            {
              "en": "“Is anything too hard for the Lord?” No, nothing is too difficult when we believe in Him enough to go forward, doing His will and letting Him do the impossible for us. Even Abraham and Sarah could have blocked God’s plan if they had continued to <span class=\"vocab-trigger\" data-vocab=\"disbelieve\">disbelieve<\/span>.",
              "zh": "“耶和华岂有难成的事吗？”不，当我们足够相信祂，愿意向前行，遵行祂的旨意，并让祂为我们成就那不可能的事时，就没有一样是太难的了。连亚伯拉罕和撒拉若持续不信，也能拦阻神的计划。",

          "paragraphs": [
            {
              "en": "Those whom I love I <span class=\"vocab-trigger\" data-vocab=\"rebuke\">rebuke<\/span> and <span class=\"vocab-trigger\" data-vocab=\"discipline\">discipline<\/span>. (Revelation 3:19)",

              "zh": "神挑选祂最优秀、最杰出的仆人，去承受最重、最显著的患难，因为那些从祂领受最多恩典的人，能够忍受最多的患难。事实上，患难临到信徒绝非偶然，而是出于神的神圣引导。祂并非漫无目标地射箭，每一支箭都负有特殊的使命，只射中它所要射中的那颗心。当信徒能在患难中站立、默默忍受时，所显出的不仅是神的恩典，也是神的荣耀。 约瑟·卡里尔",
              "simpEn": "God chooses His best and most special servants for the hardest and most special sufferings, because those who have received the most of His help can bear the most pain. In truth, suffering never comes to a believer by luck, but by God's holy leading. He does not shoot His arrows carelessly; each one has a special job and touches only the heart it is meant for. When a believer can stand and quietly go through trouble, it shows not only God's kindness but also His shining greatness. Joseph Caryl",

            },
            {
              "en": "If all my days were sunny, could I say, “In His fair land He wipes all tears away”? If I were never weary, could I keep This blessed truth, “He gives His loved ones sleep”? If no grave were mine, I might come to <span class=\"vocab-trigger\" data-vocab=\"deem\">deem<\/span> The Life Eternal but a <span class=\"vocab-trigger\" data-vocab=\"baseless\">baseless<\/span> dream. My winter, and my tears, and weariness, Even my grave, may be His way to bless. I call them ills; yet that can surely be Nothing but love that shows my Lord to me! <span class=\"vocab-trigger\" data-vocab=\"selected\">selected<\/span>",
              "zh": "若我的日子尽是艳阳高照，我岂能说“在祂荣美之地，祂擦去一切眼泪”？若我从不疲倦，我岂能持定这蒙福的真理：“祂赐所爱之人安眠”？若我从未面对坟墓，我或许会以为那永生不过是虚渺的梦幻。我的寒冬、眼泪、疲惫，甚至我的坟墓，都可能是祂赐福的途径。我称它们为祸害，但那确实只能是显明我主对我的爱！ 选自",

              "simpZh": "如果我的日子天天都是晴天，我怎能说“在祂荣美之地，祂擦去一切眼泪”呢？如果我从不疲倦，我怎能守住“祂赐祂所爱的人安眠”这蒙福真理呢？如果我从不面对坟墓，我可能以为永生不过是个虚空的梦。我的冬天、我的眼泪、我的疲惫，甚至我的坟墓，都可能是祂赐福的办法。我称它们为灾祸，但这些真的只能是显明我主对我的爱！选自"

              "en": "Christians with the most <span class=\"vocab-trigger\" data-vocab=\"spiritual depth\">spiritual depth<\/span> are generally those who have been taken through the most intense and deeply <span class=\"vocab-trigger\" data-vocab=\"anguishing\">anguishing<\/span> fires of the soul. If you have been praying to know more of Christ, do not be surprised if He leads you through the desert or through a <span class=\"vocab-trigger\" data-vocab=\"furnace of pain\">furnace of pain<\/span>.",
              "zh": "灵性最深沉的基督徒，通常是那些被带过最剧烈、最深重灵魂之苦火的人。若你一直祈求更多认识基督，当祂领你经过旷野或经过苦难的火窑时，不要感到惊讶。",

              "simpZh": "灵命最深的基督徒，往往是被带进过最猛烈、最深灵魂痛苦之火的人。如果你一直祈求更多认识基督，祂若领你走过旷野，或走过苦难的火窑，不要觉得奇怪。"
            },
            {

              "simpEn": "Dear Lord, do not punish me by taking my cross away. Instead, comfort me by helping me to give in to Your will and to love the cross. Give me only what will serve You best, and let it be used to show the greatest of all Your kind acts: bringing honor to Your name through me, just as You want. a captive's prayer",

              "zh": "我们中间谁在某个默想和祷告的时刻，未曾瞥见过天国之门呢？谁在圣洁交通的隐秘处，未曾感受过一阵汹涌的情波——那是尝到了将来蒙福的喜乐呢？",

            {

              "simpEn": "The Master had special times and places for quiet talk with His disciples. He met with them once on Mount Hermon, but more often on the holy hills of the Mount of Olives. Every Christian should have his own Mount of Olives. Most of us today, especially those in cities, live under heavy pressure. From early morning until we go to bed, we are in the wild spin of life. In all this noise and confusion, there is little chance for quiet thought, God's Word, prayer, and heart-to-heart sharing!",

              "simpEn": "Even Daniel needed to have his own Mount of Olives in his room in the middle of the noise of idol-worshiping Babylon. Peter found a rooftop in Joppa, and Martin Luther found an 'upper room' in Wittenberg, a place still seen as holy.",

            {
              "en": "The day ended with heavy showers, and the plants in my garden were beaten down by the <span class=\"vocab-trigger\" data-vocab=\"pelting\">pelting<\/span> storm. I looked at one plant I had previously <span class=\"vocab-trigger\" data-vocab=\"admired\">admired<\/span> for its beauty and had loved for its <span class=\"vocab-trigger\" data-vocab=\"delicate fragrance\">delicate fragrance<\/span>. After being exposed to the <span class=\"vocab-trigger\" data-vocab=\"merciless\">merciless<\/span> storm, its flowers had <span class=\"vocab-trigger\" data-vocab=\"drooped\">drooped<\/span>, all its petals were closed, and it appeared that its glory was gone. I thought to myself, “I suppose I will have to wait till next year to see those beautiful flowers again.”",
              "zh": "那天大雨倾盆而终，我园中的草木被猛烈的风暴打倒了。我望着先前因美丽而欣赏、因其清幽芬芳而喜爱的一株花。经过无情风暴的吹打之后，它的花朵低垂，所有的花瓣都合拢了，看似荣华尽失。我心里想：“看来我得等到明年才能再见到这些美丽的花朵了。”",
              "simpEn": "The day ended with heavy rain, and the plants in my garden were beaten down by the pounding storm. I looked at one plant I had loved for its beauty and sweet smell. After the cruel storm, its flowers hung down, all petals closed, and it looked like its beauty was gone. I thought, 'I guess I must wait till next year to see those pretty flowers again.'",
              "simpZh": "那天以大雨结束，园中的植物被猛烈的暴风打倒了。我看着一株先前因美丽而喜爱、又爱其清香的植物。经过无情风暴之后，花朵低垂，花瓣全闭起来，荣美好像全都没有了。我心想：“大概要等到明年才能再见到这些美丽的花了。”"

            {
              "en": "Yet the night passed, the sun shone again, and the morning brought strength to my favorite plant. The light looked at its flowers and the flowers looked at the light. There was contact and <span class=\"vocab-trigger\" data-vocab=\"communion\">communion<\/span>, and power passed into the flowers. They lifted their heads, opened their petals, regained their glory, and seemed more beautiful than before. I wondered how this took place—these <span class=\"vocab-trigger\" data-vocab=\"feeble\">feeble<\/span> flowers coming into contact with something much stronger, and gaining strength!",

              "simpEn": "But the night passed, the sun shone again, and the morning brought power to my loved plant. The light looked at the flowers and the flowers looked at the light. There was touching and sharing, and strength flowed into the flowers. They lifted their heads, opened their petals, got back their beauty, and looked even prettier than before. I wondered how this happened—these weak flowers touching something much stronger and getting power!",

            {
              "en": "I cannot explain exactly how we are able to receive the power to serve and to <span class=\"vocab-trigger\" data-vocab=\"endure\">endure<\/span> through communion with God, but I know it is a fact. Are you in danger of being crushed by a heavy and difficult trial? Then seek <span class=\"vocab-trigger\" data-vocab=\"communion with Christ\">communion with Christ<\/span> and you will receive strength and the power to be <span class=\"vocab-trigger\" data-vocab=\"victorious\">victorious<\/span>, for God has promised, “I will strengthen you” (Isa. 41:10).",
              "zh": "我无法详尽解释我们借着与神交通如何能领受服侍和忍耐的能力，但我知道这是事实。你是否正面临被重压的、艰难的试炼所压碎的危险？那就寻求与基督的交通，你就必得着力量和得胜的能力，因为神已应许：“我必坚固你”（以赛亚书41:10）。",

              "simpZh": "我说不清我们借着与神交通，怎么能得到服侍和忍耐的能力，但我知道这是事实。你是不是正面对一个沉重艰难的试炼，快要被压垮了？那就去寻求与基督交通吧，你就必得着力量和得胜的能力，因为神应许过：“我必坚固你。”"

            {
              "en": "<span class=\"vocab-trigger\" data-vocab=\"Yesterday’s Grief\">Yesterday’s Grief<\/span> The falling rain of yesterday is ruby on the roses, Silver on the poplar leaf, and gold on willow stem; The grief that fell just yesterday is silence that <span class=\"vocab-trigger\" data-vocab=\"encloses\">encloses<\/span> God’s great gifts of grace, and time will never trouble them. The falling rain of yesterday makes all the hillsides glisten, Coral on the laurel and beryl on the grass; The grief that fell just yesterday has taught the soul to listen For whispers of eternity in all the winds that pass. O faint of heart, storm-beaten, this rain will shine tomorrow, Flame within the columbine and jewels on the thorn, Heaven in the forget-me-not; though sorrow now is sorrow, Yet sorrow will be beauty in the magic of the morn. <span class=\"vocab-trigger\" data-vocab=\"Katherine Lee Bates\">Katherine Lee Bates<\/span>",
              "zh": "《昨日的忧伤》 昨日的落雨，在玫瑰上是红宝石，在杨树叶上是银，在柳枝上是金；昨日降下的忧伤，是环绕着神伟大恩赐的静默，时光永不会惊扰它们。昨日的落雨，使一切山坡闪亮，在月桂上成为珊瑚，在青草上成为绿玉；昨日降下的忧伤，已教灵魂聆听，在所有吹过的风中寻觅永恒的低语。哦，被风暴击打的心怯者啊，这雨明天将要放光，在耧斗菜中燃为火焰，在荆棘上化为珠宝，在勿忘我中变成天堂；虽然现在忧伤仍是忧伤，但在晨光的魔力中，忧伤将变为美丽。 凯瑟琳·李·贝茨",
              "simpEn": "Yesterday's Grief: The rain that fell yesterday is ruby on the roses, silver on the poplar leaf, and gold on the willow stem. The grief that fell just yesterday is a quietness that wraps God's great gifts of grace, and time will never touch them. The rain that fell yesterday makes all the hillsides shine, coral on the laurel and beryl on the grass. The grief that fell just yesterday has taught the soul to listen for whispers of forever in all the passing winds. O weak of heart, beaten by storms, this rain will shine tomorrow, flame in the columbine and jewels on the thorn, heaven in the forget-me-not. Though sorrow now is sorrow, yet sorrow will be beauty in the magic of the morning. Katherine Lee Bates",

          "paragraphs": [
            {

            {
              "en": "God chooses people He can depend upon. He knew what to expect from <span class=\"vocab-trigger\" data-vocab=\"Abraham\">Abraham<\/span> and said of him, “I have chosen him, so that he will direct his children . . . that the Lord will bring about for Abraham what he has promised him.” God knew Abraham would “direct his children.” The Lord can be depended upon, and He desires for us to be just as <span class=\"vocab-trigger\" data-vocab=\"reliable\">reliable<\/span>, <span class=\"vocab-trigger\" data-vocab=\"determined\">determined<\/span>, and <span class=\"vocab-trigger\" data-vocab=\"stable\">stable<\/span>. This is simply the meaning of faith.",
              "zh": "神拣选祂可以信赖的人。祂知道能从亚伯拉罕身上期待什么，于是论到他说：“我眷顾他，为要叫他吩咐他的众子……使我所应许亚伯拉罕的话都成就了。”神知道亚伯拉罕会“吩咐他的众子”。主是可以信赖的，祂也渴望我们同样可靠、坚定和稳固。这就是信心的意义。",
              "simpEn": "God chooses people He can trust. He knew what to expect from Abraham and said, 'I have chosen him so that he will guide his children . . . so that the Lord will do for Abraham what He has promised.' God knew Abraham would teach his children. The Lord can be trusted, and He wants us to be just as trustworthy, firm, and steady. This is what faith means.",
              "simpZh": "神拣选祂信得过的人。祂知道亚伯拉罕会怎样，就说：“我拣选他，为要他教导儿女……好让耶和华成就对亚伯拉罕的应许。”神知道亚伯拉罕会教导儿女。主是可靠的，祂也要我们同样可靠、坚定和稳当。这就是信心的意思。"
            },
            {
              "en": "God is looking for people on whom He can place the weight of His entire love, power, and faithful promises. And His engines are strong enough to pull any weight we may attach to them. Unfortunately, the cable we fasten to the engine is often too weak to handle the weight of our prayers. Therefore God continues to train and <span class=\"vocab-trigger\" data-vocab=\"discipline\">discipline<\/span> us in His school of stability and <span class=\"vocab-trigger\" data-vocab=\"certainty\">certainty<\/span> in the life of faith. May we learn our lessons well and then stand firm. <span class=\"vocab-trigger\" data-vocab=\"A. B. Simpson\">A. B. Simpson<\/span>",
              "zh": "神正在寻找一些人，祂可以把祂全部的爱、能力和信实应许的重担放在他们身上。祂的引擎足够强劲，能拉动我们挂在其上的任何重物。不幸的是，我们系在引擎上的缆绳往往太弱，承受不了我们祷告的分量。因此，神继续在祂那信心生活之稳固和确切的学校中训练和管教我们。愿我们学好功课，然后站立得稳。 宣信",
              "simpEn": "God is looking for people He can put the weight of His whole love, power, and faithful promises on. His engines are strong enough to pull any load we hook to them. Sadly, the rope we tie to the engine is often too weak to hold the weight of our prayers. So God keeps training and teaching us in His school of steadiness and sure trust in the life of faith. May we learn well and then stand strong. A. B. Simpson",
              "simpZh": "神在寻找可以把祂全部的爱、能力和信实应许的重量放上去的人。祂的引擎够强，能拉动我们挂上去的任何重量。可惜我们拴在引擎上的绳子常常太弱，担不起我们祷告的重量。所以神在信心的学校里不断训练管教我们，让我们稳固、确定。愿我们学好功课，站立得稳。宣信"

            {

              "zh": "神知道你能承受你的试炼，否则祂就不会把它加给你。祂对你的信任，解释了你生命中的诸般试炼，不论它们看似多么严重。神知道你的力量，祂连最后一寸都量过。要记得，从来没有一个试炼，是大过人在神里面承受它的能力而临到人的。",

          "paragraphs": [
            {
              "en": "Unless a <span class=\"vocab-trigger\" data-vocab=\"kernel of wheat\">kernel of wheat<\/span> falls to the ground and dies, it remains only a single seed. But if it dies, it produces many seeds. (John 12:24)",
              "zh": "一粒麦子不落在地里死了，仍旧是一粒；若是死了，就结出许多子粒来。（约翰福音12:24）",
              "simpEn": "Unless a grain of wheat falls into the ground and dies, it stays alone. But if it dies, it grows many more grains.",
              "simpZh": "一粒麦子如果不落在地里死了，它还是一粒。如果死了，就会结出许多籽粒来。"
            },
            {
              "en": "In <span class=\"vocab-trigger\" data-vocab=\"Northampton\">Northampton<\/span>, Massachusetts, stands the old <span class=\"vocab-trigger\" data-vocab=\"cemetery\">cemetery<\/span> where <span class=\"vocab-trigger\" data-vocab=\"David Brainerd\">David Brainerd<\/span> is buried. Brainerd, a pioneer American missionary, died in 1747 at the age of twenty-nine after suffering from <span class=\"vocab-trigger\" data-vocab=\"tuberculosis\">tuberculosis<\/span>. His grave is beside that of <span class=\"vocab-trigger\" data-vocab=\"Jerusha Edwards\">Jerusha Edwards<\/span>, the daughter of <span class=\"vocab-trigger\" data-vocab=\"Jonathan Edwards\">Jonathan Edwards<\/span>, a <span class=\"vocab-trigger\" data-vocab=\"Puritan\">Puritan<\/span> theologian of that day. Brainerd loved Jerusha and they were engaged to be married, but he did not live until the wedding.",
              "zh": "在马萨诸塞州的北安普敦，有一座古老的墓园，大卫·布雷纳德就葬在那里。布雷纳德是一位先驱美国宣教士，因患肺结核于1747年去世，年仅二十九岁。他的坟墓旁边是耶路莎·爱德华兹的墓，她是当时清教徒神学家约拿单·爱德华兹的女儿。布雷纳德爱耶路莎，他们已订婚，但他未能活到婚礼。",
              "simpEn": "In Northampton, Massachusetts, there is an old graveyard where David Brainerd is buried. He was an early American missionary who died in 1747 at age twenty-nine from a lung sickness. His grave is next to Jerusha Edwards, the daughter of Jonathan Edwards, a Puritan teacher. Brainerd loved Jerusha and they were promised to marry, but he died before the wedding.",
              "simpZh": "在马萨诸塞州的北安普敦，有个老墓园，里面葬着大卫·布雷纳德。他是早期美国宣教士，1747年因肺结核去世，才29岁。他旁边是耶路莎·爱德华兹的墓，她是当时清教徒神学家约拿单·爱德华兹的女儿。布雷纳德爱她，他们已经订婚，但他没活到结婚。"
            },
            {
              "en": "Imagine what hopes, dreams, and expectations for the cause of Christ were buried in the grave with the <span class=\"vocab-trigger\" data-vocab=\"withered\">withered<\/span> body of that young missionary. At that point, nothing remained but memories and several dozen Indian <span class=\"vocab-trigger\" data-vocab=\"converts\">converts<\/span>! Yet Jonathan Edwards, that <span class=\"vocab-trigger\" data-vocab=\"majestic\">majestic<\/span> old Puritan saint, who had hoped to call Brainerd his son, began to write the story of that short life in a little book. The book took wings, flew across the sea, and landed on the desk of a Cambridge student by the name of <span class=\"vocab-trigger\" data-vocab=\"Henry Martyn\">Henry Martyn<\/span>.",
              "zh": "想象一下，多少为基督事业的盼望、梦想和期待，随着那年轻宣教士枯槁的身体一同葬入了坟墓。当时，除了回忆和几十个印第安归信者，什么都没留下！然而，那位威严的老清教徒圣徒约拿单·爱德华兹，他原盼望称布雷纳德为儿子，开始将那段短暂生命的故事写成一本小书。这本书长了翅膀，飞越大海，落在一个名叫亨利·马丁的剑桥学生的书桌上。",
              "simpEn": "Think of the hopes, dreams, and big plans for Christ's work that were buried in the grave with the thin, sick body of that young missionary. At that time, nothing was left but memories and a few dozen Native American believers! Yet Jonathan Edwards, that grand old Puritan saint who had hoped to call Brainerd his son, began to write the story of that short life in a little book. The book took wings, flew across the sea, and landed on the desk of a Cambridge student named Henry Martyn.",
              "simpZh": "想想看，多少为基督的盼望、梦想和期待，随着那个年轻宣教士瘦弱的身体一起埋进了坟墓。那时候，只剩下回忆和几十个印第安信徒了！可是那位威严的老清教徒约拿单·爱德华兹，他本来想叫布雷纳德作女婿的，开始把那短暂一生的故事写成一本小书。这本书长了翅膀，飞过海洋，落在剑桥一个叫亨利·马丁的学生桌上。"
            },
            {
              "en": "Poor Henry Martyn! In spite of his education, brilliance, and great opportunities, he—after reading that little book on the life of Brainerd—threw his own life away! Afterward, what had he accomplished once he set his course toward home from India in 1812? With his health then broken, he dragged himself as far north as the town of <span class=\"vocab-trigger\" data-vocab=\"Tokat\">Tokat<\/span>, Turkey, near the Black Sea. There he lay in the shade of a pile of <span class=\"vocab-trigger\" data-vocab=\"saddles\">saddles<\/span>, to cool his burning fever, and died alone at the age of thirty-one.",
              "zh": "可怜的亨利·马丁！尽管他受过良好教育、才华横溢、拥有大好机会，读了那本关于布雷纳德生平的小书之后，竟把自己的生命也“抛了出去”！此后，当他于1812年从印度动身返家时，他到底成就了什么呢？那时他的健康已经崩溃，他拖着身子往北走到黑海附近的土耳其城镇托卡特。在那里，他躺在一堆马鞍的阴凉下，想要冷却灼烧的热度，独自死在那里，年仅三十一岁。",
              "simpEn": "Poor Henry Martyn! Even with his schooling, bright mind, and great chances, after reading that little book about Brainerd's life, he threw his own life away! Later, what had he done when he started home from India in 1812? His health was broken. He pulled himself as far north as Tokat, Turkey, near the Black Sea. There he lay in the shade of a pile of saddles to cool his burning fever and died alone at age thirty-one.",
              "simpZh": "可怜的亨利·马丁！尽管他受过教育、聪明、有大好机会，读了那本讲布雷纳德生平的小书后，竟把自己的生命也“丢掉”了！后来，1812年他从印度动身回家时，又做成了什么呢？那时他身体已经垮了，拖着身子向北走到黑海附近的土耳其托卡特镇，躺在一堆马鞍的阴凉下想降温，独自死在那里，才31岁。"
            },
            {
              "en": "What was the purpose behind these “wasted lives”? From the grave of a young David Brainerd, and the lonely grave of Henry Martyn near the shores of the Black Sea, have arisen a mighty army of modern missionaries. <span class=\"vocab-trigger\" data-vocab=\"Leonard Woolsey Bacon\">Leonard Woolsey Bacon<\/span>",
              "zh": "这些“枉费了的生命”背后的目的是什么？从年轻的大卫·布雷纳德的坟墓，以及黑海岸边亨利·马丁孤寂的坟墓，兴起了一支现代宣教士的大军。 伦纳德·伍尔西·培根",
              "simpEn": "What was the point of these 'wasted lives'? From the grave of young David Brainerd, and the lonely grave of Henry Martyn near the Black Sea, a mighty army of new missionaries has risen. Leonard Woolsey Bacon",
              "simpZh": "这些“白费了的生命”有什么意义呢？从年轻的大卫·布雷纳德的坟墓，和黑海边亨利·马丁孤单的坟墓，兴起了现代宣教士的大军。伦纳德·伍尔西·培根"
            },
            {
              "en": "Is there some desert, or some boundless sea, Where You, great God of angels, will send me? Some oak for me to <span class=\"vocab-trigger\" data-vocab=\"rend\">rend<\/span>, Some sod for me to break, Some handful of Your corn to take And scatter far afield, Till it in turn will yield Its hundredfold Of grains of gold To feed the happy children of my God? Show me the desert, Father, or the sea; Is it Your <span class=\"vocab-trigger\" data-vocab=\"enterprise\">enterprise<\/span>? Great God, send me! And though this body lies where ocean rolls, Father, count me among all faithful souls.",
              "zh": "是否有哪片旷野，或无边海洋，伟大之天使的神啊，你要差我前往？是否有哪棵橡树要我去劈开，哪块草皮要我去翻耕，哪一把你的谷粒要我拿去，撒向远方的田野，直到它转而出产百倍的金色子粒，好喂养我神快乐的孩子们？父啊，将旷野或海洋指示我吧；这是你的事业吗？伟大的神，求差遣我！即使这身体倒在大浪翻滚之处，父啊，也算我在一切忠心的灵魂之中。",
              "simpEn": "Is there some desert or endless sea where You, great God of angels, will send me? Some oak for me to split, some ground for me to break, some handful of Your grain to take and scatter far away, until it gives back a hundred times over, grains of gold to feed the happy children of my God? Show me the desert, Father, or the sea; is it Your work? Great God, send me! And though my body lies where the ocean rolls, Father, count me with all the faithful souls.",
              "simpZh": "哪里有旷野，哪里有无边的海洋，伟大的神啊，你要差我去？有没有橡树要我劈开，有没有土块要我翻动，有没有一把你的谷粒要我拿去，撒到远方的田野里，直到它长出百倍的金色籽粒，好喂养我神喜乐的儿女？父啊，把旷野或海洋指给我看；这是你的事业吗？伟大的神，求你差派我！就算我的身体倒在大浪翻腾的地方，父啊，也算我在忠心的灵魂当中。"

              "simpZh": "神让雅各在毗努伊勒的危机完全包围他，直到他最终存诚恳卑微的心向神呼求。那夜他与神摔跤，实实在在地到了一个能比以前更抓住神的地步。借着这次与危险的擦身而过，雅各的信心和对神的认识扩大了，他过崭新得胜生活的能力也生出来了。"

              "en": "The Lord had to force <span class=\"vocab-trigger\" data-vocab=\"David\">David<\/span>, through the <span class=\"vocab-trigger\" data-vocab=\"discipline\">discipline<\/span> of many long and painful years, to learn of the <span class=\"vocab-trigger\" data-vocab=\"almighty\">almighty<\/span> power and <span class=\"vocab-trigger\" data-vocab=\"faithfulness\">faithfulness<\/span> of his God. Through those difficult years, he also grew in his knowledge of faith and <span class=\"vocab-trigger\" data-vocab=\"godliness\">godliness<\/span>, which were <span class=\"vocab-trigger\" data-vocab=\"indispensable\">indispensable<\/span> principles for his glorious career as the king of Israel.",
              "zh": "主不得不借着漫长而痛苦年日的管教，迫使大卫学习他神那全能的权能和信实。在那些艰难岁月中，他也在信心和敬虔的知识上成长，而这正是他作以色列王那荣耀生涯不可或缺的根基。",
              "simpEn": "The Lord had to push David, through the training of many long, hard years, to learn about his God's all-powerful strength and truthfulness. During those hard years, he also grew in knowing faith and holy living, which were absolutely needed for his great work as king of Israel.",
              "simpZh": "主必须用多年漫长又痛苦的管教，逼着大卫去认识神的全能大能和信实。在那些艰难的年月里，他在信心和敬虔的知识上也成长了，而这些都是他后来作以色列王那荣耀生涯绝对需要的根基。"
            },
            {
              "en": "Nothing but the most dangerous circumstances in which <span class=\"vocab-trigger\" data-vocab=\"Paul\">Paul<\/span> was constantly placed could ever have taught him, and thus the church through him, the full meaning of the great promise of God he learned to claim: “My <span class=\"vocab-trigger\" data-vocab=\"grace\">grace<\/span> is <span class=\"vocab-trigger\" data-vocab=\"sufficient\">sufficient<\/span> for you” (2 Cor. 12:9). And nothing but the great trials and dangers we have experienced would ever have led some of us to know Him as we do, to trust Him as we have, and to draw from Him the great measure of His grace so <span class=\"vocab-trigger\" data-vocab=\"indispensable\">indispensable<\/span> during our times of greatest need.",
              "zh": "除了保罗不断被置于最危险的处境中，没有什么能教他、并借着他教导教会，他所学会支取的神那伟大应许的完全意义：“我的恩典够你用的”（哥林多后书12:9）。除了我们所经历的那些大试炼和危险，也没有什么能使我们有些人如此认识祂、如此信靠祂，并从祂那里吸取那在我们最需要之时不可或缺的极大恩典。",
              "simpEn": "Nothing but the very dangerous places Paul was always put in could have taught him, and through him the church, the full meaning of the great promise of God he learned to use: 'My grace is enough for you.' And nothing but the great trials and dangers we have gone through would have led some of us to know Him like we do, to trust Him like we have, and to pull from Him the huge supply of His grace so needed in our times of greatest need.",
              "simpZh": "除了保罗不断被放在最危险的环境中，没有什么能教他、并通过他教会，学会他所支取的那伟大应许的完全意思：“我的恩典够你用的。”除了我们所经历过的大试炼和危险，也没有什么能使我们有些人像现在这样认识祂、像这样信靠祂，并从祂那里吸取那在我们最需要时绝对少不了的极大恩典。"
            },
            {
              "en": "Difficulties and obstacles are God’s <span class=\"vocab-trigger\" data-vocab=\"challenges\">challenges<\/span> to our faith. When we are confronted with <span class=\"vocab-trigger\" data-vocab=\"hindrances\">hindrances<\/span> that block our path of service, we are to recognize them as <span class=\"vocab-trigger\" data-vocab=\"vessels for faith\">vessels for faith<\/span> and then to fill them with the fullness and complete <span class=\"vocab-trigger\" data-vocab=\"sufficiency\">sufficiency<\/span> of Jesus. As we move forward in faith, simply and fully trusting Him, we may be tested. Sometimes we may have to wait and realize that “<span class=\"vocab-trigger\" data-vocab=\"perseverance\">perseverance<\/span> must finish its work” (James 1:4). But <span class=\"vocab-trigger\" data-vocab=\"ultimately\">ultimately<\/span> we will surely find “the stone rolled away” (Luke 24:2) and the Lord Himself waiting to <span class=\"vocab-trigger\" data-vocab=\"bestow\">bestow<\/span> a double blessing on us for our time of testing. <span class=\"vocab-trigger\" data-vocab=\"A. B. Simpson\">A. B. Simpson<\/span>",
              "zh": "困难和障碍是神对我们信心的挑战。当我们面对拦阻服侍之路的障碍时，我们当认出它们乃是盛装信心的器皿，然后用耶稣那丰满和完全的充足来充满它们。当我们凭信心前进，单纯而完全地信靠祂时，我们或许会受试验。有时我们可能需要等候，并认识到“忍耐也当成功”（雅各书1:4）。但最终我们必发现“石头已经滚开了”（路加福音24:2），主自己正等候，要为我们的试炼时刻赐下加倍的祝福。 宣信",
              "simpEn": "Hard times and blocks in the way are God's dares to our faith. When we face things that block our path of service, we should see them as cups for faith and then fill them with the fullness and complete enough-ness of Jesus. As we move forward in faith, trusting Him fully and simply, we may be tested. Sometimes we may need to wait and understand that 'holding on must finish its work.' But in the end we will surely find 'the stone rolled away' and the Lord Himself waiting to give us a double blessing for our time of testing. A. B. Simpson",
              "simpZh": "困难和障碍是神对我们信心的挑战。当我们遇到挡住服侍之路的障碍时，要认出它们是装信心的器皿，然后用耶稣丰满和完全的充足来充满它们。当我们凭信心向前，单纯完全地信靠祂，我们可能会被试验。有时候我们需要等候，认识到“忍耐必须做完它的工”。但最终我们一定会发现“石头已经滚开”，主自己正等着，要为我们受试炼的时间赐下加倍的祝福。宣信"
            }

              "en": "It is sometimes very difficult not to be offended in Jesus Christ, for the offense may be the result of my <span class=\"vocab-trigger\" data-vocab=\"circumstances\">circumstances<\/span>. I may find myself <span class=\"vocab-trigger\" data-vocab=\"confined\">confined<\/span> to narrow areas of service, or <span class=\"vocab-trigger\" data-vocab=\"isolated\">isolated<\/span> from others through sickness or by taking an unpopular <span class=\"vocab-trigger\" data-vocab=\"stance\">stance<\/span>, when I had hoped for much wider opportunities. Yet the Lord knows what is best for me, and my surroundings are determined by Him. Wherever He places me, He does so to strengthen my faith and power and to draw me into closer <span class=\"vocab-trigger\" data-vocab=\"communion\">communion<\/span> with Himself. And even if <span class=\"vocab-trigger\" data-vocab=\"confined to a dungeon\">confined to a dungeon<\/span>, my soul will <span class=\"vocab-trigger\" data-vocab=\"prosper\">prosper<\/span>.",
              "zh": "有时要不因耶稣基督跌倒真是非常困难，因为这跌倒可能是源于我的环境。我可能发现自己被困在狭窄的服侍领域里，或因疾病、或因持守不受欢迎的立场而与人隔绝，而我原曾盼望更广阔的机会。然而，主知道什么对我最好，我的环境是由祂决定的。无论祂将我放在何处，都是要坚固我的信心和能力，并吸引我进入与祂更亲密的交通。即使被关在地牢里，我的灵魂也必兴旺。",
              "simpEn": "Sometimes it is very hard not to be upset with Jesus, because the trouble may come from what is around me. I may find myself limited to small places of service, or cut off from others by sickness or by taking a stand that others don't like, when I had hoped for much bigger chances. Yet the Lord knows what is best for me, and where I am placed is decided by Him. Wherever He puts me, it is to make my faith and power stronger and to pull me into closer fellowship with Him. Even if locked in a prison, my soul will do well.",
              "simpZh": "有时候要不因耶稣跌倒实在很难，因为跌倒可能来自我的环境。我可能被限制在狭窄的服侍范围里，或因疾病、或因站了一个不受欢迎的立场而被孤立，而我本来盼望有更广的机会。但主知道什么对我最好，我在哪里是祂定的。祂把我放在哪里，都是为要加增我的信心和能力，把我拉进与祂更亲密的交通。就算被关在地牢里，我的灵魂也会兴旺。"
            },
            {
              "en": "The offense that causes me to turn from Christ may be <span class=\"vocab-trigger\" data-vocab=\"emotional\">emotional<\/span>. I may be continually confused and troubled over questions I cannot solve. When I gave myself to Him, I had hoped that my skies would always be fair, but often they are overcast with clouds and rain. But I must believe that when difficulties remain, it is that I may learn to trust Him completely—to trust and not be afraid. And it is through my mental and emotional struggles that I am being trained to <span class=\"vocab-trigger\" data-vocab=\"tutor\">tutor<\/span> others who are being tossed by the storm.",
              "zh": "那使我转离基督的跌倒也可能是情感上的。我可能不断被自己无法解决的问题所困惑和烦扰。当我将自己献给祂时，曾盼望我的天空总能晴好，但天空却常布满云雨。但我必须相信，当困难存留时，乃是要我学会完全信靠祂——信靠而不惧怕。正是借着我的心智和情感上的挣扎，我正在受训，去辅导那些在风暴中被摇撼的人。",
              "simpEn": "The trouble that makes me want to turn from Christ may be in my feelings. I may be always confused and bothered by questions I can't answer. When I gave myself to Him, I hoped my skies would always be blue, but often they are covered with clouds and rain. But I must believe that when hard times stay, it is so I may learn to trust Him completely—to trust and not be scared. And it is through my mind and feeling struggles that I am being taught to help others who are being tossed by the storm.",
              "simpZh": "让我想要离开基督的跌倒，也可能是在情感上。我可能老是被自己解决不了的问题困惑烦扰。我把自己交给祂的时候，曾盼望天空总是晴的，可是常常乌云下雨。但我必须相信，当困难还在的时候，是要我学会完全信靠祂——信靠而不惧怕。正是借着我思想上和情感上的挣扎，我在被训练，好去辅导那些被风暴抛来抛去的人。"
            },
            {
              "en": "The offense causing me to turn away may be <span class=\"vocab-trigger\" data-vocab=\"spiritual\">spiritual<\/span>. I had imagined that once within His fold, I would never again suffer from the stinging winds of <span class=\"vocab-trigger\" data-vocab=\"temptation\">temptation<\/span>. Yet it is best for me the way it is, for when I endure temptation His grace is <span class=\"vocab-trigger\" data-vocab=\"magnified\">magnified<\/span>, my own character matures, and heaven seems sweeter at the end of the day.",
              "zh": "那使我退后的跌倒也可能是属灵上的。我曾想象一旦进了祂的圈中，就永不再遭受试探的刺痛之风。然而，现状于我是最好的，因为当我忍受试探时，祂的恩典就被显大，我自己的品格也得以成熟，而天家在日暮时也显得更甜美。",
              "simpEn": "The trouble that makes me turn away may be in my spirit. I had thought that once I was in His care, I would never again feel the sharp winds of wanting to sin. But it is best for me as it is, because when I go through temptation, His grace is made bigger, my own heart grows up, and heaven seems sweeter at the end of the day.",
              "simpZh": "那让我退后的跌倒也可能是灵里的。我曾以为一进了祂的羊圈，就不会再受试探的刺骨寒风了。但现在这样对我最好，因为当我忍受试探时，祂的恩典就显为大，我自己的品格也成熟了，天家也显得更甜美。"
            },
            {
              "en": "Once I arrive at my heavenly home, I will look back across the turns and trials along my path and will sing the praises of my Guide. So whatever comes my way, I will welcome His will and refuse to be offended in my loving Lord. <span class=\"vocab-trigger\" data-vocab=\"Alexander Smellie\">Alexander Smellie<\/span>",
              "zh": "一旦我抵达天家，我必回望我路途上的一切转折和试炼，并要歌唱赞美我的向导。所以，无论何事临到我，我都要欢迎祂的旨意，拒绝在我慈爱的主面前跌倒。 亚历山大·斯梅利",
              "simpEn": "When I get to my home in heaven, I will look back at all the turns and tests along my path and will sing the praises of my Guide. So whatever comes my way, I will gladly accept His will and refuse to be upset with my loving Lord. Alexander Smellie",
              "simpZh": "等我到了天上的家，我会回头看路上一切的曲折和试炼，并要歌唱赞美我的向导。所以不管什么事临到我，我都要接受祂的旨意，拒绝在我慈爱的主面前跌倒。亚历山大·斯梅利"
            },
            {
              "en": "Blessed is he whose faith is not offended, When all around his way The power of God is working out <span class=\"vocab-trigger\" data-vocab=\"deliverance\">deliverance<\/span> For others day by day; Though in some prison dark his own soul does fail, Till life itself be spent, Yet still can trust his Father’s love and purpose, And rest therein <span class=\"vocab-trigger\" data-vocab=\"content\">content<\/span>. Blessed is he, who through long years of suffering, Not now from active toil, Still shares by prayer and praise the work of others, And thus “<span class=\"vocab-trigger\" data-vocab=\"divides the spoil\">divides the spoil<\/span>.” Blessed are you, O child of God, who does suffer, And cannot understand The reason for your pain, yet will gladly leave Your life in His blest Hand. Yes, blessed are you whose faith is “not offended” By trials unexplained, By <span class=\"vocab-trigger\" data-vocab=\"mysteries\">mysteries<\/span> unsolved, past understanding, Until the goal is gained. <span class=\"vocab-trigger\" data-vocab=\"Freda Hanbury Allen\">Freda Hanbury Allen<\/span>",
              "zh": "那信心不跌倒的人有福了：当他的四围，神的能力日复一日地为别人成就拯救，他自己的灵魂却在黑暗的监牢里衰残，直到生命耗尽，他仍然信靠父的爱和旨意，并在其中安然知足。那经过长年受苦、不再参加积极劳作，却仍借着祷告和赞美分享别人工作，因而“分取掳物”的人有福了。你这受苦的神的孩子啊，有福了；你不能明白自己痛苦的原因，却仍欣然将自己的生命交在祂赐福的手中。是的，那信心“不因”未解释的试炼、未解明、无法明白的奥秘而“跌倒”的人有福了，直等到目标达成。 弗雷达·汉伯里·艾伦",
              "simpEn": "Happy is the one whose faith is not shaken when all around him God's power is working out rescue for others day by day; though his own soul grows weak in some dark prison until life itself is used up, he still can trust his Father's love and plan, and rest there, satisfied. Happy is the one who, through long years of pain, no longer in active work, still shares by prayer and praise in the work of others, and so 'shares the goods taken in war.' Happy are you, O child of God, who suffers and cannot understand why you hurt, yet gladly leaves your life in His blessed hand. Yes, happy are you whose faith is 'not shaken' by trials you can't explain, by unsolved mysteries, beyond understanding, until the goal is reached. Freda Hanbury Allen",
              "simpZh": "信心不被绊倒的人有福了：当他四围，神的能力天天为别人成就拯救，他自己的灵魂却在黑监里衰残，直到生命耗尽，他仍能信靠父的慈爱和旨意，在那里安然满足。那经过多年受苦、不再积极劳作，却仍借着祷告和赞美分享别人工作，因而“分得战利品”的人有福了。你这受苦的神的儿女啊，有福了；你不明白痛苦的原因，却还是甘心把自己的生命交在祂赐福的手中。是的，那信心不因无法解释的试炼、无法明白的奥秘而“跌倒”的人有福了，直到目标达到。弗雷达·汉伯里·艾伦"
            }
          ],

            },
            {
              "en": "Wait in quiet patience. Never complain about what you believe to be the cause of your problems, as the children of Israel did against Moses. Accept your situation exactly as it is and then simply place it with your whole heart into the hand of your <span class=\"vocab-trigger\" data-vocab=\"covenant God\">covenant God<\/span>. And while removing any <span class=\"vocab-trigger\" data-vocab=\"self-will\">self-will<\/span>, say to Him, “Lord, ‘Not my will, but yours be done’ [Luke 22:42]. I do not know what to do, and I am in great need. But I will wait until You divide the flood before me or drive back my enemies. I will wait even if You keep me here many days, for my heart is fixed on You alone, dear Lord. And my spirit will wait for You with full confidence that You will still be my joy and my salvation, ‘for you have been my <span class=\"vocab-trigger\" data-vocab=\"refuge\">refuge<\/span>, [and] a <span class=\"vocab-trigger\" data-vocab=\"strong tower\">strong tower<\/span> against the foe’ [Ps. 61:3].” <span class=\"vocab-trigger\" data-vocab=\"from Morning by Morning\">from Morning by Morning<\/span>",
              "zh": "以安静的忍耐等候。绝不要像以色列人向摩西发怨言那样，去抱怨你所认为造成问题的原因。原原本本地接受你的处境，然后将它用全心放在你那位立约之神的手中。当除去一切己意时，要对祂说：“主啊，‘不要成就我的意思，只要成就祢的意思’（路加福音22:42）。我不知道该做什么，我正处在极大的需要中。但我要等候，直到祢在我面前分开洪水，或赶逐我的仇敌。即使祢把我留在这里多日，我也要等候，因我的心单单注视于祢，亲爱的主。我的灵必以全备的信心等候祢，因祢仍是我的喜乐和拯救，‘因为祢作过我的避难所，[作过]我的坚固台，脱离仇敌’（诗篇61:3）。” 摘自《晨晨复兴》",
              "simpEn": "Wait in quiet patience. Never complain about what you think is causing your troubles, as the Israelites did against Moses. Accept your situation just as it is, and put it wholeheartedly into the hand of your covenant God. And while putting away your own will, say to Him, 'Lord, not what I want, but what You want be done. I don't know what to do, and I am in great need. But I will wait until You part the waters before me or push back my enemies. I will wait even if You keep me here many days, for my heart is fixed only on You, dear Lord. And my spirit will wait for You with full trust that You will still be my joy and salvation, for You have been my safe place and a strong tower against the enemy.' from Morning by Morning",
              "simpZh": "用安静的忍耐等候。绝不要像以色列人向摩西发怨言那样，去抱怨你以为造成问题的原因。接受你现在的处境，然后用全心把它交在你那位立约之神的手中。把出于自己的意思拿掉，对祂说：“主啊，不要照我的意思，只要照祢的意思。我不知道该做什么，我正处在极大的需要中。但我要等候，直到祢在我面前把洪水劈开，或是把仇敌赶回去。就算祢把我留在这里许多天，我也要等，因为我的心单单固定在祢身上，亲爱的主。我的灵要完全信赖地等候祢，因为祢仍然是我的喜乐和拯救，因为祢作过我的避难所，作过我的坚固台，脱离仇敌。”摘自《晨晨复兴》"
            },
            {
              "en": "Wait, patiently wait, God never is late; Your budding plans are in Your Father’s holding, And only wait His grand divine unfolding. Then wait, wait, Patiently wait. Trust, hopefully trust, That God will adjust Your <span class=\"vocab-trigger\" data-vocab=\"tangled\">tangled<\/span> life; and from its dark <span class=\"vocab-trigger\" data-vocab=\"concealings\">concealings<\/span>, Will bring His will, in all its bright <span class=\"vocab-trigger\" data-vocab=\"revealings\">revealings<\/span>. Then trust, trust, Hopefully trust. Rest, peacefully rest On your Savior’s breast; <span class=\"vocab-trigger\" data-vocab=\"Breathe in His ear\">Breathe in His ear<\/span> your sacred high ambition, And He will bring it forth in blest <span class=\"vocab-trigger\" data-vocab=\"fruition\">fruition<\/span>. Then rest, rest, Peacefully rest! <span class=\"vocab-trigger\" data-vocab=\"Mercy A. Gladwin\">Mercy A. Gladwin<\/span>",
              "zh": "等候，耐性等候，神从不误时；你萌芽中的计划都在天父掌握中，只等祂雄伟神圣的展开。就等候，等候，耐性等候吧。信靠，盼望地信靠，神必将你这纠缠不清的人生调整妥当；从它黑暗的遮蔽中，将祂的旨意在明亮启示中带出来。就信靠，信靠，盼望地信靠吧。安息，平静地安息，在你救主的怀中；将你神圣崇高的志向轻轻呼入祂耳中，祂必将它在蒙福的成就中带出来。就安息，安息，平静地安息吧！ 默茜·A·格拉德温",
              "simpEn": "Wait, patiently wait, God is never late; your growing plans are held by your Father, and only wait for His great unfolding. Trust, hopefully trust that God will straighten out your tangled life; from its dark hidden places, He will bring His will in bright showing. Rest, peacefully rest on your Savior's chest; whisper your holy high dream in His ear, and He will bring it to blessed completion. Mercy A. Gladwin",
              "simpZh": "等候吧，耐心等候，神从不迟到；你那正在萌芽的计划都在天父手里，只等祂伟大神圣的展开。信靠吧，带着盼望信靠，神会把你那缠在一起的人生理顺；从那些黑暗隐藏的地方，把祂的旨意明亮亮地显明出来。安息吧，平静地安息，靠在救主怀里；把你的神圣崇高志向轻轻告诉祂，祂就会在蒙福的成就中把它带出来。默茜·A·格拉德温"
            }
          ],
