    --toolbar-bg:#122030; --col-title-color:#7eb8d4; --progress-bar-bg:#1a2e3d;

  .btn { background:var(--primary); color:#fff; border:none; padding:0.5rem 1.1rem; border-radius:30px; font-weight:600; cursor:pointer; font-size:0.9rem; white-space:nowrap; }

  .wt-logo { font-family:"Segoe UI","Noto Sans SC",sans-serif; font-weight:700; font-size:1.2rem; color:#1b3a4b; letter-spacing:0.5px; margin-bottom:0.3rem; }

  .wt-underline { width:90px; height:3px; background:#e6a817; margin:0.3rem auto 0.5rem; }
  .wt-credit { font-size:0.8rem; color:var(--footer-text); }
  #error-message { background:#ffe0e0; border:1px solid red; padding:1rem; border-radius:8px; display:none; color:red; margin:1rem 0; }
  #readingModeSelect { padding:0.3rem 0.7rem; border-radius:20px; border:1px solid var(--tab-border); font-size:0.85rem; background:var(--card-bg); color:var(--text); }
  .paragraph-image { margin:1rem 0; }

  .page-nav-btn { background:var(--tab-bg); border:1px solid var(--tab-border); border-radius:6px; padding:0.5rem 1rem; cursor:pointer; font-size:0.9rem; min-height:44px; color:var(--text); }

  .page-nav-label { font-size:0.9rem; color:var(--col-title-color); margin:0 0.6rem; }
  select { color:var(--text); background:var(--card-bg); }
</style>

<script id="bookDataScript" type="application/json">{

          "audio": "audio/Streams in the Desert - October 1.m4a",
          "paragraphs": [
            {
              "en": "It was good for me to be <span class=\"vocab-trigger\" data-vocab=\"afflicted\">afflicted<\/span>. (Psalm 119:71)",
              "zh": "我受苦是与我有益。（诗篇119:71）",

            {
              "en": "It is a remarkable occurrence of nature that the most brilliant colors of plants are found on the highest mountains, in places that are the most exposed to the fiercest weather. The brightest <span class=\"vocab-trigger\" data-vocab=\"lichens\">lichens<\/span> and <span class=\"vocab-trigger\" data-vocab=\"mosses\">mosses<\/span>, as well as the most beautiful <span class=\"vocab-trigger\" data-vocab=\"wildflowers\">wildflowers<\/span>, abound high upon the <span class=\"vocab-trigger\" data-vocab=\"windswept\">windswept<\/span>, <span class=\"vocab-trigger\" data-vocab=\"storm-ravaged\">storm-ravaged<\/span> peaks.",
              "zh": "自然界有一个奇妙的景象：最绚丽的植物色彩出现在最高的山上，在那些最暴露于严酷天气之处。最鲜亮的苔藓和地衣，以及最美丽的野花，遍布在狂风大作、暴雨摧残的山峰高处。",
              "simpEn": "It is a striking fact of nature that the brightest plant colors are found on the highest mountains, places with the harshest weather. The brightest lichens and mosses, and the prettiest wildflowers, grow high up on windy, storm-beaten peaks.",
              "simpZh": "大自然有个奇妙的现象：最鲜艳的植物颜色出现在最高的山上，那些天气最严酷的地方。最亮的青苔和地衣，还有最美的野花，生长在高处那些被风吹、被暴雨打的山顶上。"
            },
            {
              "en": "One of the finest arrays of living color I have ever seen was just above the great <span class=\"vocab-trigger\" data-vocab=\"Saint Bernard Hospice\">Saint Bernard Hospice<\/span> near the ten-thousand-foot summit of <span class=\"vocab-trigger\" data-vocab=\"Mont Cenis\">Mont Cenis<\/span> in the <span class=\"vocab-trigger\" data-vocab=\"French Alps\">French Alps<\/span>. The entire face of one expansive rock was covered with a strikingly vivid yellow <span class=\"vocab-trigger\" data-vocab=\"lichen\">lichen<\/span>, which shone in the sunshine like a golden wall protecting an <span class=\"vocab-trigger\" data-vocab=\"enchanted\">enchanted<\/span> castle. Amid the loneliness and <span class=\"vocab-trigger\" data-vocab=\"barrenness\">barrenness<\/span> of that high altitude and exposed to the fiercest winds of the sky, this lichen exhibited glorious color it has never displayed in the shelter of the valley.",
              "zh": "我所见过最华美的自然色彩陈列之一，就在法国阿尔卑斯山塞尼峰近万呎高处的大圣伯纳德招待所上方。一整面辽阔的岩石覆盖着一种极其鲜艳的黄色地衣，在阳光下闪耀，如同一道护卫着迷幻城堡的金墙。在那高海拔的孤寂与荒芜之中，在天空最猛烈的风吹之下，这地衣展现出它从未在谷底遮蔽处显露过的华美色彩。",
              "simpEn": "One of the most beautiful displays of natural color I have ever seen was above the Saint Bernard Hospice near the 10,000-foot top of Mont Cenis in the French Alps. A huge rock face was covered with bright yellow lichen, shining in the sun like a golden wall around a magical castle. Alone and barren at that high place, blasted by the wildest winds, this lichen showed colors it never had in the sheltered valley.",
              "simpZh": "我见过最美的天然色彩之一，是在法国阿尔卑斯山塞尼峰近万呎高处的大圣伯纳德招待所上方。一面大岩石上铺满了鲜黄色的地衣，在阳光下闪闪发光，像一道金墙保护着魔法城堡。在那高处又孤寂又荒凉，被最强的风吹着，这地衣展现出了它在山谷的遮蔽下从没有过的绚丽色彩。"
            },
            {
              "en": "As I write these words, I have two specimens of the same type of lichen before me. One is from this Saint Bernard area, and the other is from the wall of a Scottish castle, which is surrounded by <span class=\"vocab-trigger\" data-vocab=\"sycamore\">sycamore<\/span> trees. The difference in their form and coloring is quite striking. The one grown amid the fierce storms of the mountain peak has a lovely yellow color of a <span class=\"vocab-trigger\" data-vocab=\"primrose\">primrose<\/span>, a smooth texture, and a definite form and shape. But the one cultivated amid the warm air and the soft showers of the lowland valley has a dull, rusty color, a rough texture, and an <span class=\"vocab-trigger\" data-vocab=\"indistinct\">indistinct<\/span> and broken shape.",
              "zh": "在我写下这些文字时，面前正摆着同一种地衣的两个标本。一个取自圣伯纳德地区，另一个取自一座被枫树环绕的苏格兰城堡墙垣。两者在外形与色彩上的差别极为显著。生长在猛烈山峰风暴中的那一个，有着樱草般可爱的黄色，质地平滑，外形轮廓分明。而在温暖空气与谷地柔和阵雨中培养的那一个，颜色暗淡铁锈，质地粗糙，形状模糊破碎。",
              "simpEn": "As I write, I have two samples of the same lichen before me. One from Saint Bernard, the other from a Scottish castle wall surrounded by sycamore trees. The difference is striking. The one grown in fierce mountain storms has a lovely primrose yellow, smooth feel, and clear shape. But the one grown in warm air and soft valley showers is dull, rusty, rough, and poorly shaped.",
              "simpZh": "我写这段话时，面前放着两个同种地衣的标本。一个来自圣伯纳德，另一个来自一座被枫树环绕的苏格兰城堡墙上。它们的形状和颜色差别很大。在猛烈山顶风暴中长大的那个，是漂亮的淡黄色，摸着平滑，形状很清楚。在温暖空气和柔和谷地阵雨中长大的那个，颜色暗淡像铁锈，粗糙，形状模糊破碎。"

              "zh": "我们许多人之所以不能更好地认识并明白神，是因为我们没有留意祂温柔的“制止”——祂那细致的约束与限制。祂的声音乃是“微小的声音”。微声几乎不能听见，因此必须作为一种微弱而稳定的压力量，临到心思与心田上被感觉到，如同清晨的微风轻轻拂过灵魂。一旦被留意，它便在心灵内耳中渐渐变得更加清晰。",

              "en": "If I experience the presence of God in His <span class=\"vocab-trigger\" data-vocab=\"majesty\">majesty<\/span> through my pain and loss, so that I bow before Him and pray, “Your will be done” (Matt. 6:10), then I have gained much indeed. God gave Job glimpses of his future glory, for in those weary and difficult days and nights, he was allowed to <span class=\"vocab-trigger\" data-vocab=\"penetrate\">penetrate<\/span> God’s veil and could honestly say, “I know that my <span class=\"vocab-trigger\" data-vocab=\"Redeemer\">Redeemer<\/span> lives” (Job 19:25). So truly: “The Lord blessed the latter part of Job’s life more than the first.” <span class=\"vocab-trigger\" data-vocab=\"from In the Hour of Silence\">from In the Hour of Silence<\/span>",
              "zh": "我若借着痛苦和损失经历到神威荣的同在，以致俯伏在祂面前祷告说：“愿祢的旨意成全”（马太福音6:10），那么我就实在大有所得了。神曾让约伯瞥见他未来的荣耀，因为在那疲乏艰难的黑夜白日里，他被允准透过神的幔子，并能诚诚实实地说：“我知道我的救赎主活着”（约伯记19:25）。所以诚然：“耶和华后来赐福给约伯比先前更多。” 摘自《在静默的时辰》",
              "simpEn": "If I experience God's glorious presence through my pain and loss, so that I bow before Him and pray, 'Your will be done,' then I have truly gained a lot. God gave Job peeks of his future glory, for in those tired and difficult days and nights, he was allowed to see through God's curtain and could honestly say, 'I know that my Redeemer lives.' So truly, 'The Lord blessed the last part of Job's life more than the first.' from In the Hour of Silence",
              "simpZh": "如果我借着痛苦和损失经历到神威严的同在，俯伏在祂面前祷告：“愿你的旨意成就”，那我就真的得到了很多。神曾让约伯看见他未来的荣耀，因为在那些疲惫艰难的日夜里，他被容许穿透神的幔子，可以诚实地说：“我知道我的救赎主活着。”所以确实：“耶和华赐给约伯后半生的福气比先前更多。”摘自《在静默的时辰》"

            {
              "en": "Trouble never comes to someone unless it brings a <span class=\"vocab-trigger\" data-vocab=\"nugget of gold\">nugget of gold<\/span> in its hand. <span class=\"vocab-trigger\" data-vocab=\"Apparent\">Apparent<\/span> <span class=\"vocab-trigger\" data-vocab=\"adversity\">adversity<\/span> will ultimately become an advantage for those of us doing what is right, if we are willing to keep serving and to wait patiently. Think of the great <span class=\"vocab-trigger\" data-vocab=\"victorious souls\">victorious souls<\/span> of the past who worked with <span class=\"vocab-trigger\" data-vocab=\"steadfast\">steadfast<\/span> faith and who were <span class=\"vocab-trigger\" data-vocab=\"invincible\">invincible<\/span> and courageous! There are many blessings we will never obtain if we are unwilling to accept and endure suffering. There are certain joys that can come to us only through sorrow. There are <span class=\"vocab-trigger\" data-vocab=\"revelations\">revelations<\/span> of God’s divine truth that we will receive only when the lights of earth have been <span class=\"vocab-trigger\" data-vocab=\"extinguished\">extinguished<\/span>. And there are harvests that will grow only once the <span class=\"vocab-trigger\" data-vocab=\"plow\">plow<\/span> has done its work. <span class=\"vocab-trigger\" data-vocab=\"selected\">selected<\/span>",
              "zh": "患难从不会临到人，除非它手中带来了一块金块。看似不幸的事，最终会变成我们这些行正事之人的益处，只要我们愿意继续服侍，并耐心等候。想想过去那些得胜的灵魂，他们以坚定的信心工作，是何等不可战胜、何等勇敢！有许多祝福，我们若不愿接受并忍受苦难，就永不能得着。有些喜乐，只能透过忧伤临到我们。有些神圣真理的启示，我们只有在地上灯火都熄灭时才能领受。有些庄稼，只有在犁头完成了它的工作后才能生长。 选自",
              "simpEn": "Trouble never comes to anyone without bringing a nugget of gold in its hand. What looks like trouble will finally become a gain for those who do right, if we are willing to keep serving and wait with patience. Think of the great winning souls of the past who worked with firm faith and were unbeatable and brave! There are many blessings we will never get if we refuse to go through suffering. There are joys that come only through sorrow. There are showings of God's truth we receive only when the lights of earth have been put out. And there are crops that grow only after the plow has done its work. selected",
              "simpZh": "患难从来不会空手而来，它手里一定带着一块金子。看似不幸的事，最终会变成对我们这些行正事之人的好处，只要我们愿意继续服侍并耐心等候。想想过去那些得胜的灵魂，他们凭着坚固的信心做工，是多么不可战胜、多么勇敢！有很多祝福，我们若不愿接受并忍受苦难，就永远得不到。有些快乐只有借着忧伤才能临到。有些神圣真理的启示，只有在地上所有的灯光都熄灭时才能得到。有些庄稼，只有在犁头犁过之后才能长出来。选自"
            },
            {

              "zh": "正是从苦难中，曾涌现出世上最刚强的灵魂；世上最伟大的品格展现，见于那些显出忧伤伤痕的人；历代的殉道者身穿被火照耀的加冕袍，却透过眼泪与忧伤看见了天门。 查平",
              "simpEn": "From suffering have come the strongest souls ever known. The world's greatest showing of character is seen in those who carry the marks of sorrow. The martyrs of all ages wore their crowning robes shining with fire, yet through tears and sadness saw the gates of heaven. Chapin",

            {

              "zh": "我们信心的教育若不学习到神的护理是借着损失而运行，借着失败和事物的消逝对我们有事奉，并且祂将虚空的礼物赐给我们，那教育就不完全。事实上，正是人生中物质上的不安全感，使我们的生命在属灵上得以建立。",
              "simpEn": "The training of our faith is not complete if we haven't learned that God's care works through loss, that there is a help to us through failure and things passing away, and that He gives the gift of emptiness. In fact, the unsureness of material things is what makes our lives spiritually strong.",
              "simpZh": "我们信心的教育如果没有学到：神的看顾是借着损失来运作，失败和东西的消逝其实是对我们的一种服侍，而且祂会把空空的礼物赐给我们，那这教育就还没完成。其实，正是生活中物质上的不安全，才让我们的生命在属灵上稳固下来。"
            },
            {

              "zh": "以利亚凝思独坐的基立溪旁那渐干之溪，正是我们各人一生的真实写照。“过了些日子，溪水就干了”——这是我们过往的历史，也是对我们明天的预言。",
              "simpEn": "The shrinking brook at Kerith, where Elijah sat thinking deeply, is a true picture of each of our lives. 'Some time later the brook dried up'—this is the story of our past and a foretelling of our tomorrows.",
              "simpZh": "以利亚静静坐着沉思的那条渐渐变小的基立溪，正是我们每个人生命的真实写照。“过了一段时间，溪水干了”——这是我们过去的历史，也是对我们明天的预言。"

            {
              "en": "One way or the other, we must all learn the difference between trusting in the gift and trusting in the Giver. The gift may last for a season, but the Giver is the only eternal love. The Kerith Ravine was a difficult problem for Elijah until he arrived at <span class=\"vocab-trigger\" data-vocab=\"Zarephath\">Zarephath<\/span>, and suddenly everything became as clear as daylight to him. God’s hard instructions are never His last words to us, for the woe, the waste, and the tears of life belong to its <span class=\"vocab-trigger\" data-vocab=\"interlude\">interlude<\/span>, not its <span class=\"vocab-trigger\" data-vocab=\"finale\">finale<\/span>.",
              "zh": "无论怎样，我们都必须学会区分信靠恩赐与信靠赐恩者之间的不同。恩赐可能存留片时，但赐恩者是唯一永恒的爱。基立溪旁对以利亚是个难解的难题，直到他到了撒勒法，一切才突然变得清楚明白。神严厉的指示从来不是祂对我们最后的话，因为一生的哀痛、荒凉和眼泪属于它的间奏，而非终曲。",

            },
            {
              "en": "If the Lord had led Elijah directly to Zarephath, he would have missed something that helped to make him a wiser prophet and a better man—living by faith at Kerith. And whenever our earthly stream or any other outer resource has dried up, it has been allowed so we may learn that our hope and help are in God, who made heaven and earth. <span class=\"vocab-trigger\" data-vocab=\"F. B. Meyer\">F. B. Meyer<\/span>",
              "zh": "主若直接将以利亚领往撒勒法，他就会错过那帮助他成为更有智慧的先知、更好之人的一件事——在基立溪旁凭信心生活。每当我们在世上的溪流或任何其他外源枯干时，都是蒙允许的，好叫我们学习我们的盼望和帮助在于那位造天地的神。 迈尔",
              "simpEn": "If the Lord had led Elijah straight to Zarephath, he would have missed what helped make him a wiser prophet and a better man—living by faith at Kerith. Whenever our earthly brook or any outside supply dries up, it is allowed so we may learn that our hope and help are in God, who made heaven and earth. F. B. Meyer",
              "simpZh": "如果主直接领以利亚去撒勒法，他就会错过那帮助他成为更智慧的先知和更好之人的经历——在基立溪凭信心生活。每当我们地上的溪水或任何外面的资源干了的时候，都是神允许的，好叫我们学到我们的盼望和帮助都在那位创造天地的神里面。迈尔"
            },
            {
              "en": "Perhaps you, too, have camped by such sweet waters, And <span class=\"vocab-trigger\" data-vocab=\"quenched\">quenched<\/span> with joy your weary, <span class=\"vocab-trigger\" data-vocab=\"parched\">parched<\/span> soul’s thirst; To find, as time goes on, your streamlet alters From what it was at first. Hearts that have cheered, or soothed, or blest, or strengthened; Loves that have <span class=\"vocab-trigger\" data-vocab=\"lavished\">lavished<\/span> unreservedly; Joys, treasured joys—have passed, as time has lengthened, Into <span class=\"vocab-trigger\" data-vocab=\"obscurity\">obscurity<\/span>. If then, O soul, the brook your heart has cherished Does fail you now—no more your thirst <span class=\"vocab-trigger\" data-vocab=\"assuage\">assuage<\/span>— If its once glad refreshing streams have perished, Let HIM your heart engage. He will not fail, nor mock, nor disappoint you; His comfort and care change not with the years; With oil of joy He surely will <span class=\"vocab-trigger\" data-vocab=\"anoint\">anoint<\/span> you, And wipe away your tears. <span class=\"vocab-trigger\" data-vocab=\"J. Danson Smith\">J. Danson Smith<\/span>",
              "zh": "或许你也曾在这样甜美的水旁扎营，欢然解了疲惫枯干之灵的渴；却随着时间发现，你的小溪改变了起初的模样。那些曾鼓舞、安慰、祝福、坚固的心灵；那些毫无保留地倾注的爱；那些喜乐、被珍藏的喜乐——随着时间延长，都逝入朦胧之中。那么，灵魂啊，若你心所珍爱的溪流如今叫你失望——不再解你的渴——若它昔日欢畅更新的水流已经消亡，就当让你的心以祂为依归。祂必不叫你失望，不嘲笑，不辜负你；祂的安慰和眷顾不随年日改变；祂必定要用喜乐的油膏你，并擦去你的眼泪。 J. 丹森·史密斯",
              "simpEn": "Maybe you too have camped by such sweet waters, gladly drinking to satisfy your tired, dry soul's thirst, only to find as time passes that your little stream changes from what it was. Hearts that cheered, calmed, blessed, or strengthened; loves that poured out freely; joys, dear joys—have slipped away with passing time into darkness. If then, O soul, the brook your heart held dear fails you now—no longer meets your thirst—if its once happy, fresh streams have died, let HIM take hold of your heart. He will not fail, or mock, or let you down. His comfort and care don't change with years. With the oil of joy He will surely rub you, and wipe away your tears. J. Danson Smith",
              "simpZh": "也许你也曾在这样甜美的溪水旁支搭帐篷，欢欢喜喜地解了疲惫干渴心灵的渴，却随着时间过去，发现你的小溪变了样。那些曾经鼓励、安慰、祝福、坚固的心；那些毫无保留倾注的爱；那些喜乐、珍藏的喜乐——随着时间拉长，都消失在模糊中。灵魂啊，如果那条你心深爱的溪水现在让你失望了——不能再解你的渴——如果它曾经欢快更新的水流已经枯竭，就让你的心以祂为依靠。祂不会让你失望，不会嘲笑你，不会辜负你；祂的安慰和眷顾不随着年月改变；祂一定会用喜乐的油膏抹你，擦去你的眼泪。J. 丹森·史密斯"

            {
              "en": "Some Christians are easily turned away from the greatness of their life’s calling by pursuing instead their own <span class=\"vocab-trigger\" data-vocab=\"grievances\">grievances<\/span> and enemies. They ultimately turn their lives into one petty whirlwind of warfare. It reminds me of trying to deal with a <span class=\"vocab-trigger\" data-vocab=\"hornet’s nest\">hornet’s nest<\/span>. You may be able to disperse the hornets, but you will probably be terribly stung and receive nothing for your pain, for even their honey has no value.",
              "zh": "有些基督徒容易偏离自己生命呼召的伟大，转而去追逐自己的冤屈和仇敌。他们最终把自己的生命变成一场琐碎的战争旋风。这让我想起试图对付一个马蜂窝的情形。你也许能驱散马蜂，但可能会被严重蜇伤，而你的痛苦一无所获，因为就连它们的蜜也没有价值。",
              "simpEn": "Some Christians are easily turned away from the greatness of their life's purpose by chasing after their own complaints and enemies. They end up turning their lives into one small storm of fighting. It reminds me of trying to deal with a hornet's nest. You might scatter the hornets, but you will probably be badly stung and get nothing for your pain, because even their honey is worthless.",
              "simpZh": "有些基督徒很容易从他们生命呼召的伟大上被拉开，转而去追自己的委屈和敌人。他们最后把自己的生命变成了一场琐碎的战争旋风。这让我想起对付马蜂窝的情形。你也许能把马蜂赶散，但你很可能会被狠狠蜇伤，而且你的痛苦什么都得不到，因为连它们的蜜都没有价值。"
            },
            {
              "en": "May God grant us more of the Spirit of Christ, who, “when they <span class=\"vocab-trigger\" data-vocab=\"hurled\">hurled<\/span> their insults at him, . . . did not <span class=\"vocab-trigger\" data-vocab=\"retaliate\">retaliate<\/span>. . . . Instead, he <span class=\"vocab-trigger\" data-vocab=\"entrusted\">entrusted<\/span> himself to him who judges justly” (1 Peter 2:23). “<span class=\"vocab-trigger\" data-vocab=\"Consider\">Consider<\/span> him who endured such <span class=\"vocab-trigger\" data-vocab=\"opposition\">opposition<\/span> from sinful men, so that you will not grow weary and <span class=\"vocab-trigger\" data-vocab=\"lose heart\">lose heart<\/span>” (Heb. 12:3). <span class=\"vocab-trigger\" data-vocab=\"A. B. Simpson\">A. B. Simpson<\/span>",
              "zh": "愿神将基督的灵更多赐给我们，祂“被骂不还口……只将自己交托那按公义审判人的主”（彼得前书2:23）。“那忍受罪人这样顶撞的，你们要思想，免得疲倦灰心”（希伯来书12:3）。 宣信",
              "simpEn": "May God give us more of the Spirit of Christ, who, 'when they threw insults at Him, did not throw any back, but trusted Himself to the One who judges fairly.' 'Think about Him who stood against such attacks from sinful men, so that you won't get tired and give up.' A. B. Simpson",
              "simpZh": "愿神赐给我们更多基督的灵，祂“被骂不还口……只把自己交托那按公义审判人的主”。“你们要思想那忍受罪人这样顶撞的主，免得疲倦灰心。”宣信"
            },
            {
              "en": "For you He walked along the path of woe, He was sharply struck with His head bent low. He knew the deepest sorrow, pain, and grief, He knew long <span class=\"vocab-trigger\" data-vocab=\"endurance\">endurance<\/span> with no relief, He took all the bitter from death’s deep cup, He kept no blood drops but gave them all up. Yes, for you, and for me, He won the fight To take us to glory and <span class=\"vocab-trigger\" data-vocab=\"realms\">realms<\/span> of light. <span class=\"vocab-trigger\" data-vocab=\"L. S. P.\">L. S. P.<\/span>",
              "zh": "为了你，祂行过苦难之路，祂被重击，低垂着头。祂识透最深的忧愁、痛苦和悲伤，祂识透那长久无缓解的忍耐，祂从死之深杯中喝尽一切苦味，祂不留下一点血滴，全都倾倒。是的，为你，也为我，祂打赢了仗，为要领我们进入荣耀和光明的疆域。 L. S. P.",
              "simpEn": "For you He walked the path of sadness, He was hit hard, with His head bent low. He knew the deepest sadness, pain, and grief; He knew long bearing up with no help. He took all the bitter from death's deep cup; He kept no drops of blood but gave them all. Yes, for you and for me He won the fight, to take us to glory and lands of light. L. S. P.",
              "simpZh": "为了你，祂走了那条痛苦的路，祂被重击，头低垂着。祂知道最深的忧愁、疼痛和悲伤；祂知道长久忍耐、毫无缓解；祂从死之深杯里喝尽了一切苦味；祂一点血滴都没有留下，全都给了出去。是的，为你，也为我，祂赢得了这场战斗，要领我们进入荣耀和光明的境界。L. S. P."
            }

        {
          "sectionId": 7,
          "heading": "October 7",
          "audio": "audio/Streams in the Desert - October 7.m4a",
          "paragraphs": [
            {
              "en": "Who among you fears the Lord and obeys the word of his servant? Let him who walks in the dark, who has no light, trust in the name of the Lord and <span class=\"vocab-trigger\" data-vocab=\"rely\">rely<\/span> on his God. (Isaiah 50:10)",
              "zh": "你们中间谁是敬畏耶和华、听从他仆人之话的？……这人行在暗中，没有亮光，当倚靠耶和华的名，仗赖自己的神。（以赛亚书50:10）",
              "simpEn": "Who among you respects the Lord and obeys His servant's word? Let the one who walks in darkness with no light trust in the Lord's name and depend on his God.",
              "simpZh": "你们中间谁敬畏耶和华、听从祂仆人话语的？那在黑暗中行走、没有亮光的人，当信靠耶和华的名，依赖自己的神。"
            },
            {
              "en": "What is a believer to do in times of darkness—a darkness of <span class=\"vocab-trigger\" data-vocab=\"perplexities\">perplexities<\/span> and confusion—a darkness not of the heart but of the mind? These times of darkness come to a faithful and believing disciple who is walking obediently in the will of God. They come as seasons when he does not know what to do or which way to turn. His sky becomes overcast with clouds, and the clear light of heaven does not shine on his path, so that he feels as if he were <span class=\"vocab-trigger\" data-vocab=\"groping\">groping<\/span> his way through complete darkness.",
              "zh": "信徒在黑暗——一种困窘与混乱的黑暗，不是心灵乃是心思的黑暗——之时该做什么呢？这种黑暗时刻临到忠心和信靠、顺服行在神旨意中的门徒。它们作为他不知道当做什么、当转向何方的季节临到。他的天空被云层遮蔽，天上清明的亮光不照在他的路上，以致他觉得仿佛在完全的黑暗中摸索前行。",
              "simpEn": "What should a believer do in times of darkness—a darkness of confusion and not knowing—not darkness of the heart but of the mind? These dark times come to a faithful follower who is walking obediently in God's will. They come as seasons when he doesn't know what to do or which way to turn. His sky is covered with clouds, and the clear light of heaven doesn't shine on his path, so he feels as if he is feeling his way through total darkness.",
              "simpZh": "信徒在黑暗的时候该怎么办呢？那是一种困惑混乱的黑暗，不是心里的黑暗，而是思想上的黑暗。这种黑暗的时期会临到那些忠心、信靠、顺服行在神旨意中的门徒。它们来到，成为他不知道该做什么、该往哪里转的季节。他的天空被云遮住，天上清亮的光不照在他的路上，使他感觉好像在完全的黑暗中摸索。"
            },
            {
              "en": "Dear believer, does this describe you? What should you do in times of darkness? Listen to God’s Word: “Let him ... trust in the name of the Lord and rely on his God.” Actually, the first thing to do is nothing. This is a difficult thing for our lowly human nature to do. There is a saying, “When you’re <span class=\"vocab-trigger\" data-vocab=\"rattled\">rattled<\/span>, don’t rush.” In other words, “When you are confused and do not know what to do, do nothing.” When you find yourself in a spiritual fog, do not run ahead, but slow the pace of your life. And if necessary, keep your life’s ship <span class=\"vocab-trigger\" data-vocab=\"anchored\">anchored<\/span> or tied to the dock.",
              "zh": "亲爱的信徒，这描述的是你吗？你在黑暗时应当做什么呢？当听神的话：“他……当倚靠耶和华的名，仗赖自己的神。”事实上，第一件当做的事就是什么都不做。这对我们卑微的人性是件困难的事。有一句格言说：“慌张时不要急冲。”换句话说：“当你混乱不知道做什么时，就什么都不要做。”当你发现自己身处属灵的迷雾中时，不要向前直冲，而要放慢生活的步调。如有必要，就把你生命的船锚定或拴在码头上。",
              "simpEn": "Dear believer, does this describe you? What should you do in dark times? Listen to God's Word: 'Let him trust in the name of the Lord and depend on his God.' Actually, the first thing to do is nothing. This is hard for our human nature. There is a saying: 'When you're rattled, don't rush.' In other words, 'When you are confused and don't know what to do, do nothing.' When you are in a spiritual fog, don't run ahead; slow down your life. And if needed, keep your life's ship anchored or tied to the dock.",
              "simpZh": "亲爱的信徒，这说的是你吗？在黑暗的时候，你该做什么呢？要听神的话：“他当信靠耶和华的名，依赖他的神。”其实，第一件该做的事就是什么都不做。这对我们卑微的人性是很困难的事。有一句话说：“慌张时，不要急冲。”换句话说：“当你混乱、不知道做什么时，就什么都不要做。”当你发现自己身处灵里的迷雾中时，不要向前冲，而要放慢生活的脚步。必要的话，让你人生的船锚定住或拴在码头上。"
            },
            {
              "en": "The right thing is simply to trust God, for while we trust, He can work. Worrying, however, prevents Him from doing anything for us. If the darkness covering us strikes terror in our hearts and we run back and forth, seeking in vain to find a way of escape from the dark trial where God’s providence has placed us, then the Lord cannot work on our behalf.",
              "zh": "正确的事就是单单信靠神，因为当我们信靠时，祂就能作工。而忧虑却拦阻祂为我们行事。倘若那笼罩我们的黑暗使我们心里惊恐，我们跑来跑去，徒然寻找从神护理所安置我们的黑暗试炼中逃离的出路，主就无法为我们行事。",
              "simpEn": "The right thing is simply to trust God, for while we trust, He can work. Worrying stops Him from doing anything for us. If the darkness covering us fills our hearts with fear and we run back and forth, trying in vain to find a way out of the dark trial where God has placed us, then the Lord cannot work for us.",
              "simpZh": "正确的做法就是单单信靠神，因为当我们信靠时，祂才能做工。但忧虑会拦阻祂为我们做事。如果笼罩我们的黑暗让我们心里充满恐惧，我们跑来跑去，白白地想从神安排我们所在的黑暗试炼中逃出来，主就无法为我们行事。"
            },
            {
              "en": "Only the peace of God will quiet our minds and put our hearts at rest. We must place our hand in His as a little child and allow Him to lead us into the bright sunshine of His love. He knows the way out of the dense, dark forest, so may we climb into His arms, trusting Him to rescue us by showing us the shortest and most reliable road. <span class=\"vocab-trigger\" data-vocab=\"Dr. Pardington\">Dr. Pardington<\/span>",
              "zh": "惟有神的平安能平静我们的思绪，使我们的心得安息。我们必须像小孩子一样把手放在祂手中，让祂领我们进入祂爱的明亮阳光里。祂知道走出这浓密黑暗森林的路，所以让我们爬上祂的臂膀，信靠祂必拯救我们，向我们指明最短最可靠的路。 帕丁顿博士",
              "simpEn": "Only God's peace can quiet our thoughts and give our hearts rest. We must put our hand in His like a little child and let Him lead us into the bright sunshine of His love. He knows the way out of the thick, dark woods, so let us climb into His arms, trusting Him to save us by showing the shortest and surest road. Dr. Pardington",
              "simpZh": "只有神的平安能让我们的心思安静下来，让我们的心得安息。我们必须像小孩子一样，把手放在祂手中，让祂领我们进入祂爱的明亮阳光里。祂知道走出这浓密黑暗森林的路，所以让我们爬进祂的怀中，信靠祂必拯救我们，把最短最可靠的路指给我们。帕丁顿博士"
            },
            {
              "en": "Remember, we are never without a pilot—even when we do not know which way to steer. Hold on, my heart, in your believing— Only the <span class=\"vocab-trigger\" data-vocab=\"steadfast\">steadfast<\/span> wins the crown; He who, when stormy winds are heaving, Parts with his anchor, will go down; But he who Jesus holds through all, Will stand, though Heaven and earth should fall. Hold on! An end will come to sorrow; Hope from the dust will conquering rise; The storm foretells a summer’s morrow; The Cross points on to Paradise; The Father reigns! So cease all doubt; Hold on, my heart. Hold on, hold out.",
              "zh": "要记住，我们从未没有领航者——即使我们不知道往哪里驾驶。我的心哪，在信心中坚守吧——惟有坚定不移的人赢得冠冕；在风暴翻腾之际，丢弃锚的人必沉下去；但那透过一切持定耶稣的人，纵然天地坠落，仍必站立。坚守吧！忧伤必有尽头；盼望必从尘土中得胜而起；风暴预告夏天的明日；十字架指向乐园；父已掌权！所以停止一切疑惑；我的心哪，坚守吧。坚守到底，忍耐到底。",
              "simpEn": "Remember, we are never without a pilot—even when we don't know which way to go. Hold on, my heart, in your believing—only the firm one wins the crown. He who, when stormy winds are rising, lets go of his anchor will sink. But he who holds onto Jesus through everything will stand, even if heaven and earth fall. Hold on! Sorrow will come to an end; hope will rise up from the dust winning; the storm tells of a summer tomorrow; the Cross points to Paradise; the Father rules! So stop all doubt; hold on, my heart. Hold on, hold out.",
              "simpZh": "要记住，我们永远有领航者——即使我们不知道该往哪里开。我的心哪，在信里坚守吧——只有坚固不动摇的人才能赢得冠冕；当暴风大浪翻腾时，丢弃锚的人必定沉下去；但那透过一切紧紧抓住耶稣的人，就是天地都坠落，他仍必站立。坚守吧！忧伤一定会结束；盼望要从尘土中得胜起来；风暴预告夏天的明日；十字架指向乐园；父神在掌权！所以要停止一切怀疑；我的心哪，坚守吧。坚守，坚持到底。"
            }
          ],

    {
      "id": 41,
      "title": "October 8–14",
      "sections": [
        {
          "sectionId": 1,
          "heading": "October 8",
          "audio": "audio/Streams in the Desert - October 8.m4a",
          "paragraphs": [
            {
              "en": "Do not be <span class=\"vocab-trigger\" data-vocab=\"anxious\">anxious<\/span> about anything. (Philippians 4:6)",
              "zh": "应当一无挂虑。（腓立比书4:6）",
              "simpEn": "Don't worry about anything at all.",
              "simpZh": "什么事都不要忧虑。"
            },
            {
              "en": "Quite a few Christians live in a terrible state of anxiety, constantly <span class=\"vocab-trigger\" data-vocab=\"fretting\">fretting<\/span> over the <span class=\"vocab-trigger\" data-vocab=\"concerns\">concerns<\/span> of life. The secret of living in perfect peace amid the <span class=\"vocab-trigger\" data-vocab=\"hectic pace\">hectic pace<\/span> of daily life is one well worth knowing. What good has worrying ever <span class=\"vocab-trigger\" data-vocab=\"accomplished\">accomplished<\/span>? It has never made anyone stronger, helped anyone do God's will, or provided for anyone a way of escape out of their anxiety or confusion. Worry only destroys the <span class=\"vocab-trigger\" data-vocab=\"effectiveness\">effectiveness<\/span> of lives that would otherwise be useful and beautiful. Being <span class=\"vocab-trigger\" data-vocab=\"restless\">restless<\/span> and having worries and cares are absolutely <span class=\"vocab-trigger\" data-vocab=\"forbidden\">forbidden<\/span> by our Lord, who said, \"So do not worry, saying, 'What shall we eat?' or 'What shall we drink?' or 'What shall we wear?'\" (Matt. 6:31). He does not mean that we are not to think ahead or that our life should never have a plan or <span class=\"vocab-trigger\" data-vocab=\"pattern\">pattern<\/span> to it. He simply means that we are not to worry about these things.",
              "zh": "不少基督徒活在一种可怕的焦虑状态中，不断为生活上的事烦躁。在忙碌的日常生活中享有完全平安的秘诀，是非常值得知道的。忧虑曾成就过什么好事呢？它从未使任何人变得更强，从未帮助人遵行神的旨意，也从未为人提供脱离焦虑或混乱的出路。忧虑只会摧毁那些本可有用而美丽的生命之效能。我们的主绝对禁止烦躁不安和忧虑牵挂，祂说：“所以不要忧虑说，吃什么？喝什么？穿什么？”（马太福音6:31）。祂的意思不是我们不该预先思想，或生活不该有任何计划和样式，祂只是说我们不要为这些事忧虑。",
              "simpEn": "Many Christians live in terrible worry, always upset over life's problems. The secret of having perfect peace in a very busy daily life is worth knowing. What good has worry ever done? It has never made anyone stronger, never helped anyone do what God wants, and never given anyone a way out of their worry or confusion. Worry only ruins lives that could be useful and lovely. Being restless and full of worries is completely not allowed by our Lord, who said, 'So don't worry, saying, What will we eat? or What will we drink? or What will we wear?' He doesn't mean we should never plan ahead. He just means we should not worry about these things.",
              "simpZh": "好多基督徒活在可怕的焦虑里，老是为生活中的事烦躁不安。在忙忙碌碌的日常生活中享有完全平安的秘诀，是很值得知道的。忧虑到底做成过什么好事呢？它从来没让任何人变得更强，没帮助任何人遵行神的旨意，也没给任何人一条脱离焦虑或混乱的路。忧虑只会毁掉那些本来可以有用又美好的生命。主绝对禁止烦躁和忧虑，祂说：“所以不要忧虑说，吃什么？喝什么？穿什么？”祂不是说我们不要预先计划，而是说我们不要为这些事忧虑。"
            },
            {
              "en": "People will know that you live in a constant state of anxiety by the lines on your face, the tone of your voice, your negative attitude, and the lack of joy in your spirit. So <span class=\"vocab-trigger\" data-vocab=\"scale the heights\">scale the heights<\/span> of a life <span class=\"vocab-trigger\" data-vocab=\"abandoned to God\">abandoned to God<\/span>, and your <span class=\"vocab-trigger\" data-vocab=\"perspective\">perspective<\/span> will change to the point that you will look down on the clouds beneath your feet. <span class=\"vocab-trigger\" data-vocab=\"Darlow Sargeant\">Darlow Sargeant<\/span>",
              "zh": "人们会从你脸上的皱纹、你说话的语气、你消极的态度和灵里缺乏喜乐，看出你活在持续的焦虑中。所以要攀登那完全奉献给神的生命高峰，你的眼光就会改变到一个地步，叫你俯视脚下的云层。 达洛·萨金特",
              "simpEn": "People can tell you live in constant worry by the lines on your face, the sound of your voice, your negative way of thinking, and the lack of joy inside you. So climb the high places of a life fully given up to God, and your view will change so much that you will look down on the clouds under your feet. Darlow Sargeant",
              "simpZh": "别人会从你脸上的皱纹、你说话的语气、你消极的态度，还有你里面缺少喜乐，看出你一直活在焦虑里。所以要攀登那种完全交给神的人生高峰，你的眼光就会改变，甚至能低头看脚下的云层。达洛·萨金特"
            },
            {
              "en": "It is a sign of weakness to always worry and fret, question everything, and <span class=\"vocab-trigger\" data-vocab=\"mistrust\">mistrust<\/span> everyone. Can anything be gained by it? Don't we only make ourselves unfit for action, and separate our minds from the ability to make wise decisions? We simply <span class=\"vocab-trigger\" data-vocab=\"sink\">sink<\/span> in our struggles when we could <span class=\"vocab-trigger\" data-vocab=\"float\">float<\/span> by faith.",
              "zh": "总是忧虑烦躁、凡事质疑、对人人不信任，乃是软弱的表现。这样能有什么收获呢？我们岂不是只会使自己不适合行动，并让自己的心脱离作出明智决定的能力吗？我们本来可以凭信心浮起来，却偏偏在挣扎中沉下去。",
              "simpEn": "Always worrying and fretting, questioning everything, and not trusting anyone is a sign of being weak. What good comes from it? Don't we just make ourselves unable to act, and take our minds away from being able to make wise choices? We simply go down in our struggles when we could stay up by faith.",
              "simpZh": "老是忧虑烦躁、什么都怀疑、谁都不信任，这是软弱的表现。这样做能得到什么好处呢？我们岂不是让自己不适合行动，也让自己的心没法做出明智的决定吗？我们本来可以靠信心浮起来，却偏偏在挣扎里沉下去。"
            },
            {
              "en": "Oh, for the grace to be silent! Oh, to \"<span class=\"vocab-trigger\" data-vocab=\"be still\">be still<\/span>, and know that [Jehovah is] God\" (Ps. 46:10)! \"The Holy One of Israel\" (Ps. 89:18) will <span class=\"vocab-trigger\" data-vocab=\"defend\">defend<\/span> and <span class=\"vocab-trigger\" data-vocab=\"deliver\">deliver<\/span> His own. We can be sure that His every word will stand forever, even though the mountains may fall into the sea. He deserves our <span class=\"vocab-trigger\" data-vocab=\"total confidence\">total confidence<\/span>. So come, my soul, return to your place of peace, and rest within the sweet <span class=\"vocab-trigger\" data-vocab=\"embrace\">embrace<\/span> of the Lord Jesus. <span class=\"vocab-trigger\" data-vocab=\"selected\">selected<\/span>",
              "zh": "哦，求祢赐恩典叫我能静默！哦，巴不得我能“休息，知道[耶和华]是神”（诗篇46:10）！“以色列的圣者”（诗篇89:18）必保护和拯救属祂的人。我们可以确信祂的每一句话必永远立定，即使大山坠入海中。祂配得我们全心的信赖。所以来吧，我的灵魂，回到你的平安之所，在亲爱主耶稣甜美的怀抱中安息。 选自",

          "sectionId": 2,
          "heading": "October 9",
          "audio": "audio/Streams in the Desert - October 9.m4a",
          "paragraphs": [
            {
              "en": "The Lord <span class=\"vocab-trigger\" data-vocab=\"longs\">longs<\/span> to be <span class=\"vocab-trigger\" data-vocab=\"gracious\">gracious<\/span> to you; he rises to show you <span class=\"vocab-trigger\" data-vocab=\"compassion\">compassion<\/span>. (Isaiah 30:18)",
              "zh": "耶和华必然等候，要施恩给你们；必然兴起，好怜悯你们。（以赛亚书30:18）",
              "simpEn": "The Lord wants very much to be kind to you; He gets up to show you tender care.",
              "simpZh": "耶和华非常想要施恩给你们；祂站起来要怜悯你们。"
            },
            {
              "en": "The greenest grass is found wherever the most rain falls. So I suppose it is the fog and mist of Ireland that makes it \"the <span class=\"vocab-trigger\" data-vocab=\"Emerald Isle\">Emerald Isle<\/span>.\" And wherever you find the widespread fog of trouble and the mist of sorrow, you always find emerald green hearts that are full of the beautiful <span class=\"vocab-trigger\" data-vocab=\"foliage\">foliage<\/span> of the comfort and love of God.",
              "zh": "最绿的草总是出现在降雨最多的地方。所以我想正是爱尔兰的雾和薄霭，使它成为“翡翠岛”。而在任何你遇见弥漫的患难之雾和忧伤之霭的地方，你也总能找到翠绿的心，充满了神安慰和慈爱的美丽枝叶。",
              "simpEn": "The greenest grass grows where the most rain falls. So I think the fog and mist of Ireland make it the 'Emerald Isle.' And wherever you find the wide fog of trouble and the mist of sadness, you always find emerald green hearts full of the lovely leaves of God's comfort and love.",
              "simpZh": "最绿的草长在雨水最多的地方。所以我想是爱尔兰的雾和薄雾让它成了“绿宝石岛”。无论在哪里，只要有大片的患难之雾和忧伤之薄雾，你总能找到翠绿的心，充满了神安慰和慈爱的美丽叶子。"
            },
            {
              "en": "Dear Christian, do not say, \"Where are all the <span class=\"vocab-trigger\" data-vocab=\"swallows\">swallows<\/span>? They are all gone—they are dead.\" No, they are not dead. They have simply <span class=\"vocab-trigger\" data-vocab=\"skimmed\">skimmed<\/span> across the deep, blue sea, flying to a faraway land; but they will be back again soon. Child of God, do not say, \"All the flowers are dead—the winter has killed them, so they are gone.\" No! Although the winter has covered them with a white coat of snow, they will <span class=\"vocab-trigger\" data-vocab=\"push up\">push up<\/span> their heads again and will be alive very soon. O believer, do not say that the sun has <span class=\"vocab-trigger\" data-vocab=\"burned out\">burned out<\/span>, just because a cloud has hidden it. No, it is still there, planning a summer for you; for when it shines again, it will have caused those clouds to have dropped their April showers, each of them a mother to a sweet <span class=\"vocab-trigger\" data-vocab=\"mayflower\">mayflower<\/span>.",
              "zh": "亲爱的基督徒，不要说：“燕子都到哪里去了？它们全走了——它们死了。”不，它们没有死。它们不过是掠过深蓝色的海洋，飞往了远方之地；但它们很快就要再回来。神的儿女，不要说：“所有的花都死了——冬天杀死了它们，所以它们没有了。”不！虽然冬天用白雪袍覆盖了它们，但它们将要再次昂起头来，很快就会活过来。哦，信徒啊，不要因为一片云遮住了太阳，就说太阳已经烧尽了。不，它还在那里，正为你筹划一个夏天；当它再次照耀时，它必使那些云降下四月的阵雨，每一滴雨水都是一朵甜美五月花的母亲。",
              "simpEn": "Dear Christian, don't say, 'Where are the swallows? They are all gone—they are dead.' No, they are not dead. They have only flown low across the deep blue sea to a faraway land, but they will come back soon. Child of God, don't say, 'All the flowers are dead—winter killed them, so they are gone.' No! Though winter covered them with a white blanket of snow, they will push their heads up again and be alive very soon. O believer, don't say the sun has gone out just because a cloud hid it. No, it is still there, planning a summer for you; when it shines again, it will have made those clouds drop April rains, each raindrop a mother to a sweet May flower.",

            },
            {
              "en": "Above all, remember—when God <span class=\"vocab-trigger\" data-vocab=\"hides His face\">hides His face<\/span> from you, do not say that He has forgotten you. He is simply waiting for a little while to make you love Him more. And once He comes, you will rejoice with the inexpressible \"joy of the Lord\" (Neh. 8:10). Waiting on Him exercises your gift of grace and tests your faith. Therefore continue to wait in hope, for although the promise may <span class=\"vocab-trigger\" data-vocab=\"linger\">linger<\/span>, it will never come too late. <span class=\"vocab-trigger\" data-vocab=\"Charles H. Spurgeon\">Charles H. Spurgeon<\/span>",
              "zh": "最重要的，务要记住——当神向你掩面时，不要说祂忘了你。祂只不过是在等候片时，好叫你更爱祂。一旦祂来到，你必因那无法言喻的“靠耶和华而得的喜乐”（尼希米记8:10）而欢呼。等候祂能操练你恩典的恩赐，试验你的信心。因此要继续在盼望中等候，因为应许虽然可能迟延，却永不会来得太晚。 司布真",
              "simpEn": "Most of all, remember—when God hides His face from you, don't say He has forgotten you. He is just waiting a little while to make you love Him more. And when He comes, you will be happy with the joy of the Lord that is too great for words. Waiting on Him exercises your gift of grace and tests your faith. So keep waiting in hope, for though the promise may take a while, it will never be too late. Charles H. Spurgeon",
              "simpZh": "最重要的，要记住——当神向你隐藏祂的脸时，不要说他忘了你。祂只是在等一小会儿，好让你更爱祂。等祂一来，你就要因说不出的“靠耶和华而得的喜乐”大大欢喜。等候祂能操练你恩典的恩赐，试验你的信心。所以要继续怀着盼望等候，因为应许虽然可能迟延，却永远不会来得太晚。司布真"
            },
            {
              "en": "Oh, every year has its winter, And every year has its rain— But a day is always coming When the birds go north again. When new leaves sprout in the forest, And grass springs green on the plain, And tulips boast their blossoms— And the birds go north again. Oh, every heart has its sorrow, And every heart has its pain— But a day is always coming When the birds go north again. It's the sweetest thing to remember, If your courage starts to <span class=\"vocab-trigger\" data-vocab=\"wane\">wane<\/span>, When the cold, dark days are over— That the birds go north again.",
              "zh": "哦，每年都有冬天，每年都有雨水——但总有一个日子要来到，那时候鸟再飞向北方。当新叶在林中发芽，青草在原野上发绿，郁金香炫耀花朵——候鸟再飞向北方。哦，每颗心都有忧伤，每颗心都有疼痛——但总有一个日子要来到，那时候鸟再飞向北方。这是最甘甜的记忆，当你的勇气开始衰退，当寒冷黑暗的日子过去——候鸟再飞向北方。",
              "simpEn": "Oh, every year has its winter, and every year has its rain—but a day is always coming when the birds go north again. When new leaves come out in the woods, and green grass springs up on the flat lands, and tulips show off their flowers—the birds go north again. Oh, every heart has its sadness, and every heart has its hurt—but a day is always coming when the birds go north again. It's the sweetest thing to remember, if your courage starts to grow weak, when the cold, dark days are over—that the birds go north again.",
              "simpZh": "哦，每一年都有冬天，每一年都有雨水——但总有一个日子要来，那时候鸟儿再往北飞。当新叶子在树林里长出来，绿草在平原上冒出来，郁金香夸耀它们的花朵——鸟儿再往北飞。哦，每一颗心都有忧伤，每一颗心都有疼痛——但总有一个日子要来，那时候鸟儿再往北飞。这是最甜美的事要记住，当你的勇气开始衰退，当那些寒冷黑暗的日子过去——鸟儿再往北飞。"

        {

          "paragraphs": [
            {
              "en": "Do not <span class=\"vocab-trigger\" data-vocab=\"fret\">fret<\/span>. (Psalm 37:1)",

              "simpEn": "Don't be upset and worried.",
              "simpZh": "不要烦躁不安。"
            },
            {
              "en": "I believe that this verse is as much a <span class=\"vocab-trigger\" data-vocab=\"divine command\">divine command<\/span> as \"You shall not steal\" (Ex. 20:15). But what does it mean to fret? One person once defined it as that which makes a person rough on the surface, causing him to rub and wear himself and others away. Isn't it true that an <span class=\"vocab-trigger\" data-vocab=\"irritable\">irritable<\/span>, <span class=\"vocab-trigger\" data-vocab=\"irrational\">irrational<\/span>, and <span class=\"vocab-trigger\" data-vocab=\"critical\">critical<\/span> person not only wears himself out but is also very <span class=\"vocab-trigger\" data-vocab=\"draining\">draining<\/span> and tiring to others? When we worry and fret, we are a constant <span class=\"vocab-trigger\" data-vocab=\"annoyance\">annoyance<\/span>. This psalm not only says, \"Do not fret because of evil men\" but leaves no room for fretting whatsoever. It is very harmful, and God does not want us to hurt ourselves or others.",
              "zh": "我相信这节经文正如“不可偷盗”（出埃及记20:15）一样是一条神圣的命令。但心怀不平是什么意思呢？有人曾把它定义为：那使人表面变得粗糙、叫人摩擦磨损自己和他人的东西。一个易怒、不理性、挑剔的人，不但耗尽自己，而且极其耗竭、使人疲惫，这岂不正是事实吗？当我们忧虑烦躁时，我们就成了一个持续的搅扰。这诗篇不仅说“不要因作恶的心怀不平”，而且完全不留任何心怀不平的余地。它是极其有害的，而神不愿我们伤害自己或他人。",
              "simpEn": "I believe this verse is just as much a command from God as 'You shall not steal.' But what does it mean to fret? Someone once said it makes a person rough, wearing himself and others down. Isn't it true that a person who gets annoyed easily, who is not reasonable, and who always finds fault not only tires himself out but also wears out others? When we worry and fret, we bother people all the time. This psalm not only says, 'Don't fret because of bad people,' but leaves no place for fretting at all. It is very hurtful, and God does not want us to hurt ourselves or others.",
              "simpZh": "我相信这节经文就像“不可偷盗”一样是神的命令。但心怀不平是什么意思呢？有人把它定义为让人表面变得粗糙、磨掉自己又磨掉别人的东西。一个动不动就发火、不讲道理、爱挑毛病的人，不但把自己耗尽，也非常耗别人的精神，这难道不是真的吗？当我们忧虑烦躁时，我们就是个不停的搅扰。这诗篇不只是说“不要因作恶的心怀不平”，而是根本不给心怀不平留一点空间。它非常有害，神不愿意我们伤害自己或别人。"
            },
            {
              "en": "Any physician can tell you that a <span class=\"vocab-trigger\" data-vocab=\"fit of anger\">fit of anger<\/span> is more harmful to your system than a fever and that a <span class=\"vocab-trigger\" data-vocab=\"disposition\">disposition<\/span> of continual fretting is not <span class=\"vocab-trigger\" data-vocab=\"conducive\">conducive<\/span> to a healthy body. The next step down from fretting is being <span class=\"vocab-trigger\" data-vocab=\"quick-tempered\">quick-tempered<\/span>, and that amounts to anger. May we set it aside once and for all and simply be <span class=\"vocab-trigger\" data-vocab=\"obedient\">obedient<\/span> to the command \"Do not fret.\" <span class=\"vocab-trigger\" data-vocab=\"Margaret Bottome\">Margaret Bottome<\/span>",
              "zh": "任何医生都能告诉你，一次暴怒对身体的伤害比一次发烧更大，而一个不断烦躁的性情对健康的身体是没有益处的。从心怀不平再往下走一步就是暴躁，那就等于愤怒了。愿我们把它一次而永远地放在一边，单单顺服“不要心怀不平”这条命令。 玛格丽特·伯顿",
              "simpEn": "Any doctor can tell you that a sudden anger is more harmful to your body than a fever, and that a habit of always fretting does not help you stay healthy. The next step down from fretting is being quick-tempered, and that is the same as anger. May we put it aside once and for all and just obey the command 'Do not fret.' Margaret Bottome",
              "simpZh": "任何医生都能告诉你，一次大发雷霆对身体的伤害比发烧还大，而一个老是烦躁的习惯对健康的身体没有好处。从心怀不平再往下走一步就是脾气火爆，那就等于愤怒了。但愿我们把它一次永远地放到一边，单单顺服“不要心怀不平”这条命令。玛格丽特·伯顿"
            },
            {
              "en": "<span class=\"vocab-trigger\" data-vocab=\"Overheard in an Orchard\">Overheard in an Orchard<\/span> Said the <span class=\"vocab-trigger\" data-vocab=\"Robin\">Robin<\/span> to the <span class=\"vocab-trigger\" data-vocab=\"Sparrow\">Sparrow<\/span>: \"I should really like to know Why these anxious human beings <span class=\"vocab-trigger\" data-vocab=\"rush about\">rush about<\/span> and worry so.\" Said the Sparrow to the Robin: \"Friend, I think that it must be That they have no Heavenly Father Such as cares for you and me.\" <span class=\"vocab-trigger\" data-vocab=\"Elizabeth Cheney\">Elizabeth Cheney<\/span>",
              "zh": "《在果园里听见的话》 知更鸟对麻雀说：“我真想知道为什么这些焦虑的人如此奔忙忧虑。” 麻雀对知更鸟说：“朋友，我想那一定是因为他们没有一位像看顾你我这样的天父。” 伊丽莎白·切尼",

          "paragraphs": [
            {
              "en": ". . . <span class=\"vocab-trigger\" data-vocab=\"dying\">dying<\/span>, and yet we live on. (2 Corinthians 6:9)",

              "simpEn": "Dying, but look—we keep on living.",
              "simpZh": "好像要死了，却还是活着。"
            },
            {
              "en": "Last summer I had a flower bed of <span class=\"vocab-trigger\" data-vocab=\"asters\">asters<\/span> that nearly covered my garden in the country. They were planted late in the season, but how beautiful they were! While the outer portion of the plants were still producing fresh flowers, the tops had gone to seed, and when an early frost came, I found that the <span class=\"vocab-trigger\" data-vocab=\"radiant\">radiant<\/span> beauty of the blossoms had <span class=\"vocab-trigger\" data-vocab=\"withered\">withered<\/span>. All I could say at this point was, \"Oh well, I guess the season has been too much for them, and they have died.\" So I wished them a <span class=\"vocab-trigger\" data-vocab=\"fond farewell\">fond farewell<\/span>.",
              "zh": "去年夏天，我在乡间的花园里有一畦紫菀，几乎盖满整个园子。它们种得晚，却何等美丽！当植株外部仍在开鲜花的时候，顶部却已结籽了。一场早霜袭来，我发现那光彩夺目的花朵已经凋谢。那时我所能说的只是：“好吧，看来季节对它们太过严酷，它们死了。”于是我向它们深情道别。",
              "simpEn": "Last summer I had a flower bed of asters that nearly covered my country garden. They were planted late, but how pretty they were! While the outer parts still made new flowers, the tops had gone to seed, and when an early frost came, the glowing beauty of the flowers had died. All I could say was, 'Oh well, I guess the season was too hard for them, and they have died.' So I said a loving goodbye to them.",
              "simpZh": "去年夏天我在乡下花园里有一畦紫菀花，几乎铺满了整个园子。它们种得晚，可是多美啊！外围还在开鲜花，顶部却已经结籽了。一场早霜下来，那些闪闪发光的花朵就枯萎了。那时我只能说：“好吧，看来季节对它们太严酷了，它们死了。”我就跟它们深情告别。"
            },
            {
              "en": "After this I no longer enjoyed looking at the flower bed, for it seemed to be only a <span class=\"vocab-trigger\" data-vocab=\"graveyard\">graveyard<\/span> of flowers. Yet several weeks ago one of the gardeners called my attention to the fact that across the entire garden, asters were now <span class=\"vocab-trigger\" data-vocab=\"sprouting up\">sprouting up<\/span> in great <span class=\"vocab-trigger\" data-vocab=\"abundance\">abundance<\/span>. It appeared that every plant I thought the winter had destroyed had replanted fifty to take its place. What had the frost and the fierce winter wind done? They had taken my flowers and destroyed them, casting them to the ground. They had walked across them with their snowy feet and, once finished with their work, said, \"This is the end of you.\" And yet in the spring, for every one destroyed, fifty <span class=\"vocab-trigger\" data-vocab=\"witnesses\">witnesses<\/span> arose and said, \"It is through 'dying . . . we live on.'\"",
              "zh": "此后，我再也不喜欢看那花畦了，因为它似乎只是一片花的墓地。然而几周前，一位园丁提醒我注意：整个花园里，紫菀正大量地萌发出来。似乎每一株我以为被冬天摧毁的，都重新种下了五十株来代替。霜和凛冽的冬风做了什么呢？它们把我的花夺去、摧毁了，将它们抛在地上。它们用雪白的脚从花上踏过，完工之后说：“你们就此结束了。”然而春天一到，每一株被毁的，都有五十个见证者兴起，说：“正是借着‘死……我们却活着。’”",
              "simpEn": "After this I didn't enjoy looking at the flower bed, because it seemed just like a graveyard of flowers. But a few weeks ago a gardener pointed out to me that all across the garden, asters were now popping up in great numbers. It seemed that every plant I thought winter had killed had planted fifty new ones in its place. What had the frost and fierce winter wind done? They had taken my flowers, destroyed them, and thrown them to the ground. They had walked over them with snowy feet and, when finished, said, 'This is the end of you.' But in spring, for every one destroyed, fifty witnesses stood up and said, 'It is through dying that we live on.'",
              "simpZh": "之后我就不再喜欢看那花畦了，因为它好像只是一片花的坟场。可是几个星期前，一位园丁提醒我注意：整个花园里，紫菀正大量地冒出来。看起来，每一株我以为被冬天毁掉的花，都重新种下了五十株来代替。霜和猛烈的冬风做了什么呢？它们拿走了我的花，毁了它们，把它们丢在地上。它们用雪白的脚踩过去，做完工之后说：“你们完了。”可是春天一到，每毁掉一株，就有五十个见证者站起来说：“正是借着'死……我们才继续活着。'”"
            },
            {
              "en": "As it is in the plant world, so it is in God's kingdom. Through death came <span class=\"vocab-trigger\" data-vocab=\"everlasting life\">everlasting life<\/span>. Through <span class=\"vocab-trigger\" data-vocab=\"crucifixion\">crucifixion<\/span> and the <span class=\"vocab-trigger\" data-vocab=\"tomb\">tomb<\/span> came the <span class=\"vocab-trigger\" data-vocab=\"throne\">throne<\/span> and the palace of the eternal God. Through <span class=\"vocab-trigger\" data-vocab=\"apparent defeat\">apparent defeat<\/span> came victory. So do not be afraid of suffering or defeat. It is through being \"<span class=\"vocab-trigger\" data-vocab=\"struck down\">struck down<\/span>, but not destroyed\" (2 Cor. 4:9) and through being broken to pieces, and those pieces being torn to <span class=\"vocab-trigger\" data-vocab=\"shreds\">shreds<\/span>, that we become people of strength. And it is the <span class=\"vocab-trigger\" data-vocab=\"endurance\">endurance<\/span> of one believer that produces a <span class=\"vocab-trigger\" data-vocab=\"multitude\">multitude<\/span>.",
              "zh": "植物界怎样，神的国度也怎样。借死亡来了永生。借钉十字架和坟墓，来了永生神的宝座和宫殿。借表面上的失败，来了得胜。所以不要害怕苦难或失败。正是借着“打倒了，却不至死亡”（哥林多后书4:9），借着被打成碎片，那些碎片再被撕成细条，我们才成为刚强的人。正是一个信徒的忍耐，产生了众多的生命。",
              "simpEn": "As it is in the plant world, so it is in God's kingdom. Through death came never-ending life. Through the cross and the grave came the throne and home of the forever God. Through what looked like defeat came winning. So don't be afraid of suffering or losing. It is through being knocked down but not destroyed, and through being broken into pieces, and those pieces torn into tiny bits, that we become strong people. And it is the holding on of one believer that brings many others.",
              "simpZh": "植物界是这样的，神国也是这样。借着死，来了永生。借着钉十字架和坟墓，来了永生神的宝座和宫殿。借着看起来的失败，来了得胜。所以不要害怕受苦或失败。正是借着“被打倒了，却不至死亡”，借着被打成碎片，碎片再被撕成细条，我们才变成刚强的人。正是一个信徒的忍耐，产生了许多的生命。"
            },
            {
              "en": "Others may <span class=\"vocab-trigger\" data-vocab=\"yield\">yield<\/span> to the appearance of things and follow the world. They may blossom quickly and find <span class=\"vocab-trigger\" data-vocab=\"momentary prosperity\">momentary prosperity<\/span>, but their end will be one of <span class=\"vocab-trigger\" data-vocab=\"eternal death\">eternal death<\/span>. <span class=\"vocab-trigger\" data-vocab=\"Henry Ward Beecher\">Henry Ward Beecher<\/span>",
              "zh": "别人也许会屈服于事物的外表而随从世俗。他们可能快快开花，得着片时的兴旺，但他们的结局将是永远的死亡。 亨利·沃德·比彻",
              "simpEn": "Others may give in to how things look and follow the world. They may bloom fast and find quick success, but their end will be forever death. Henry Ward Beecher",
              "simpZh": "别人可能会屈服于事情的外表，跟着世界走。他们可能很快开花，得到暂时的兴旺，但他们的结局将是永远的死亡。亨利·沃德·比彻"
            },
            {
              "en": "Measure your life by loss and not by <span class=\"vocab-trigger\" data-vocab=\"gain\">gain<\/span>, Not by the wine drunk but by the wine poured forth. For love's strength is found in love's <span class=\"vocab-trigger\" data-vocab=\"sacrifice\">sacrifice<\/span>, And he who suffers most has most to give.",
              "zh": "当以损失而非以得着来衡量你的人生，不以所喝的酒，乃以所倾倒的酒。因为爱的力量见于爱的牺牲，受苦最多的人最有可给予。",
              "simpEn": "Measure your life by what you lose, not by what you get—not by the wine you drink but by the wine you pour out. For love's power is found in love's giving up, and the one who suffers the most has the most to give.",
              "simpZh": "要用失去的而不是得到的来衡量你的人生，不是你喝进去的酒，而是你倒出去的酒。因为爱的力量是在爱的牺牲里找到的，受苦最多的人最能够给予。"
            }
          ],

          "paragraphs": [
            {
              "en": "Joseph's master took him and put him in prison. . . . But . . . the Lord was with him . . . and gave him success in whatever he did. (Genesis 39:20–21, 23)",
              "zh": "约瑟的主人把他下在监里……但耶和华与约瑟同在……使他手里所办的尽都顺利。（创世记39:20–21, 23）",
              "simpEn": "Joseph's master put him in prison. But the Lord was with him and made everything he did go well.",
              "simpZh": "约瑟的主人把他关进监牢。但是耶和华与他同在，让他做的一切都顺利。"

            {
              "en": "When God allows us to go to prison because of our service to Him, it is nearly the most blessed place in the world that we could be, because He goes with us. Joseph seems to have known this truth. He did not <span class=\"vocab-trigger\" data-vocab=\"sulk\">sulk<\/span>, become discouraged and <span class=\"vocab-trigger\" data-vocab=\"rebellious\">rebellious<\/span>, or engage in <span class=\"vocab-trigger\" data-vocab=\"self-pity\">self-pity<\/span> by thinking \"everything was against him.\" If he had done so, the prison <span class=\"vocab-trigger\" data-vocab=\"warden\">warden<\/span> would never have trusted him.",
              "zh": "当神因我们服侍祂而容许我们下监时，那几乎是我们世上最蒙福的地方了，因为祂与我们同去。约瑟似乎深知这真理。他没有生闷气，没有灰心叛逆，也没有陷入自怜，觉得“一切都在跟他作对”。如果他是这样，监狱长就绝不会信任他。",
              "simpEn": "When God lets us go to prison because we serve Him, it is almost the most blessed place in the world we could be, because He goes with us. Joseph seems to have known this. He did not pout, get sad and fight back, or feel sorry for himself thinking everything was against him. If he had, the prison warden would never have trusted him.",
              "simpZh": "当神因为我们服侍祂而让我们去坐牢时，那差不多是全世界最蒙福的地方了，因为祂跟我们一起去。约瑟好像知道这个真理。他没有赌气，没有灰心、悖逆，也没有自怜地觉得“一切都在跟他作对”。如果他那样做了，监狱长绝不会信任他。"
            },
            {
              "en": "May we remember that if self-pity is allowed to set in, we will never be used by God again until it is totally removed. Joseph simply placed everything in joyful trust upon the Lord, and as a result, the prison warden placed everything into Joseph's care. Lord Jesus, when the prison door closes behind me, keep me trusting in You with complete and <span class=\"vocab-trigger\" data-vocab=\"overflowing joy\">overflowing joy<\/span>. Give Your work through me great success, and even in prison make me \"<span class=\"vocab-trigger\" data-vocab=\"free indeed\">free indeed<\/span>\" (John 8:36). <span class=\"vocab-trigger\" data-vocab=\"selected\">selected<\/span>",
              "zh": "愿我们记住，如果容许自怜生根，我们就再不能被神使用，直到它被完全除去。约瑟只是把一切放在对主喜乐的信靠上，结果监狱长把一切交在约瑟手中。主耶稣，当监狱的门在我身后关上时，求祢保守我以完全而满溢的喜乐信靠祢。使祢借我所作的工大获成功，即使在监牢里，也叫我“真自由”（约翰福音8:36）。 选自",
              "simpEn": "May we remember that if we let self-pity take hold, God will not use us again until it is fully taken away. Joseph simply put everything in happy trust on the Lord, and as a result, the prison warden put everything into Joseph's care. Lord Jesus, when the prison door shuts behind me, keep me trusting You with full and spilling-over joy. Give great success to Your work through me, and even in prison make me 'free indeed.' selected",
              "simpZh": "愿我们记住，如果让自怜扎根，就再也不能被神使用，直到它被完全除掉。约瑟只是把一切放在对主喜乐的信靠上，结果监狱长把一切交在约瑟手里。主耶稣，当监狱的门在我身后关上时，求你保守我以满溢的喜乐信靠你。让你借着我的工作大大成功，就算在监牢里也叫我“真自由”。选自"
            },
            {
              "en": "A little bird I am, <span class=\"vocab-trigger\" data-vocab=\"Shut\">Shut<\/span> from the fields of air, And in my cage I sit and sing To Him who placed me there; Well pleased a prisoner to be, Because, My God, it <span class=\"vocab-trigger\" data-vocab=\"pleases\">pleases<\/span> Thee. My cage <span class=\"vocab-trigger\" data-vocab=\"confines\">confines<\/span> me round, Freely I cannot fly, But though my wings are closely bound, My soul is at <span class=\"vocab-trigger\" data-vocab=\"liberty\">liberty<\/span>; For prison walls cannot control The flight or freedom of the soul. I have learned to love the darkness of sorrow, for it is there I see the brightness of God's face. <span class=\"vocab-trigger\" data-vocab=\"Madame Guyon\">Madame Guyon<\/span>",
              "zh": "我是一只小鸟，被关在天空的田野之外，我在笼中坐着歌唱，唱给那位将我安置在此的主听；我甘心作一名囚徒，因为，我的神，这讨祢喜悦。我的笼子四面困住我，我不能自由飞翔，但我的翅膀虽被紧紧捆绑，我的灵魂却是自由的；因监狱的墙不能控制灵魂的飞翔和自由。我已学会喜爱忧伤的黑暗，因为正是在那里，我看见神脸上的荣光。 盖恩夫人",
              "simpEn": "I am a little bird, shut away from the open fields of air. In my cage I sit and sing to the One who placed me here, well happy to be a prisoner because, my God, it pleases You. My cage holds me in on every side; I cannot fly freely, but though my wings are tightly tied, my soul is free. For prison walls cannot control where the soul flies or its freedom. I have learned to love the darkness of sadness, for there I see the brightness of God's face. Madame Guyon",
              "simpZh": "我是一只小鸟，被关在开阔天空之外。我在笼子里坐着歌唱，唱给那位把我放在这里的主听。我甘心乐意作囚犯，因为我的神啊，这讨你喜欢。我的笼子四面围住我，我不能自由地飞，但虽然我的翅膀被紧紧绑住，我的灵魂却是自由的。因为监狱的墙不能控制灵魂的飞翔和自由。我已经学会了喜爱忧伤的黑暗，因为正是在那里，我看见神脸上的亮光。盖恩夫人"

        {
          "sectionId": 6,
          "heading": "October 13",
          "audio": "audio/Streams in the Desert - October 13.m4a",
          "paragraphs": [
            {
              "en": "Do not be <span class=\"vocab-trigger\" data-vocab=\"anxious\">anxious<\/span> about anything. (Philippians 4:6)",
              "zh": "应当一无挂虑。（腓立比书4:6）",
              "simpEn": "Don't be worried about anything.",
              "simpZh": "什么事情都不要忧虑。"
            },
            {
              "en": "Anxiety should never be found in a believer. In spite of the <span class=\"vocab-trigger\" data-vocab=\"magnitude\">magnitude<\/span>, quantity, and <span class=\"vocab-trigger\" data-vocab=\"diversity\">diversity<\/span> of our trials, <span class=\"vocab-trigger\" data-vocab=\"afflictions\">afflictions<\/span>, and difficulties, anxiety should not exist under any circumstances. This is because we have a Father in heaven who is <span class=\"vocab-trigger\" data-vocab=\"almighty\">almighty<\/span>, who loves His children as He loves His \"one and only Son\" (John 3:16), and whose complete joy and delight it is to continually <span class=\"vocab-trigger\" data-vocab=\"assist\">assist<\/span> them under all circumstances. We should <span class=\"vocab-trigger\" data-vocab=\"heed\">heed<\/span> His Word, which says, \"Do not be anxious about anything, but in everything, by prayer and <span class=\"vocab-trigger\" data-vocab=\"petition\">petition<\/span>, with <span class=\"vocab-trigger\" data-vocab=\"thanksgiving\">thanksgiving<\/span>, present your requests to God.\"",
              "zh": "在信徒身上绝不该找到焦虑。尽管我们的试炼、患难和困难如此巨大、繁多且多样，焦虑在任何情况下都不当存在。这是因为我们有一位全能的天父，祂爱祂的儿女如同爱祂的“独生子”（约翰福音3:16）一样，而在一切境遇中持续不断地帮助他们，正是祂完全的喜乐和欢欣。我们应当留心听祂的话，祂说：“应当一无挂虑，只要凡事借着祷告、祈求，和感谢，将你们所要的告诉神。”",
              "simpEn": "A believer should never be worried. Even though our troubles are big, many, and different, worry should not be there in any situation. This is because we have a Father in heaven who has all power, who loves His children as He loves His only Son, and whose full joy is to keep helping them in everything. We should listen to His Word, which says, 'Don't be anxious about anything, but in everything, by prayer and asking, with thanks, tell God what you need.'",
              "simpZh": "在信徒身上绝对不该有忧虑。不管我们的试炼多么大、多么多、多么杂，忧虑在任何情况下都不应该存在。这是因为我们有一位全能的天父，祂爱祂的儿女就像爱祂的独生子一样，而且在所有情况下不断帮助他们，正是祂完全的喜乐。我们应当留心听祂的话，祂说：“应当一无挂虑，只要凡事借着祷告、祈求和感谢，将你们所要的告诉神。”"
            },
            {
              "en": "\"In everything\"—not simply when our house is on fire or when our beloved spouse and children are <span class=\"vocab-trigger\" data-vocab=\"gravely ill\">gravely ill<\/span>, but even in the smallest matters of life. We are to take everything to God—little things, very little things, even what the world calls <span class=\"vocab-trigger\" data-vocab=\"trivial\">trivial<\/span> things. Yes, we are to take everything, living all day long in holy <span class=\"vocab-trigger\" data-vocab=\"fellowship\">fellowship<\/span> with our heavenly Father and our precious Lord Jesus. We should develop something of a <span class=\"vocab-trigger\" data-vocab=\"spiritual instinct\">spiritual instinct<\/span>, causing us to immediately turn to God when a concern keeps us awake at night. During those <span class=\"vocab-trigger\" data-vocab=\"sleepless nights\">sleepless nights<\/span>, we should speak to Him, bringing our various concerns before Him, no matter how small they may be. Also speak to the Lord about any trial you are facing or any difficulties you may have in your family or professional life.",
              "zh": "“凡事”——不单是在房子失火、或心爱的配偶儿女病重之时，就连在人生最微小的事上也是如此。我们要把凡事带到神面前——小事、非常小的事、甚至世界称为琐碎的事。是的，我们要把凡事带来，终日活在和天父并亲爱主耶稣的圣洁交通中。我们应当培养一种属灵的本能，叫我们一有挂虑使我们夜里睡不着时，就立刻转向神。在那些不眠之夜，我们应当向祂说话，把各样挂虑带到祂面前，不管它们多么微小。也要将你正面对的任何试炼，或你在家庭和职业生活中遇到的任何困难，都告诉主。",
              "simpEn": "'In everything'—not just when our house is burning or our dear family is very sick, but even in the smallest things of life. We are to bring everything to God—little things, very little things, even what the world calls unimportant things. Yes, bring everything, living all day in holy closeness with our Father in heaven and our dear Lord Jesus. We should grow a kind of inner sense that makes us turn to God right away when a worry keeps us up at night. During those nights we cannot sleep, we should talk to Him, bringing our different worries to Him, no matter how small. Also tell the Lord about any test you are facing or any trouble in your family or work.",
              "simpZh": "“凡事”——不只是房子着火、或者心爱的家人病得很重的时候，就算生活中最小的事也是一样。我们要把一切带到神面前——小事、很小的事、连世界觉得不值一提的事。是的，我们要把一切都带来，整天活在与天父和亲爱主耶稣的圣洁交通里。我们应该培养一种属灵的直觉，一有忧虑让我们晚上睡不着，就马上转向神。在那些睡不着觉的夜里，我们应该跟祂说话，把各样挂虑带到祂面前，不管它们多小。也要把你正在面对的任何试炼，或者家庭和工作中的任何困难，都告诉主。"
            },
            {
              "en": "\"By prayer and petition\"—<span class=\"vocab-trigger\" data-vocab=\"earnestly pleading\">earnestly pleading<\/span>, <span class=\"vocab-trigger\" data-vocab=\"persevering\">persevering<\/span> and enduring, and waiting, waiting, waiting on God. \"With thanksgiving\"—always laying a good <span class=\"vocab-trigger\" data-vocab=\"foundation\">foundation<\/span>. Even if we have no possessions, there is one thing for which we can always be thankful—that He has saved us from hell. We can also give thanks that He has given us His Holy Word, His Holy Spirit, and the most precious gift of all—His Son. Therefore when we consider all this, we have <span class=\"vocab-trigger\" data-vocab=\"abundant\">abundant<\/span> reasons for thanksgiving. May this be our goal!",
              "zh": "“借着祷告和祈求”——热切恳求，坚持忍耐，等候、等候、再等候神。“借着感谢”——总要立下一个美好的根基。即使我们一无所有，也有一件事是我们可以永远感谢的——祂已把我们从地狱中拯救出来。我们也可以感谢祂赐给我们祂的圣言、祂的圣灵，以及那最宝贵的恩赐——祂的儿子。所以当我们思想这一切时，就有充足的感谢理由。愿这成为我们的目标！",
              "simpEn": "'By prayer and petition'—begging with all your heart, keeping at it and holding on, and waiting, waiting, waiting on God. 'With thanksgiving'—always putting down a good base. Even if we have nothing else, there is one thing we can always be thankful for—that He saved us from hell. We can also thank Him for giving us His Holy Word, His Holy Spirit, and the most precious gift of all—His Son. So when we think about all this, we have more than enough reasons to be thankful. May this be what we aim for!",
              "simpZh": "“借着祷告和祈求”——真心恳求，持续坚持，等候、等候、等候神。“借着感谢”——总是先打下好的根基。就算我们什么都没有，也有一件事我们可以永远感谢的——祂已经把我们从地狱里救出来了。我们也可以感谢祂把祂的圣言、祂的圣灵和最宝贵的礼物——祂的儿子——赐给了我们。所以当我们思想这一切，就有丰丰富富的感谢理由。愿这成为我们的目标！"
            },
            {
              "en": "\"And the peace of God, which <span class=\"vocab-trigger\" data-vocab=\"transcends\">transcends<\/span> all understanding, will <span class=\"vocab-trigger\" data-vocab=\"guard\">guard<\/span> your hearts and your minds in Christ Jesus\" (Phil. 4:7). This is such a wonderful, genuine, and precious blessing that to truly know it, you must experience it, for it \"transcends all understanding.\" May we take these truths to heart, <span class=\"vocab-trigger\" data-vocab=\"instinctively\">instinctively<\/span> walking in them, so the result will be lives that <span class=\"vocab-trigger\" data-vocab=\"glorify\">glorify<\/span> God more abundantly than ever before. <span class=\"vocab-trigger\" data-vocab=\"George Mueller\">George Mueller<\/span>, <span class=\"vocab-trigger\" data-vocab=\"from Life of Trust\">from Life of Trust<\/span>",
              "zh": "“神所赐出人意外的平安，必在基督耶稣里保守你们的心怀意念”（腓立比书4:7）。这是如此奇妙、真实、宝贵的祝福，要真正认识它，你必须经历它，因为它“超越一切理解”。愿我们将这些真理存记在心，本能地行在其中，以致结出的果子就是前所未有地更加荣耀神的生命。 乔治·慕勒，摘自《信心的生命》",
              "simpEn": "'And the peace of God, which goes far beyond all understanding, will keep your hearts and minds safe in Christ Jesus.' This is such a wonderful, real, and dear blessing that to truly know it, you must go through it, for it 'goes beyond all understanding.' May we take these truths into our hearts, walking in them by second nature, so the result will be lives that bring more glory to God than ever before. George Mueller, from Life of Trust",
              "simpZh": "“神所赐出人意外的平安，必在基督耶稣里保守你们的心怀意念。”这是多么奇妙、真实、宝贵的祝福，要真正认识它，你必须亲身经历，因为它“超越一切理解”。愿我们把这些真理放在心上，本能地行在其中，好让结果就是前所未有地更加荣耀神的生命。乔治·慕勒，摘自《信心的生命》"
            },
            {
              "en": "Search your heart several times a day, and if you find something that is disturbing your peace, remember to take the proper steps to restore the calm. <span class=\"vocab-trigger\" data-vocab=\"Francis de Sales\">Francis de Sales<\/span>",
              "zh": "每天数次省察你的心，若发现有东西扰乱你的平安，就要记着采取适当的步骤，恢复那平静。 弗朗西斯·德·萨勒斯",
              "simpEn": "Look into your heart several times each day, and if you find something taking away your peace, remember to do what is right to bring back the calm. Francis de Sales",
              "simpZh": "每天几次察验你的心，如果发现有东西在搅扰你的平安，要记得用对的方法把平静恢复过来。弗朗西斯·德·萨勒斯"
            }

          "sectionId": 7,
          "heading": "October 14",
          "audio": "audio/Streams in the Desert - October 14.m4a",
          "paragraphs": [
            {
              "en": "Suddenly an angel of the Lord appeared and a light shone in the <span class=\"vocab-trigger\" data-vocab=\"cell\">cell<\/span>. He struck Peter on the side and woke him up. \"Quick, get up!\" he said, and the chains fell off Peter's wrists. (Acts 12:7) About midnight Paul and Silas were praying and singing hymns to God. . . . Suddenly there was such a violent earthquake that the <span class=\"vocab-trigger\" data-vocab=\"foundations\">foundations<\/span> of the prison were shaken. At once all the prison doors flew open, and everybody's chains came loose. (Acts 16:25–26)",
              "zh": "忽然有主的一位使者站在旁边，屋里有光照耀。天使拍彼得的肋旁，拍醒了他，说：“快快起来！”那铁链就从彼得的手上脱落下来。（使徒行传12:7）约在半夜，保罗和西拉祷告，唱诗赞美神……忽然地大震动，甚至监牢的地基都摇动了，监门立刻全开，众囚犯的锁链也都松开了。（使徒行传16:25–26）",
              "simpEn": "Suddenly an angel of the Lord stood there, and a light shone in the cell. He struck Peter on the side and woke him. 'Quick, get up!' he said, and the chains fell off Peter's hands. Around midnight Paul and Silas were praying and singing to God. Suddenly there was a great earthquake that shook the prison's base. At once all the doors flew open, and everyone's chains came loose.",
              "simpZh": "忽然有一位主的天使站在旁边，牢房里发出光来。天使拍了一下彼得的肋旁，叫醒他，说：“快起来！”铁链就从彼得的手上掉下来了。约在半夜，保罗和西拉正祷告唱诗歌赞美神。忽然发生了一场大地震，连监牢的地基都震动了。马上所有的牢门都开了，每一个人的锁链也都松开了。"
            },
            {
              "en": "This is the way God works. In our darkest hour, He walks to us across the waves, just as an angel came to Peter's cell when the day of Peter's <span class=\"vocab-trigger\" data-vocab=\"execution\">execution<\/span> dawned. And when the <span class=\"vocab-trigger\" data-vocab=\"scaffold\">scaffold<\/span> was completed for <span class=\"vocab-trigger\" data-vocab=\"Mordecai\">Mordecai<\/span>'s execution, the king's <span class=\"vocab-trigger\" data-vocab=\"sleeplessness\">sleeplessness<\/span> ultimately led to his action favoring God's favored race. (See Est. 6.) Dear soul, you may have to experience the very worst before you are delivered, but you will be delivered! God may keep you waiting, but He will always remember His promise and will appear in time to fulfill His <span class=\"vocab-trigger\" data-vocab=\"sacred Word\">sacred Word<\/span> that cannot be broken. <span class=\"vocab-trigger\" data-vocab=\"F. B. Meyer\">F. B. Meyer<\/span>",
              "zh": "这就是神作工的方式。在我们最黑暗的时刻，祂从波浪上走向我们，正如在彼得行刑的日子破晓时，天使进入他的牢房。当为末底改行刑的绞架准备好时，王一夜的失眠最终导致他采取了恩待神选民的行事（见以斯帖记第6章）。亲爱的灵魂，在得蒙拯救之前，你或许必须经历那最糟的，但你必蒙拯救！神或许会让你等候，但祂永远不会忘记祂的应许，并要在合宜之时显现，成全祂那不能打破的圣言。 迈尔",
              "simpEn": "This is how God works. In our darkest hour, He walks to us across the waves, just as an angel came to Peter's cell when the day of his death dawned. When the gallows was ready for Mordecai, the king's not being able to sleep at last led him to help God's chosen people. Dear soul, you may have to go through the very worst before you are saved, but you will be saved! God may make you wait, but He will always remember His promise and will come at the right time to keep His holy Word that cannot be broken. F. B. Meyer",
              "simpZh": "这就是神做事的方式。在我们最黑暗的时刻，祂从波浪上走向我们，就像彼得要被处决的那天黎明时，天使进到他的牢房一样。为末底改准备的绞刑架搭好时，王一夜睡不着觉，最后导致了帮神选民的事。亲爱的灵魂，在得救之前，你可能需要经历最坏的情况，但你一定会得救！神可能会让你等待，但祂永不会忘记祂的应许，必在合宜的时候显现，成全祂那不能打破的圣言。迈尔"
            },
            {
              "en": "God has a simplicity about Him in working out His plans, and yet He possesses a <span class=\"vocab-trigger\" data-vocab=\"resourcefulness\">resourcefulness<\/span> equal to any difficulty. His faithfulness to His trusting children is <span class=\"vocab-trigger\" data-vocab=\"unwavering\">unwavering<\/span>, and He is <span class=\"vocab-trigger\" data-vocab=\"steadfast\">steadfast<\/span> in holding to His purpose. In Joseph's life, we see God work through a fellow prisoner, later through a dream, and finally through lifting Joseph from a prison to the position of <span class=\"vocab-trigger\" data-vocab=\"governor\">governor<\/span>. And the length of Joseph's prison stay gave him the strength and steadiness he needed as governor. It is always safe to trust God's methods and to live by His clock. <span class=\"vocab-trigger\" data-vocab=\"Samuel Dickey Gordon\">Samuel Dickey Gordon<\/span>",
              "zh": "神在成就计划时，本身有着单纯，然而祂却拥有足以应付任何困难的资源。祂对信靠祂儿女的信实坚定不移，持守自己的旨意毫不动摇。在约瑟的一生中，我们看见神先借着一个同囚作工，接着借着一个梦，最后将约瑟从监牢提升到宰相的地位。约瑟长久囚禁的年日，给了他担任宰相所需的力量和稳重。信靠神的方法，按祂的时钟生活，总是稳妥的。 撒母耳·迪基·戈登",
              "simpEn": "God has a simple way of working out His plans, yet He has all the cleverness needed to meet any trouble. His faithfulness to His trusting children never wavers, and He holds firmly to His purpose. In Joseph's life, we see God work through a fellow prisoner, then through a dream, and at last by lifting Joseph from prison to be governor. The long time Joseph spent in prison gave him the strength and steadiness he needed as governor. It is always safe to trust God's ways and live by His timing. Samuel Dickey Gordon",
              "simpZh": "神成就计划时做法很简单，但祂却拥有应对任何困难的全部智谋。祂对信靠祂儿女的信实毫不动摇，而且坚定地持守祂的旨意。在约瑟的一生中，我们看见神先是借着一位同囚做工，后来借着一个梦，最后把约瑟从监狱提升到宰相的高位。约瑟坐牢的年日，给了他作宰相所需的力量和稳重。信靠神的方法、照祂的时间表生活，总是稳妥的。撒母耳·迪基·戈登"
            },
            {
              "en": "God in His <span class=\"vocab-trigger\" data-vocab=\"providence\">providence<\/span> has a thousand keys to open a thousand different doors in order to deliver His own, no matter how <span class=\"vocab-trigger\" data-vocab=\"desperate\">desperate<\/span> the situation may have become. May we be faithful to do our part, which is simply to suffer for Him, and to place Christ's part on Him and then leave it there. <span class=\"vocab-trigger\" data-vocab=\"George MacDonald\">George MacDonald<\/span>",
              "zh": "神在祂的护理中有一千把钥匙，能打开一千扇不同的门，为要拯救祂自己的人，不论情势变得何等绝望。愿我们忠心履行我们的本分，就是单单为祂受苦，而将基督的分放在祂身上，就留在那里。 乔治·麦克唐纳",
              "simpEn": "God in His caring rule has a thousand keys to open a thousand different doors to save His own, no matter how hopeless things have become. May we be faithful to do our part, which is simply to suffer for Him, and put Christ's part on Him and leave it there. George MacDonald",
              "simpZh": "神在祂的看顾中有一千把钥匙，能打开一千扇不同的门来拯救属祂的人，不管情况已经变得多么没有指望。愿我们忠心做自己该做的，就是单单为祂受苦，把基督的那部分放在祂身上，就留在那里。乔治·麦克唐纳"
            },
            {
              "en": "Difficulty is actually the <span class=\"vocab-trigger\" data-vocab=\"atmosphere\">atmosphere<\/span> surrounding a miracle, or a miracle in its <span class=\"vocab-trigger\" data-vocab=\"initial stage\">initial stage<\/span>. Yet if it is to be a great miracle, the surrounding condition will be not simply a difficulty but an <span class=\"vocab-trigger\" data-vocab=\"utter impossibility\">utter impossibility<\/span>. And it is the <span class=\"vocab-trigger\" data-vocab=\"clinging hand\">clinging hand<\/span> of His child that makes a <span class=\"vocab-trigger\" data-vocab=\"desperate situation\">desperate situation<\/span> a delight to God.",
              "zh": "困难实际上是神迹周围的气氛，或初始阶段的神迹。然而若要成为一个大神迹，周围的条件将不单是困难，而是绝对的不可能。正是祂儿女紧紧抓住的手，将一个绝望的处境变成了神所喜爱的。",
              "simpEn": "Trouble is actually the air that surrounds a miracle, or a miracle just beginning. But if it is going to be a great miracle, what surrounds it will be not just trouble but something completely impossible. And it is the holding-on hand of His child that makes a hopeless situation a joy to God.",
              "simpZh": "困难其实就是围绕着神迹的气氛，或者是刚刚开始的神迹。但如果要成为一个大神迹，那围绕着它的就不只是困难，而是完全不可能。正是祂儿女紧紧抓住的手，把一个毫无指望的处境变成了神所喜爱的。"
            }

    {

      "sections": [
        {
          "sectionId": 1,
