            {
              "en": "We always enjoy looking down a long road lined with beautiful trees. The trees are a delightful sight and seem to be forming a temple of plants, with strong wooden <span class=\"vocab-trigger\" data-vocab=\"pillars\">pillars<\/span> and <span class=\"vocab-trigger\" data-vocab=\"arches\">arches<\/span> of leaves. In the same way you look down a beautiful road like this, why not look back on the road of the years of your life? Look at the large green limbs of God’s mercy overhead and the strong pillars of His loving-kindness and faithfulness that have brought you much joy. Do you see any birds singing in the branches? If you look closely, surely you will see many, for they are singing of God’s mercy received “thus far.”",
              "zh": "我们总是喜欢沿着一条两旁长满美丽树木的长路望去。那些树木是悦目的景象，似乎形成了一座由植物构成的殿宇，有着坚实的木柱和绿叶的拱门。照样，当你这样望着一条美丽的长路时，何不也回望你生命中走过的岁月之路呢？仰望头顶上神怜悯那青葱的大枝，和祂那曾带给你许多喜乐的慈爱与信实的坚固柱子。你看见枝头有雀鸟歌唱吗？若你仔细看，必定看见许多，因为它们正歌唱着“到如今”所蒙的神怜悯。",
              "simpEn": "We always enjoy looking down a long road lined with beautiful trees. The trees are a lovely sight, seeming to form a temple of plants with strong wooden pillars and leafy arches. Just as you look down a lovely road like this, why not look back on the road of your life? Look at the big green branches of God's mercy overhead and the strong pillars of His loving-kindness and faithfulness that have brought you so much joy. Do you see birds singing in the branches? If you look closely, you will surely see many, for they are singing of God's mercy received 'thus far.'",
              "simpZh": "我们总喜欢看一条长长的、两边长满美丽树木的路。那些树真好看，好像形成了一座植物的殿，有坚固的木柱和绿叶的拱门。就像你看这样一条美丽的路一样，为什么不回头看你一生走过的路呢？看看头顶上神怜悯的大绿枝，还有祂慈爱和信实的坚固柱子，这些曾带给你许多快乐。你看见枝头有小鸟在唱歌吗？如果你仔细看，一定会看到很多，因为它们正在歌唱“到如今”所蒙的神怜悯。"
            },
            {
              "en": "These words also point forward. Someone who comes to a certain point and writes the words “thus far” realizes he has not yet come to the end of the road and that he still has some distance to travel. There are still more trials, joys, <span class=\"vocab-trigger\" data-vocab=\"temptations\">temptations<\/span>, battles, defeats, victories, prayers, answers, <span class=\"vocab-trigger\" data-vocab=\"toils\">toils<\/span>, and strength yet to come. These are then followed by sickness, old age, disease, and death.",
              "zh": "这几个字也指向前面。一个人来到某一点，写下“到如今”这几个字时，就知道自己尚未到达路的尽头，前面还有一段距离要走。仍有更多的试炼、喜乐、试探、争战、失败、得胜、祷告、应允、劳苦和力量在前面。随后还有疾病、衰老、病痛和死亡。",
              "simpEn": "These words also point forward. Someone who comes to a certain point and writes 'thus far' knows he has not yet reached the end of the road and still has some distance to go. There are still more trials, joys, temptations, battles, defeats, victories, prayers, answers, hard work, and strength yet to come. These are then followed by sickness, old age, disease, and death.",
              "simpZh": "这几个字也指向前面。一个人走到某个点，写下“到如今”这几个字，就知道自己还没有到路的尽头，还有一段路要走。前面还有更多的试炼、喜乐、试探、争战、失败、得胜、祷告、应允、劳苦和力量。接着还有疾病、衰老、病痛和死亡。"
            },
            {
              "en": "Then is life over after death? No! These are still yet to come: arising in the likeness of Jesus; <span class=\"vocab-trigger\" data-vocab=\"thrones\">thrones<\/span>, harps, and the singing of psalms; being “clothed in white <span class=\"vocab-trigger\" data-vocab=\"garments\">garments<\/span>” (Rev. 3:5 NASB), seeing the face of Jesus, and sharing fellowship with the saints; and experiencing the glory of God, the fullness of <span class=\"vocab-trigger\" data-vocab=\"eternity\">eternity<\/span>, and infinite joy. So dear believer, “be strong and take heart” (Ps. 27:14), and with thanksgiving and confidence lift your voice in praise, for: The Lord who “thus far” has helped you Will help you all your journey through.",
              "zh": "那么死之后生命就结束了吗？不！仍有这些在前面：在耶稣的样式中复活；宝座、琴瑟和诗篇的歌唱；得“穿白衣”（启示录3:5），得见耶稣的面，与圣徒相交；并经历神的荣耀，永恒的丰满，和无限的喜乐。所以亲爱的信徒，要“坚固等候耶和华”（诗篇27:14），存感恩和信心，扬声赞美，因为：“到如今”帮助你的主，必帮助你走完整个旅途。",
              "simpEn": "Then is life over after death? No! Still to come are: rising in the likeness of Jesus; thrones, harps, and the singing of psalms; being dressed in white clothes, seeing the face of Jesus, and sharing friendship with the saints; and knowing the glory of God, the fullness of forever, and endless joy. So dear believer, be strong and take courage, and with thanks and trust lift your voice in praise, for: The Lord who has helped you 'thus far' will help you all through your journey.",
              "simpZh": "那么死了以后就完了吗？不！还有这些要来到：在耶稣的形象里复活；宝座、竖琴和唱诗篇；穿上白衣，看见耶稣的面，与圣徒一同相交；经历神的荣耀，永恒的丰盛，和无限的喜乐。所以亲爱的信徒，要刚强壮胆，带着感恩和信心扬声赞美，因为：“到如今”帮助你的主，必帮助你走完整段路程。"
            },
            {
              "en": "When the words “thus far” are read in heaven’s light, what glorious and <span class=\"vocab-trigger\" data-vocab=\"miraculous\">miraculous<\/span> <span class=\"vocab-trigger\" data-vocab=\"prospects\">prospects<\/span> they reveal to our grateful eyes! <span class=\"vocab-trigger\" data-vocab=\"Charles H. Spurgeon\">Charles H. Spurgeon<\/span>",
              "zh": "当“到如今”这几个字在天上的光中读出时，它们向我们感恩的眼睛显明何等荣耀而奇妙的前景！ 司布真",
              "simpEn": "When the words 'thus far' are read in heaven's light, what glorious and wonderful hopes they reveal to our thankful eyes! Charles H. Spurgeon",
              "simpZh": "当“到如今”这几个字在天上的光中读出来的时候，它们向我们感激的眼睛显明了多么荣耀奇妙的前景！司布真"
            },
            {
              "en": "The shepherds of the <span class=\"vocab-trigger\" data-vocab=\"Alps\">Alps<\/span> have a beautiful custom of ending the day by singing an evening farewell to one another. The air is so pure that the songs can be heard for very long distances. As the sun begins to set, they gather their <span class=\"vocab-trigger\" data-vocab=\"flocks\">flocks<\/span> and begin to lead them down the mountain paths while they sing, “Thus far has the Lord helped us. Let us praise His name!”",
              "zh": "阿尔卑斯山的牧人有一个美好的习俗，在一天结束时彼此唱晚歌道别。空气如此纯净，歌声可传到极远之处。当太阳开始西沉，他们聚集羊群，开始沿着山路往下领，一面唱：“到如今耶和华都帮助我们。让我们赞美祂的名！”",
              "simpEn": "The shepherds of the Alps have a lovely custom of ending the day by singing an evening goodbye to one another. The air is so clean that the songs can be heard from very far away. As the sun begins to set, they gather their sheep and lead them down the mountain paths while they sing, 'Thus far has the Lord helped us. Let us praise His name!'",
              "simpZh": "阿尔卑斯山的牧羊人有一个美好的习俗，一天结束时互相唱晚间告别歌。空气非常纯净，歌声能传到很远很远。太阳开始下山时，他们聚拢羊群，领着它们沿山路往下走，一边唱：“到如今耶和华都帮助我们。让我们赞美祂的名！”"
            },
            {
              "en": "Finally, as is their beautiful custom, they sing to one another the <span class=\"vocab-trigger\" data-vocab=\"courteous\">courteous<\/span> and friendly farewell “Goodnight! Goodnight!” The words then begin to echo from mountainside to mountainside, <span class=\"vocab-trigger\" data-vocab=\"reverberating\">reverberating<\/span> sweetly and softly until the music fades into the distance.",
              "zh": "最后，照他们美好的习俗，他们彼此唱着礼貌而友善的告别：“晚安！晚安！”然后话语开始在山坡间回荡，甜美而轻柔地回响着，直到音乐消失在远方。",
              "simpEn": "Finally, as is their beautiful custom, they sing to each other the polite and friendly goodbye, 'Goodnight! Goodnight!' The words then begin to echo from hillside to hillside, sounding back sweetly and softly until the music fades into the distance.",
              "simpZh": "最后，按他们美好的习俗，他们彼此唱出礼貌又友善的告别：“晚安！晚安！”然后这些话就在山坡之间回响，甜美又轻柔地回荡，直到音乐消失在远处。"
            },
            {
              "en": "Let us also call out to one another through the darkness until the night becomes alive with the sound of many voices, encouraging God’s weary travelers. And may the echoes grow into a storm of <span class=\"vocab-trigger\" data-vocab=\"hallelujahs\">hallelujahs<\/span> that will break in thundering waves around His <span class=\"vocab-trigger\" data-vocab=\"sapphire throne\">sapphire throne<\/span>. Then as the morning dawns, we will find ourselves on the shore of the “<span class=\"vocab-trigger\" data-vocab=\"sea of glass\">sea of glass<\/span>” (Rev. 4:6), crying out with the <span class=\"vocab-trigger\" data-vocab=\"redeemed hosts\">redeemed hosts<\/span> of heaven, “To him who sits on the throne and to the Lamb be praise and honor and glory and power, for ever and ever!” (Rev. 5:13).",
              "zh": "让我们也在黑暗中彼此呼唤，直到黑夜因众多声音而活跃起来，鼓励神疲惫的行路者。愿这些回声汇成一阵哈利路亚的风暴，以轰然的波浪在祂蓝宝石宝座周围炸响。当早晨破晓时，我们必发现自己站在“玻璃海”（启示录4:6）的岸边，与天上被赎的众军一同呼喊：“愿颂赞、尊贵、荣耀、权势，都归给坐宝座的和羔羊，直到永永远远！”（启示录5:13）。",
              "simpEn": "Let us also call out to one another through the darkness until the night becomes alive with the sound of many voices, lifting up God's tired travelers. And may the echoes grow into a storm of 'hallelujahs' that will break like thundering waves around His sapphire throne. Then as morning dawns, we will find ourselves on the shore of the 'sea of glass,' crying out with the saved crowds of heaven, 'To Him who sits on the throne and to the Lamb be praise and honor and glory and power, forever and ever!'",
              "simpZh": "让我们也在黑暗中彼此呼喊，直到黑夜因许多声音变得活跃，鼓励神那些疲乏的旅人。愿这些回声汇成一阵哈利路亚的风暴，像雷轰的波浪在祂蓝宝石宝座四周炸开。天亮时，我们必发现自己站在“玻璃海”的岸边，和天上被赎的群众一同呼喊：“愿颂赞、尊贵、荣耀、权能都归给坐宝座的和羔羊，直到永永远远！”"
            },
            {
              "en": "This my song through endless ages, Jesus led me all the way. AND AGAIN THEY SHOUTED: “<span class=\"vocab-trigger\" data-vocab=\"HALLELUJAH\">HALLELUJAH<\/span>!” (Revelation 19:3)",
              "zh": "这是我无尽世代的诗歌：耶稣一路引领我。他们又说：“哈利路亚！”（启示录19:3）",
              "simpEn": "This will be my song through endless ages: Jesus led me all the way. And again they shouted: 'Hallelujah!' (Revelation 19:3)",
              "simpZh": "这就是我在永世里要唱的诗歌：耶稣一路引领我。他们又喊着说：“哈利路亚！”（启示录19:3）"
            }
          ],
          "quiz": [
            {
              "text": "1 Samuel 7:12 records Samuel setting up a stone and saying 'Thus far has the Lord helped us.'",
              "answer": true
            },
            {
              "text": "Charles Spurgeon said that 'thus far' only points to the past, with no hope for the future.",
              "answer": false
            },
            {
              "text": "The shepherds of the Alps sing 'Thus far has the Lord helped us' as they lead their flocks down the mountain.",
              "answer": true
            },
            {
              "text": "The reading concludes with the redeemed hosts shouting 'Hallelujah' around the throne.",
              "answer": true
            }
          ]
        }
      ]
    }
  ]
}</script>
<script>
  const vocabDefinitions = {};
  (function() {
    const errorBox = document.getElementById("error-message");
    function showError(msg) {
      errorBox.textContent = "❌ " + msg;
      errorBox.style.display = "block";
    }
    const dataEl = document.getElementById("bookDataScript");
    if (!dataEl) { showError("bookDataScript element not found"); return; }
    let bookData;
    try {
      bookData = JSON.parse(dataEl.textContent);
    } catch (e) {
      showError("JSON parse error: " + e.message);
      return;
    }
    if (!bookData.chapters || !Array.isArray(bookData.chapters)) {
      showError("Chapters data missing.");
      return;
    }

    let currentChapterIndex = null;
    let currentChapter = null;
    let currentSection = 0;
    let currentPage = 0;
    let isSimplified = false;
    let readingMode = 'sections';
    let currentVocabTrigger = null;
    let mobileLang = 'en';
    const LABEL = bookData.chapterLabel || 'Ch.';
    const READING_MODE_KEY = bookData.title + "_readingMode";
    const PROGRESS_KEY = bookData.title + "_progress";
    const READ_KEY = bookData.title + "_read";
    const NIGHT_KEY = bookData.title + "_night";
    const FONT_KEY = bookData.title + "_font";
    const BOOKMARK_KEY = bookData.title + "_bookmark";
    const PAGE_SIZE = 6;
    const placeholderQuiz = [{ text: "This section has no quiz yet.", answer: true, rationale: "" }];
    let readSections = JSON.parse(localStorage.getItem(READ_KEY) || '{}');
    let fontSizes = [0.85, 0.95, 1.05, 1.18, 1.32, 1.5];
    let fontIdx = parseInt(localStorage.getItem(FONT_KEY) || '2');
    function applyFontSize() { document.documentElement.style.setProperty('--font-size', fontSizes[fontIdx] + 'rem'); }
    applyFontSize();

    // Night mode
    let nightMode = localStorage.getItem(NIGHT_KEY) === '1';
    function applyNight() { document.body.classList.toggle('night', nightMode); document.getElementById('nightToggle').textContent = nightMode ? '☀️' : '🌙'; }
    applyNight();
    document.getElementById('nightToggle').addEventListener('click', () => { nightMode = !nightMode; localStorage.setItem(NIGHT_KEY, nightMode ? '1' : '0'); applyNight(); });

    // Font size
    document.getElementById('fontIncBtn').addEventListener('click', () => { if (fontIdx < fontSizes.length-1) { fontIdx++; localStorage.setItem(FONT_KEY, fontIdx); applyFontSize(); } });
    document.getElementById('fontDecBtn').addEventListener('click', () => { if (fontIdx > 0) { fontIdx--; localStorage.setItem(FONT_KEY, fontIdx); applyFontSize(); } });

    // Book description
    if (bookData.description) {
      const descEl = document.getElementById('bookDescription');
      descEl.textContent = bookData.description;
      descEl.style.display = 'block';
    }

    // Progress bar
    function updateProgressBar() {
      const total = bookData.chapters.length;
      const pct = total > 1 ? Math.round((currentChapterIndex / (total - 1)) * 100) : 100;
      document.getElementById('bookProgressFill').style.width = pct + '%';
      document.getElementById('bookProgressLabel').textContent = LABEL + ' ' + (currentChapterIndex + 1) + ' of ' + total;
    }

    // Mark as read
    function sectionReadKey(chIdx, secIdx) { return chIdx + '_' + secIdx; }
    function updateMarkReadUI() {
      const bar = document.getElementById('markReadBar');
      const btn = document.getElementById('markReadBtn');
      const lbl = document.getElementById('markReadLabel');
      if (readingMode !== 'sections' || !currentChapter || !currentChapter.sections) { bar.style.display = 'none'; return; }
      bar.style.display = 'flex';
      const key = sectionReadKey(currentChapterIndex, currentSection);
      const isRead = !!readSections[key];
      btn.textContent = isRead ? '✓ Read' : '✓ Mark as Read';
      btn.className = isRead ? 'unmark' : '';
      lbl.textContent = isRead ? 'This section is marked as read.' : '';
      refreshTabReadState();
    }
    function refreshTabReadState() {
      document.querySelectorAll('.section-tab').forEach((tab, idx) => {
        const key = sectionReadKey(currentChapterIndex, idx);
        tab.classList.toggle('read', !!readSections[key]);
      });
    }
    document.getElementById('markReadBtn').addEventListener('click', () => {
      const key = sectionReadKey(currentChapterIndex, currentSection);
      if (readSections[key]) delete readSections[key];
      else readSections[key] = 1;
      localStorage.setItem(READ_KEY, JSON.stringify(readSections));
      updateMarkReadUI();
    });

    // Bookmark
    let bookmark = JSON.parse(localStorage.getItem(BOOKMARK_KEY) || 'null');
    function updateBookmarkUI() {
      const bar = document.getElementById('bookmarkBar');
      const lbl = document.getElementById('bookmarkLabel');
      if (!bookmark) { bar.style.display = 'none'; return; }
      bar.style.display = 'flex';
      const ch = bookData.chapters[bookmark.chapterIndex];
      let label = LABEL + ' ' + (bookmark.chapterIndex + 1);
      if (ch && ch.sections && bookmark.sectionIndex != null) label += ' · ' + (ch.sections[bookmark.sectionIndex] ? ch.sections[bookmark.sectionIndex].heading : '');
      lbl.textContent = label;
    }
    document.getElementById('bookmarkBtn').addEventListener('click', () => {
      bookmark = { chapterIndex: currentChapterIndex, sectionIndex: currentSection };
      localStorage.setItem(BOOKMARK_KEY, JSON.stringify(bookmark));
      updateBookmarkUI();
    });
    document.getElementById('goBookmarkBtn').addEventListener('click', () => {
      if (!bookmark) return;
      loadChapter(bookmark.chapterIndex);
      document.getElementById('chapterSelect').value = bookmark.chapterIndex;
      if (readingMode === 'sections' && bookmark.sectionIndex != null) { currentSection = bookmark.sectionIndex; renderSectionsMode(); }
    });
    document.getElementById('clearBookmarkBtn').addEventListener('click', () => { bookmark = null; localStorage.removeItem(BOOKMARK_KEY); updateBookmarkUI(); });
    updateBookmarkUI();

    function detectReadingMode(ch) {
      const stored = localStorage.getItem(READING_MODE_KEY);
      if (stored && ['sections','full','pages'].includes(stored)) readingMode = stored;
      else if (ch.sections && ch.sections.length > 0) readingMode = 'sections';
      else readingMode = 'full';
    }

    const readingModeSelect = document.getElementById('readingModeSelect');
    readingModeSelect.addEventListener('change', () => {
      stopSpeaking();
      readingMode = readingModeSelect.value;
      currentPage = 0;
      localStorage.setItem(READING_MODE_KEY, readingMode);
      if (currentChapter) renderWithMode();
    });

    function populateChapterSelector() {
      const select = document.getElementById("chapterSelect");
      select.innerHTML = "";
      bookData.chapters.forEach((ch, idx) => {
        const opt = document.createElement("option");
        opt.value = idx;
        opt.textContent = LABEL + " " + ch.id + ": " + ch.title;
        select.appendChild(opt);
      });
      select.addEventListener("change", (e) => loadChapter(parseInt(e.target.value)));
    }

    function loadChapter(index) {
      stopSpeaking();
      currentChapterIndex = index;
      currentChapter = bookData.chapters[index];
      currentSection = 0;
      currentPage = 0;
      document.querySelector(".title").textContent = "📖 " + bookData.title + " – " + LABEL + " " + currentChapter.id;
      detectReadingMode(currentChapter);
      readingModeSelect.value = readingMode;
      setupAudioForChapter(currentChapter);
      renderWithMode();
      saveFullProgress();
      updateProgressBar();
      updateMarkReadUI();
    }

    function renderWithMode() {
      const ch = currentChapter;
      if (!ch) return;
      if (readingMode === 'sections' && ch.sections && ch.sections.length > 0) {
        renderSectionsMode();
      } else if (readingMode === 'pages') {
        renderPagesMode();
      } else {
        renderFullMode();
      }
    }

    function renderFullMode() {
      document.getElementById('sectionTabs').innerHTML = '';
      document.getElementById('sectionProgress').textContent = '';
      const paragraphs = currentChapter.paragraphs || (currentChapter.sections ? currentChapter.sections.flatMap(s => s.paragraphs) : []);
      renderParagraphs(paragraphs);
      renderQuiz(currentChapter.quiz || []);
      applyMobileLang(mobileLang);
    }

    function renderPagesMode() {
      document.getElementById('sectionTabs').innerHTML = '';
      const allParagraphs = currentChapter.paragraphs || (currentChapter.sections ? currentChapter.sections.flatMap(s => s.paragraphs) : []);
      const totalPages = Math.max(1, Math.ceil(allParagraphs.length / PAGE_SIZE));
      if (currentPage >= totalPages) currentPage = totalPages - 1;
      if (currentPage < 0) currentPage = 0;
      const pageParagraphs = allParagraphs.slice(currentPage * PAGE_SIZE, (currentPage + 1) * PAGE_SIZE);
      renderParagraphs(pageParagraphs);

      const progress = document.getElementById('sectionProgress');
      progress.innerHTML = '';
      const prevBtn = document.createElement('button');
      prevBtn.className = 'page-nav-btn'; prevBtn.textContent = '⬅ 上一页';
      prevBtn.disabled = currentPage === 0;
      prevBtn.addEventListener('click', () => { stopSpeaking(); currentPage--; renderPagesMode(); saveFullProgress(); });
      const label = document.createElement('span');
      label.className = 'page-nav-label';
      label.textContent = '📄 Page ' + (currentPage + 1) + ' of ' + totalPages;
      const nextBtn = document.createElement('button');
      nextBtn.className = 'page-nav-btn'; nextBtn.textContent = '下一页 ➡';
      nextBtn.disabled = currentPage >= totalPages - 1;
      nextBtn.addEventListener('click', () => { stopSpeaking(); currentPage++; renderPagesMode(); saveFullProgress(); });
      progress.appendChild(prevBtn);
      progress.appendChild(label);
      progress.appendChild(nextBtn);

      renderQuiz(currentChapter.quiz || []);
      applyMobileLang(mobileLang);
    }

    function renderSectionsMode() {
      const sections = currentChapter.sections;
      if (!sections || sections.length === 0) { renderFullMode(); return; }
      const tabContainer = document.getElementById('sectionTabs');
      tabContainer.innerHTML = '';
      sections.forEach((sec, idx) => {
        const tab = document.createElement('button');
        tab.className = 'section-tab'; if (idx === currentSection) tab.classList.add('active');
        tab.textContent = (idx+1) + '. ' + sec.heading;
        tab.addEventListener('click', () => {
          stopSpeaking();
          currentSection = idx;
          renderSectionsMode();
          saveFullProgress();
        });
        tabContainer.appendChild(tab);
      });
      document.getElementById('sectionProgress').textContent = 'Section ' + (currentSection+1) + ' of ' + sections.length;
      renderParagraphs(sections[currentSection].paragraphs);
      renderQuiz(sections[currentSection].quiz || []);
      loadSectionAudio(sections[currentSection]);
      applyMobileLang(mobileLang);
      updateMarkReadUI();
    }

    // ----- KEY FIX: renderParagraphs now handles "image" field -----
    function renderParagraphs(paragraphs) {
      const enDiv = document.getElementById('enContent');
      const zhDiv = document.getElementById('zhContent');
      enDiv.innerHTML = ''; zhDiv.innerHTML = '';
      paragraphs.forEach(p => {
        // If there is an image property, show it before the English text
        if (p.image) {
          const imgDiv = document.createElement('div');
          imgDiv.className = 'paragraph-image';
          imgDiv.innerHTML = '<img src="' + p.image + '" alt="illustration">';
          enDiv.appendChild(imgDiv);
        }
        const enContent = isSimplified ? ((() => { const d = document.createElement('div'); d.innerHTML = p.simpEn || ''; return d.textContent; })()) : p.en;
        const enP = document.createElement('p'); enP.innerHTML = enContent;
        enDiv.appendChild(enP);
        const zhP = document.createElement('p'); zhP.textContent = isSimplified ? p.simpZh : p.zh;
        zhDiv.appendChild(zhP);
      });
    }

    // ----- Quiz rendering (unchanged, includes rationale) -----
    function renderQuiz(quizArr) {
      const tfContainer = document.getElementById('tfQuestions');
      tfContainer.innerHTML = '';
      const quizToUse = (quizArr && quizArr.length) ? quizArr : placeholderQuiz;
      quizToUse.forEach((q, i) => {
        const div = document.createElement('div'); div.className = 'quiz-item-wrapper';
        div.innerHTML = `
          <div><strong>${i+1}.</strong> ${q.text}
            <select class='tf-sel' style='width:auto; display:inline-block; margin-left:0.5rem; padding:0.2rem 0.5rem;'>
              <option value=''>--</option><option value='true'>True</option><option value='false'>False</option>
            </select>
          </div>
          <div class='rationale-container'></div>
        `;
        tfContainer.appendChild(div);
      });
      document.getElementById('tfFeedback').textContent = '';
    }

    // ... rest of reader JS unchanged (simplify, speak, check quiz, progress) ...
    document.getElementById('simplifyToggle').addEventListener('click', () => {
      stopSpeaking();
      isSimplified = !isSimplified;
      document.getElementById('simpActiveLabel').classList.toggle('active', isSimplified);
      if (currentChapter) renderWithMode();
      document.getElementById('simplifyToggle').textContent = isSimplified ? '📖 Switch back to Original' : '📖 Switch to Simplified';
      hidePopup();
    });

    const popup = document.getElementById('vocabPopup');
    function showPopup(trigger, vocabKey) {
      const def = vocabDefinitions[vocabKey];
      if (!def) return;
      document.getElementById('popupZh').textContent = def.zh;
      document.getElementById('popupExplain').textContent = '📘 ' + def.explain;
      document.getElementById('popupSimple').textContent = '💬 Simple: ' + def.simple;
      if (window.innerWidth <= 640) {
        // Mobile: pin to bottom of viewport via CSS class (CSS handles position)
        popup.style.top = ''; popup.style.left = '';
        popup.style.bottom = '1rem'; popup.style.left = '1rem'; popup.style.right = '1rem'; popup.style.width = 'auto'; popup.style.maxWidth = 'none';
      } else {
        popup.style.bottom = ''; popup.style.right = ''; popup.style.width = ''; popup.style.maxWidth = '';
        const rect = trigger.getBoundingClientRect();
        let top = rect.bottom + 8, left = rect.left;
        if (left + 320 > window.innerWidth) left = window.innerWidth - 330;
        if (top + 180 > window.innerHeight) top = rect.top - 180;
        popup.style.top = top + 'px'; popup.style.left = left + 'px';
      }
      popup.classList.add('show'); currentVocabTrigger = trigger;
    }
    function hidePopup() { popup.classList.remove('show'); currentVocabTrigger = null; }
    document.addEventListener('click', function(e) {
      const trig = e.target.closest('.vocab-trigger');
      if (trig && trig !== currentVocabTrigger) { e.stopPropagation(); showPopup(trig, trig.getAttribute('data-vocab')); }
      else if (trig === currentVocabTrigger) hidePopup();
      else if (!e.target.closest('#vocabPopup')) hidePopup();
    });
    document.getElementById('closePopup').addEventListener('click', (e) => { e.stopPropagation(); hidePopup(); });
    window.addEventListener('scroll', () => { if (currentVocabTrigger) hidePopup(); });

    // ----- Per-Section Audio Player -----
    const sectionAudio = document.getElementById('sectionAudio');
    const sectionAudioBar = document.getElementById('sectionAudioBar');
    const audioSectionLabel = document.getElementById('audioSectionLabel');

    function loadSectionAudio(sec) {
      if (sec && sec.audio) {
        const src = sec.audio;
        if (sectionAudio.getAttribute('src') !== src) {
          sectionAudio.pause();
          sectionAudio.src = src;
          sectionAudio.load();
        }
        audioSectionLabel.textContent = sec.heading || '';
        sectionAudioBar.style.display = 'flex';
      } else {
        sectionAudio.pause();
        sectionAudio.removeAttribute('src');
        sectionAudioBar.style.display = 'none';
        audioSectionLabel.textContent = '';
      }
    }

    function setupAudioForChapter(ch) {
      // Called on chapter load — clear player; section audio loaded when section is rendered
      sectionAudio.pause();
      sectionAudio.removeAttribute('src');
      sectionAudioBar.style.display = 'none';
      audioSectionLabel.textContent = '';
    }

    document.addEventListener('visibilitychange', () => {
      if (document.hidden) sectionAudio.pause();
    });

    // ----- EN/ZH Mobile Toggle & Swipe -----
    function applyMobileLang(lang) {
      mobileLang = lang;
      const enCol = document.getElementById('enCol');
      const zhCol = document.getElementById('zhCol');
      const btnEn = document.getElementById('toggleEnBtn');
      const btnZh = document.getElementById('toggleZhBtn');
      if (window.innerWidth <= 640) {
        enCol.classList.toggle('mobile-visible', lang === 'en');
        zhCol.classList.toggle('mobile-visible', lang === 'zh');
      } else {
        enCol.classList.add('mobile-visible');
        zhCol.classList.add('mobile-visible');
      }
      if (btnEn) btnEn.classList.toggle('active', lang === 'en');
      if (btnZh) btnZh.classList.toggle('active', lang === 'zh');
    }

    document.getElementById('toggleEnBtn').addEventListener('click', () => applyMobileLang('en'));
    document.getElementById('toggleZhBtn').addEventListener('click', () => applyMobileLang('zh'));
    window.addEventListener('resize', () => applyMobileLang(mobileLang));

    // Swipe left = show Chinese, swipe right = show English
    // Only triggers if horizontal movement clearly dominates vertical (not a scroll)
    let swipeStartX = 0;
    let swipeStartY = 0;
    const colsContainer = document.getElementById('colsContainer');
    colsContainer.addEventListener('touchstart', e => {
      swipeStartX = e.touches[0].clientX;
      swipeStartY = e.touches[0].clientY;
    }, { passive: true });
    colsContainer.addEventListener('touchend', e => {
      const dx = e.changedTouches[0].clientX - swipeStartX;
      const dy = e.changedTouches[0].clientY - swipeStartY;
      const isHorizontalSwipe = Math.abs(dx) > 60 && Math.abs(dx) > Math.abs(dy) * 2;
      if (isHorizontalSwipe && window.innerWidth <= 640) {
        applyMobileLang(dx < 0 ? 'zh' : 'en');
      }
    }, { passive: true });

    // stub — called in simplify toggle and chapter load
    function stopSpeaking() {}

    document.getElementById('checkTfBtn').addEventListener('click', () => {
      const quizArr = currentChapter.sections && readingMode==='sections' ? (currentChapter.sections[currentSection]?.quiz || []) : (currentChapter.quiz || []);
      const quizToUse = quizArr.length ? quizArr : placeholderQuiz;
      let correct = 0;
      document.querySelectorAll('.tf-sel').forEach((sel, i) => {
        const val = sel.value;
        const currentItem = quizToUse[i];
        const wrapper = sel.closest('.quiz-item-wrapper');
        const ratBox = wrapper.querySelector('.rationale-container');
        if (val === '') { sel.style.border = '1px solid #ccc'; ratBox.style.display = 'none'; return; }
        const userTrue = (val === 'true');
        const correctChoice = (userTrue === currentItem.answer);
        ratBox.style.display = 'block';
        if (correctChoice) {
          sel.style.border = '2px solid green';
          correct++;
          ratBox.style.borderLeft = '4px solid green';
          ratBox.innerHTML = '<span style="color:green; font-weight:bold;">✓ Correct.</span> ' + (currentItem.rationale || '');
        } else {
          sel.style.border = '2px solid red';
          ratBox.style.borderLeft = '4px solid red';
          ratBox.innerHTML = '<span style="color:red; font-weight:bold;">✗ Incorrect.</span> ' + (currentItem.rationale || '');
        }
      });
      document.getElementById('tfFeedback').textContent = 'Score: ' + correct + ' / ' + quizToUse.length;
    });

    function saveFullProgress() {
      const state = { chapterIndex: currentChapterIndex, sectionIndex: (readingMode==='sections' && currentChapter.sections) ? currentSection : 0, pageIndex: (readingMode==='pages') ? currentPage : 0, readingMode };
      localStorage.setItem(PROGRESS_KEY, JSON.stringify(state));
      updateProgressIndicator();
    }

    function updateProgressIndicator() {
      const saved = localStorage.getItem(PROGRESS_KEY);
      if (saved) {
        try {
          const state = JSON.parse(saved);
          const ch = bookData.chapters[state.chapterIndex];
          if (ch) {
            let info = '📌 Last read: ' + LABEL + ' ' + ch.id;
            if (ch.sections && state.sectionIndex) info += ' · ' + ch.sections[state.sectionIndex].heading;
            info += ' | ' + (state.chapterIndex+1) + '/' + bookData.chapters.length + ' chapters';
            document.getElementById('progressBox').textContent = info;
          }
        } catch(e) {}
      }
    }

    function restoreProgress() {
      const saved = localStorage.getItem(PROGRESS_KEY);
      if (saved) {
        try {
          const state = JSON.parse(saved);
          if (state.chapterIndex >= 0 && state.chapterIndex < bookData.chapters.length) {
            document.getElementById('chapterSelect').value = state.chapterIndex;
            readingMode = state.readingMode || 'sections';
            readingModeSelect.value = readingMode;
            loadChapter(state.chapterIndex);
            if (readingMode === 'sections' && bookData.chapters[state.chapterIndex].sections) {
              currentSection = state.sectionIndex || 0;
              renderSectionsMode();
            } else if (readingMode === 'pages') {
              currentPage = state.pageIndex || 0;
              renderPagesMode();
            }
            return;
          }
        } catch(e) {}
      }
      loadChapter(0);
    }

    populateChapterSelector();
    restoreProgress();
    updateProgressIndicator();
  })();
</script>
</body>
</html>
