    {
      "id": 51,
      "title": "December 17–23",
      "sections": [
        {
          "sectionId": 1,
          "heading": "December 17",
          "audio": "audio/Streams in the Desert - December 17.m4a",
          "paragraphs": [
            {
              "en": "May God himself, the God of peace, <span class=\"vocab-trigger\" data-vocab=\"sanctify\">sanctify<\/span> you through and through. May your whole spirit, soul and body be kept <span class=\"vocab-trigger\" data-vocab=\"blameless\">blameless<\/span> at the coming of our Lord Jesus Christ. The one who calls you is <span class=\"vocab-trigger\" data-vocab=\"faithful\">faithful<\/span> and he will do it. (1 Thessalonians 5:23–24)",
              "zh": "愿赐平安的神亲自使你们全然成圣。又愿你们的灵与魂与身子得蒙保守，在我主耶稣基督降临的时候，完全无可指摘。那召你们的本是信实的，祂必成就这事。（帖撒罗尼迦前书5:23–24）",
              "simpEn": "May God Himself, the God of peace, make you completely holy. May your whole spirit, soul, and body be kept without fault when our Lord Jesus comes. The One who calls you is trustworthy, and He will do it.",
              "simpZh": "愿那位赐平安的神亲自使你们完全圣洁，让你们整个人——灵、魂、身体——在主耶稣来的时候都没有可指责的地方。那位呼召你们的神是信实的，祂一定会做成这件事。"
            },
            {
              "en": "Many years after I first read that “without <span class=\"vocab-trigger\" data-vocab=\"holiness\">holiness<\/span> no one will see the Lord” (Heb. 12:14), I began following this truth and encouraging everyone with whom I spoke to do the same. Ten years later God gave me a clearer view than I had ever seen before of the way to obtain holiness—namely, by faith in the Son of God. Immediately I began sharing with everyone, “We are saved from sin and made holy by faith.” I <span class=\"vocab-trigger\" data-vocab=\"testified\">testified<\/span> to this in private, in public, and in print, and God confirmed it through a thousand other witnesses. I have now declared this truth continuously for more than thirty years, and God has continued to confirm my work. <span class=\"vocab-trigger\" data-vocab=\"John Wesley\">John Wesley<\/span> in 1771",
              "zh": "在我初次读到“非圣洁没有人能见主”（希伯来书12:14）多年之后，我开始跟从这真理，并鼓励我交谈的每一个人也如此行。十年以后，神赐给我一个比从前更清楚的看见，认识得着圣洁的道路——就是借着相信神的儿子。我立刻开始向每一个人分享：“我们因信得救脱离罪恶，也成为圣洁。”我在私下、公开场合和文字中都为此作见证，神也借着成千的其他见证人证实了这事。如今我持续宣告这真理已经三十多年，神仍继续印证我的工作。 约翰·卫斯理，1771年",
              "simpEn": "Years after I first read that 'without holiness no one will see the Lord,' I began to follow this truth and encouraged others to do so. Ten years later, God gave me a clearer understanding of how to become holy—by faith in the Son of God. I immediately began telling everyone, 'We are saved from sin and made holy by faith.' I shared this privately, publicly, and in writing, and God confirmed it through many other witnesses. I have now proclaimed this truth for over thirty years, and God has continued to back my work. John Wesley in 1771",
              "simpZh": "在我最初读到“非圣洁没有人能见主”多年后，我开始照着这个真理行，并鼓励别人也这样做。十年后，神让我比以前更清楚地看见怎样得到圣洁——就是借着信靠神的儿子。我马上开始告诉所有人：“我们因信得救脱离罪，也因信成为圣洁。”我在私下、公开和文字里都见证这件事，神也借着许许多多别的见证人证实了。如今我持续宣讲这真理已超过三十年，神仍然印证我的工作。约翰·卫斯理，1771年"
            },
            {
              "en": "I knew Jesus, and He was very <span class=\"vocab-trigger\" data-vocab=\"precious\">precious<\/span> to me, but I found something deep within me that would not stay pleasant, patient, and kind. I did what I could to keep those traits <span class=\"vocab-trigger\" data-vocab=\"suppressed\">suppressed<\/span>, but they were still there. Finally I sought Jesus for help, and when I gave Him my will, He came to my heart and removed everything that would not stay pleasant, patient, and kind. And then He shut the door. <span class=\"vocab-trigger\" data-vocab=\"George Fox\">George Fox<\/span>",
              "zh": "我认识耶稣，祂对我是极其宝贵的，但我发现我里面深处有些东西就是不能保持愉快、忍耐和恩慈。我尽力压制这些特质，但它们仍在。最终我向耶稣寻求帮助，当我把我的意志交给祂时，祂就进入我的心，除去一切不能保持愉快、忍耐和恩慈的东西。然后祂关上了门。 乔治·福克斯",
              "simpEn": "I knew Jesus, and He was very dear to me, but deep inside I found something that wouldn't stay pleasant, patient, and kind. I tried to push it down, but it was still there. At last I sought Jesus' help, and when I gave Him my will, He came into my heart and took away everything that couldn't stay pleasant, patient, and kind. Then He shut the door. George Fox",
              "simpZh": "我认识耶稣，祂对我非常宝贵，但我发现内心深处有些东西不能保持愉快、忍耐和友善。我尽力压制，但它们还在。最后我向耶稣求助，当我把自己的意志交给祂时，祂就进入我心，除掉了所有不能保持愉快、忍耐和友善的东西。然后祂关上了门。乔治·福克斯"
            },
            {
              "en": "At this very moment, my entire heart does not have even a hint of <span class=\"vocab-trigger\" data-vocab=\"thirst\">thirst<\/span> after my acceptance by God. I am alone with Him and He fills every <span class=\"vocab-trigger\" data-vocab=\"void\">void<\/span>. I do not have one wish, one will, or one desire, except in Him. He has set my feet in His large room. And I am in awe, standing amazed that He has conquered everything within me, through His love. <span class=\"vocab-trigger\" data-vocab=\"Lady Huntington\">Lady Huntington<\/span>",
              "zh": "就在此刻，我全心的确毫无一丝渴望去寻求被神接纳。我单独与祂同在，祂充满了一切空虚。除了在祂里面，我没有一个愿望、一个意志或一个渴想。祂使我的脚站在宽阔之处。我满心敬畏，惊讶站立，因祂借着祂的爱征服了我里面的一切。 亨廷顿夫人",
              "simpEn": "Right now, my whole heart has not even a tiny bit of thirst for being accepted by God. I am alone with Him, and He fills every empty space. I have not one wish, not one will, not one desire, except in Him. He has set my feet in a large, open place. I am full of awe, amazed that He has overcome everything inside me through His love. Lady Huntington",
              "simpZh": "就在此刻，我的全心里对寻求被神接纳连一丝的渴望都没有。我单独与祂同在，祂填满了所有的空虚。除了在祂里面，我没有一个愿望，没有一个意思，没有一个渴慕。祂让我的脚站在宽阔之地。我满心敬畏，惊讶地看着祂用爱征服了我里面的一切。亨廷顿夫人"
            },
            {
              "en": "Suddenly I felt as if a hand—not weak but <span class=\"vocab-trigger\" data-vocab=\"omnipotent\">omnipotent<\/span>, and not of wrath but of love—were laid on my forehead. Yet I did not feel it as much outwardly as inwardly. It seemed to be pressing in on my entire being and sending a holy, <span class=\"vocab-trigger\" data-vocab=\"sin-consuming\">sin-consuming<\/span> energy throughout me. As it moved downward, my heart as well as my head was aware of the presence of this soul-cleansing energy. Under its power I fell to the floor, and in the joyful wonder of the moment, I cried out in a loud voice. This hand of power continued to work without and within me, and wherever it moved, it seemed to leave the glorious <span class=\"vocab-trigger\" data-vocab=\"influence\">influence<\/span> of the Savior's image. And for several minutes, the deep ocean of God's love swallowed me, as all its waves and <span class=\"vocab-trigger\" data-vocab=\"billows\">billows<\/span> rolled over me. <span class=\"vocab-trigger\" data-vocab=\"Bishop Hamline\">Bishop Hamline<\/span>",
              "zh": "突然，我感觉到仿佛有一只手——不是软弱的，乃是全能的；不是愤怒的，乃是慈爱的——按在我的额头上。不过，我内里的感受比外表的感受更深。它似乎在压入我的全人，将一股圣洁、吞灭罪恶的能量贯穿我全身。随着它向下移动，我的心和我的头都察觉到这洁净灵魂之能量的同在。在它的能力之下，我扑倒在地，并在那一刻喜乐惊异中大声喊叫。这大能之手继续在我里外运行，所到之处似乎都留下救主形象的荣耀影响。有几分钟之久，神爱的深海将我吞没，它一切的波浪洪涛都漫过我身。 汉姆林主教",
              "simpEn": "Suddenly I felt as if a hand—not weak but all-powerful, and not angry but full of love—was placed on my forehead. But I felt it more inside than outside. It seemed to press into my whole being, sending a holy, sin-destroying power through me. As it moved down, both my heart and my head knew this soul-cleaning power was there. Under its strength I fell to the floor, and in that moment of joyful wonder I cried out loudly. This powerful hand kept working inside and outside me, and wherever it moved, it seemed to leave the wonderful mark of the Savior's likeness. For several minutes, the deep ocean of God's love swallowed me, as all its waves rolled over me. Bishop Hamline",
              "simpZh": "忽然，我感觉到仿佛有一只手——不是软弱的，而是全能的；不是愤怒的，而是爱的——放在我的额头上。但我里面感受到的比外面更深。它好像压入我的整个人，把一股圣洁、吞灭罪的能力传遍我全身。随着它往下移动，我的心和我的头都察觉到这股洁净灵魂的能力同在。在它的能力下，我扑倒在地，在那一刻的喜乐惊异里大声喊叫。这只有大能的手继续在我里外作工，所到之处好像都留下了救主形像的荣耀影响。有几分钟的时间，神爱的深海把我吞没了，它一切的波浪都滚过我身。汉姆林主教"
            },
            {
              "en": "Some of my views on holiness, as I once wrote them, are as follows: Holiness appears to me to have a sweet, calm, pleasant, <span class=\"vocab-trigger\" data-vocab=\"charming\">charming<\/span>, and <span class=\"vocab-trigger\" data-vocab=\"serene\">serene<\/span> nature, all of which brings an <span class=\"vocab-trigger\" data-vocab=\"inexpressible purity\">inexpressible purity<\/span>, <span class=\"vocab-trigger\" data-vocab=\"radiance\">radiance<\/span>, peacefulness, and <span class=\"vocab-trigger\" data-vocab=\"overwhelming joy\">overwhelming joy<\/span> to the soul. In other words, holiness makes the soul like a field or garden of God, with every kind of pleasant fruit and flower, and each one delightful and undisturbed, enjoying a sweet calm and the gentle and refreshing rays of the sun. <span class=\"vocab-trigger\" data-vocab=\"Jonathan Edwards\">Jonathan Edwards<\/span>",
              "zh": "我曾写下对圣洁的一些看法如下：圣洁在我看来具有一种甘甜、平静、愉快、迷人和安详的性质，这一切为灵魂带来无法言喻的纯净、光辉、安宁和满溢的喜乐。换句话说，圣洁使灵魂如同一片神的田地或园子，长满各样佳美的果子和花朵，每种都悦人而宁静，享受甜美的安详与温柔和煦的阳光。 约拿单·爱德华兹",
              "simpEn": "Some of my thoughts on holiness, as I once wrote: Holiness seems to me to have a sweet, calm, pleasant, lovely, and peaceful nature. It brings a purity, brightness, peace, and great joy to the soul that is beyond words. In other words, holiness makes the soul like a field or garden of God, filled with every kind of pleasant fruit and flower, each one lovely and untroubled, enjoying a sweet calm and the gentle, refreshing sunlight. Jonathan Edwards",
              "simpZh": "我曾写下对圣洁的一些看法：圣洁在我看来有一种甘甜、平静、愉快、迷人和安详的本质，它带给灵魂一种无法形容的纯净、光辉、安宁和满溢的喜乐。换句话说，圣洁使灵魂像神的一块田地或园子，长满各样佳美的果子和花朵，每一种都可爱而宁静，享受着甜美的平静与温柔清新的阳光。约拿单·爱德华兹"
            },
            {
              "en": "Love's <span class=\"vocab-trigger\" data-vocab=\"resistless current\">resistless current<\/span> sweeping All the regions deep within; Thought and wish and senses keeping Now, and every instant clean: Full salvation! Full salvation! From the <span class=\"vocab-trigger\" data-vocab=\"guilt\">guilt<\/span> and power of sin.",
              "zh": "爱那不可抗拒的洪流，漫过我里面一切深处；保守思想、意念和感官，现在和每一刻都得洁净：全备的救恩！全备的救恩！脱离罪的罪疚与权势。",
              "simpEn": "Love's unstoppable river sweeps through all the deep places inside; keeping every thought and wish and sense clean now and at every moment: Full salvation! Full salvation! From the guilt and power of sin.",
              "simpZh": "爱的洪流无可抗拒，冲过我里面所有深处；保守我的思想、意念和感官，现在和每一刻都洁净：完全的拯救！完全的拯救！脱离罪的罪责和权势。"
            }
          ],

        {
          "sectionId": 2,
          "heading": "December 18",
          "audio": "audio/Streams in the Desert - December 18.m4a",
          "paragraphs": [
            {
              "en": "In all these things we are more than <span class=\"vocab-trigger\" data-vocab=\"conquerors\">conquerors<\/span> through him who loved us. (Romans 8:37)",
              "zh": "然而，靠着爱我们的主，在这一切的事上已经得胜有余了。（罗马书8:37）",
              "simpEn": "In all these things we are more than winners through Him who loved us.",
              "simpZh": "在这一切事上，借着那位爱我们的主，我们不只是得胜，更是全然得胜。"
            },
            {
              "en": "The gospel and the gift of God are <span class=\"vocab-trigger\" data-vocab=\"structured\">structured<\/span> so wonderfully that the very enemies and forces that are <span class=\"vocab-trigger\" data-vocab=\"marshaled\">marshaled<\/span> to fight against us actually help pave our way to the very gates of heaven and into the presence of God. Those forces can be used in the same way an eagle uses the fierce winds of a storm to <span class=\"vocab-trigger\" data-vocab=\"soar\">soar<\/span> to the sky. At first he sits perfectly still, high on a cliff, watching the sky as it fills with darkness and as the lightning strikes all around him. Yet he never moves until he feels the <span class=\"vocab-trigger\" data-vocab=\"burst\">burst<\/span> of the storm, and then with a <span class=\"vocab-trigger\" data-vocab=\"screech\">screech<\/span> he dives toward the winds, using them to carry him ever higher.",
              "zh": "福音和神的恩赐构造得如此奇妙，以致那些被调动来攻击我们的仇敌和势力，实际上竟帮助我们铺平了道路，直通天国之门和神的同在。这些力量可以被使用，正如鹰利用暴风的狂飙冲上天空。起先它完全静止地高踞在峭壁上，望着天空布满黑暗，闪电在它四周击打。然而它纹丝不动，直到它感到风暴的爆发，便发出一声尖啸，向风俯冲，利用风暴将它带得越来越高。",
              "simpEn": "The good news and God's gift are set up so wonderfully that the very enemies and powers brought to fight against us actually help clear the way to heaven's gates and into God's presence. These forces can be used just as an eagle uses the wild winds of a storm to fly high. At first it sits completely still on a high cliff, watching the sky grow dark with lightning all around. It doesn't move until it feels the storm break, and then with a sharp cry it dives into the winds, using them to carry it higher and higher.",
              "simpZh": "福音和神的恩赐安排得真是奇妙，那些被调来攻击我们的仇敌和势力，实际上帮我们铺平了通往天国之门和神同在的路。这些力量就像鹰利用暴风的猛烈气流冲上高空一样。起先它完全不动，蹲在高高的峭壁上，看着天空黑暗下来，雷电在四周击打。它不动，直到感觉到风暴的爆发，然后一声尖叫，向风冲去，借着风越飞越高。"
            },
            {
              "en": "This is also what God desires of each of His children. He wants us to be “more than conquerors,” turning storm clouds into <span class=\"vocab-trigger\" data-vocab=\"chariots of victory\">chariots of victory<\/span>. It is obvious when an army becomes “more than conquerors,” for it drives its enemies from the battlefield and <span class=\"vocab-trigger\" data-vocab=\"confiscates\">confiscates<\/span> their food and supplies. This is exactly what this Scripture passage means. There are <span class=\"vocab-trigger\" data-vocab=\"spoils\">spoils<\/span> to be taken! Dear believer, after experiencing the terrible valley of suffering, did you depart with the spoils? When you were struck with an injury and you thought you had lost everything, did you trust in God to the point that you came out richer than you were before? Being “more than [a] conqueror” means taking the spoils from the enemy and <span class=\"vocab-trigger\" data-vocab=\"appropriating\">appropriating<\/span> them for yourself. What your enemy had planned to use for your defeat, you can confiscate for your own use.",
              "zh": "这也是神对祂每一个儿女的期望。祂要我们“得胜有余”，把暴风云变成胜利的战车。当一支军队“得胜有余”时，意思很明显：它将仇敌赶出战场，并夺获他们的粮食和物资。这正是这节经文的意思。那里有掠物可夺！亲爱的信徒，当你经历了那可怕的受苦之谷后，你带着掠物出来了吗？当你被打击受伤，以为自己失去一切时，你是否如此信靠神，以致你出来时比先前更丰富了？“得胜有余”的意思，就是从仇敌手中夺取掠物，将它们归为己用。你的仇敌所计划用来打败你的，你都能夺过来为你所用。",
              "simpEn": "This is what God wants for each of His children. He wants us to be 'more than winners,' turning storm clouds into victory chariots. When an army is 'more than conquerors,' it is clear: it drives its enemies off the field and takes their food and supplies. That's exactly what this Bible verse means. There are goods to take! Dear believer, after going through the dark valley of suffering, did you leave with the spoils? When you were hit by a loss and thought you had lost everything, did you trust God so much that you came out richer than before? Being 'more than a conqueror' means taking what the enemy wanted to use to beat you and making it your own.",
              "simpZh": "这也是神要祂每个儿女做到的。祂要我们“得胜有余”，把暴风云变成胜利的战车。当一支军队“得胜有余”时，意思很清楚：它把敌人赶出战场，夺取了他们的粮食和物资。这正是这节经文的意思。那里有战利品可以夺取！亲爱的信徒，你经历了那可怕的苦难幽谷之后，有没有带着战利品出来？当你被打击，以为自己失去一切时，你有没有那样信靠神，以致出来时比从前更丰富？“得胜有余”的意思就是把仇敌的东西夺过来给自己用。仇敌想用来打败你的，你可以抢过来成为自己的益处。"

        {

          "paragraphs": [
            {
              "en": "A thick and <span class=\"vocab-trigger\" data-vocab=\"dreadful darkness\">dreadful darkness<\/span> came over him. (Genesis 15:12)",
              "zh": "忽然有大而可怕的黑暗落在他身上。（创世记15:12）",
              "simpEn": "A deep and terrifying darkness came over him.",
              "simpZh": "一片又大又可怕的黑暗落在他身上。"
            },
            {
              "en": "In this Scripture passage, the sun had finally gone down, and the eastern night had swiftly cast its heavy <span class=\"vocab-trigger\" data-vocab=\"veil\">veil<\/span> over the entire scene. Worn out by the mental conflict, and the <span class=\"vocab-trigger\" data-vocab=\"exertion\">exertion<\/span> and the cares of the day, <span class=\"vocab-trigger\" data-vocab=\"Abraham\">Abraham<\/span> “fell into a deep sleep” (v. 12). During his sleep, his soul was <span class=\"vocab-trigger\" data-vocab=\"oppressed\">oppressed<\/span> with “a thick and dreadful darkness,” which seemed to <span class=\"vocab-trigger\" data-vocab=\"smother\">smother<\/span> him and felt like a nightmare in his heart.",
              "zh": "在这段经文中，日头终于落下，东方的夜晚迅速将其沉重的帷幕笼罩全地。亚伯拉罕因心灵的交战、日间的劳碌与挂虑而疲惫不堪，“沉沉地睡了”（12节）。在他睡眠之中，他的灵魂被“大而可怕的黑暗”所压迫，这黑暗仿佛要令他窒息，在他心中如同梦魇。",
              "simpEn": "In this part of Scripture, the sun had gone down, and the eastern night quickly threw its heavy curtain over everything. Worn out by inner struggle, hard work, and the day's worries, Abraham fell into a deep sleep. During his sleep, his soul was weighed down by a thick and dreadful darkness that seemed to choke him and felt like a nightmare in his heart.",
              "simpZh": "在圣经这段，太阳已经下山，东边的夜晚迅速把厚重的帷幕罩住一切。亚伯拉罕因为心里的挣扎、白天的劳苦和挂虑，疲倦得沉沉地睡了。在睡梦中，他的灵魂被又大又可怕的黑暗压着，那黑暗好像要闷死他，心里像做了噩梦一样。"
            },
            {
              "en": "Do you have an understanding of the horror of that kind of darkness? Have you ever experienced a terrible sorrow that seems difficult to <span class=\"vocab-trigger\" data-vocab=\"reconcile\">reconcile<\/span> with God's perfect love—a sorrow that comes crashing down upon you, <span class=\"vocab-trigger\" data-vocab=\"wrings\">wrings<\/span> from your soul its peaceful rest in the grace of God, and casts it into a sea of darkness that is unlit by even one ray of hope? Have you experienced a sorrow caused by unkindness, when others cruelly mistreat your trusting heart, and you even begin to wonder if there is really a God above who sees what is happening yet continues to allow it? If you know this kind of sorrow, then you know something of this “thick and dreadful darkness.”",
              "zh": "你明白那种黑暗的可怕吗？你可曾经历过一种可怕的忧愁，似乎难以与神完全的爱相调和——那种忧愁猛烈地压在你身上，将你灵魂在神恩典中的平静安息拧挤出去，并把它抛入一片连一丝盼望之光都没有的黑暗之海中？你可曾经历过因不仁不慈而造成的忧愁，当别人残酷地错待你信托的心灵，你甚至开始怀疑天上是否真有一位神看见一切却继续容许它发生？你若知道这种忧愁，你就多少体会了那“大而可怕的黑暗”。",
              "simpEn": "Do you understand the horror of that kind of darkness? Have you ever gone through a terrible sadness that seems hard to fit with God's perfect love—a sadness that crashes down on you, rips away your soul's quiet rest in God's grace, and throws it into a sea of darkness without even one ray of hope? Have you known a sadness caused by unkindness, when others cruelly hurt your trusting heart, and you even wonder if there is a God above who sees it all and still lets it happen? If you know this kind of sadness, then you know something of this 'thick and dreadful darkness.'",
              "simpZh": "你知道那种黑暗有多可怕吗？你有没有经历过一种可怕的忧伤，好像很难和神完全的爱合在一起——那忧伤猛砸在你身上，把你灵魂在神恩典里的安息拧干，丢进一片没有一丝希望之光的黑暗大海？你有没有经历过因为别人不仁慈而来的忧伤，他们残忍地对待你信任的心，你甚至开始怀疑天上到底有没有一位神，看见一切还继续允许它发生？如果你知道这种忧伤，你就多多少少体会过那“又大又可怕的黑暗”。"
            },
            {
              "en": "Human life is made of brightness and gloom, shadows and sunshine, and dark clouds followed by brilliant rays of light. Yet through it all, God's divine justice is accomplishing His plan, affecting and disciplining each individual soul. Dear friend, if you are filled with fear of the “thick and dreadful darkness” because of God's dealings with humankind, learn to trust His <span class=\"vocab-trigger\" data-vocab=\"infallible wisdom\">infallible wisdom<\/span>, for it is equal to His <span class=\"vocab-trigger\" data-vocab=\"unchanging justice\">unchanging justice<\/span>. And know that He who endured the “dreadful darkness” of <span class=\"vocab-trigger\" data-vocab=\"Calvary\">Calvary<\/span> and the feeling of having been <span class=\"vocab-trigger\" data-vocab=\"forsaken\">forsaken<\/span> on the cross is ready to accompany you “through the valley of the shadow of death” (Ps. 23:4) until you can see the sun shining on the other side.",
              "zh": "人生由光明与幽暗、阴影与阳光交织而成，乌云之后跟随着璀璨的光芒。然而贯穿一切，神公义的作为正成就祂的计划，影响并操练着每一个灵魂。亲爱的朋友，若你因神对待人的方式而对“大而可怕的黑暗”充满恐惧，当学习信靠祂无误的智慧，因为这智慧与祂不变的公义同等。并且要知道，那位忍受了加略山“可怕的黑暗”、在十字架上经历了被离弃之感觉的主，愿意陪伴你“行过死荫的幽谷”（诗篇23:4），直到你能看见太阳在另一边照耀。",
              "simpEn": "Human life is made of brightness and darkness, shadows and sunshine, and dark clouds followed by brilliant light. Through it all, God's holy justice is working out His plan, shaping and training every soul. Dear friend, if you are afraid of the 'thick and dreadful darkness' because of God's ways with people, learn to trust His never-failing wisdom, for it is equal to His never-changing justice. And know that the One who went through the 'dreadful darkness' of Calvary and the feeling of being left alone on the cross is ready to go with you 'through the valley of the shadow of death' until you see the sun shining on the other side.",
              "simpZh": "人生有光有暗，有影有阳光，乌云后面跟着耀眼的光芒。在这一切之中，神公义的作为正在完成祂的计划，影响和训练着每一个灵魂。亲爱的朋友，如果你因为神待人处事的方式，对“又大又可怕的黑暗”充满害怕，就要学会信靠祂那永不错误的智慧，因为这智慧与祂那永不改变的公义同等。并且知道，那位经历过加略山“可怕黑暗”、在十字架上尝过被弃感觉的主，愿意陪着你“走过死荫的幽谷”，直到你看见太阳在另一面照耀。"
            },
            {
              "en": "May we realize that “we have this hope as an <span class=\"vocab-trigger\" data-vocab=\"anchor\">anchor<\/span> for the soul, firm and secure” and that “it enters the inner <span class=\"vocab-trigger\" data-vocab=\"sanctuary\">sanctuary<\/span> behind the curtain” (Heb. 6:19). And may we know that although it is unseen within His sanctuary, our anchor will be grounded and will never <span class=\"vocab-trigger\" data-vocab=\"yield\">yield<\/span>. It will hold firm until the day He returns, and then we too will follow it into the safe <span class=\"vocab-trigger\" data-vocab=\"haven\">haven<\/span> <span class=\"vocab-trigger\" data-vocab=\"guaranteed\">guaranteed<\/span> to us in God's unchangeable Word. <span class=\"vocab-trigger\" data-vocab=\"F. B. Meyer\">F. B. Meyer<\/span>",
              "zh": "愿我们认识到“我们有这指望，如同灵魂的锚，又坚固又牢靠，且通入幔子内的圣所”（希伯来书6:19）。愿我们晓得，虽然锚在祂的圣所中不可见，它却是稳固的，永不松脱。它必牢牢持守，直到祂归来的那日，那时我们也必随着它进入神不变话语所保证给我们的安稳港湾。 迈尔",
              "simpEn": "May we know that 'we have this hope as an anchor for the soul, firm and secure. It enters the inner sanctuary behind the curtain.' And may we know that though the anchor is unseen inside His holy place, it will never give way. It will hold firm until the day He returns, and then we too will follow it into the safe harbor promised to us in God's unchanging Word. F. B. Meyer",
              "simpZh": "愿我们知道“我们有这指望，如同灵魂的锚，又坚固又牢靠，并且通入幔子后面的圣所”。虽然锚在祂的圣所里看不见，但它绝不会松脱。它会牢牢守住，直到祂回来的那一天，然后我们也要跟着它，进入神不改变的话语所保证给我们的安稳港湾。迈尔"
            },
            {
              "en": "The disciples thought that the angry sea separated them from Jesus. In fact, some of them thought something even worse—they thought that the trouble they were facing was a sign that He had forgotten them and did not care about them. O dear friend, that is when your troubles can cause the most harm. The <span class=\"vocab-trigger\" data-vocab=\"Devil\">Devil<\/span> comes and whispers to you, “God has forgotten you” or “God has forsaken you,” and your unbelieving heart cries out, as <span class=\"vocab-trigger\" data-vocab=\"Gideon\">Gideon<\/span> once did, “If the Lord is with us, why has all this happened to us?” (Judg. 6:13). God has allowed the difficulty to come upon you, in order to bring you closer to Himself. It has come not to separate you from Jesus but to cause you to <span class=\"vocab-trigger\" data-vocab=\"cling\">cling<\/span> to Him more faithfully, more firmly, and more simply. <span class=\"vocab-trigger\" data-vocab=\"F. S. Webster\">F. S. Webster<\/span>",
              "zh": "门徒们以为翻腾的大海将他们与耶稣隔开了。事实上，有些人想了更糟的事——他们以为所遭遇的困难是一个记号，表明祂已经忘记了他们，也不关心他们。亲爱的朋友，这正是你的困难可能造成最大伤害的时候。魔鬼来对你耳语：“神已经忘记了你”或“神已经离弃了你”，你那不信的心就像基甸那样喊说：“耶和华若与我们同在，我们何至遭遇这一切事呢？”（士师记6:13）。神允许这困难临到你，为要领你更亲近祂自己。它来不是要使你与耶稣分离，乃是要使你更忠诚、更坚固、更单纯地抓紧祂。 F. S. 韦伯斯特",
              "simpEn": "The disciples thought the raging sea had cut them off from Jesus. Some thought even worse—that the trouble they faced was a sign He had forgotten them and didn't care. O dear friend, that is when your troubles can do the most harm. The Devil whispers, 'God has forgotten you' or 'God has left you,' and your doubting heart cries out like Gideon, 'If the Lord is with us, why has all this happened to us?' God has allowed the trouble to come to draw you closer to Himself. It has not come to push you away from Jesus but to make you hold on to Him more faithfully, more tightly, and more simply. F. S. Webster",
              "simpZh": "门徒们以为翻腾的大海把他们和耶稣隔开了。有些人甚至想得更糟——他们以为面对的这些困难表明耶稣已经忘了他们，不在乎他们。亲爱的朋友，这时候你的困难就能造成最大的伤害。魔鬼来小声说：“神忘了你”或者“神丢下你了”，你那不信的心就像基甸那样喊出来：“如果耶和华与我们同在，我们怎么会遇到这些事呢？”神允许这些难处临到，是要把你拉得更靠近祂。它不是来把你和耶稣分开，而是让你更忠心、更牢固、更单纯地抓住祂。F. S. 韦伯斯特"
            },
            {
              "en": "We should abandon ourselves to God more fully at those times when He seems to have abandoned us. Let us enjoy His light and comfort when it is His pleasure to give it to us, but may we not attach ourselves to His gifts. May we instead attach ourselves to Him, and when He plunges us into the night, where pure faith is required, may we still press on through the <span class=\"vocab-trigger\" data-vocab=\"agonizing\">agonizing<\/span> darkness. Oh, for faith that brings the <span class=\"vocab-trigger\" data-vocab=\"triumph\">triumph<\/span> When defeat seems very near! Oh, for faith that brings the triumph Into victory's ringing cheer— Faith <span class=\"vocab-trigger\" data-vocab=\"triumphant\">triumphant<\/span>; knowing not defeat or fear. <span class=\"vocab-trigger\" data-vocab=\"Herbert Booth\">Herbert Booth<\/span>",
              "zh": "我们应当在神似乎离弃我们之时，更完全地把自己交托给祂。当祂乐意将光和安慰赐给我们时，让我们享受，但让我们不要依附于祂的恩赐，乃要依附于祂。当祂将我们投入黑夜、需要纯净信心之时，愿我们仍能穿过那极痛的黑暗奋勇向前。哦，求那种在失败看似极近时带来胜利的信心！哦，求那种将胜利带进凯歌欢呼的信心——得胜的信心，不认识失败或惧怕。 赫伯特·布斯",
              "simpEn": "We should give ourselves up to God more fully at those times when He seems to have left us. Let us enjoy His light and comfort when He is pleased to give them, but let us not hold on to His gifts. Let us hold on to Him instead, and when He throws us into the night where pure faith is needed, let us keep pressing on through the painful darkness. Oh, for faith that brings victory when defeat seems so close! Oh, for faith that brings victory into ringing cheers—faith that wins, knowing no defeat or fear. Herbert Booth",
              "simpZh": "当神似乎离弃我们的时候，我们要更完全地把自己交给祂。当祂乐意把亮光和安慰给我们时，我们享受，但不要抓住祂的礼物不放。我们要抓住祂自己。当祂把我们扔进黑夜，需要单纯信心的时候，我们要继续穿过那极痛的黑暗往前。哦，求那种在失败好像很近时带来胜利的信心！哦，求那种把胜利带进响亮欢呼的信心——得胜的信心，不知道失败和惧怕。赫伯特·布斯"
            }

            {
              "en": "The journey is too much for you. (1 Kings 19:7)",
              "zh": "当走的路甚远。（列王纪上19:7）",
              "simpEn": "The journey is too much for you.",

              "en": "What did God do with <span class=\"vocab-trigger\" data-vocab=\"Elijah\">Elijah<\/span>, His tired servant? He allowed him to sleep and then gave him something good to eat. Elijah had done <span class=\"vocab-trigger\" data-vocab=\"tremendous\">tremendous<\/span> work and in his excitement had run “ahead of <span class=\"vocab-trigger\" data-vocab=\"Ahab\">Ahab<\/span>[’s chariot] all the way to <span class=\"vocab-trigger\" data-vocab=\"Jezreel\">Jezreel<\/span>” (1 Kings 18:46). But the run had been too much for him and had <span class=\"vocab-trigger\" data-vocab=\"sapped\">sapped<\/span> his physical strength, ultimately causing him to become depressed. Just as others in this condition need sleep and want their <span class=\"vocab-trigger\" data-vocab=\"ailments\">ailments<\/span> treated, Elijah's physical requirements needed to be met.",
              "zh": "神怎样对待祂疲乏的仆人以利亚呢？祂让他睡一觉，然后给他好东西吃。以利亚做了浩大的工作，在兴奋中“在亚哈前头……直到耶斯列的城门”（列王纪上18:46）。但这奔跑对他太过度了，耗尽了他的体力，最终导致他抑郁。正如其他处在这种状况的人需要睡眠并想得到疾患的医治，以利亚身体的需要也必须得到满足。",
              "simpEn": "What did God do with Elijah, His tired servant? He let him sleep and then gave him good food to eat. Elijah had done huge work, and in his excitement had run ahead of Ahab's chariot all the way to Jezreel. But the run had been too much for him and had drained his strength, which finally made him depressed. Just as others in this state need sleep and want their sicknesses treated, Elijah's physical needs had to be met.",
              "simpZh": "神怎么对待祂那个累坏了的仆人以利亚呢？祂让他睡觉，然后给他好东西吃。以利亚做了很大的工，在兴奋中跑在亚哈的马车前头，一直跑到耶斯列。但这段跑对他太超过了，把他的体力耗尽了，最后导致他抑郁。就像别人在这种状态下需要睡觉、需要治病一样，以利亚身体的需要也必须得到满足。"
            },
            {
              "en": "There are many wonderful people who end up where Elijah did—“under a <span class=\"vocab-trigger\" data-vocab=\"juniper tree\">juniper tree<\/span>” (1 Kings 19:4 KJV)! When this happens, the words of the Master are very <span class=\"vocab-trigger\" data-vocab=\"soothing\">soothing<\/span>: “Get up and eat, for the journey is too much for you.” In other words, “I am going to refresh you.” Therefore may we never confuse physical <span class=\"vocab-trigger\" data-vocab=\"weariness\">weariness<\/span> with spiritual weakness.",
              "zh": "有许多很好的人，到头来落到了以利亚所在之处——“在罗腾树下”（列王纪上19:4）！当这样的事发生时，主的话是非常抚慰的：“起来吃吧！因为当走的路甚远。”换句话说：“我必使你重新得力。”因此我们永不要将身体的疲倦与灵性的软弱混为一谈。",
              "simpEn": "There are many good people who end up where Elijah did—'under a bush.' When this happens, the Master's words are very comforting: 'Get up and eat, for the journey is too much for you.' In other words, 'I am going to make you fresh and strong again.' So let us never mix up physical tiredness with spiritual weakness.",
              "simpZh": "有很多很好的基督徒，最后也落到了以利亚那样——在罗腾树下。这时主的话是特别安慰人的：“起来吃吧，因为路太远。”换句话说：“我要让你重新得力。”所以我们千万不要把身体的疲乏和灵性的软弱混在一起。"
            },
            {
              "en": "I'm too tired to trust and too tired to pray, Said I, as my <span class=\"vocab-trigger\" data-vocab=\"overtaxed\">overtaxed<\/span> strength gave way. The one conscious thought that my mind possessed, Is, oh, could I just drop it all and rest. Will God forgive me, do you suppose, If I go right to sleep as a baby goes, Without questioning if I may, Without even trying to trust and pray? Will God forgive you? Think back, dear heart, When language to you was an unknown art, Did your mother deny you needed rest, Or refuse to pillow your head on her breast? Did she let you want when you could not ask? Did she give her child an <span class=\"vocab-trigger\" data-vocab=\"unequal task\">unequal task<\/span>? Or did she <span class=\"vocab-trigger\" data-vocab=\"cradle\">cradle<\/span> you in her arms, And then guard your <span class=\"vocab-trigger\" data-vocab=\"slumber\">slumber<\/span> against alarms? Oh, how quickly a mother's love can see, The <span class=\"vocab-trigger\" data-vocab=\"unconscious yearnings\">unconscious yearnings<\/span> of infancy. When you've grown too tired to trust and pray, When overworked nature has quite given way: Then just drop it all, and give up to rest, As you used to do on mother's breast, He knows all about it—the dear Lord knows, So just go to sleep as a baby goes; Without even asking if you may, God knows when His child is too tired to pray. He judges not solely by uttered prayer, He knows when the yearnings of love are there. He knows you do pray, He knows you do trust, And He knows, too, the limits of poor, weak dust. Oh, the wonderful <span class=\"vocab-trigger\" data-vocab=\"sympathy\">sympathy<\/span> of Christ, For His chosen ones in that midnight <span class=\"vocab-trigger\" data-vocab=\"tryst\">tryst<\/span>, When He told them, “Sleep and take your rest,” While on Him the <span class=\"vocab-trigger\" data-vocab=\"guilt\">guilt<\/span> of the whole world pressed— You have trusted your life to Him to keep, Then don't be afraid to go right to sleep. <span class=\"vocab-trigger\" data-vocab=\"Ella Conrad Cowherd\">Ella Conrad Cowherd<\/span>",
              "zh": "我太倦了，无法信靠；太倦了，无法祷告，当我的气力过度耗尽而垮下时，我说。我心思中唯一有意识的想法就是，哦，我能不能把一切都放下，休息罢了。你想神会不会赦免我，若我像婴孩一样径直睡去，连问都不问可不可以，连试都不试去信靠和祷告？神会不会赦免你？请回想，亲爱的，当你还是个不懂言语的婴孩时，你的母亲可曾拒绝你所需的休息，或不肯把你的头枕在她胸前？当你还不会求时，她可曾让你缺乏？她可曾给她的孩子力不能胜的任务？抑或她将你抱在怀中，保护你的安眠免受惊扰？哦，母亲的爱何等迅速地察觉到婴孩那不自觉的渴求。当你变得太累而无法信靠和祷告，当工作过劳的天性完全崩溃时：那就把一切都放下，歇下来安息吧，像你从前在母亲怀中那样。祂全都知道——亲爱的主知道，所以就像婴孩那样去睡吧；连问都不问可不可以，神知道祂的孩子何时太倦了而无法祷告。祂不单凭出口的祷告来判断，祂知道爱的渴求何时在那里。祂知道你在祷告，祂知道你在信靠，祂也知道可怜软弱尘土的限制。哦，基督那奇妙的同情，在午夜幽会中向着祂所拣选的人，当祂告诉他们“你们仍要安歇睡觉”之时，全世界的罪咎正压在祂身上——你已将自己的生命交托给祂保守，就不要害怕径直去安睡。 艾拉·康拉德·考赫德",
              "simpEn": "I'm too tired to trust and too tired to pray, I said, as my worn-out strength gave way. The one clear thought in my mind is, oh, could I just drop it all and rest? Will God forgive me, do you think, if I go right to sleep as a baby goes, without even asking if I may, without trying to trust and pray? Will God forgive you? Think back, dear heart, to when you were a baby who couldn't speak. Did your mother say you couldn't rest, or refuse to lay your head on her chest? Did she let you go without when you couldn't ask? Did she give her child a task too heavy? Or did she hold you in her arms and guard your sleep from harm? Oh, how quickly a mother's love sees the unspoken needs of her baby. When you've become too tired to trust and pray, when your overworked body has broken down: then just drop it all and rest, as you once did on your mother's chest. He knows all about it—the dear Lord knows—so just go to sleep as a baby goes. Without even asking, God knows when His child is too tired to pray. He doesn't judge only by spoken prayer; He knows when the longings of love are there. He knows you do pray, He knows you do trust, and He knows the limits of weak human dust. Oh, the wonderful understanding of Christ for His chosen ones at that midnight meeting, when He told them, 'Sleep and take your rest,' while the guilt of the whole world pressed on Him. You have trusted your life to Him to keep, so don't be afraid to go right to sleep. Ella Conrad Cowherd",
              "simpZh": "我太累，不能信靠；太累，不能祷告，当我的力气用尽时，我这样说。我心里唯一清楚的念头是：哦，我能不能把一切都放下来休息？你想神会原谅我吗？如果我就像婴孩一样直接睡觉去，连问都不问可不可以，连试着信靠和祷告都不做。神会原谅你吗？亲爱的，回想一下你还是个不会说话的小婴孩时，你的母亲有没有不让你休息，有没有不肯让你的头靠在她胸前？当你还不会开口求的时候，她有没有让你缺乏？她有没有把力不能胜的任务交给她的孩子？还是她把你们抱在怀里，保护你们安睡不被惊吓？哦，母亲的爱多么快就察觉到婴孩那说不出声的渴望。当你累得不能信靠和祷告，当劳累过度的天性完全垮下的时候：那就把一切放下，歇下来休息吧，像你从前在母亲怀里那样。祂全都知道——亲爱的主知道——所以就照着婴孩那样睡去吧；连问都不问可不可以，神知道祂的孩子什么时候太累无法祷告。祂不单凭嘴里说出来的祷告判断，祂知道爱的渴慕在那里。祂知道你在祷告，祂知道你在信靠，祂也知道可怜软弱之尘土的极限。哦，基督那奇妙的同情，在那个午夜的约会里向着祂所拣选的人流露，当祂告诉他们“安歇睡觉吧”，而全世界的罪正压在祂身上——你既把自己的生命交给祂保守，就不要害怕直接去安睡。艾拉·康拉德·考赫德"
            }

            {

              "zh": "这世界已经太多地成为我们的一部分，我们被一种观念所苦，以为若不时常忙碌奔走，就一无所成。我们不再相信安静退到荫下静坐的重要性。身为神的子民，我们已变得过于讲求实用。我们相信“把所有的铁都放在火里”，凡离开铁砧或火炉的时间都是浪费。",

              "zh": "然而，我们花在安静默想、与神交谈、举目望天上的时间，从来没有比这更合算的了。我们生命中这类敞开的空间永远不嫌太多——那些分别出来、让我们的灵魂全然敞开、接纳神所乐意赐下的任何属天思想或影响的时刻。",
              "simpEn": "But our time is never better spent than when we set aside time for quiet deep thinking, talking with God, and looking up to heaven. We can never have too many of these open moments in life—times set apart when our soul is completely open and ready to receive any heavenly thought or touch that God may be pleased to send our way.",

              "zh": "今天住在城市里的人，若能效法以撒的榜样，尽可能常到乡间的田野去，离开城市的喧嚣，那将是美好的。在城市的热气和噪音中疲惫之后，与自然相交是非常令人爽快的，会带来一种平静、医治的影响。在田间散步，海边溜达，或是在点缀着雏菊的草场上远足，必清除你生命中的杂质，使你的心怀着新的喜乐和盼望跳动。",
              "simpEn": "People living in cities today would do well to follow Isaac's example and visit the countryside as often as possible, away from the busy noise of the city. After growing tired from the city's heat and noise, time with nature is very refreshing and brings a calming, healing touch. A walk through a field, a stroll by the seashore, or a hike across a meadow dotted with daisies will clean out the dirt of life and make your heart beat with new joy and hope.",

            {
              "en": "<span class=\"vocab-trigger\" data-vocab=\"A poem for Christmas Eve\">A poem for Christmas Eve<\/span>: Bells across the Snow O Christmas, merry Christmas, Has it really come again, With its memories and greetings, With its joy and with its pain! <span class=\"vocab-trigger\" data-vocab=\"Minor chords\">Minor chords<\/span> are in the <span class=\"vocab-trigger\" data-vocab=\"carol\">carol<\/span> And a shadow in the light, And a spray of <span class=\"vocab-trigger\" data-vocab=\"cypress\">cypress<\/span> twining With the <span class=\"vocab-trigger\" data-vocab=\"holly\">holly<\/span> wreath tonight. And the hush is never broken By laughter light and low, As we listen in the starlight To the “bells across the snow.” O Christmas, merry Christmas, It’s not so very long Since other voices blended With the carol and the song! If we could but hear them singing, As they are singing now, If we could but see the <span class=\"vocab-trigger\" data-vocab=\"radiance\">radiance<\/span> Of the crown on each dear brow, There would be no cry to cover, No hidden tear to flow, As we listen in the starlight To the “bells across the snow.” O Christmas, merry Christmas, This nevermore can be; We cannot bring again the days Of our unshadowed <span class=\"vocab-trigger\" data-vocab=\"glee\">glee<\/span>, But Christmas, happy Christmas, Sweet <span class=\"vocab-trigger\" data-vocab=\"herald\">herald<\/span> of goodwill, With holy songs of glory Brings holy <span class=\"vocab-trigger\" data-vocab=\"gladness\">gladness<\/span> still. For peace and hope may brighten, And patient love may glow, As we listen in the starlight To the “bells across the snow.” <span class=\"vocab-trigger\" data-vocab=\"Frances Ridley Havergal\">Frances Ridley Havergal<\/span>",
              "zh": "《圣诞前夜的诗》：雪中之钟 哦，圣诞节，欢乐的圣诞节，难道它真的又来临，带着回忆和问候，带着喜乐与疼痛！小调融在圣诞颂歌里，光影之中有阴影，今晚一枝柏树缠绕着冬青花环。寂静从未被轻快的笑声打破，当我们在星光下聆听“雪中之钟”。哦，圣诞节，欢乐的圣诞节，并不很久以前，曾有别的歌声与这颂歌和曲调交融！我们若能听见他们歌唱，如同他们如今正在歌唱，我们若能看见每个亲爱额头上冠冕的光辉，就不必压抑哭声，不必隐藏流淌的眼泪，当我们在星光下聆听“雪中之钟”。哦，圣诞节，欢乐的圣诞节，这再也不能重来；我们无法重回那毫无阴影的欢欣日子，但圣诞节，幸福的圣诞节，美好善意的报信者，带着荣耀的圣歌，依然带来圣洁的欢欣。因平安和盼望可以更加明亮，忍耐的爱可以发热，当我们在星光下聆听“雪中之钟”。 弗朗西斯·雷德利·哈弗格尔",
              "simpEn": "A poem for Christmas Eve: Bells across the Snow. O Christmas, merry Christmas, has it really come again, with its memories and greetings, with its joy and with its pain! Sad tones are in the carol and a shadow in the light, and a spray of cypress twining with the holly wreath tonight. And the quiet is never broken by light, low laughter, as we listen in the starlight to the 'bells across the snow.' O Christmas, merry Christmas, it's not so very long since other voices joined with the carol and the song! If we could only hear them singing, as they are singing now, if we could only see the shining of the crown on each dear forehead, there would be no cry to cover, no hidden tear to flow, as we listen in the starlight to the 'bells across the snow.' O Christmas, merry Christmas, this can never be again; we cannot bring back the days of our shadowless happiness, but Christmas, happy Christmas, sweet messenger of goodwill, with holy songs of glory brings holy gladness still. For peace and hope may brighten, and patient love may glow, as we listen in the starlight to the 'bells across the snow.' Frances Ridley Havergal",

              "zh": "在危机时刻被迫留在背后，是一件非常困难的事。在客西马尼园里，剩下的十一个门徒中有八个被留下，无事可做。当耶稣往前去祷告时，彼得、雅各、约翰跟祂同去守望，但其余的人坐下等候。我相信那些被留下的人一定抱怨过。他们在园子里，不过如此而已，因为他们在园中花朵的栽培上无份。那是一个暴风雨的危机时刻，压力沉重，他们却被排除在外。",
              "simpEn": "It is very hard to be kept in the background during a time of trouble. In the Garden of Gethsemane, eight of the eleven disciples were left behind to do nothing. When Jesus went ahead to pray, Peter, James, and John went with Him to watch, but the rest sat down to wait. I think the ones left behind must have complained. They were in the garden, but that was all; they had no part in growing its flowers. It was a stormy time of great stress, yet they were not allowed to join in.",
              "simpZh": "在危急的时候被放在后面，是件很难的事。在客西马尼园，十一个门徒中有八个被留下来，什么都不能做。耶稣往前走祷告，彼得、雅各、约翰跟祂去守望，其余的人就坐下等候。我相信那些被留下的人一定抱怨过。他们在园子里，但也仅此而已，他们没有参与栽培园中的花朵。那是暴风雨般的危急时刻，压力很大，但他们却不能参与。"
            },
            {
              "en": "You and I have certainly had that experience and felt the same disappointment. Perhaps you have seen a great opportunity for Christian service arise, and some people are sent immediately to the work, while still others are being trained to go. Yet you are forced to do nothing but sit and wait. Or perhaps sickness and poverty has come your way, or you have had to endure some terrible <span class=\"vocab-trigger\" data-vocab=\"disgrace\">disgrace<\/span>. Whatever your situation, you have been kept from service, and now you feel angry and do not understand why you should be <span class=\"vocab-trigger\" data-vocab=\"excluded\">excluded<\/span> from this part of the Christian life. It seems unjust that you have been allowed to enter the garden but have found no path assigned to you once inside.",
              "zh": "你我也一定有过这种经历，感受过同样的失望。或许你曾看见一个大好机会兴起，可以去服侍基督，有些人立刻就被差去工作了，另有些人也正受训预备前往。而你却被迫什么都不能做，只能坐着等候。又或许疾病和贫穷临到了你，或者你不得不忍受某种可怕的耻辱。无论你的处境如何，你一直不能服侍，如今你感到愤怒，不明白自己为何被排除在基督徒生活的这部分之外。容你进了园子，却未在里面分派给你一条道路，这似乎很不公平。",
              "simpEn": "You and I have surely had that experience and felt the same letdown. Maybe you saw a great chance for Christian service arise. Some were sent to the work right away, while others were being trained to go. But you were forced to do nothing but sit and wait. Or maybe sickness and poverty came, or you had to go through some terrible shame. Whatever your situation, you have been kept from serving, and now you feel angry and don't understand why you are left out of this part of Christian life. It seems unfair that you were allowed into the garden but found no path given to you once inside.",
              "simpZh": "你和我一定都有过这样的经历，感到同样的失望。也许你看到一个服侍主的好机会出现，有些人立刻被差去工作，还有人在受训练准备去。而你却被迫什么都不能做，只能坐着等。也许疾病和贫穷临到你，或者你不得不忍受极大的羞辱。不管什么情况，你被拦着不能服侍，现在你感到愤怒，不明白为什么你被排除在基督徒生活这一部分之外。让你进了园子，却没有在里面给你安排路，这好像很不公平。"
            },
            {
              "en": "Be still, dear soul—things are not what they seem! You are not excluded from any part of the Christian life. Do you believe that the garden of the Lord only has places for those who walk or those who stand? No! It also has a place set apart for those who are <span class=\"vocab-trigger\" data-vocab=\"compelled\">compelled<\/span> to sit. Just as there are three voices in a verb—active, passive, and <span class=\"vocab-trigger\" data-vocab=\"neuter\">neuter<\/span>—there are three voices in Christ’s verb “live.” There are active people, who go straight to the battle, and struggle till the setting of the sun. There are passive people, who stand in the middle and simply report the progress of the fight. Yet there are also neuter people—those who can neither fight nor be <span class=\"vocab-trigger\" data-vocab=\"spectators\">spectators<\/span> of the fight but must simply lie down and wait.",
              "zh": "亲爱的灵魂啊，要安静——事情并不像表面所见！你并未被排除在基督徒生活的任何部分之外。你难道相信主的园子只有给行走或站立之人的地方吗？不！它也有一个特别为那些被迫坐下的人预备的地方。正如动词有三种语态——主动、被动和中立——基督的动词“活”也有三种语态。有主动的人，他们直奔战场，奋战直到日落。有被动的人，他们站在中间，只报告战事的进展。然而也有中立的人——那些既不能打仗，也不能作观战者，只能躺下等候的人。",
              "simpEn": "Be quiet, dear soul—things are not as they seem! You are not left out of any part of the Christian life. Do you think the Lord's garden only has places for those who walk or stand? No! It also has a spot set apart for those who are forced to sit. Just as there are three voices in a verb—active, passive, and neuter—there are three voices in Christ's verb 'live.' There are active people, who go straight to battle and fight till sunset. There are passive people, who stand in the middle and just report how the fight is going. But there are also neuter people—those who can neither fight nor watch the fight, but must simply lie down and wait.",
              "simpZh": "安静下来，亲爱的灵魂——事情不是看起来那样的！你没有被排除在基督徒生活的任何部分之外。你以为主的园子只有给行走或站立之人的地方吗？不！它也有一个专门为那些只能坐着的人预备的地方。就像动词有三种语态——主动、被动和中性——基督的“活”这个动词也有三种语态。有主动的人，直接上战场，奋战到日落。有被动的人，站在中间，只报告战况。但也有中性的人——那些既不能打仗，也不能观战，只能躺下等候的人。"
            },
            {
              "en": "When this experience comes, do not think that you have been turned aside. Remember, it is Christ himself who says to you, “Sit here.” Your place in the garden has also been set apart. God has selected it especially for you, and it is not simply a place of waiting. There are some lives He brings into this world neither to do great work nor to bear great burdens. Their job is simply to be—they are the neuter verbs, or the flowers in the garden that have no active <span class=\"vocab-trigger\" data-vocab=\"mission\">mission<\/span>. They have won no major victories and have never been honored with the best seats at a <span class=\"vocab-trigger\" data-vocab=\"banquet\">banquet<\/span>—they have simply escaped the sight of people like Peter, James, and John.",
              "zh": "当这样的经历临到时，不要以为你被撇在一边。要记住，是基督亲自对你说：“坐在这里。”你在园中的位置也已被分别出来。神特别为你拣选了它，这不单是一个等候的地方。有些生命被祂带到世上，既非为做大事，也非为担重任。他们的本分就是单纯地“在”——他们是中性的动词，是园中没有活跃使命的花朵。他们未曾赢得任何大胜利，也从未在宴席上被尊以首位——他们只是从彼得、雅各、约翰这类人的视线中逃过去了而已。",
              "simpEn": "When this comes, don't think you have been pushed aside. Remember, it is Christ Himself who says to you, 'Sit here.' Your place in the garden has also been set apart. God chose it just for you, and it is not simply a place of waiting. There are some lives He brings into this world not to do great work or carry great loads. Their job is simply to be—they are the neuter verbs, or the flowers in the garden with no active task. They have won no big victories and have never been given the best seats at a feast—they have simply been missed by the eyes of people like Peter, James, and John.",
              "simpZh": "当这样的经历临到时，不要以为你被推到一边去了。记住，是基督亲自对你说：“坐在这里。”你在园子里的位置也已经被分别出来了。神特别为你选的，这不只是一个等候的地方。有些生命被祂带到世上，不是为了做大事或背重担。他们的工作就是单纯地“存在”——他们是中性的动词，是园子里没有活跃任务的花。他们没有赢过什么大胜利，也从未在宴席上被尊以首位——他们只是被彼得、雅各、约翰那样的人忽略了而已。"
            },
            {
              "en": "However, Jesus is delighted by the sight of them, for through their mere <span class=\"vocab-trigger\" data-vocab=\"fragrance\">fragrance<\/span> and beauty, they have brought Him joy. And just their existence and the preservation of their loveliness in the valley has lifted the Master’s heart. So you need not complain if you are one of these flowers! <span class=\"vocab-trigger\" data-vocab=\"selected\">selected<\/span>",
              "zh": "然而，耶稣看见它们就喜悦，因为单借着它们的芬芳和美丽，它们就给祂带来了喜乐。仅仅是它们的存在，以及它们在山谷中那份可爱之保存，就已经提起了主的心。所以，你若也是这些花中的一朵，就不必抱怨！ 选自",
              "simpEn": "But Jesus is full of joy at the sight of them, because just through their sweet smell and beauty, they have brought Him happiness. And just their being there and keeping their loveliness in the valley has lifted the Master's heart. So you don't need to complain if you are one of these flowers! selected",
              "simpZh": "但耶稣看见它们就满心欢喜，因为单是它们的香气和美丽，就给祂带来了喜乐。只是它们的存在，以及它们在谷中保持的那份可爱，就让主人的心被提起来了。所以你若是这些花中的一朵，就不需要抱怨！选自"
            }

              "simpEn": "The chains of sorrow and loss, the loads carried when young, and the soul's fight against sin all help build an iron toughness and strong purpose, as well as the ability to bear up and stay brave. These qualities form the needed base and frame of a noble character.",
              "simpZh": "忧伤和损失的铁链、年轻时背的重担、灵魂与罪的搏斗，这些都帮助我们培养出钢铁般的坚韧和坚定，还有忍耐和刚毅。这些品质构成了高尚品格必需的根基和骨架。"

            {
              "en": "Never run from suffering, but bear it silently, patiently, and <span class=\"vocab-trigger\" data-vocab=\"submissively\">submissively<\/span>, with the <span class=\"vocab-trigger\" data-vocab=\"assurance\">assurance<\/span> that it is God’s way of <span class=\"vocab-trigger\" data-vocab=\"instilling\">instilling<\/span> iron into your spiritual life. The world is looking for iron leaders, iron armies, iron <span class=\"vocab-trigger\" data-vocab=\"tendons\">tendons<\/span>, and muscles of steel. But God is looking for iron saints, and since there is no way to <span class=\"vocab-trigger\" data-vocab=\"impart\">impart<\/span> iron into His people’s moral nature except by letting them suffer, He allows them to suffer.",

              "simpEn": "Never run from suffering, but carry it quietly, patiently, and with a surrendered heart, knowing that this is God's way of putting iron into your spiritual life. The world is looking for iron leaders, iron armies, iron sinews, and muscles of steel. But God is looking for iron saints, and since there is no way to put iron into His people's character except by letting them suffer, He allows them to suffer.",
              "simpZh": "永远不要逃避苦难，要安静、忍耐、顺服地承受，确信这是神把铁打进你属灵生命的方法。世界在寻找铁一样的领袖、铁一样的军队、铁一样的筋腱和钢铁般的肌肉。但神在寻找铁一样的圣徒，而除了让他们受苦，没有别的办法能把铁打进神百姓的品格里，所以祂允许他们受苦。"
            },
            {
              "en": "Are the best years of your life slipping away while you suffer enforced <span class=\"vocab-trigger\" data-vocab=\"monotony\">monotony<\/span>? Are you <span class=\"vocab-trigger\" data-vocab=\"afflicted\">afflicted<\/span> with opposition, misunderstandings, and the <span class=\"vocab-trigger\" data-vocab=\"scorn\">scorn<\/span> of others? Do your afflictions seem as thick as the <span class=\"vocab-trigger\" data-vocab=\"undergrowth\">undergrowth<\/span> confronting someone hiking through a jungle? Then take heart! Your time is not wasted, for God is simply putting you through His iron <span class=\"vocab-trigger\" data-vocab=\"regimen\">regimen<\/span>. Your iron crown of suffering precedes your golden crown of glory, and iron is entering your soul to make it strong and brave. <span class=\"vocab-trigger\" data-vocab=\"F. B. Meyer\">F. B. Meyer<\/span>",

              "simpEn": "Are the best years of your life slipping away while you suffer forced sameness day after day? Are you troubled by opposition, misunderstandings, and the scorn of others? Do your troubles seem as thick as the bushes facing someone hiking through a jungle? Then take courage! Your time is not wasted, for God is simply putting you through His iron training. Your iron crown of suffering comes before your golden crown of glory, and iron is entering your soul to make it strong and brave. F. B. Meyer",
              "simpZh": "当你因被迫过着日复一日单调的生活，而人生的最好年华正在流逝，你受苦吗？你被反对、误解和别人的轻看所折磨吗？你的患难是不是像穿越丛林时遇到的灌木丛那样密密层层？那么，鼓起勇气吧！你的时间没有浪费，神不过是在让你经过祂的铁的训练。你苦难的铁冠冕，是在荣耀的金冠冕之前，铁正进入你的灵魂，要让它又强又勇敢。迈尔"

              "zh": "但你将不在意路途的崎岖陡峭，不在意寒冷未得歇息的清晨，也不在意正午的炎热；你将不偏左也不偏右，而是笔直向前，不因黑夜将临而战兢，因为这条路通向家。",
